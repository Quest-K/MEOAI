<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite Auth Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .bg-binance-gold { background-color: #F3BA2F; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #F3BA2F; outline: none; background: rgba(255,255,255,0.08); }
        .loading-spinner { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #F3BA2F; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- 로고 섹션 -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter">C-SUITE <span class="binance-gold">VAULT</span></h1>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.3em]">Institutional Grade Security</p>
        </div>

        <!-- 메인 카드 -->
        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl border-white/10">
            <!-- 탭 전환 -->
            <div class="flex bg-black/40 p-1 rounded-2xl mb-8">
                <button id="tab-login" class="flex-1 py-2 text-xs font-bold rounded-xl bg-white/10 text-white transition-all">로그인</button>
                <button id="tab-signup" class="flex-1 py-2 text-xs font-bold rounded-xl text-slate-500 hover:text-white transition-all">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <form id="login-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email Address</label>
                    <input type="email" id="login-email" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="name@company.com">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="login-password" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="w-full bg-binance-gold text-black font-bold py-4 rounded-2xl mt-4 hover:brightness-110 transition-all shadow-lg shadow-yellow-500/10">
                    시스템 접속
                </button>
            </form>

            <!-- 통합 회원가입 폼 -->
            <form id="signup-form" class="space-y-4 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Full Name</label>
                        <input type="text" id="signup-name" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="성함">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email</label>
                        <input type="email" id="signup-email" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="ceo@co.com">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="signup-password" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="최소 6자리 이상">
                </div>
                
                <div class="pt-2 border-t border-white/5 mt-2">
                    <p class="text-[9px] font-black text-binance-gold uppercase mb-3 tracking-widest">Binance API Configuration</p>
                    <div class="space-y-3">
                        <input type="password" id="signup-api-key" required class="input-field w-full px-4 py-3 rounded-xl text-xs font-mono" placeholder="Binance API Key">
                        <input type="password" id="signup-api-secret" required class="input-field w-full px-4 py-3 rounded-xl text-xs font-mono" placeholder="Binance Secret Key">
                    </div>
                </div>

                <button type="submit" id="signup-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl mt-4 hover:bg-slate-200 transition-all">
                    계정 생성 및 자산 연결
                </button>
            </form>

            <!-- 메시지 박스 -->
            <div id="message" class="mt-6 text-center text-[11px] font-medium p-3 rounded-xl hidden"></div>
        </div>

        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-widest">
            Protected by Supabase Guard System
        </p>
    </div>

    <script>
        // 새로운 Supabase 프로젝트 정보 적용
        const SUPABASE_URL = "https://mgidrwfgcdcxgosotysg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FQt1zyzqKOI3LUSZ8DYNAQ_b9fOqhTx";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const nodes = {
            tabLogin: document.getElementById('tab-login'),
            tabSignup: document.getElementById('tab-signup'),
            loginForm: document.getElementById('login-form'),
            signupForm: document.getElementById('signup-form'),
            msgBox: document.getElementById('message'),
            loginBtn: document.getElementById('login-btn'),
            signupBtn: document.getElementById('signup-btn')
        };

        // UI 헬퍼 함수
        const setStatus = (isLoading, btn) => {
            btn.disabled = isLoading;
            if (isLoading) {
                btn.dataset.originalText = btn.innerText;
                btn.innerHTML = `<span class="loading-spinner"></span> 처리 중...`;
            } else {
                btn.innerText = btn.dataset.originalText || btn.innerText;
            }
        };

        const showMsg = (text, isError = false) => {
            nodes.msgBox.innerText = text;
            nodes.msgBox.className = `mt-6 text-center text-[11px] font-medium p-3 rounded-xl ${
                isError ? 'text-red-400 bg-red-400/10 border border-red-400/20' : 'text-emerald-400 bg-emerald-400/10 border border-emerald-400/20'
            }`;
            nodes.msgBox.classList.remove('hidden');
        };

        // 탭 전환 핸들러
        nodes.tabLogin.onclick = () => {
            nodes.tabLogin.className = 'flex-1 py-2 text-xs font-bold rounded-xl bg-white/10 text-white transition-all';
            nodes.tabSignup.className = 'flex-1 py-2 text-xs font-bold rounded-xl text-slate-500 hover:text-white transition-all';
            nodes.loginForm.classList.remove('hidden');
            nodes.signupForm.classList.add('hidden');
            nodes.msgBox.classList.add('hidden');
        };

        nodes.tabSignup.onclick = () => {
            nodes.tabSignup.className = 'flex-1 py-2 text-xs font-bold rounded-xl bg-white/10 text-white transition-all';
            nodes.tabLogin.className = 'flex-1 py-2 text-xs font-bold rounded-xl text-slate-500 hover:text-white transition-all';
            nodes.signupForm.classList.remove('hidden');
            nodes.loginForm.classList.add('hidden');
            nodes.msgBox.classList.add('hidden');
        };

        // 로그인 처리
        nodes.loginForm.onsubmit = async (e) => {
            e.preventDefault();
            setStatus(true, nodes.loginBtn);
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMsg("보안 세션 수립 중... 잠시 후 이동합니다.");
                // 성공 시 trade.html로 이동 (파일이 준비되어 있어야 함)
                setTimeout(() => window.location.href = 'trade.html', 1000);
            } catch (err) {
                showMsg(err.message || "이메일 또는 비밀번호를 확인하세요.", true);
            } finally {
                setStatus(false, nodes.loginBtn);
            }
        };

        // 통합 회원가입 및 API 등록 처리
        nodes.signupForm.onsubmit = async (e) => {
            e.preventDefault();
            setStatus(true, nodes.signupBtn);

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const fullName = document.getElementById('signup-name').value;
            const apiKey = document.getElementById('signup-api-key').value;
            const apiSecret = document.getElementById('signup-api-secret').value;

            try {
                // 1. Supabase Auth 회원가입
                const { data: authData, error: authError } = await sb.auth.signUp({
                    email,
                    password,
                    options: { 
                        data: { full_name: fullName },
                        // 인증 메일 내 링크 클릭 시 돌아올 주소
                        emailRedirectTo: window.location.origin + window.location.pathname
                    }
                });

                if (authError) throw authError;

                if (authData.user) {
                    // 2. 바이낸스 API 키를 user_settings 테이블에 저장
                    // SQL의 RLS 정책에 따라 본인의 user_id로만 insert 가능
                    const { error: dbError } = await sb.from('user_settings').insert([{
                        user_id: authData.user.id,
                        binance_key: apiKey,
                        binance_secret: apiSecret,
                        default_order_amount: 10
                    }]);

                    if (dbError) {
                        console.error("DB 저장 오류:", dbError);
                        showMsg("가입은 완료되었으나 API 설정 저장에 실패했습니다. 관리자 페이지에서 확인하세요.", true);
                    } else {
                        showMsg("계정 생성 성공! 가입하신 이메일에서 인증 링크를 확인해 주세요.");
                    }
                }
            } catch (err) {
                showMsg(err.message, true);
            } finally {
                setStatus(false, nodes.signupBtn);
            }
        };

        // 초기 세션 체크 (이미 로그인된 경우 자동 이동)
        (async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                // 이미 세션이 있다면 trade.html로 바로 보낼 수 있습니다.
                // window.location.href = 'trade.html';
            }
        })();
    </script>
</body>
</html>
