    <script>
        const SUPABASE_URL = "https://mgidrwfgcdcxgosotysg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FQt1zyzqKOI3LUSZ8DYNAQ_b9fOqhTx";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const nodes = {
            tabLogin: document.getElementById('tab-login'),
            tabSignup: document.getElementById('tab-signup'),
            loginForm: document.getElementById('login-form'),
            signupForm: document.getElementById('signup-form'),
            forgotForm: document.getElementById('forgot-form'),
            msgBox: document.getElementById('message'),
            loginBtn: document.getElementById('login-btn'),
            signupBtn: document.getElementById('signup-btn'),
            forgotBtn: document.getElementById('forgot-btn'),
            goForgot: document.getElementById('go-forgot'),
            backToLogin: document.getElementById('back-to-login'),
            tabContainer: document.getElementById('tab-container')
        };

        const setStatus = (isLoading, btn) => {
            btn.disabled = isLoading;
            if (isLoading) {
                btn.dataset.originalText = btn.innerText;
                btn.innerHTML = `<span class="loading-spinner"></span> Processing...`;
            } else {
                btn.innerText = btn.dataset.originalText || btn.innerText;
            }
        };

        const showMsg = (text, isError = false) => {
            nodes.msgBox.innerText = text;
            nodes.msgBox.className = `mt-6 text-center text-[11px] font-medium p-3 rounded-xl ${
                isError ? 'text-red-400 bg-red-400/10 border border-red-400/20' : 'text-emerald-400 bg-emerald-400/10 border border-emerald-400/20'
            }`;
            nodes.msgBox.classList.remove('hidden');
        };

        const toggleTabs = (isSignup) => {
            nodes.tabLogin.className = isSignup ? 'flex-1 py-2 text-xs font-bold rounded-xl tab-inactive hover:text-white transition-all' : 'flex-1 py-2 text-xs font-bold rounded-xl tab-active transition-all';
            nodes.tabSignup.className = isSignup ? 'flex-1 py-2 text-xs font-bold rounded-xl tab-active transition-all' : 'flex-1 py-2 text-xs font-bold rounded-xl tab-inactive hover:text-white transition-all';
            nodes.signupForm.classList.toggle('hidden', !isSignup);
            nodes.loginForm.classList.toggle('hidden', isSignup);
            nodes.forgotForm.classList.add('hidden');
            nodes.tabContainer.classList.remove('hidden');
            nodes.msgBox.classList.add('hidden');
        };

        nodes.tabLogin.onclick = () => toggleTabs(false);
        nodes.tabSignup.onclick = () => toggleTabs(true);

        nodes.goForgot.onclick = () => {
            nodes.loginForm.classList.add('hidden');
            nodes.forgotForm.classList.remove('hidden');
            nodes.tabContainer.classList.add('hidden');
            nodes.msgBox.classList.add('hidden');
        };

        nodes.backToLogin.onclick = () => {
            nodes.forgotForm.classList.add('hidden');
            nodes.loginForm.classList.remove('hidden');
            nodes.tabContainer.classList.remove('hidden');
            nodes.msgBox.classList.add('hidden');
        };

        // 로그인 핸들러
        nodes.loginForm.onsubmit = async (e) => {
            e.preventDefault();
            setStatus(true, nodes.loginBtn);
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showMsg("보안 세션 수립 중...");
                setTimeout(() => window.location.href = 'trade.html', 1000);
            } catch (err) {
                showMsg(err.message, true);
            } finally {
                setStatus(false, nodes.loginBtn);
            }
        };

        // 회원가입 핸들러
        nodes.signupForm.onsubmit = async (e) => {
            e.preventDefault();
            setStatus(true, nodes.signupBtn);
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const fullName = document.getElementById('signup-name').value;
            const apiKey = document.getElementById('signup-api-key').value;
            const apiSecret = document.getElementById('signup-api-secret').value;

            try {
                let { data: authData, error: authError } = await sb.auth.signUp({
                    email, password, options: { data: { full_name: fullName } }
                });
                if (authError && authError.message.includes("already registered")) {
                    const { data: signInData, error: signInError } = await sb.auth.signInWithPassword({ email, password });
                    if (signInError) throw new Error("이미 가입된 이메일입니다. 비밀번호를 확인해주세요.");
                    authData = signInData;
                } else if (authError) throw authError;

                if (authData.user) {
                    const { error: dbError } = await sb.from('user_settings').upsert({
                        user_id: authData.user.id,
                        binance_key: apiKey,
                        binance_secret: apiSecret,
                        default_order_amount: 10
                    });
                    if (dbError) throw dbError;
                    showMsg("자산 연결 완료! 이제 로그인할 수 있습니다.");
                    setTimeout(() => nodes.tabLogin.click(), 2000);
                }
            } catch (err) {
                showMsg(err.message, true);
            } finally {
                setStatus(false, nodes.signupBtn);
            }
        };

        // 비밀번호 초기화 핸들러
        nodes.forgotForm.onsubmit = async (e) => {
            e.preventDefault();
            setStatus(true, nodes.forgotBtn);
            const email = document.getElementById('forgot-email').value;
            
            try {
                // redirectTo: 비밀번호 재설정 페이지 주소 (나중에 구현할 reset_password.html 등)
                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset_password.html',
                });
                if (error) throw error;
                showMsg("이메일로 재설정 링크가 전송되었습니다. 메일을 확인해주세요.");
            } catch (err) {
                showMsg(err.message, true);
            } finally {
                setStatus(false, nodes.forgotBtn);
            }
        };
    </script>
</body>
