<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e11; color: #eaecef; }
        .binance-yellow { color: #fcd535; }
        .bg-binance-gray { background-color: #1e2329; }
        .border-binance { border-color: #30363d; }
        .card { background-color: #1e2329; border-radius: 12px; border: 1px solid #30363d; }
        input { background-color: #2b3139 !important; border: 1px solid #474d57 !important; color: white !important; }
        input:focus { border-color: #fcd535 !important; outline: none; }
        .profit { color: #0ecb81; }
        .loss { color: #f6465d; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold binance-yellow">Binance Futures</h1>
                <p class="text-gray-400 text-sm mt-1">실시간 선물 포지션 및 수익률 조회</p>
            </div>
            <div id="status-badge" class="hidden px-3 py-1 rounded-full text-xs font-semibold bg-gray-700 text-gray-300">
                연결 대기 중
            </div>
        </header>

        <!-- API Settings Card -->
        <section class="card p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                API 설정
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">API Key</label>
                    <input type="password" id="apiKey" class="w-full p-2 rounded" placeholder="입력하세요">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Secret Key</label>
                    <input type="password" id="secretKey" class="w-full p-2 rounded" placeholder="입력하세요">
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="fetchData()" id="fetchBtn" class="bg-[#fcd535] hover:bg-[#f0c82d] text-black font-bold py-2 px-6 rounded transition-colors">
                    조회 시작
                </button>
                <button onclick="clearKeys()" class="bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded transition-colors">
                    정보 지우기
                </button>
            </div>
            <p class="text-xs text-gray-500 mt-3">* 입력하신 키는 서버에 저장되지 않으며 브라우저 메모리 내에서만 사용됩니다.</p>
        </section>

        <!-- Summary Info -->
        <div id="summary-container" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="card p-4">
                <p class="text-sm text-gray-400">총 미실현 손익 (USDT)</p>
                <p id="total-pnl" class="text-2xl font-bold mt-1">--</p>
            </div>
            <div class="card p-4">
                <p class="text-sm text-gray-400">지갑 잔고 (Wallet Balance)</p>
                <p id="wallet-balance" class="text-2xl font-bold mt-1 text-white">--</p>
            </div>
            <div class="card p-4">
                <p class="text-sm text-gray-400">활성 포지션 수</p>
                <p id="position-count" class="text-2xl font-bold mt-1 text-white">--</p>
            </div>
        </div>

        <!-- Position Table -->
        <section class="card overflow-hidden">
            <div class="p-4 border-b border-binance flex justify-between items-center">
                <h2 class="text-lg font-semibold">보유 포지션</h2>
                <span id="last-update" class="text-xs text-gray-500"></span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[#2b3139] text-gray-400 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-3">심볼 (Symbol)</th>
                            <th class="px-6 py-3">사이즈 (Size)</th>
                            <th class="px-6 py-3">진입가 (Entry)</th>
                            <th class="px-6 py-3">현재가 (Mark)</th>
                            <th class="px-6 py-3">수익금액 (PNL)</th>
                            <th class="px-6 py-3">수익률 (ROE%)</th>
                        </tr>
                    </thead>
                    <tbody id="position-table-body" class="divide-y divide-binance text-sm">
                        <tr>
                            <td colspan="6" class="px-6 py-10 text-center text-gray-500">
                                API 키를 입력하고 조회를 눌러주세요.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- UI Notification -->
        <div id="toast" class="fixed bottom-5 right-5 hidden bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-50">
            에러가 발생했습니다. 키를 확인해주세요.
        </div>
    </div>

    <script>
        const BASE_URL = 'https://fapi.binance.com';

        // Utility: Sign Request
        function getSignature(queryString, secretKey) {
            return CryptoJS.HmacSHA256(queryString, secretKey).toString();
        }

        function showToast(msg, isError = true) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden', 'bg-red-600', 'bg-green-600');
            toast.classList.add(isError ? 'bg-red-600' : 'bg-green-600');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function clearKeys() {
            document.getElementById('apiKey').value = '';
            document.getElementById('secretKey').value = '';
            localStorage.removeItem('bn_api_key');
            localStorage.removeItem('bn_secret_key');
            location.reload();
        }

        // Save keys temporarily
        document.getElementById('apiKey').value = localStorage.getItem('bn_api_key') || '';
        document.getElementById('secretKey').value = localStorage.getItem('bn_secret_key') || '';

        async function fetchData() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();

            if (!apiKey || !secretKey) {
                showToast("API Key와 Secret Key를 모두 입력해주세요.");
                return;
            }

            // Save for convenience
            localStorage.setItem('bn_api_key', apiKey);
            localStorage.setItem('bn_secret_key', secretKey);

            const btn = document.getElementById('fetchBtn');
            const statusBadge = document.getElementById('status-badge');
            
            btn.disabled = true;
            btn.innerText = "조회 중...";
            statusBadge.classList.remove('hidden');
            statusBadge.innerText = "데이터 호출 중...";

            try {
                const timestamp = Date.now();
                const queryString = `timestamp=${timestamp}`;
                const signature = getSignature(queryString, secretKey);

                // 1. Account Info (Balance)
                const accountResponse = await fetch(`${BASE_URL}/fapi/v2/account?${queryString}&signature=${signature}`, {
                    headers: { 'X-MBX-APIKEY': apiKey }
                });

                if (!accountResponse.ok) throw new Error("계정 정보를 가져오지 못했습니다.");
                const accountData = await accountResponse.json();

                // 2. Position Risk (Actual positions)
                const posResponse = await fetch(`${BASE_URL}/fapi/v2/positionRisk?${queryString}&signature=${signature}`, {
                    headers: { 'X-MBX-APIKEY': apiKey }
                });

                if (!posResponse.ok) throw new Error("포지션 정보를 가져오지 못했습니다.");
                const posData = await posResponse.json();

                updateUI(accountData, posData);
                statusBadge.innerText = "연결됨";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-semibold bg-green-900 text-green-300";

            } catch (err) {
                console.error(err);
                showToast(err.message);
                statusBadge.innerText = "연결 오류";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-semibold bg-red-900 text-red-300";
            } finally {
                btn.disabled = false;
                btn.innerText = "새로고침";
            }
        }

        function updateUI(account, positions) {
            const tableBody = document.getElementById('position-table-body');
            const summaryContainer = document.getElementById('summary-container');
            summaryContainer.classList.remove('hidden');

            // Summary Data
            document.getElementById('wallet-balance').innerText = parseFloat(account.totalWalletBalance).toLocaleString() + " USDT";
            document.getElementById('total-pnl').innerText = parseFloat(account.totalUnrealizedProfit).toLocaleString();
            document.getElementById('total-pnl').className = `text-2xl font-bold mt-1 ${parseFloat(account.totalUnrealizedProfit) >= 0 ? 'profit' : 'loss'}`;

            // Filter active positions (Amt != 0)
            const activePositions = positions.filter(p => parseFloat(p.positionAmt) !== 0);
            document.getElementById('position-count').innerText = activePositions.length;

            tableBody.innerHTML = '';

            if (activePositions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-gray-500">현재 오픈된 포지션이 없습니다.</td></tr>';
            } else {
                activePositions.forEach(pos => {
                    const amt = parseFloat(pos.positionAmt);
                    const entry = parseFloat(pos.entryPrice);
                    const mark = parseFloat(pos.markPrice);
                    const pnl = parseFloat(pos.unRealizedProfit);
                    
                    // ROE calculation simplified (not accounting for leverage in this view but typically PNL / (Margin))
                    // Here we show it based on simple % change vs entry
                    const roe = ((mark - entry) / entry * 100 * (amt > 0 ? 1 : -1)).toFixed(2);

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-[#2b3139] transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-bold text-white">${pos.symbol} <span class="text-[10px] ml-1 bg-gray-700 px-1 rounded text-gray-300">${pos.marginType.toUpperCase()} ${pos.leverage}x</span></td>
                        <td class="px-6 py-4 ${amt > 0 ? 'profit' : 'loss'} font-medium">${amt > 0 ? 'LONG' : 'SHORT'} ${Math.abs(amt)}</td>
                        <td class="px-6 py-4 text-gray-300">${entry.toLocaleString()}</td>
                        <td class="px-6 py-4 text-gray-300">${mark.toLocaleString()}</td>
                        <td class="px-6 py-4 font-bold ${pnl >= 0 ? 'profit' : 'loss'}">${pnl.toLocaleString()} USDT</td>
                        <td class="px-6 py-4 font-bold ${roe >= 0 ? 'profit' : 'loss'}">${roe}%</td>
                    `;
                    tableBody.appendChild(tr);
                });
            }

            document.getElementById('last-update').innerText = `최종 업데이트: ${new Date().toLocaleTimeString()}`;
        }
    </script>
</body>
</html>
