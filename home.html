<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e11; color: #eaecef; }
        .binance-yellow { color: #fcd535; }
        .bg-binance-gray { background-color: #1e2329; }
        .border-binance { border-color: #30363d; }
        .card { background-color: #1e2329; border-radius: 12px; border: 1px solid #30363d; }
        input, select { background-color: #2b3139 !important; border: 1px solid #474d57 !important; color: white !important; }
        input:focus, select:focus { border-color: #fcd535 !important; outline: none; }
        .profit { color: #0ecb81; }
        .loss { color: #f6465d; }
        
        .refresh-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #timer-progress {
            transition: width 1s linear;
        }

        /* 강조된 버튼 애니메이션 */
        .btn-highlight {
            background: linear-gradient(135deg, #fcd535 0%, #f0b90b 100%);
            box-shadow: 0 4px 15px rgba(252, 213, 53, 0.2);
            transition: all 0.3s ease;
        }
        .btn-highlight:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 213, 53, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold binance-yellow tracking-tight">Binance Futures</h1>
                <p class="text-gray-400 text-sm mt-1 tracking-wide">실시간 선물 포지션 대시보드</p>
            </div>
            <div id="status-badge" class="hidden px-3 py-1 rounded-full text-xs font-semibold bg-gray-700 text-gray-300">
                연결 대기 중
            </div>
        </header>

        <!-- API & Settings Card -->
        <section class="card p-6 mb-8 border-l-4 border-[#fcd535] shadow-xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#fcd535]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    설정
                </h2>
                
                <div class="flex items-center gap-4">
                    <!-- 강조된 종목찾기 버튼 -->
                    <a href="https://quest-k.github.io/MEOAI/trade.html" class="btn-highlight flex items-center gap-2 text-black font-bold px-6 py-2.5 rounded-lg text-sm transition-all border-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        전략 종목찾기
                    </a>

                    <div class="flex items-center gap-3 bg-[#2b3139] p-2 px-4 rounded-lg border border-binance">
                        <label class="text-sm text-gray-300">갱신 주기:</label>
                        <select id="refreshInterval" class="p-1 rounded text-sm bg-transparent border-none focus:ring-0">
                            <option value="5">5초</option>
                            <option value="10" selected>10초</option>
                            <option value="30">30초</option>
                            <option value="60">1분</option>
                            <option value="300">5분</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1 font-medium">API Key</label>
                    <input type="password" id="apiKey" class="w-full p-2.5 rounded-lg" placeholder="Binance API Key를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1 font-medium">Secret Key</label>
                    <input type="password" id="secretKey" class="w-full p-2.5 rounded-lg" placeholder="Binance Secret Key를 입력하세요">
                </div>
            </div>
            
            <div class="mt-6 flex flex-wrap gap-2">
                <button onclick="startFetching()" id="fetchBtn" class="bg-[#fcd535] hover:bg-[#f0c82d] text-black font-bold py-2.5 px-8 rounded-lg transition-colors flex items-center gap-2">
                    조회 시작
                </button>
                <button onclick="stopAutoRefresh()" id="stopBtn" class="hidden bg-red-900/50 hover:bg-red-800 text-white py-2.5 px-5 rounded-lg transition-colors border border-red-700">
                    자동 갱신 중단
                </button>
                <button onclick="clearKeys()" class="bg-gray-700 hover:bg-gray-600 text-white py-2.5 px-5 rounded-lg transition-colors">
                    정보 지우기
                </button>
            </div>

            <div id="timer-ui" class="mt-6 hidden">
                <div class="flex justify-between items-center mb-1 text-xs">
                    <span class="text-gray-400">다음 업데이트까지: <span id="countdown-text" class="text-white font-bold text-sm">--</span>초</span>
                    <span id="refresh-status" class="text-binance-yellow font-semibold">대기 중</span>
                </div>
                <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                    <div id="timer-progress" class="bg-[#fcd535] h-full w-0 shadow-[0_0_10px_rgba(252,213,53,0.5)]"></div>
                </div>
            </div>
        </section>

        <!-- Summary Info -->
        <div id="summary-container" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card p-4">
                <p class="text-xs text-gray-400 uppercase font-semibold">총 미실현 손익 (PNL)</p>
                <p id="total-pnl" class="text-xl font-bold mt-1 font-mono">--</p>
            </div>
            <div class="card p-4 border-l-4 border-blue-500">
                <p class="text-xs text-gray-400 uppercase font-semibold">사용 가능 잔액 (Available)</p>
                <p id="available-balance" class="text-xl font-bold mt-1 text-blue-400 font-mono">--</p>
            </div>
            <div class="card p-4">
                <p class="text-xs text-gray-400 uppercase font-semibold">지갑 총 잔고 (Wallet)</p>
                <p id="wallet-balance" class="text-xl font-bold mt-1 text-white font-mono">--</p>
            </div>
            <div class="card p-4">
                <p class="text-xs text-gray-400 uppercase font-semibold">활성 포지션 수</p>
                <p id="position-count" class="text-xl font-bold mt-1 text-white">--</p>
            </div>
        </div>

        <!-- Position Table -->
        <section class="card overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-binance flex justify-between items-center bg-[#1e2329]">
                <h2 class="text-lg font-bold">보유 포지션</h2>
                <div class="flex items-center gap-3">
                    <span id="refresh-indicator" class="hidden">
                        <svg class="refresh-spinner h-4 w-4 text-[#fcd535]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </span>
                    <span id="last-update" class="text-[11px] text-gray-500 font-mono">조회되지 않음</span>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[#2b3139] text-gray-400 text-[11px] uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">심볼 / 레버리지</th>
                            <th class="px-6 py-4 text-right">포지션 규모 (USDT)</th>
                            <th class="px-6 py-4 text-right">진입 / 마크 가격</th>
                            <th class="px-6 py-4 text-right">수익률 (ROE)</th>
                            <th class="px-6 py-4 text-right">미실현 손익 (PNL)</th>
                            <th class="px-6 py-4 text-right text-orange-400">차기 펀딩비 (Est.)</th>
                        </tr>
                    </thead>
                    <tbody id="position-table-body" class="divide-y divide-binance text-sm">
                        <tr>
                            <td colspan="6" class="px-6 py-16 text-center text-gray-500">
                                API 키를 입력하고 조회를 시작해 주세요.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <div id="toast" class="fixed bottom-5 right-5 hidden bg-red-600 text-white px-6 py-3 rounded-xl shadow-2xl z-50 transition-all duration-300 transform font-semibold">
            에러가 발생했습니다.
        </div>
    </div>

    <script>
        const BASE_URL = 'https://fapi.binance.com';
        let refreshTimer = null;
        let countdownTimer = null;
        let isFetching = false;
        let remainingSeconds = 0;

        function getSignature(queryString, secretKey) {
            return CryptoJS.HmacSHA256(queryString, secretKey).toString();
        }

        function showToast(msg, isError = true) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden', 'bg-red-600', 'bg-green-600', 'opacity-0', 'translate-y-10');
            toast.classList.add(isError ? 'bg-red-600' : 'bg-green-600');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        function clearKeys() {
            if(!confirm("저장된 API 키 정보를 삭제하시겠습니까?")) return;
            stopAutoRefresh();
            document.getElementById('apiKey').value = '';
            document.getElementById('secretKey').value = '';
            localStorage.removeItem('bn_api_key');
            localStorage.removeItem('bn_secret_key');
            location.reload();
        }

        document.getElementById('apiKey').value = localStorage.getItem('bn_api_key') || '';
        document.getElementById('secretKey').value = localStorage.getItem('bn_secret_key') || '';

        function startFetching() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            if (!apiKey || !secretKey) {
                showToast("API Key와 Secret Key를 모두 입력해주세요.");
                return;
            }
            localStorage.setItem('bn_api_key', apiKey);
            localStorage.setItem('bn_secret_key', secretKey);
            document.getElementById('stopBtn').classList.remove('hidden');
            document.getElementById('fetchBtn').innerText = "조회 가동 중";
            document.getElementById('fetchBtn').disabled = true;
            document.getElementById('fetchBtn').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('timer-ui').classList.remove('hidden');
            runCycle();
        }

        function runCycle() {
            fetchData();
            const interval = parseInt(document.getElementById('refreshInterval').value);
            remainingSeconds = interval;
            updateCountdownUI();
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                remainingSeconds--;
                if (remainingSeconds <= 0) {
                    runCycle();
                } else {
                    updateCountdownUI();
                }
            }, 1000);
        }

        function updateCountdownUI() {
            const interval = parseInt(document.getElementById('refreshInterval').value);
            const progressBar = document.getElementById('timer-progress');
            const countdownText = document.getElementById('countdown-text');
            countdownText.innerText = remainingSeconds;
            const percentage = ((interval - remainingSeconds) / interval) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        function stopAutoRefresh() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = null;
            document.getElementById('stopBtn').classList.add('hidden');
            document.getElementById('fetchBtn').innerText = "조회 시작";
            document.getElementById('fetchBtn').disabled = false;
            document.getElementById('fetchBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('timer-ui').classList.add('hidden');
            const statusBadge = document.getElementById('status-badge');
            statusBadge.innerText = "조회 중단됨";
            statusBadge.className = "px-3 py-1 rounded-full text-xs font-semibold bg-gray-700 text-gray-300";
            showToast("자동 갱신이 중단되었습니다.", false);
        }

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            const statusBadge = document.getElementById('status-badge');
            const refreshIndicator = document.getElementById('refresh-indicator');
            const refreshStatus = document.getElementById('refresh-status');
            statusBadge.classList.remove('hidden');
            refreshIndicator.classList.remove('hidden');
            refreshStatus.innerText = "데이터 갱신 중...";
            try {
                const timestamp = Date.now();
                const queryString = `timestamp=${timestamp}`;
                const signature = getSignature(queryString, secretKey);
                const [accountRes, posRes, fundingRes] = await Promise.all([
                    fetch(`${BASE_URL}/fapi/v2/account?${queryString}&signature=${signature}`, {
                        headers: { 'X-MBX-APIKEY': apiKey }
                    }),
                    fetch(`${BASE_URL}/fapi/v2/positionRisk?${queryString}&signature=${signature}`, {
                        headers: { 'X-MBX-APIKEY': apiKey }
                    }),
                    fetch(`${BASE_URL}/fapi/v1/premiumIndex`)
                ]);
                if (!accountRes.ok || !posRes.ok) throw new Error("API 호출 실패 (키 권한 확인 요망)");
                const accountData = await accountRes.json();
                const posData = await posRes.json();
                const fundingData = await fundingRes.json();
                updateUI(accountData, posData, fundingData);
                statusBadge.innerText = "실시간 연결 중";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-semibold bg-green-900 text-green-300";
                refreshStatus.innerText = "연결됨";
            } catch (err) {
                console.error(err);
                showToast(err.message);
                statusBadge.innerText = "연결 오류";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-semibold bg-red-900 text-red-300";
                refreshStatus.innerText = "오류 발생";
                stopAutoRefresh();
            } finally {
                isFetching = false;
                refreshIndicator.classList.add('hidden');
            }
        }

        function updateUI(account, positions, fundingRates) {
            const tableBody = document.getElementById('position-table-body');
            const summaryContainer = document.getElementById('summary-container');
            summaryContainer.classList.remove('hidden');

            const availableBal = parseFloat(account.availableBalance);
            const totalWalletBal = parseFloat(account.totalWalletBalance);
            const totalUnrealized = parseFloat(account.totalUnrealizedProfit);

            document.getElementById('available-balance').innerText = availableBal.toLocaleString(undefined, {minimumFractionDigits: 2}) + " USDT";
            document.getElementById('wallet-balance').innerText = totalWalletBal.toLocaleString(undefined, {minimumFractionDigits: 2}) + " USDT";
            document.getElementById('total-pnl').innerText = (totalUnrealized >= 0 ? "+" : "") + totalUnrealized.toLocaleString(undefined, {minimumFractionDigits: 2}) + " USDT";
            document.getElementById('total-pnl').className = `text-xl font-bold mt-1 font-mono ${totalUnrealized >= 0 ? 'profit' : 'loss'}`;

            const activePositions = positions.filter(p => parseFloat(p.positionAmt) !== 0);
            document.getElementById('position-count').innerText = activePositions.length;

            const fundingMap = {};
            fundingRates.forEach(f => {
                fundingMap[f.symbol] = parseFloat(f.lastFundingRate);
            });

            tableBody.innerHTML = '';
            if (activePositions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-16 text-center text-gray-500">현재 오픈된 포지션이 없습니다.</td></tr>';
            } else {
                activePositions.forEach(pos => {
                    const amt = parseFloat(pos.positionAmt);
                    const entry = parseFloat(pos.entryPrice);
                    const mark = parseFloat(pos.markPrice);
                    const pnl = parseFloat(pos.unRealizedProfit);
                    const leverage = pos.leverage;
                    
                    const fundingRateRaw = fundingMap[pos.symbol] || 0;
                    const fundingRateDisplay = (fundingRateRaw * 100).toFixed(4);
                    
                    const usdtValue = Math.abs(amt * mark);
                    const estFundingFee = usdtValue * fundingRateRaw;
                    
                    const isPaying = (amt > 0 && fundingRateRaw > 0) || (amt < 0 && fundingRateRaw < 0);
                    const roe = ((mark - entry) / entry * 100 * (amt > 0 ? 1 : -1) * leverage).toFixed(2);

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-[#2b3139] transition-colors border-b border-binance last:border-0";
                    tr.innerHTML = `
                        <td class="px-6 py-5 font-bold text-white">
                            <div class="flex flex-col">
                                <span class="text-base">${pos.symbol}</span>
                                <span class="flex items-center gap-1 mt-1">
                                    <span class="text-[10px] bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 font-mono">${pos.marginType.toUpperCase()} ${leverage}x</span>
                                    <span class="text-[10px] text-gray-500 font-normal">Next: <span class="${fundingRateRaw >= 0 ? 'text-blue-400' : 'text-orange-400'}">${fundingRateDisplay}%</span></span>
                                </span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <div class="flex flex-col items-end">
                                <span class="text-lg font-bold text-white font-mono">
                                    ${usdtValue.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1})} <span class="text-[10px] text-gray-500 font-normal ml-1 tracking-tighter uppercase">USDT</span>
                                </span>
                                <span class="${amt > 0 ? 'profit' : 'loss'} text-[11px] font-semibold mt-0.5 flex items-center gap-1">
                                    <span class="px-1 py-0.2 rounded-[3px] text-[9px] ${amt > 0 ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${amt > 0 ? 'LONG' : 'SHORT'}</span>
                                    ${Math.abs(amt).toLocaleString()} Qty
                                </span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-right font-mono">
                            <div class="flex flex-col items-end">
                                <span class="text-gray-300 text-xs">Entry: ${entry.toLocaleString()}</span>
                                <span class="text-[#fcd535] text-xs font-semibold mt-1">Mark: ${mark.toLocaleString()}</span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-right font-bold text-base ${roe >= 0 ? 'profit' : 'loss'}">${roe}%</td>
                        <td class="px-6 py-5 text-right font-bold font-mono text-base ${pnl >= 0 ? 'profit' : 'loss'} tracking-tight">
                            ${pnl.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})} <span class="text-[10px] font-normal uppercase ml-0.5">USDT</span>
                        </td>
                        <td class="px-6 py-5 text-right font-mono">
                            <div class="flex flex-col items-end">
                                <span class="${isPaying ? 'loss' : 'profit'} font-bold">
                                    ${isPaying ? '-' : '+'}${Math.abs(estFundingFee).toFixed(3)}
                                </span>
                                <span class="text-[10px] font-normal text-gray-500">${isPaying ? '지불예정' : '수취예정'}</span>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
            document.getElementById('last-update').innerText = `최종 업데이트: ${new Date().toLocaleTimeString()}`;
        }
    </script>
</body>
</html>
