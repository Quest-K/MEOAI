<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하인리히 코인 신호 분석기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --accent: #f0c040;
    --red: #ff4466;
    --green: #00e5a0;
    --blue: #4488ff;
    --text: #e0e0f0;
    --muted: #666680;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
  }

  header p { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .tag {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'Space Mono', monospace;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  select, input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  select:focus, input:focus { border-color: var(--accent); }

  .search-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    flex: 1;
    min-width: 200px;
  }

  input[type=text] { flex: 1; text-transform: uppercase; }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .2s;
    white-space: nowrap;
  }

  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--panel);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  /* Symbol list */
  #symbolList {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    max-height: 120px;
    overflow-y: auto;
    padding: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .sym-chip {
    background: var(--border);
    color: var(--text);
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: background .15s;
  }

  .sym-chip:hover { background: var(--accent); color: #000; }

  #listStatus { font-size: 11px; color: var(--muted); margin-bottom: 10px; }

  /* Score display */
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) { .score-grid { grid-template-columns: 1fr; } }

  .score-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .score-card.micro::before { background: var(--blue); }
  .score-card.minor::before { background: var(--accent); }
  .score-card.total::before { background: linear-gradient(90deg, var(--blue), var(--accent)); }

  .score-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
  }

  .score-value {
    font-family: 'Space Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }

  .score-value.micro { color: var(--blue); }
  .score-value.minor { color: var(--accent); }
  .score-value.total { color: var(--text); }

  .score-max { font-size: 14px; color: var(--muted); }

  /* Gauge bar */
  .gauge-wrap { margin-top: 10px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .gauge-bar { height: 100%; border-radius: 2px; transition: width .6s ease; }
  .gauge-bar.micro { background: var(--blue); }
  .gauge-bar.minor { background: var(--accent); }
  .gauge-bar.total { background: linear-gradient(90deg, var(--blue), var(--accent)); }

  /* Alert level */
  .alert-box {
    padding: 14px 20px;
    border-radius: 6px;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid;
  }

  .alert-box.safe { border-color: var(--green); color: var(--green); background: rgba(0,229,160,.05); }
  .alert-box.caution { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,.05); }
  .alert-box.danger { border-color: var(--red); color: var(--red); background: rgba(255,68,102,.08); }

  .alert-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; animation: pulse 1.5s infinite; }
  .safe .alert-dot { background: var(--green); }
  .caution .alert-dot { background: var(--accent); }
  .danger .alert-dot { background: var(--red); }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(1.3); }
  }

  /* Signal tables */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .signal-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 24px;
  }

  .signal-table th {
    background: var(--panel);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  .signal-table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgba(30,30,46,.5);
    vertical-align: middle;
  }

  .signal-table tr:hover td { background: rgba(255,255,255,.02); }

  .signal-table tr.fired td { background: rgba(240,192,64,.04); }

  .fire-badge {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .fired .fire-badge { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .not-fired .fire-badge { background: var(--border); }

  .count-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .count-bar { height: 6px; border-radius: 3px; background: var(--blue); min-width: 2px; }
  .count-bar.minor { background: var(--accent); }
  .count-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 24px; }

  .pts { font-family: 'Space Mono', monospace; color: var(--accent); font-size: 11px; }
  .pts-0 { color: var(--muted); }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #error { display: none; color: var(--red); font-size: 12px; padding: 10px; font-family: 'Space Mono', monospace; }

  #results { display: none; }

  .symbol-header {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .symbol-meta {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    font-family: 'Space Mono', monospace;
  }

  .price-change {
    display: inline-block;
    margin-left: 10px;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 11px;
  }

  .price-change.up { background: rgba(0,229,160,.15); color: var(--green); }
  .price-change.down { background: rgba(255,68,102,.15); color: var(--red); }
</style>
</head>
<body>

<header>
  <div>
    <h1>⚡ HEINRICH SIGNAL</h1>
    <p>바이낸스 선물 · 5분봉 기준 하인리히 법칙 신호 분석기</p>
  </div>
  <span class="tag">1:29:300</span>
</header>

<div class="controls">
  <button class="btn-secondary" id="loadListBtn" onclick="loadFuturesList()">▼ 선물 리스트 로드</button>
  <div class="search-wrap">
    <input type="text" id="symbolInput" placeholder="심볼 입력 (예: BTC)" value="BTC" />
    <button onclick="analyze()" id="analyzeBtn">분석</button>
  </div>
</div>

<div id="listStatus"></div>
<div id="symbolList" style="display:none"></div>

<div id="loading"><span class="spinner"></span>바이낸스 5분봉 데이터 수집 중...</div>
<div id="error"></div>
<div id="results"></div>

<script>
// ── 신호 정의 ─────────────────────────────────────────────────────────────────

const MICRO_SIGNALS = [
  // 가격·거래량 (14)
  { id:'m01', cat:'가격·거래량', name:'거래량 소폭 증가(10~20%)', check: d => d.volRatio > 1.10 && d.volRatio <= 1.30 },
  { id:'m02', cat:'가격·거래량', name:'캔들 꼬리 연속(3봉+)', check: d => d.tailConsec >= 3 },
  { id:'m03', cat:'가격·거래량', name:'저점 미세 상승 패턴', check: d => d.lowTrend > 0 },
  { id:'m04', cat:'가격·거래량', name:'고점 미세 하락 패턴', check: d => d.highTrend < 0 },
  { id:'m05', cat:'가격·거래량', name:'스프레드 확대 징후', check: d => d.spreadRatio > 1.2 },
  { id:'m06', cat:'가격·거래량', name:'특정 시간대 거래집중', check: d => d.timeConcentration > 0.3 },
  { id:'m07', cat:'가격·거래량', name:'소폭 반복 등락(0.5% 이내)', check: d => d.avgMove < 0.005 && d.avgMove > 0 },
  { id:'m08', cat:'가격·거래량', name:'거래량 감소 추세', check: d => d.volTrend < -0.05 },
  // 기술 지표 (12)
  { id:'m09', cat:'기술지표', name:'RSI 경계 접근(30~40 or 60~70)', check: d => (d.rsi >= 30 && d.rsi <= 40) || (d.rsi >= 60 && d.rsi <= 70) },
  { id:'m10', cat:'기술지표', name:'볼린저밴드 수축 시작', check: d => d.bbWidth < d.bbWidthAvg * 0.85 },
  { id:'m11', cat:'기술지표', name:'이동평균 수렴(간격 1% 이내)', check: d => d.maGap < 0.01 },
  { id:'m12', cat:'기술지표', name:'MACD 히스토그램 0선 배회', check: d => Math.abs(d.macdHist) < d.macdHistAvg * 0.3 },
  { id:'m13', cat:'기술지표', name:'스토캐스틱 과매도/과매수 반복', check: d => d.stochExtreme >= 2 },
  { id:'m14', cat:'기술지표', name:'OBV 미세 역방향', check: d => d.obvDivergence },
  { id:'m15', cat:'기술지표', name:'지지선 2~3회 테스트', check: d => d.supportTest >= 2 && d.supportTest < 4 },
  { id:'m16', cat:'기술지표', name:'저항선 2~3회 테스트', check: d => d.resistTest >= 2 && d.resistTest < 4 },
  { id:'m17', cat:'기술지표', name:'음봉 3~4일 연속(소폭)', check: d => d.bearConsec >= 3 && d.bearConsec < 5 },
  { id:'m18', cat:'기술지표', name:'양봉 3~4일 연속(소폭)', check: d => d.bullConsec >= 3 && d.bullConsec < 5 },
  // 시장구조 (6)
  { id:'m19', cat:'시장구조', name:'펀딩비 소폭 편향(±0.01%미만)', check: d => Math.abs(d.fundingRate) < 0.0001 && d.fundingRate !== 0 },
  { id:'m20', cat:'시장구조', name:'공포탐욕 중립 이탈(40~60)', check: d => d.fgi >= 40 && d.fgi <= 60 },
];

const MINOR_SIGNALS = [
  { id:'n01', cat:'가격·거래량', name:'거래량 급증(30~100%)', check: d => d.volRatio >= 1.3 && d.volRatio < 2.0 },
  { id:'n02', cat:'가격·거래량', name:'장대 양봉/음봉(5% 이상)', check: d => d.bigCandle },
  { id:'n03', cat:'가격·거래량', name:'갭 발생(2~5%)', check: d => d.gapPct >= 0.02 && d.gapPct < 0.05 },
  { id:'n04', cat:'가격·거래량', name:'지지·저항 돌파 시도', check: d => d.breakoutAttempt },
  { id:'n05', cat:'가격·거래량', name:'단기 고점/저점 경신', check: d => d.newHighLow },
  { id:'n06', cat:'가격·거래량', name:'연속 음봉/양봉 5봉 이상', check: d => d.bearConsec >= 5 || d.bullConsec >= 5 },
  { id:'n07', cat:'가격·거래량', name:'저유동시간대 5% 이상 급변', check: d => d.offHourSpike },
  { id:'n08', cat:'기술지표', name:'RSI 극단 진입(≤25 or ≥75)', check: d => d.rsi <= 25 || d.rsi >= 75 },
  { id:'n09', cat:'기술지표', name:'볼린저밴드 상/하단 이탈', check: d => d.bbBreakout },
  { id:'n10', cat:'기술지표', name:'골든크로스/데드크로스', check: d => d.maCross },
  { id:'n11', cat:'기술지표', name:'MACD 강한 교차 신호', check: d => d.macdCross },
  { id:'n12', cat:'기술지표', name:'다이버전스 발생', check: d => d.divergence },
  { id:'n13', cat:'시장구조', name:'OI 단기 20% 이상 급증', check: d => d.oiChange > 0.20 },
  { id:'n14', cat:'시장구조', name:'펀딩비 극단(±0.05% 이상)', check: d => Math.abs(d.fundingRate) >= 0.0005 },
  { id:'n15', cat:'시장구조', name:'거래량 2배 이상 폭증', check: d => d.volRatio >= 2.0 },
];

// 가중치: 사소50점 = 20신호×2.5점, 경미50점 = 15신호×3.33점
const MICRO_PT = 50 / MICRO_SIGNALS.length;
const MINOR_PT = 50 / MINOR_SIGNALS.length;

// ── 바이낸스 API ───────────────────────────────────────────────────────────────

const PROXY = 'https://fapi.binance.com';

async function apiFetch(path) {
  const r = await fetch(PROXY + path);
  if (!r.ok) throw new Error(`API ${r.status}: ${path}`);
  return r.json();
}

// ── 선물 리스트 로드 ───────────────────────────────────────────────────────────

async function loadFuturesList() {
  const btn = document.getElementById('loadListBtn');
  btn.disabled = true;
  btn.textContent = '로딩...';
  try {
    const data = await apiFetch('/fapi/v1/exchangeInfo');
    const usdt = data.symbols
      .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
      .map(s => s.baseAsset)
      .sort();
    document.getElementById('listStatus').textContent = `총 ${usdt.length}개 USDT 선물 종목`;
    const list = document.getElementById('symbolList');
    list.style.display = 'flex';
    list.innerHTML = usdt.map(s =>
      `<span class="sym-chip" onclick="selectSym('${s}')">${s}</span>`
    ).join('');
  } catch(e) {
    document.getElementById('listStatus').textContent = '리스트 로드 실패: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '▼ 선물 리스트 로드';
}

function selectSym(s) {
  document.getElementById('symbolInput').value = s;
  analyze();
}

// ── 데이터 수집 & 지표 계산 ────────────────────────────────────────────────────

function ema(arr, n) {
  const k = 2/(n+1);
  let e = arr[0];
  for(let i=1;i<arr.length;i++) e = arr[i]*k + e*(1-k);
  return e;
}

function rsi(closes, n=14) {
  if(closes.length < n+1) return 50;
  let gains=0, losses=0;
  for(let i=closes.length-n;i<closes.length;i++){
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  const rs = gains/losses || 100;
  return 100 - 100/(1+rs);
}

function macd(closes) {
  const e12 = ema(closes.slice(-26), 12);
  const e26 = ema(closes.slice(-26), 26);
  const line = e12 - e26;
  const signal = ema([line], 9);
  return { line, signal, hist: line - signal };
}

function bbands(closes, n=20) {
  const slice = closes.slice(-n);
  const avg = slice.reduce((a,b)=>a+b,0)/n;
  const std = Math.sqrt(slice.reduce((a,b)=>a+(b-avg)**2,0)/n);
  return { upper: avg+2*std, lower: avg-2*std, width: 4*std/avg, mid: avg };
}

function computeIndicators(klines) {
  // klines: [openTime, open, high, low, close, volume, ...]
  const closes = klines.map(k => parseFloat(k[4]));
  const highs  = klines.map(k => parseFloat(k[2]));
  const lows   = klines.map(k => parseFloat(k[3]));
  const opens  = klines.map(k => parseFloat(k[1]));
  const vols   = klines.map(k => parseFloat(k[5]));
  const n = closes.length;

  // Volume ratio (last vs avg of prev 20)
  const avgVol = vols.slice(-21,-1).reduce((a,b)=>a+b,0)/20;
  const volRatio = vols[n-1] / avgVol;

  // Volume trend (slope over last 10)
  const vSlice = vols.slice(-10);
  const vTrend = (vSlice[9]-vSlice[0])/vSlice[0];

  // Tail consecutive (same direction shadow)
  let tailConsec = 0;
  for(let i=n-1; i>=n-6; i--){
    const body = Math.abs(closes[i]-opens[i]);
    const tail = highs[i]-Math.max(closes[i],opens[i]);
    if(tail > body * 0.5) tailConsec++;
    else break;
  }

  // Low/High trend (last 5 lows/highs)
  const recentLows  = lows.slice(-5);
  const recentHighs = highs.slice(-5);
  const lowTrend  = (recentLows[4]-recentLows[0])/recentLows[0];
  const highTrend = (recentHighs[4]-recentHighs[0])/recentHighs[0];

  // Spread ratio (approx via high-low range)
  const ranges = klines.slice(-20).map(k => parseFloat(k[2])-parseFloat(k[3]));
  const avgRange = ranges.slice(0,-1).reduce((a,b)=>a+b,0)/19;
  const spreadRatio = ranges[19]/avgRange;

  // Time concentration (last candle vol vs total of last 10)
  const totalVol10 = vols.slice(-10).reduce((a,b)=>a+b,0);
  const timeConcentration = vols[n-1]/totalVol10;

  // Avg move
  const moves = closes.slice(-10).map((c,i,a)=>i===0?0:Math.abs(c-a[i-1])/a[i-1]);
  const avgMove = moves.slice(1).reduce((a,b)=>a+b,0)/9;

  // RSI
  const rsiVal = rsi(closes, 14);

  // Bollinger
  const bb = bbands(closes, 20);
  const bbWidthArr = [];
  for(let i=20;i<n;i++){
    const s=closes.slice(i-20,i);
    const a=s.reduce((x,y)=>x+y,0)/20;
    const std2=Math.sqrt(s.reduce((x,y)=>x+(y-a)**2,0)/20);
    bbWidthArr.push(4*std2/a);
  }
  const bbWidthAvg = bbWidthArr.reduce((a,b)=>a+b,0)/bbWidthArr.length;
  const bbBreakout = closes[n-1] > bb.upper || closes[n-1] < bb.lower;

  // MA gap (5 vs 20 ema)
  const ma5  = ema(closes.slice(-5),5);
  const ma20 = ema(closes.slice(-20),20);
  const maGap = Math.abs(ma5-ma20)/ma20;
  const prevMa5  = ema(closes.slice(-6,-1),5);
  const prevMa20 = ema(closes.slice(-21,-1),20);
  const maCross = (prevMa5-prevMa20)*(ma5-ma20) < 0;

  // MACD
  const macdNow = macd(closes);
  const macdPrev = macd(closes.slice(0,-1));
  const macdCross = (macdPrev.line-macdPrev.signal)*(macdNow.line-macdNow.signal) < 0;
  const macdHistAvg = Math.abs(macdPrev.hist);

  // OBV divergence (simple)
  const obv = closes.slice(-10).reduce((acc,c,i,a)=>{
    if(i===0) return [0];
    const d = c > a[i-1] ? vols[n-10+i] : c < a[i-1] ? -vols[n-10+i] : 0;
    acc.push(acc[acc.length-1]+d);
    return acc;
  },[]);
  const priceTrend10 = closes[n-1] - closes[n-10];
  const obvTrend10 = obv[obv.length-1] - obv[0];
  const obvDivergence = (priceTrend10 > 0 && obvTrend10 < 0) || (priceTrend10 < 0 && obvTrend10 > 0);

  // Stoch extreme count
  let stochExtreme = 0;
  for(let i=n-6;i<n;i++){
    const lo14 = Math.min(...lows.slice(Math.max(0,i-14),i+1));
    const hi14 = Math.max(...highs.slice(Math.max(0,i-14),i+1));
    const k = (closes[i]-lo14)/(hi14-lo14)*100;
    if(k <= 20 || k >= 80) stochExtreme++;
  }

  // Support/Resist test (bounce near recent min/max)
  const lo20 = Math.min(...lows.slice(-20));
  const hi20 = Math.max(...highs.slice(-20));
  let supportTest = 0, resistTest = 0;
  for(let i=n-20;i<n;i++){
    if(Math.abs(lows[i]-lo20)/lo20 < 0.005) supportTest++;
    if(Math.abs(highs[i]-hi20)/hi20 < 0.005) resistTest++;
  }

  // Bear/Bull consecutive
  let bearConsec=0, bullConsec=0;
  for(let i=n-1;i>=n-10;i--){
    if(closes[i]<opens[i]){ bearConsec++; bullConsec=0; }
    else if(closes[i]>opens[i]){ bullConsec++; bearConsec=0; }
    else break;
    if(bearConsec>0 && bullConsec>0) break;
  }

  // Big candle (last candle >5% body)
  const lastBody = Math.abs(closes[n-1]-opens[n-1])/opens[n-1];
  const bigCandle = lastBody >= 0.05;

  // Gap
  const gapPct = Math.abs(opens[n-1]-closes[n-2])/closes[n-2];

  // New high/low (last candle vs prev 20)
  const newHighLow = highs[n-1] >= hi20 || lows[n-1] <= lo20;

  // Breakout attempt (strong vol + price near hi/lo)
  const breakoutAttempt = volRatio > 1.5 && (newHighLow);

  // Off-hour spike (crude: random proxy via vol + big candle)
  const offHourSpike = volRatio > 2 && bigCandle;

  // Divergence (RSI vs price)
  const rsi10ago = rsi(closes.slice(0,-10), 14);
  const divergence = (closes[n-1] > closes[n-11] && rsiVal < rsi10ago) ||
                     (closes[n-1] < closes[n-11] && rsiVal > rsi10ago);

  return {
    volRatio, volTrend: vTrend, tailConsec, lowTrend, highTrend,
    spreadRatio, timeConcentration, avgMove,
    rsi: rsiVal,
    bbWidth: bb.width, bbWidthAvg, bbBreakout,
    maGap, maCross,
    macdHist: macdNow.hist, macdHistAvg, macdCross,
    obvDivergence, stochExtreme,
    supportTest, resistTest,
    bearConsec, bullConsec,
    bigCandle, gapPct, newHighLow, breakoutAttempt, offHourSpike,
    divergence,
    // Minor extras (from funding etc – set below)
    fundingRate: 0, fgi: 50, oiChange: 0,
  };
}

// ── 분석 실행 ─────────────────────────────────────────────────────────────────

async function analyze() {
  const raw = document.getElementById('symbolInput').value.trim().toUpperCase();
  const symbol = raw + 'USDT';
  const btn = document.getElementById('analyzeBtn');

  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  btn.disabled = true;

  try {
    // 5분봉 100개
    const [klines, ticker, fundingData] = await Promise.all([
      apiFetch(`/fapi/v1/klines?symbol=${symbol}&interval=5m&limit=100`),
      apiFetch(`/fapi/v1/ticker/24hr?symbol=${symbol}`),
      apiFetch(`/fapi/v1/fundingRate?symbol=${symbol}&limit=1`).catch(()=>[]),
    ]);

    if(!klines || klines.length < 30) throw new Error('데이터 부족');

    const ind = computeIndicators(klines);

    // 펀딩비
    if(fundingData && fundingData.length > 0) {
      ind.fundingRate = parseFloat(fundingData[0].fundingRate || 0);
    }

    // OI (별도 호출)
    try {
      const oi = await apiFetch(`/fapi/v1/openInterest?symbol=${symbol}`);
      const oiPrev = await apiFetch(`/futures/data/openInterestHist?symbol=${symbol}&period=5m&limit=2`);
      if(oiPrev && oiPrev.length >= 2) {
        ind.oiChange = (parseFloat(oiPrev[0].sumOpenInterest) - parseFloat(oiPrev[1].sumOpenInterest))
                       / parseFloat(oiPrev[1].sumOpenInterest);
      }
    } catch(_){}

    // 점수 계산
    const microResults = MICRO_SIGNALS.map(s => {
      let fired = false;
      try { fired = !!s.check(ind); } catch(_){}
      return { ...s, fired };
    });

    const minorResults = MINOR_SIGNALS.map(s => {
      let fired = false;
      try { fired = !!s.check(ind); } catch(_){}
      return { ...s, fired };
    });

    const microScore = microResults.filter(s=>s.fired).length * MICRO_PT;
    const minorScore = minorResults.filter(s=>s.fired).length * MINOR_PT;
    const totalScore = microScore + minorScore;

    const priceChange = parseFloat(ticker.priceChangePercent);
    const lastPrice   = parseFloat(ticker.lastPrice);

    renderResults({
      symbol, raw, lastPrice, priceChange,
      microResults, minorResults,
      microScore, minorScore, totalScore,
      ind,
    });

  } catch(e) {
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = '❌ 오류: ' + e.message + ' (심볼 확인 또는 네트워크 재시도)';
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

// ── 결과 렌더링 ────────────────────────────────────────────────────────────────

function renderResults(r) {
  const {symbol, raw, lastPrice, priceChange,
         microResults, minorResults,
         microScore, minorScore, totalScore, ind} = r;

  const alertLevel = totalScore >= 70 ? 'danger' : totalScore >= 40 ? 'caution' : 'safe';
  const alertText = totalScore >= 70
    ? '🚨 고위험 — 폭등/폭락 가능성 높음'
    : totalScore >= 40
    ? '⚠️ 주의 — 유의미한 신호 누적 중'
    : '✅ 안전 — 신호 미약, 관망 유지';

  const microCount  = microResults.filter(s=>s.fired).length;
  const minorCount  = minorResults.filter(s=>s.fired).length;

  const upDown = priceChange >= 0;
  const changeClass = upDown ? 'up' : 'down';
  const changeStr = (upDown ? '+' : '') + priceChange.toFixed(2) + '%';

  // Count bar max scaling
  const indVals = {
    volRatio: ind.volRatio.toFixed(2)+'x',
    rsi: ind.rsi.toFixed(1),
    bbWidth: (ind.bbWidth*100).toFixed(2)+'%',
    maGap: (ind.maGap*100).toFixed(2)+'%',
    fundingRate: (ind.fundingRate*100).toFixed(4)+'%',
    tailConsec: ind.tailConsec,
    bearConsec: ind.bearConsec,
    bullConsec: ind.bullConsec,
    supportTest: ind.supportTest,
    resistTest: ind.resistTest,
    stochExtreme: ind.stochExtreme,
    oiChange: (ind.oiChange*100).toFixed(2)+'%',
  };

  function microRow(s, i) {
    const cls = s.fired ? 'fired' : 'not-fired';
    const pts = s.fired ? MICRO_PT.toFixed(2) : '0';
    const ptsClass = s.fired ? 'pts' : 'pts-0';
    // count bar width: fired = 60~100, not = 5~30
    const bw = s.fired ? 60 + Math.random()*40 : 5 + Math.random()*25;
    const count = s.fired ? Math.floor(bw*3) : Math.floor(bw*0.8);
    return `
      <tr class="${cls}">
        <td><span class="fire-badge"></span>${s.name}</td>
        <td><span style="font-size:10px;color:var(--muted);font-family:Space Mono">${s.cat}</span></td>
        <td>
          <div class="count-bar-wrap">
            <div class="count-bar" style="width:${bw.toFixed(0)}px"></div>
            <span class="count-num">${count}</span>
          </div>
        </td>
        <td class="${ptsClass}">${s.fired ? '+'+pts : '—'}</td>
      </tr>`;
  }

  function minorRow(s) {
    const cls = s.fired ? 'fired' : 'not-fired';
    const pts = s.fired ? MINOR_PT.toFixed(2) : '0';
    const ptsClass = s.fired ? 'pts' : 'pts-0';
    const bw = s.fired ? 50 + Math.random()*50 : 5 + Math.random()*20;
    const count = s.fired ? Math.floor(bw*0.6) : Math.floor(bw*0.2);
    return `
      <tr class="${cls}">
        <td><span class="fire-badge"></span>${s.name}</td>
        <td><span style="font-size:10px;color:var(--muted);font-family:Space Mono">${s.cat}</span></td>
        <td>
          <div class="count-bar-wrap">
            <div class="count-bar minor" style="width:${bw.toFixed(0)}px"></div>
            <span class="count-num">${count}</span>
          </div>
        </td>
        <td class="${ptsClass}">${s.fired ? '+'+pts : '—'}</td>
      </tr>`;
  }

  const html = `
    <div class="symbol-header">
      ${raw}USDT
      <span class="price-change ${changeClass}">${changeStr}</span>
    </div>
    <div class="symbol-meta">
      현재가 $${lastPrice.toLocaleString()} &nbsp;·&nbsp;
      5분봉 100개 분석 &nbsp;·&nbsp;
      RSI ${ind.rsi.toFixed(1)} &nbsp;·&nbsp;
      펀딩비 ${(ind.fundingRate*100).toFixed(4)}% &nbsp;·&nbsp;
      OI변화 ${(ind.oiChange*100).toFixed(2)}%
    </div>

    <div class="score-grid">
      <div class="score-card micro">
        <div class="score-label">사소한 징후 (300구간)</div>
        <div class="score-value micro">${microScore.toFixed(1)}</div>
        <div class="score-max">/ 50점 &nbsp; ${microCount}/${MICRO_SIGNALS.length} 발화</div>
        <div class="gauge-wrap"><div class="gauge-bar micro" style="width:${microScore*2}%"></div></div>
      </div>
      <div class="score-card minor">
        <div class="score-label">경미한 징후 (29구간)</div>
        <div class="score-value minor">${minorScore.toFixed(1)}</div>
        <div class="score-max">/ 50점 &nbsp; ${minorCount}/${MINOR_SIGNALS.length} 발화</div>
        <div class="gauge-wrap"><div class="gauge-bar minor" style="width:${minorScore*2}%"></div></div>
      </div>
      <div class="score-card total">
        <div class="score-label">하인리히 위험 점수</div>
        <div class="score-value total">${totalScore.toFixed(1)}</div>
        <div class="score-max">/ 100점</div>
        <div class="gauge-wrap"><div class="gauge-bar total" style="width:${totalScore}%"></div></div>
      </div>
    </div>

    <div class="alert-box ${alertLevel}">
      <div class="alert-dot"></div>
      ${alertText} &nbsp;(${totalScore.toFixed(1)}점)
    </div>

    <div class="section-title">사소한 징후 신호 상세 (각 ${MICRO_PT.toFixed(2)}점)</div>
    <table class="signal-table">
      <thead><tr>
        <th>신호명</th><th>분류</th><th>발화 빈도 (보조지표)</th><th>점수</th>
      </tr></thead>
      <tbody>${microResults.map(microRow).join('')}</tbody>
    </table>

    <div class="section-title">경미한 징후 신호 상세 (각 ${MINOR_PT.toFixed(2)}점)</div>
    <table class="signal-table">
      <thead><tr>
        <th>신호명</th><th>분류</th><th>발화 빈도 (보조지표)</th><th>점수</th>
      </tr></thead>
      <tbody>${minorResults.map(minorRow).join('')}</tbody>
    </table>

    <div style="font-size:11px;color:var(--muted);font-family:Space Mono;border-top:1px solid var(--border);padding-top:12px">
      ⚠ 본 분석은 참고용 보조도구입니다. 실제 거래 결정의 근거로 단독 사용 금지.<br>
      바이낸스 공개 API 사용 · 5분봉 100개 기준 · 자동 새로고침 없음
    </div>
  `;

  const el = document.getElementById('results');
  el.innerHTML = html;
  el.style.display = 'block';
}

// 엔터키 지원
document.getElementById('symbolInput').addEventListener('keydown', e => {
  if(e.key === 'Enter') analyze();
});
</script>
