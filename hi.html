<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futures Signal Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap');

:root {
  --bg:      #080c10;
  --surface: #0d1117;
  --panel:   #111827;
  --border:  #1f2937;
  --border2: #374151;
  --pump:    #00d97e;
  --dump:    #ff3d5a;
  --neutral: #6b7280;
  --amber:   #f59e0b;
  --blue:    #3b82f6;
  --text:    #e5e7eb;
  --dim:     #6b7280;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans KR', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;max-width:100vw;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
}

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  overflow: hidden;
  min-width: 0;
  max-width: 100vw;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--amber);
  white-space: nowrap;
}

.logo span { color: var(--dim); font-weight: 300; }

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.stat-pill {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--dim);
  white-space: nowrap;
}

.stat-pill.live { border-color: var(--pump); color: var(--pump); }
.live-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--pump);
  margin-right: 5px;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MAIN AREA ── */
.main {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  overflow: hidden;
  min-width: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.controls-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

select, input[type=number] {
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 8px;
  font-family: var(--mono);
  font-size: 11px;
  border-radius: 3px;
  outline: none;
  flex: 1;
  min-width: 0;
}

select:focus, input:focus { border-color: var(--amber); }

.threshold-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.threshold-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
}

.scan-btn {
  width: 100%;
  padding: 9px;
  background: var(--amber);
  color: #000;
  border: none;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  border-radius: 3px;
  cursor: pointer;
  transition: opacity .15s;
}

.scan-btn:hover { opacity: .85; }
.scan-btn:disabled { opacity: .4; cursor: not-allowed; }

.scan-btn.scanning {
  background: var(--border2);
  color: var(--amber);
  border: 1px solid var(--amber);
}

/* ── RESULT LIST ── */
.result-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}

.result-list::-webkit-scrollbar { width: 4px; }
.result-list::-webkit-scrollbar-track { background: transparent; }
.result-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.sym-card {
  padding: 10px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  margin-bottom: 5px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  background: var(--panel);
}

.sym-card:hover { border-color: var(--amber); }
.sym-card.active { border-color: var(--amber); background: rgba(245,158,11,.06); }

.sym-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.sym-name {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
}

.sym-signal {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 2px;
}

.sym-signal.pump { background: rgba(0,217,126,.15); color: var(--pump); }
.sym-signal.dump { background: rgba(255,61,90,.15); color: var(--dump); }
.sym-signal.neutral { background: rgba(107,114,128,.15); color: var(--neutral); }

/* Dual probability bars */
.prob-bars { display: flex; flex-direction: column; gap: 3px; }

.prob-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.prob-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  width: 32px;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .5s ease;
}

.bar-fill.pump { background: var(--pump); }
.bar-fill.dump { background: var(--dump); }

.prob-pct {
  font-family: var(--mono);
  font-size: 9px;
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

.prob-pct.pump { color: var(--pump); }
.prob-pct.dump { color: var(--dump); }

/* scan status */
.scan-status {
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
}

/* ── DETAIL PANEL ── */
.detail {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  min-width: 0;
}

.detail-inner {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px;
  min-width: 0;
  width: 100%;
}

.detail-inner::-webkit-scrollbar { width: 4px; }
.detail-inner::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.placeholder {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-family: var(--mono);
  font-size: 12px;
  gap: 10px;
}

.placeholder-icon { font-size: 40px; opacity: .3; }

/* ── DETAIL HEADER ── */
.detail-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.detail-sym {
  font-family: var(--mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
}

.detail-price {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  margin-top: 2px;
}

.detail-price.up { color: var(--pump); }
.detail-price.down { color: var(--dump); }

.detail-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  margin-top: 4px;
  word-break: break-all;
  white-space: normal;
}

/* ── PROBABILITY GAUGES ── */
.gauge-row {
  display: grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.gauge-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.gauge-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
}

.gauge-card.pump-card::after { background: var(--pump); }
.gauge-card.dump-card::after { background: var(--dump); }

.gauge-title {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.gauge-card.pump-card .gauge-title { color: var(--pump); }
.gauge-card.dump-card .gauge-title { color: var(--dump); }

.gauge-pct {
  font-family: var(--mono);
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}

.gauge-card.pump-card .gauge-pct { color: var(--pump); }
.gauge-card.dump-card .gauge-pct { color: var(--dump); }

.gauge-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
}

/* Arc gauge */
.arc-wrap { position: relative; width: 90px; height: 50px; margin: 6px auto 4px; }
.arc-bg, .arc-fg {
  position: absolute;
  width: 90px; height: 45px;
  top: 0; left: 0;
  border-radius: 90px 90px 0 0;
  overflow: hidden;
}

.arc-bg { background: var(--border); }
.arc-fg {
  transform-origin: bottom center;
  transition: transform .6s cubic-bezier(.34,1.56,.64,1);
}

.pump-card .arc-fg { background: var(--pump); }
.dump-card .arc-fg { background: var(--dump); }

/* ── SIGNAL BREAKDOWN ── */
.breakdown-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
  min-width: 0;
}

@media (max-width: 900px) { .breakdown-grid { grid-template-columns: 1fr; } }

.breakdown-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  min-width: 0;
  overflow: hidden;
}

.breakdown-heading {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.factor-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid rgba(31,41,55,.6);
}

.factor-row:last-child { border-bottom: none; }

.factor-name {
  font-size: 11px;
  color: var(--dim);
  flex: 1;
}

.factor-val {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  margin-left: 8px;
  white-space: nowrap;
}

.factor-val.pos { color: var(--pump); }
.factor-val.neg { color: var(--dump); }
.factor-val.neu { color: var(--dim); }

.factor-score {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 2px;
  margin-left: 8px;
  min-width: 36px;
  text-align: right;
}

.factor-score.pos { background: rgba(0,217,126,.12); color: var(--pump); }
.factor-score.neg { background: rgba(255,61,90,.12); color: var(--dump); }
.factor-score.zero { color: var(--dim); }

/* ── RAW INDICATORS TABLE ── */
.ind-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  margin-bottom: 20px;
  table-layout: fixed;
}

.ind-table th {
  background: var(--surface);
  color: var(--dim);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  padding: 7px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}

.ind-table td {
  padding: 7px 10px;
  border-bottom: 1px solid rgba(31,41,55,.5);
  font-family: var(--mono);
}

.ind-table tr:hover td { background: rgba(255,255,255,.02); }

.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 2px;
  font-size: 10px;
  font-family: var(--mono);
}

.badge.pump { background: rgba(0,217,126,.15); color: var(--pump); }
.badge.dump { background: rgba(255,61,90,.15); color: var(--dump); }
.badge.neu  { background: rgba(107,114,128,.15); color: var(--dim); }

/* ── LOADING / ERROR ── */
.scan-progress {
  padding: 8px 16px;
  display: none;
}

.progress-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 1px;
  transition: width .3s ease;
}

.error-msg {
  color: var(--dump);
  font-family: var(--mono);
  font-size: 11px;
  padding: 10px 16px;
  display: none;
}

.empty-list {
  padding: 20px;
  text-align: center;
  color: var(--dim);
  font-family: var(--mono);
  font-size: 11px;
}

/* ── SORT TABS ── */
.sort-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
}

.sort-tab {
  flex: 1;
  padding: 4px 0;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}

.sort-tab:hover { border-color: var(--border2); color: var(--text); }
.sort-tab.active { background: var(--amber); border-color: var(--amber); color: #000; font-weight: 700; }

.disclaimer {
  font-size: 10px;
  color: var(--dim);
  font-family: var(--mono);
  border-top: 1px solid var(--border);
  padding: 12px 0 0;
  line-height: 1.6;
}

/* ── VOLUME PROFILE ── */
.vp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 20px;
  min-width: 0;
  overflow: hidden;
}

.vp-heading {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.vp-legend {
  display: flex;
  gap: 12px;
}

.vp-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  color: var(--dim);
}

.vp-legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

.vp-chart {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-height: 300px;
  overflow-y: auto;
  overflow-x: hidden;
}

.vp-chart::-webkit-scrollbar { width: 3px; }
.vp-chart::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.vp-row {
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  min-height: 18px;
}

.vp-price {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  width: 80px;
  flex-shrink: 0;
  text-align: right;
  white-space: nowrap;
}

.vp-bar-wrap {
  flex: 1;
  height: 14px;
  position: relative;
  min-width: 0;
}

.vp-bar {
  height: 100%;
  border-radius: 1px;
  position: absolute;
  left: 0;
  top: 0;
  transition: width .4s ease;
}

.vp-bar.normal { background: rgba(59,130,246,.35); }
.vp-bar.poc    { background: rgba(245,158,11,.85); }
.vp-bar.support{ background: rgba(0,217,126,.5); }
.vp-bar.resist { background: rgba(255,61,90,.5); }

.vp-vol-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  width: 52px;
  flex-shrink: 0;
  text-align: right;
  white-space: nowrap;
}

.vp-tag {
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
  width: 40px;
  text-align: center;
}

.vp-tag.poc     { background: rgba(245,158,11,.2); color: var(--amber); }
.vp-tag.support { background: rgba(0,217,126,.15); color: var(--pump); }
.vp-tag.resist  { background: rgba(255,61,90,.15); color: var(--dump); }
.vp-tag.cur     { background: rgba(255,255,255,.08); color: var(--text); }
.vp-tag.empty   { background: transparent; color: transparent; }

.vp-cur-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,.4);
  pointer-events: none;
  z-index: 2;
}
.vp-cur-line::after {
  content: '▶ 현재가';
  position: absolute;
  right: 0;
  top: -8px;
  font-family: var(--mono);
  font-size: 8px;
  color: rgba(255,255,255,.5);
  white-space: nowrap;
}

.vp-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.vp-sum-item {
  text-align: center;
}

.vp-sum-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--dim);
  margin-bottom: 3px;
  letter-spacing: 1px;
}

.vp-sum-val {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
}

.vp-sum-val.poc    { color: var(--amber); }
.vp-sum-val.sup    { color: var(--pump); }
.vp-sum-val.res    { color: var(--dump); }
.vp-sum-val.dist   { color: var(--text); }

/* sym-card 매물대 라인 */
.sym-vp-row {
  display: flex;
  gap: 4px;
  margin-top: 5px;
  flex-wrap: wrap;
}

.sym-vp-tag {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
}

.sym-vp-tag.poc { background: rgba(245,158,11,.15); color: var(--amber); }
.sym-vp-tag.sup { background: rgba(0,217,126,.12); color: var(--pump); }
.sym-vp-tag.res { background: rgba(255,61,90,.12); color: var(--dump); }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">FUTURES <span>/</span> SIGNAL SCANNER</div>
    <div class="topbar-right">
      <div class="stat-pill" id="scanTime">--</div>
      <div class="stat-pill live" id="liveStatus"><span class="live-dot"></span>BINANCE FUTURES</div>
    </div>
  </header>

  <div class="main">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">스캔 설정</div>

        <div class="controls-row">
          <select id="intervalSel">
            <option value="5m" selected>5분봉</option>
            <option value="15m">15분봉</option>
            <option value="1h">1시간봉</option>
          </select>
          <select id="limitSel">
            <option value="20">상위 20종목</option>
            <option value="50" selected>상위 50종목</option>
            <option value="100">상위 100종목</option>
          </select>
        </div>

        <div class="threshold-row">
          <span class="threshold-label">최소확률</span>
          <input type="number" id="thresholdInput" value="40" min="0" max="99" step="5" style="width:70px;flex:none">
          <span class="threshold-label">% 이상</span>
          <select id="filterSel" style="flex:1;margin-left:4px">
            <option value="all">전체</option>
            <option value="pump">폭등만</option>
            <option value="dump">폭락만</option>
          </select>
        </div>

        <div class="sort-tabs">
          <div class="sort-tab active" data-sort="pump" onclick="setSort('pump')">폭등↑</div>
          <div class="sort-tab" data-sort="dump" onclick="setSort('dump')">폭락↑</div>
          <div class="sort-tab" data-sort="max" onclick="setSort('max')">최고확률</div>
          <div class="sort-tab" data-sort="vol" onclick="setSort('vol')">거래량↑</div>
        </div>

        <button class="scan-btn" id="scanBtn" onclick="startScan()">▶ 스캔 시작</button>
      </div>

      <div class="scan-progress" id="scanProgress">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>

      </div>

    <!-- DETAIL PANEL -->

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const BASE = 'https://fapi.binance.com';
const CONCURRENCY = 5; // 동시 요청 수 (rate limit 대응)
const KLINE_LIMIT = 100; // 봉 개수

let currentSort = 'pump';
let scanResults = [];
let activeSymbol = null;

// ═══════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════
async function apiFetch(path, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const r = await fetch(BASE + path, { signal: AbortSignal.timeout(8000) });
      if (r.status === 429) { await sleep(1200); continue; }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    } catch (e) {
      if (i === retries) throw e;
      await sleep(600);
    }
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function batchRun(tasks, concurrency) {
  const results = new Array(tasks.length);
  let idx = 0;
  async function worker() {
    while (idx < tasks.length) {
      const i = idx++;
      try { results[i] = await tasks[i](); }
      catch (e) { results[i] = null; }
    }
  }
  await Promise.all(Array.from({ length: concurrency }, worker));
  return results;
}

// ═══════════════════════════════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════════════════════════════
function ema(arr, n) {
  if (!arr.length) return 0;
  const k = 2 / (n + 1);
  let e = arr[0];
  for (let i = 1; i < arr.length; i++) e = arr[i] * k + e * (1 - k);
  return e;
}

function sma(arr, n) {
  const s = arr.slice(-n);
  return s.reduce((a, b) => a + b, 0) / s.length;
}

function stdev(arr) {
  const m = arr.reduce((a, b) => a + b, 0) / arr.length;
  return Math.sqrt(arr.reduce((a, b) => a + (b - m) ** 2, 0) / arr.length);
}

function calcRSI(closes, n = 14) {
  if (closes.length < n + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - n; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    d > 0 ? (gains += d) : (losses -= d);
  }
  if (losses === 0) return 100;
  return 100 - 100 / (1 + gains / losses);
}

function calcMACD(closes) {
  if (closes.length < 26) return { line: 0, signal: 0, hist: 0 };
  const e12 = ema(closes.slice(-12), 12);
  const e26 = ema(closes.slice(-26), 26);
  const line = e12 - e26;
  const prevE12 = ema(closes.slice(-13, -1), 12);
  const prevE26 = ema(closes.slice(-27, -1), 26);
  const prevLine = prevE12 - prevE26;
  const signal = ema([prevLine * 0.8 + line * 0.2], 1); // simplified signal
  return { line, signal, hist: line - signal };
}

function calcBB(closes, n = 20) {
  if (closes.length < n) return { upper: 0, lower: 0, mid: 0, width: 0, pct: 50 };
  const s = closes.slice(-n);
  const mid = s.reduce((a, b) => a + b, 0) / n;
  const sd = stdev(s);
  const upper = mid + 2 * sd;
  const lower = mid - 2 * sd;
  const last = closes[closes.length - 1];
  const width = (upper - lower) / mid;
  const pct = (last - lower) / (upper - lower) * 100;
  return { upper, lower, mid, width, pct };
}

function calcATR(highs, lows, closes, n = 14) {
  const trs = [];
  for (let i = 1; i < closes.length; i++) {
    trs.push(Math.max(
      highs[i] - lows[i],
      Math.abs(highs[i] - closes[i - 1]),
      Math.abs(lows[i] - closes[i - 1])
    ));
  }
  return trs.length >= n ? sma(trs, n) : sma(trs, trs.length);
}

// ═══════════════════════════════════════════════════════════════
// VOLUME PROFILE (매물대)
// ═══════════════════════════════════════════════════════════════
/*
  가격 범위를 BINS개 구간으로 나눠 각 구간에 거래된 거래량을 집계.
  - POC  : 거래량 최고점 (Point of Control)
  - VAH  : Value Area High  (전체 거래량의 상위 70% 상단)
  - VAL  : Value Area Low   (전체 거래량의 상위 70% 하단)
  - 지지/저항 : POC 주변 ±5% 이내 고거래량 구간
*/
function calcVolumeProfile(klines, bins = 30) {
  const highs  = klines.map(k => +k[2]);
  const lows   = klines.map(k => +k[3]);
  const closes = klines.map(k => +k[4]);
  const vols   = klines.map(k => +k[5]);

  const priceHigh = Math.max(...highs);
  const priceLow  = Math.min(...lows);
  const range     = priceHigh - priceLow;
  if (range <= 0) return null;

  const binSize = range / bins;
  const buckets = Array.from({ length: bins }, (_, i) => ({
    priceMin: priceLow + i * binSize,
    priceMax: priceLow + (i + 1) * binSize,
    priceMid: priceLow + (i + 0.5) * binSize,
    vol: 0,
  }));

  // 각 봉의 거래량을 해당 봉의 가격 범위에 균등 분배
  klines.forEach((k, i) => {
    const hi = highs[i], lo = lows[i], v = vols[i];
    const span = hi - lo || binSize;
    buckets.forEach(b => {
      const overlap = Math.min(hi, b.priceMax) - Math.max(lo, b.priceMin);
      if (overlap > 0) b.vol += v * (overlap / span);
    });
  });

  // 총 거래량
  const totalVol = buckets.reduce((s, b) => s + b.vol, 0);

  // POC (거래량 최대 구간)
  const poc = buckets.reduce((a, b) => b.vol > a.vol ? b : a);
  const pocIdx = buckets.indexOf(poc);

  // Value Area (전체의 70% 포함하는 POC 중심 구간)
  let vaVol = poc.vol;
  let vaLow = pocIdx, vaHigh = pocIdx;
  while (vaVol < totalVol * 0.70 && (vaLow > 0 || vaHigh < bins - 1)) {
    const addLow  = vaLow  > 0        ? buckets[vaLow - 1].vol  : -1;
    const addHigh = vaHigh < bins - 1 ? buckets[vaHigh + 1].vol : -1;
    if (addLow >= addHigh && addLow >= 0)      { vaVol += addLow;  vaLow--; }
    else if (addHigh >= 0)                      { vaVol += addHigh; vaHigh++; }
    else break;
  }

  const VAH = buckets[vaHigh].priceMax;
  const VAL = buckets[vaLow].priceMin;

  // 최대 거래량 기준 정규화
  const maxVol = poc.vol;

  // 지지 구간: 현재가 아래 고거래량 (상위 40%)
  const lastPrice = closes[closes.length - 1];
  const volThreshold = maxVol * 0.4;
  const supports = buckets
    .filter(b => b.priceMid < lastPrice && b.vol >= volThreshold)
    .sort((a, b) => b.priceMid - a.priceMid) // 현재가에 가까운 순
    .slice(0, 3);

  // 저항 구간: 현재가 위 고거래량 (상위 40%)
  const resists = buckets
    .filter(b => b.priceMid > lastPrice && b.vol >= volThreshold)
    .sort((a, b) => a.priceMid - b.priceMid) // 현재가에 가까운 순
    .slice(0, 3);

  // 현재가가 POC 대비 위치 (매물대 신호)
  const pocDist = (lastPrice - poc.priceMid) / poc.priceMid; // 양수=위, 음수=아래
  // 현재가가 VAL 아래 = 저평가(펌프 신호), VAH 위 = 고평가(덤프 신호)
  const vpPumpScore = lastPrice < VAL ? Math.min((VAL - lastPrice) / VAL * 8, 1.0)
                    : lastPrice < poc.priceMid ? 0.3
                    : 0;
  const vpDumpScore = lastPrice > VAH ? Math.min((lastPrice - VAH) / VAH * 8, 1.0)
                    : lastPrice > poc.priceMid ? 0.3
                    : 0;

  // 가장 가까운 지지/저항 거리 비율
  const nearSupport = supports[0] ? supports[0].priceMid : null;
  const nearResist  = resists[0]  ? resists[0].priceMid  : null;
  const supportDist = nearSupport ? ((lastPrice - nearSupport) / lastPrice * 100) : null;
  const resistDist  = nearResist  ? ((nearResist - lastPrice) / lastPrice * 100)  : null;

  return {
    buckets,
    poc: poc.priceMid,
    VAH, VAL,
    supports,
    resists,
    maxVol,
    totalVol,
    vpPumpScore,
    vpDumpScore,
    pocDist,
    nearSupport,
    nearResist,
    supportDist,
    resistDist,
    priceHigh,
    priceLow,
    lastPrice,
  };
}

function fmtPrice(p) {
  if (!p && p !== 0) return '—';
  if (p >= 1000)   return p.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (p >= 1)      return p.toFixed(4);
  if (p >= 0.01)   return p.toFixed(5);
  return p.toFixed(6);
}

function fmtVol(v) {
  if (v >= 1e9) return (v/1e9).toFixed(2)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(2)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}

// ═══════════════════════════════════════════════════════════════
// SIGNAL ENGINE — Pump / Dump 확률 계산
// ═══════════════════════════════════════════════════════════════
/*
  각 지표를 [-1, +1] 범위의 "신호 강도"로 정규화
  양수 = 폭등 신호, 음수 = 폭락 신호
  가중치 합산 후 시그모이드 변환으로 [0,100]% 확률 도출
*/

function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

function computeSignals(klines) {
  const opens   = klines.map(k => +k[1]);
  const highs   = klines.map(k => +k[2]);
  const lows    = klines.map(k => +k[3]);
  const closes  = klines.map(k => +k[4]);
  const vols    = klines.map(k => +k[5]);
  const n = closes.length;
  if (n < 30) return null;

  const last = closes[n - 1];
  const prev = closes[n - 2];

  // ── RSI ──────────────────────────────────────────────────────
  const rsi = calcRSI(closes, 14);
  const rsiPrev = calcRSI(closes.slice(0, -1), 14);
  // 과매도→반등=펌프, 과매수→조정=덤프
  const rsiPumpScore = rsi < 30 ? (30 - rsi) / 30        // 0~1
                     : rsi < 45 ? (45 - rsi) / 45 * 0.4
                     : rsi > 70 ? -(rsi - 70) / 30
                     : rsi > 55 ? -(rsi - 55) / 55 * 0.4
                     : 0;

  // RSI 모멘텀 (방향성)
  const rsiMomentum = (rsi - rsiPrev) / 10; // 빠른 변화 = 방향 확신

  // ── MACD ─────────────────────────────────────────────────────
  const macd = calcMACD(closes);
  const macdScore = Math.tanh(macd.hist / (last * 0.001)); // 정규화

  // ── Bollinger Band ───────────────────────────────────────────
  const bb = calcBB(closes, 20);
  // pct<20: 과매도(펌프신호), pct>80: 과매수(덤프신호)
  const bbScore = bb.pct < 20 ? (20 - bb.pct) / 20
                : bb.pct > 80 ? -(bb.pct - 80) / 20
                : (50 - bb.pct) / 100;

  // BB 밴드폭 (수축=임박, 확장=이미 이동 중)
  const bbWidthAvg = (() => {
    let sum = 0, cnt = 0;
    for (let i = 20; i < n; i++) {
      const s = closes.slice(i - 20, i);
      const m = s.reduce((a,b)=>a+b,0)/20;
      const sd2 = stdev(s);
      sum += (4 * sd2 / m); cnt++;
    }
    return cnt ? sum / cnt : bb.width;
  })();
  const bbSqueeze = bb.width < bbWidthAvg * 0.75; // 수축 중

  // ── Volume ───────────────────────────────────────────────────
  const avgVol20 = sma(vols.slice(-21, -1), 20);
  const volRatio = avgVol20 > 0 ? vols[n - 1] / avgVol20 : 1;
  const volTrend = (() => {
    const v = vols.slice(-6);
    return (v[5] - v[0]) / (v[0] || 1);
  })();
  // 거래량 폭증 + 가격 상승 = 펌프 확신, 폭증 + 하락 = 덤프 확신
  const priceDir = (last - prev) / (prev || 1);
  const volScore = Math.min(volRatio - 1, 3) * Math.sign(priceDir) * 0.4;

  // ── Moving Average ──────────────────────────────────────────
  const ma5  = sma(closes, 5);
  const ma20 = sma(closes, 20);
  const ma60 = closes.length >= 60 ? sma(closes, 60) : ma20;
  // 가격이 MA 위 = 상승세, 아래 = 하락세
  const maScore = ((last - ma20) / (ma20 || 1)) * 5; // 정규화
  const maTrend = ma5 > ma20 ? 0.3 : ma5 < ma20 ? -0.3 : 0;
  const maLong  = ma20 > ma60 ? 0.2 : -0.2;

  // ── Price Momentum ──────────────────────────────────────────
  const ret3  = (last - closes[n - 4]) / (closes[n - 4] || 1);
  const ret6  = (last - closes[n - 7]) / (closes[n - 7] || 1);
  const ret12 = (last - closes[n - 13]) / (closes[n - 13] || 1);
  const momentum = (ret3 * 0.5 + ret6 * 0.3 + ret12 * 0.2) * 8;

  // ── ATR (변동성) ─────────────────────────────────────────────
  const atr = calcATR(highs, lows, closes, 14);
  const atrRatio = atr / (last || 1); // 변동성 비율
  // 변동성 높을 때 방향 신호 증폭
  const atrAmplify = Math.min(atrRatio * 50, 1.5);

  // ── Candle Pattern ───────────────────────────────────────────
  const body = Math.abs(last - opens[n - 1]);
  const totalRange = highs[n - 1] - lows[n - 1] || 0.0001;
  const bodyRatio = body / totalRange;
  const upperShadow = highs[n - 1] - Math.max(last, opens[n - 1]);
  const lowerShadow = Math.min(last, opens[n - 1]) - lows[n - 1];
  // 망치: 긴 아래꼬리 = 펌프, 역망치: 긴 위꼬리 = 덤프
  const candleScore = (lowerShadow - upperShadow) / totalRange;

  // ── Consecutive Candles ──────────────────────────────────────
  let bullRun = 0, bearRun = 0;
  for (let i = n - 1; i >= n - 8; i--) {
    if (closes[i] > opens[i]) { bullRun++; if (bearRun > 0) break; }
    else if (closes[i] < opens[i]) { bearRun++; if (bullRun > 0) break; }
    else break;
  }
  const runScore = bullRun > 0 ? Math.min(bullRun * 0.15, 0.6)
                 : bearRun > 0 ? -Math.min(bearRun * 0.15, 0.6)
                 : 0;

  // ── Divergence (RSI vs Price) ────────────────────────────────
  const rsi10 = calcRSI(closes.slice(0, -10), 14);
  const priceDelta = last - closes[n - 11];
  const rsiDelta = rsi - rsi10;
  let divergenceScore = 0;
  if (priceDelta < 0 && rsiDelta > 2) divergenceScore = 0.5;  // 강세 다이버전스 = 펌프
  if (priceDelta > 0 && rsiDelta < -2) divergenceScore = -0.5; // 약세 다이버전스 = 덤프

  // ── Volume Profile (매물대) ──────────────────────────────────
  const vp = calcVolumeProfile(klines, 30);
  const vpPumpScore = vp ? vp.vpPumpScore : 0;
  const vpDumpScore = vp ? vp.vpDumpScore : 0;

  // ── Funding Rate (already fetched) / OI will be added where available ──
  // (펀딩비는 별도 처리)

  // ═══════════════════════════════════════════════════════════
  // PUMP PROBABILITY
  // 각 요소를 가중 합산 → sigmoid → %
  // ═══════════════════════════════════════════════════════════
  const factors = {
    rsi:         { pump: rsiPumpScore,     dump: -rsiPumpScore,    w: 2.0 },
    rsiMomentum: { pump: rsiMomentum,      dump: -rsiMomentum,     w: 0.8 },
    macd:        { pump: macdScore,        dump: -macdScore,       w: 1.5 },
    bb:          { pump: bbScore,          dump: -bbScore,         w: 1.5 },
    volume:      { pump: volScore,         dump: -volScore,        w: 1.2 },
    ma:          { pump: maScore,          dump: -maScore,         w: 1.0 },
    maTrend:     { pump: maTrend,          dump: -maTrend,         w: 0.8 },
    maLong:      { pump: maLong,           dump: -maLong,          w: 0.6 },
    momentum:    { pump: momentum,         dump: -momentum,        w: 1.2 },
    candle:      { pump: candleScore,      dump: -candleScore,     w: 0.8 },
    run:         { pump: runScore,         dump: -runScore,        w: 0.7 },
    divergence:  { pump: divergenceScore,  dump: -divergenceScore, w: 1.0 },
    vp:          { pump: vpPumpScore,      dump: vpDumpScore,      w: 1.3 },
  };

  let pumpRaw = 0, dumpRaw = 0, totalW = 0;
  for (const [, f] of Object.entries(factors)) {
    pumpRaw += f.pump * f.w;
    dumpRaw += f.dump * f.w;
    totalW += f.w;
  }

  // 변동성 증폭
  pumpRaw *= atrAmplify;
  dumpRaw *= atrAmplify;

  // BB 수축 시 양쪽 확률 증폭 (어느 방향이든 이동 임박)
  if (bbSqueeze) { pumpRaw *= 1.2; dumpRaw *= 1.2; }

  // sigmoid 변환: raw가 0이면 50%, 양수면 높음, 음수면 낮음
  const SCALE = 1.5;
  const pumpProb = Math.round(sigmoid(pumpRaw * SCALE) * 100);
  const dumpProb = Math.round(sigmoid(dumpRaw * SCALE) * 100);

  // ── 개별 factor 상세 (UI 표시용) ────────────────────────────
  const breakdown = [
    { name: 'RSI',          val: rsi.toFixed(1),           pumpS: factors.rsi.pump,        dumpS: factors.rsi.dump },
    { name: 'RSI 모멘텀',   val: (rsiMomentum*10).toFixed(2), pumpS: factors.rsiMomentum.pump, dumpS: factors.rsiMomentum.dump },
    { name: 'MACD 히스토',  val: macd.hist.toFixed(4),     pumpS: factors.macd.pump,       dumpS: factors.macd.dump },
    { name: '볼린저 %B',    val: bb.pct.toFixed(1)+'%',    pumpS: factors.bb.pump,         dumpS: factors.bb.dump },
    { name: 'BB 밴드폭',    val: (bb.width*100).toFixed(2)+'%'+(bbSqueeze?' 🔻':''), pumpS: bbSqueeze?0.3:0, dumpS: bbSqueeze?0.3:0 },
    { name: '거래량 비율',  val: volRatio.toFixed(2)+'x',  pumpS: factors.volume.pump,     dumpS: factors.volume.dump },
    { name: 'MA5/MA20',     val: (ma5/ma20).toFixed(4),    pumpS: factors.maTrend.pump,    dumpS: factors.maTrend.dump },
    { name: '가격 모멘텀',  val: (ret6*100).toFixed(2)+'%', pumpS: factors.momentum.pump,  dumpS: factors.momentum.dump },
    { name: '캔들 패턴',    val: bodyRatio.toFixed(2),     pumpS: factors.candle.pump,     dumpS: factors.candle.dump },
    { name: '연속봉',       val: bullRun > 0 ? `+${bullRun}` : bearRun > 0 ? `-${bearRun}` : '0', pumpS: factors.run.pump, dumpS: factors.run.dump },
    { name: '다이버전스',   val: divergenceScore > 0 ? '강세' : divergenceScore < 0 ? '약세' : 'None', pumpS: factors.divergence.pump, dumpS: factors.divergence.dump },
    { name: '매물대 위치',  val: vp ? (last < vp.VAL ? 'VAL 하단' : last > vp.VAH ? 'VAH 상단' : 'VA 내부') : '—', pumpS: factors.vp.pump, dumpS: factors.vp.dump },
    { name: 'ATR 변동성',   val: (atrRatio*100).toFixed(3)+'%', pumpS: 0, dumpS: 0 },
  ];

  return {
    pumpProb, dumpProb,
    rsi, macd, bb, volRatio, ma5, ma20,
    atrRatio, bbSqueeze, momentum: ret6,
    breakdown, vp,
    lastPrice: last,
    change24h: 0,
    volume24h: 0,
  };
}

// ═══════════════════════════════════════════════════════════════
// SCAN LOGIC
// ═══════════════════════════════════════════════════════════════
let scanning = false;

async function startScan() {
  if (scanning) return;
  scanning = true;

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 스캔 중...';
  btn.classList.add('scanning');

  document.getElementById('scanProgress').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('resultList').innerHTML = '<div class="empty-list">종목 목록 로드 중...</div>';

  setProgress(0);

  const interval = document.getElementById('intervalSel').value;
  const topN = parseInt(document.getElementById('limitSel').value);
  const threshold = parseInt(document.getElementById('thresholdInput').value) || 40;
  const filter = document.getElementById('filterSel').value;

  try {
    // 1. 거래량 상위 종목 로드
    const [exchangeInfo, tickers] = await Promise.all([
      apiFetch('/fapi/v1/exchangeInfo'),
      apiFetch('/fapi/v1/ticker/24hr'),
    ]);

    const activeSymbols = new Set(
      exchangeInfo.symbols
        .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
        .map(s => s.symbol)
    );

    const tickerMap = {};
    tickers.forEach(t => { tickerMap[t.symbol] = t; });

    // 거래량 기준 상위 N개
    const topSymbols = Object.values(tickerMap)
      .filter(t => activeSymbols.has(t.symbol))
      .sort((a, b) => +b.quoteVolume - +a.quoteVolume)
      .slice(0, topN)
      .map(t => t.symbol);

    setProgress(10);
    document.getElementById('resultList').innerHTML =
      `<div class="empty-list">${topSymbols.length}개 종목 분석 중...</div>`;

    // 2. 병렬 kline 수집
    const tasks = topSymbols.map((sym, i) => async () => {
      const klines = await apiFetch(
        `/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${KLINE_LIMIT}`
      );
      const sig = computeSignals(klines);
      if (!sig) return null;
      const t = tickerMap[sym] || {};
      sig.symbol = sym;
      sig.change24h = +t.priceChangePercent || 0;
      sig.volume24h = +t.quoteVolume || 0;
      sig.lastPrice = +t.lastPrice || sig.lastPrice;
      return sig;
    });

    let done = 0;
    const raw = await batchRun(tasks.map(task => async () => {
      const r = await task();
      done++;
      setProgress(10 + Math.round(done / topSymbols.length * 85));
      return r;
    }), CONCURRENCY);

    setProgress(98);

    // 3. 필터 + 정렬
    let results = raw.filter(r =>
      r !== null &&
      (filter === 'all'  || (filter === 'pump' && r.pumpProb >= threshold)
                         || (filter === 'dump' && r.dumpProb >= threshold))
      && (r.pumpProb >= threshold || r.dumpProb >= threshold)
    );

    results = sortResults(results, currentSort);
    scanResults = results;

    renderList(results);

    const now = new Date();
    document.getElementById('scanTime').textContent =
      `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')} 업데이트`;
    document.getElementById('statusLeft').textContent =
      `${results.length}개 신호 감지`;
    document.getElementById('statusRight').textContent =
      `${topSymbols.length}개 스캔 완료`;

  } catch (e) {
    const err = document.getElementById('errorMsg');
    err.style.display = 'block';
    err.textContent = '❌ ' + e.message;
    document.getElementById('resultList').innerHTML =
      '<div class="empty-list">오류 발생 — 재시도해주세요</div>';
  }

  setProgress(100);
  setTimeout(() => {
    document.getElementById('scanProgress').style.display = 'none';
    setProgress(0);
  }, 500);

  btn.disabled = false;
  btn.textContent = '▶ 재스캔';
  btn.classList.remove('scanning');
  scanning = false;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.sort === s);
  });
  if (scanResults.length) {
    const sorted = sortResults([...scanResults], s);
    renderList(sorted);
  }
}

function sortResults(arr, sort) {
  if (sort === 'pump') return arr.sort((a, b) => b.pumpProb - a.pumpProb);
  if (sort === 'dump') return arr.sort((a, b) => b.dumpProb - a.dumpProb);
  if (sort === 'max')  return arr.sort((a, b) => Math.max(b.pumpProb, b.dumpProb) - Math.max(a.pumpProb, a.dumpProb));
  if (sort === 'vol')  return arr.sort((a, b) => b.volume24h - a.volume24h);
  return arr;
}

// ═══════════════════════════════════════════════════════════════
// RENDER LIST
// ═══════════════════════════════════════════════════════════════
function renderList(results) {
  const el = document.getElementById('resultList');
  if (!results.length) {
    el.innerHTML = '<div class="empty-list">조건을 충족하는 종목 없음<br>임계값을 낮추거나 재스캔 해주세요</div>';
    return;
  }

  el.innerHTML = results.map(r => {
    const max = Math.max(r.pumpProb, r.dumpProb);
    const sig = r.pumpProb > r.dumpProb ? 'pump' : r.dumpProb > r.pumpProb ? 'dump' : 'neutral';
    const sigLabel = sig === 'pump' ? '▲ 폭등' : sig === 'dump' ? '▼ 폭락' : '— 중립';
    const base = r.symbol.replace('USDT', '');
    const isActive = r.symbol === activeSymbol;
    const chgClass = r.change24h >= 0 ? 'pos' : 'neg';
    const chgStr = (r.change24h >= 0 ? '+' : '') + r.change24h.toFixed(2) + '%';

    // 매물대 요약 태그
    const vpTags = r.vp ? (() => {
      const v = r.vp;
      const tags = [];
      if (v.poc) tags.push(`<span class="sym-vp-tag poc">POC $${fmtPrice(v.poc)}</span>`);
      if (v.nearSupport) tags.push(`<span class="sym-vp-tag sup">지지 $${fmtPrice(v.nearSupport)}</span>`);
      if (v.nearResist)  tags.push(`<span class="sym-vp-tag res">저항 $${fmtPrice(v.nearResist)}</span>`);
      return tags.join('');
    })() : '';

    return `
    <div class="sym-card ${isActive ? 'active' : ''}" onclick="showDetail('${r.symbol}')">
      <div class="sym-card-top">
        <div>
          <span class="sym-name">${base}</span>
          <span class="factor-val ${chgClass}" style="font-size:10px;margin-left:6px">${chgStr}</span>
        </div>
        <span class="sym-signal ${sig}">${sigLabel}</span>
      </div>
      <div class="prob-bars">
        <div class="prob-row">
          <span class="prob-label" style="color:var(--pump)">폭등</span>
          <div class="bar-track"><div class="bar-fill pump" style="width:${r.pumpProb}%"></div></div>
          <span class="prob-pct pump">${r.pumpProb}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label" style="color:var(--dump)">폭락</span>
          <div class="bar-track"><div class="bar-fill dump" style="width:${r.dumpProb}%"></div></div>
          <span class="prob-pct dump">${r.dumpProb}%</span>
        </div>
      </div>
      ${vpTags ? `<div class="sym-vp-row">${vpTags}</div>` : ''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// SHOW DETAIL
// ═══════════════════════════════════════════════════════════════
function showDetail(symbol) {
  activeSymbol = symbol;
  // re-render list to update active state
  const sorted = sortResults([...scanResults], currentSort);
  renderList(sorted);

  const r = scanResults.find(x => x.symbol === symbol);
  if (!r) return;

  const base = symbol.replace('USDT', '');
  const sigType = r.pumpProb > r.dumpProb ? 'pump' : 'dump';
  const priceClass = r.change24h >= 0 ? 'up' : 'down';
  const chgStr = (r.change24h >= 0 ? '+' : '') + r.change24h.toFixed(2) + '%';

  // Arc gauge rotation: 0% → -90deg, 100% → +90deg
  const pumpRot = (r.pumpProb / 100) * 180 - 90;
  const dumpRot = (r.dumpProb / 100) * 180 - 90;

  // Breakdown table
  const bRows = r.breakdown.map(f => {
    const ps = (f.pumpS * 100).toFixed(1);
    const ds = (f.dumpS * 100).toFixed(1);
    const pClass = f.pumpS > 0.05 ? 'pos' : f.pumpS < -0.05 ? 'neg' : 'zero';
    const dClass = f.dumpS > 0.05 ? 'pos' : f.dumpS < -0.05 ? 'neg' : 'zero';
    const valClass = f.pumpS > f.dumpS ? 'pos' : f.pumpS < f.dumpS ? 'neg' : 'neu';
    return `
    <tr>
      <td style="color:var(--text)">${f.name}</td>
      <td class="factor-val ${valClass}">${f.val}</td>
      <td><span class="factor-score ${pClass}">${f.pumpS > 0 ? '+' : ''}${ps}</span></td>
      <td><span class="factor-score ${dClass}">${f.dumpS > 0 ? '+' : ''}${ds}</span></td>
    </tr>`;
  }).join('');

  const bbSqText = r.bbSqueeze ? '<span class="badge pump">수축중 ⚡</span>' : '<span class="badge neu">정상</span>';

  document.getElementById('detailInner').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-sym">${base}<span style="color:var(--dim);font-size:14px">/USDT</span></div>
        <div class="detail-price ${priceClass}">$${r.lastPrice.toLocaleString(undefined,{maximumFractionDigits:6})} <span style="font-size:13px">${chgStr}</span></div>
        <div class="detail-meta">바이낸스 선물 · ${document.getElementById('intervalSel').value} · RSI ${r.rsi.toFixed(1)} · 거래량 비율 ${r.volRatio.toFixed(2)}x</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:4px">24H 거래량</div>
        <div style="font-family:var(--mono);font-size:14px;font-weight:700">
          $${(r.volume24h / 1e6).toFixed(1)}M
        </div>
        <div style="margin-top:6px">${bbSqText}</div>
      </div>
    </div>

    <!-- GAUGE ROW -->
    <div class="gauge-row">
      <div class="gauge-card pump-card">
        <div class="gauge-title">▲ 폭등 확률</div>
        <div class="arc-wrap">
          <div class="arc-bg"></div>
          <div class="arc-fg" style="transform:rotate(${pumpRot}deg)"></div>
        </div>
        <div class="gauge-pct">${r.pumpProb}<span style="font-size:18px">%</span></div>
        <div class="gauge-sub">${r.pumpProb >= 70 ? '⚡ 강한 펌프 신호' : r.pumpProb >= 55 ? '📈 중간 상승 신호' : '─ 약한 신호'}</div>
      </div>
      <div class="gauge-card dump-card">
        <div class="gauge-title">▼ 폭락 확률</div>
        <div class="arc-wrap">
          <div class="arc-bg"></div>
          <div class="arc-fg" style="transform:rotate(${dumpRot}deg)"></div>
        </div>
        <div class="gauge-pct">${r.dumpProb}<span style="font-size:18px">%</span></div>
        <div class="gauge-sub">${r.dumpProb >= 70 ? '⚡ 강한 덤프 신호' : r.dumpProb >= 55 ? '📉 중간 하락 신호' : '─ 약한 신호'}</div>
      </div>
    </div>

    <!-- VOLUME PROFILE -->
    ${r.vp ? (() => {
      const v = r.vp;
      const rows = v.buckets.map((b, i) => {
        const isPoc     = Math.abs(b.priceMid - v.poc) < (v.priceHigh - v.priceLow) / 60;
        const isSupport = v.supports.some(s => Math.abs(s.priceMid - b.priceMid) < 0.0001);
        const isResist  = v.resists.some(s => Math.abs(s.priceMid - b.priceMid) < 0.0001);
        const isCurrent = b.priceMin <= v.lastPrice && v.lastPrice <= b.priceMax;
        const barPct    = v.maxVol > 0 ? (b.vol / v.maxVol * 100).toFixed(1) : 0;
        const barClass  = isPoc ? 'poc' : isSupport ? 'support' : isResist ? 'resist' : 'normal';
        const tag       = isPoc ? 'poc' : isCurrent ? 'cur' : isSupport ? 'support' : isResist ? 'resist' : 'empty';
        const tagLabel  = isPoc ? 'POC' : isCurrent ? '◀현재' : isSupport ? 'SUP' : isResist ? 'RES' : '';
        const curLine   = isCurrent ? '<div class="vp-cur-line"></div>' : '';
        return `
        <div class="vp-row" style="${isCurrent?'background:rgba(255,255,255,.04);border-radius:2px':''}">
          ${curLine}
          <span class="vp-price">${fmtPrice(b.priceMid)}</span>
          <div class="vp-bar-wrap">
            <div class="vp-bar ${barClass}" style="width:${barPct}%"></div>
          </div>
          <span class="vp-vol-label">${fmtVol(b.vol)}</span>
          <span class="vp-tag ${tag}">${tagLabel}</span>
        </div>`;
      }).reverse().join(''); // 위쪽이 높은 가격

      const supDistStr = v.supportDist !== null ? v.supportDist.toFixed(2)+'%' : '—';
      const resDistStr = v.resistDist  !== null ? v.resistDist.toFixed(2)+'%'  : '—';

      return `
      <div class="vp-card">
        <div class="vp-heading">
          매물대 (Volume Profile · ${document.getElementById('intervalSel').value} ${KLINE_LIMIT}봉)
          <div class="vp-legend">
            <div class="vp-legend-item"><div class="vp-legend-dot" style="background:rgba(245,158,11,.85)"></div>POC</div>
            <div class="vp-legend-item"><div class="vp-legend-dot" style="background:rgba(0,217,126,.5)"></div>지지</div>
            <div class="vp-legend-item"><div class="vp-legend-dot" style="background:rgba(255,61,90,.5)"></div>저항</div>
            <div class="vp-legend-item"><div class="vp-legend-dot" style="background:rgba(59,130,246,.35)"></div>일반</div>
          </div>
        </div>
        <div class="vp-chart">${rows}</div>
        <div class="vp-summary">
          <div class="vp-sum-item">
            <div class="vp-sum-label">POC</div>
            <div class="vp-sum-val poc">$${fmtPrice(v.poc)}</div>
          </div>
          <div class="vp-sum-item">
            <div class="vp-sum-label">VAH (70%상단)</div>
            <div class="vp-sum-val res">$${fmtPrice(v.VAH)}</div>
          </div>
          <div class="vp-sum-item">
            <div class="vp-sum-label">VAL (70%하단)</div>
            <div class="vp-sum-val sup">$${fmtPrice(v.VAL)}</div>
          </div>
          <div class="vp-sum-item">
            <div class="vp-sum-label">근접 지지↑ / 저항↓</div>
            <div class="vp-sum-val dist" style="font-size:10px">
              <span style="color:var(--pump)">${supDistStr}</span>
              <span style="color:var(--dim)"> / </span>
              <span style="color:var(--dump)">${resDistStr}</span>
            </div>
          </div>
        </div>
      </div>`;
    })() : ''}

    <!-- BREAKDOWN -->
    <div class="breakdown-grid">
      <div class="breakdown-card">
        <div class="breakdown-heading">지표별 신호 기여도</div>
        <table class="ind-table">
          <thead>
            <tr>
              <th>지표</th><th>현재값</th>
              <th style="color:var(--pump)">펌프↑</th>
              <th style="color:var(--dump)">덤프↓</th>
            </tr>
          </thead>
          <tbody>${bRows}</tbody>
        </table>
      </div>

      <div class="breakdown-card">
        <div class="breakdown-heading">주요 지표 스냅샷</div>
        <div class="factor-row">
          <span class="factor-name">RSI (14)</span>
          <span class="factor-val ${r.rsi < 30 ? 'pos' : r.rsi > 70 ? 'neg' : 'neu'}">${r.rsi.toFixed(2)}</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">MACD 히스토그램</span>
          <span class="factor-val ${r.macd.hist > 0 ? 'pos' : 'neg'}">${r.macd.hist.toFixed(6)}</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">BB %B</span>
          <span class="factor-val ${r.bb.pct < 30 ? 'pos' : r.bb.pct > 70 ? 'neg' : 'neu'}">${r.bb.pct.toFixed(2)}%</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">BB 밴드폭</span>
          <span class="factor-val neu">${(r.bb.width * 100).toFixed(3)}%</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">거래량 비율 (vs 20봉)</span>
          <span class="factor-val ${r.volRatio > 1.5 ? 'pos' : r.volRatio < 0.7 ? 'neg' : 'neu'}">${r.volRatio.toFixed(3)}x</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">MA5 / MA20</span>
          <span class="factor-val ${r.ma5 > r.ma20 ? 'pos' : 'neg'}">${(r.ma5 / r.ma20).toFixed(5)}</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">ATR 변동성</span>
          <span class="factor-val neu">${(r.atrRatio * 100).toFixed(4)}%</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">6봉 모멘텀</span>
          <span class="factor-val ${r.momentum > 0 ? 'pos' : 'neg'}">${(r.momentum * 100).toFixed(3)}%</span>
        </div>
        <div class="factor-row">
          <span class="factor-name">BB 수축 상태</span>
          ${bbSqText}
        </div>
        <div class="factor-row">
          <span class="factor-name">최종 신호</span>
          <span class="sym-signal ${sigType}" style="font-size:11px">
            ${sigType === 'pump' ? '▲ 폭등 우세' : '▼ 폭락 우세'}
          </span>
        </div>
      </div>
    </div>

    <div class="disclaimer">
      ⚠ 본 확률 수치는 기술적 지표 기반 통계 추정값이며 미래 가격을 보장하지 않습니다.<br>
      폭등/폭락 확률은 RSI·MACD·볼린저밴드·거래량·모멘텀·캔들패턴·다이버전스 등 12개 인자를<br>
      가중 합산 후 시그모이드 함수로 0~100% 변환한 값입니다. 실제 거래 시 반드시 추가 분석 필요.
    </div>
  `;
}
</script>
</body>
</html>
