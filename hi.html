<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Futures Signal Scanner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap');

:root {
  --bg:      #060a0f;
  --surface: #0b1018;
  --panel:   #0f1823;
  --border:  #1a2535;
  --border2: #2a3a50;
  --pump:    #00d97e;
  --dump:    #ff3d5a;
  --neutral: #6b7280;
  --amber:   #f59e0b;
  --blue:    #3b82f6;
  --violet:  #8b5cf6;
  --text:    #dde3ed;
  --dim:     #5a6a7f;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans KR', sans-serif;
  --sidebar-w: 300px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:13px;line-height:1.5;
}

/* ══ APP SHELL ══ */
.app{display:grid;grid-template-rows:48px 1fr;height:100dvh;overflow:hidden}

/* ══ TOPBAR ══ */
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;min-width:0;
}
.menu-btn{
  display:none;background:none;
  border:1px solid var(--border2);color:var(--text);
  font-size:15px;padding:4px 9px;border-radius:3px;
  cursor:pointer;flex-shrink:0;
}
.logo{
  font-family:var(--mono);font-size:12px;font-weight:700;
  letter-spacing:2px;color:var(--amber);white-space:nowrap;flex-shrink:0;
}
.logo span{color:var(--dim);font-weight:300}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.stat-pill{
  font-family:var(--mono);font-size:10px;
  padding:3px 8px;border-radius:3px;
  border:1px solid var(--border2);color:var(--dim);white-space:nowrap;
}
.stat-pill.live{border-color:var(--pump);color:var(--pump)}
.live-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--pump);margin-right:4px;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ══ MAIN ══ */
.main{
  display:grid;
  grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  overflow:hidden;width:100%;min-width:0;position:relative;
}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);max-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .25s ease;z-index:10;
}
.sidebar-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}

select,input[type=number]{
  background:var(--panel);border:1px solid var(--border2);color:var(--text);
  padding:6px 8px;font-family:var(--mono);font-size:11px;border-radius:3px;
  outline:none;flex:1;min-width:0;
}
select:focus,input:focus{border-color:var(--amber)}
.controls-row{display:flex;gap:5px;margin-bottom:7px}
.threshold-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.threshold-label{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}

.scan-btn{
  width:100%;padding:9px;background:var(--amber);color:#000;
  border:none;font-family:var(--mono);font-size:12px;font-weight:700;
  letter-spacing:1px;border-radius:3px;cursor:pointer;transition:opacity .15s;
}
.scan-btn:hover{opacity:.85}
.scan-btn:disabled{opacity:.4;cursor:not-allowed}
.scan-btn.scanning{background:var(--border2);color:var(--amber);border:1px solid var(--amber)}

.sort-tabs{display:flex;gap:3px;margin-bottom:8px}
.sort-tab{
  flex:1;padding:4px 0;background:var(--panel);border:1px solid var(--border);
  border-radius:3px;font-family:var(--mono);font-size:9px;color:var(--dim);
  cursor:pointer;text-align:center;transition:all .15s;
}
.sort-tab:hover{border-color:var(--border2);color:var(--text)}
.sort-tab.active{background:var(--amber);border-color:var(--amber);color:#000;font-weight:700}

.result-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:5px}
.result-list::-webkit-scrollbar{width:3px}
.result-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* sym cards */
.sym-card{
  padding:9px 11px;border-radius:4px;border:1px solid var(--border);
  margin-bottom:4px;cursor:pointer;transition:border-color .15s,background .15s;
  background:var(--panel);
}
.sym-card:hover{border-color:var(--amber)}
.sym-card.active{border-color:var(--amber);background:rgba(245,158,11,.05)}
.sym-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sym-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text)}
.sym-signal{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px}
.sym-signal.pump{background:rgba(0,217,126,.15);color:var(--pump)}
.sym-signal.dump{background:rgba(255,61,90,.15);color:var(--dump)}
.sym-signal.neutral{background:rgba(107,114,128,.15);color:var(--neutral)}

.prob-bars{display:flex;flex-direction:column;gap:3px}
.prob-row{display:flex;align-items:center;gap:5px}
.prob-label{font-family:var(--mono);font-size:9px;color:var(--dim);width:28px;flex-shrink:0}
.bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;min-width:0}
.bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.bar-fill.pump{background:var(--pump)}
.bar-fill.dump{background:var(--dump)}
.prob-pct{font-family:var(--mono);font-size:9px;width:28px;text-align:right;flex-shrink:0}
.prob-pct.pump{color:var(--pump)}
.prob-pct.dump{color:var(--dump)}

/* funding mini badge in list */
.sym-meta-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
.meta-tag{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:2px}
.meta-tag.fund-pos{background:rgba(255,61,90,.12);color:var(--dump)}
.meta-tag.fund-neg{background:rgba(0,217,126,.12);color:var(--pump)}
.meta-tag.fund-neu{background:rgba(107,114,128,.1);color:var(--dim)}
.meta-tag.oi-up{background:rgba(245,158,11,.1);color:var(--amber)}
.meta-tag.oi-dn{background:rgba(139,92,246,.1);color:var(--violet)}
.meta-tag.poc{background:rgba(245,158,11,.1);color:var(--amber)}
.meta-tag.sup{background:rgba(0,217,126,.1);color:var(--pump)}
.meta-tag.res{background:rgba(255,61,90,.1);color:var(--dump)}

.scan-status{
  padding:7px 14px;font-family:var(--mono);font-size:10px;color:var(--dim);
  border-top:1px solid var(--border);flex-shrink:0;
  display:flex;justify-content:space-between;
}
.scan-progress{padding:6px 14px;display:none}
.progress-track{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.progress-fill{height:100%;background:var(--amber);border-radius:1px;transition:width .3s ease}
.error-msg{color:var(--dump);font-family:var(--mono);font-size:11px;padding:8px 14px;display:none}
.empty-list{padding:20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px}

/* sidebar overlay */
.sidebar-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:9}
.sidebar-overlay.active{display:block}

/* ══ DETAIL PANEL ══ */
.detail{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0;width:100%}
.detail-inner{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px;min-width:0;width:100%;max-width:100%;
}
.detail-inner::-webkit-scrollbar{width:3px}
.detail-inner::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.placeholder{
  height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--dim);font-family:var(--mono);font-size:12px;gap:10px;
}
.placeholder-icon{font-size:36px;opacity:.25}

/* ══ DETAIL HEADER ══ */
.detail-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:10px;min-width:0;width:100%;
}
.detail-sym{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text)}
.detail-price{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:2px}
.detail-price.up{color:var(--pump)}
.detail-price.down{color:var(--dump)}
.detail-meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:4px;word-break:break-word}

/* ══ SECTION CARD ══ */
.section-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:14px;margin-bottom:12px;
  min-width:0;overflow:hidden;width:100%;
}
.section-heading{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--dim);text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
}

/* ══ GAUGE ROW ══ */
.gauge-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:12px;width:100%}
.gauge-card{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:14px;text-align:center;position:relative;overflow:hidden;min-width:0;
}
.gauge-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.gauge-card.pump-card::after{background:var(--pump)}
.gauge-card.dump-card::after{background:var(--dump)}
.gauge-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.gauge-card.pump-card .gauge-title{color:var(--pump)}
.gauge-card.dump-card .gauge-title{color:var(--dump)}
.gauge-pct{font-family:var(--mono);font-size:32px;font-weight:700;line-height:1;margin-bottom:3px}
.gauge-card.pump-card .gauge-pct{color:var(--pump)}
.gauge-card.dump-card .gauge-pct{color:var(--dump)}
.gauge-sub{font-family:var(--mono);font-size:10px;color:var(--dim)}
.arc-wrap{position:relative;width:80px;height:44px;margin:4px auto;overflow:hidden}
.arc-bg{position:absolute;width:80px;height:80px;top:0;left:0;border-radius:50%;background:var(--border);clip-path:inset(0 0 50% 0)}
.arc-fg{position:absolute;width:80px;height:80px;top:0;left:0;border-radius:50%;transform-origin:center center;clip-path:inset(0 0 50% 0);transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
.pump-card .arc-fg{background:var(--pump)}
.dump-card .arc-fg{background:var(--dump)}

/* ══ FUNDING + OI CARDS ══ */
.fi-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.fi-card{
  background:var(--panel);border:1px solid var(--border);border-radius:5px;
  padding:10px 12px;text-align:center;position:relative;overflow:hidden;
}
.fi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.fi-card.pump-accent::before{background:linear-gradient(90deg,var(--pump),transparent)}
.fi-card.dump-accent::before{background:linear-gradient(90deg,var(--dump),transparent)}
.fi-card.amber-accent::before{background:linear-gradient(90deg,var(--amber),transparent)}
.fi-card.violet-accent::before{background:linear-gradient(90deg,var(--violet),transparent)}
.fi-card.neu-accent::before{background:linear-gradient(90deg,var(--dim),transparent)}
.fi-label{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.fi-val{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1;margin-bottom:2px}
.fi-val.pos{color:var(--pump)}
.fi-val.neg{color:var(--dump)}
.fi-val.neu{color:var(--dim)}
.fi-val.amber{color:var(--amber)}
.fi-val.violet{color:var(--violet)}
.fi-sub{font-family:var(--mono);font-size:9px;color:var(--dim)}

/* ══ FUNDING RATE CHART ══ */
.fr-bar-row{display:flex;align-items:center;gap:0;height:28px;margin-bottom:6px;border-radius:3px;overflow:hidden;background:var(--panel)}
.fr-long{height:100%;background:rgba(255,61,90,.4);transition:width .4s ease}
.fr-short{height:100%;background:rgba(0,217,126,.4);transition:width .4s ease}
.fr-divider{width:1px;height:100%;background:var(--border2);flex-shrink:0}
.fr-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim)}

/* ══ ORDERBOOK WALL ══ */
.ob-container{width:100%;min-width:0}
.ob-header{display:grid;grid-template-columns:80px 1fr 70px;gap:6px;margin-bottom:6px}
.ob-hcell{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.ob-hcell:last-child{text-align:right}

.ob-side{margin-bottom:4px}
.ob-row{
  display:grid;grid-template-columns:80px 1fr 70px;
  gap:6px;align-items:center;margin-bottom:2px;
  padding:2px 0;position:relative;
}
.ob-price{font-family:var(--mono);font-size:10px;font-weight:600}
.ob-price.ask{color:var(--dump)}
.ob-price.bid{color:var(--pump)}
.ob-bar-wrap{height:12px;position:relative;overflow:hidden;border-radius:1px;background:transparent}
.ob-bar{position:absolute;top:0;height:100%;border-radius:1px;transition:width .4s ease}
.ob-bar.ask{background:rgba(255,61,90,.25);right:0}
.ob-bar.bid{background:rgba(0,217,126,.25);left:0}
.ob-bar.wall-ask{background:rgba(255,61,90,.7)}
.ob-bar.wall-bid{background:rgba(0,217,126,.7)}
.ob-qty{font-family:var(--mono);font-size:9px;color:var(--dim);text-align:right}
.ob-wall-tag{
  position:absolute;right:4px;top:50%;transform:translateY(-50%);
  font-family:var(--mono);font-size:8px;font-weight:700;
  padding:1px 4px;border-radius:2px;
}
.ob-wall-tag.ask{background:rgba(255,61,90,.3);color:var(--dump)}
.ob-wall-tag.bid{background:rgba(0,217,126,.3);color:var(--pump)}

.ob-spread{
  text-align:center;padding:4px 0;
  font-family:var(--mono);font-size:9px;color:var(--dim);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  margin:3px 0;
}
.ob-imbalance{
  display:flex;gap:8px;margin-top:8px;align-items:center;
  padding:8px 10px;background:var(--panel);border-radius:4px;
  border:1px solid var(--border);
}
.ob-imb-label{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0}
.ob-imb-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.ob-imb-fill{height:100%;border-radius:4px;transition:width .5s ease}
.ob-imb-val{font-family:var(--mono);font-size:11px;font-weight:700;flex-shrink:0;min-width:36px;text-align:right}

/* ══ VOLUME PROFILE ══ */
.vp-key-levels{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.vp-level-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:8px;text-align:center}
.vp-level-label{font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:3px}
.vp-level-val{font-family:var(--mono);font-size:11px;font-weight:700}
.vp-level-val.poc{color:var(--amber)}
.vp-level-val.vah{color:var(--dump)}
.vp-level-val.val{color:var(--pump)}
.vp-level-val.cur{color:var(--text)}
.vp-chart{display:flex;flex-direction:column;gap:2px;max-height:280px;overflow-y:auto;overflow-x:hidden}
.vp-chart::-webkit-scrollbar{width:3px}
.vp-chart::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.vp-row{display:flex;align-items:center;gap:5px;min-width:0;position:relative}
.vp-price{font-family:var(--mono);font-size:9px;color:var(--dim);width:76px;flex-shrink:0;text-align:right;white-space:nowrap}
.vp-bar-wrap{flex:1;height:14px;position:relative;min-width:0;overflow:hidden}
.vp-bar{position:absolute;top:2px;left:0;height:10px;border-radius:2px;transition:width .4s ease}
.vp-bar.normal{background:rgba(59,130,246,.3)}
.vp-bar.poc-bar{background:rgba(245,158,11,.8)}
.vp-bar.sup-bar{background:rgba(0,217,126,.5)}
.vp-bar.res-bar{background:rgba(255,61,90,.5)}
.vp-vol{font-family:var(--mono);font-size:9px;color:var(--dim);width:46px;flex-shrink:0;text-align:right}
.vp-tag{font-family:var(--mono);font-size:8px;font-weight:700;padding:1px 5px;border-radius:2px;flex-shrink:0;width:38px;text-align:center}
.vp-tag.poc{background:rgba(245,158,11,.2);color:var(--amber)}
.vp-tag.sup{background:rgba(0,217,126,.15);color:var(--pump)}
.vp-tag.res{background:rgba(255,61,90,.15);color:var(--dump)}
.vp-tag.cur{background:rgba(255,255,255,.08);color:var(--text)}
.vp-tag.empty{opacity:0}

/* ══ BREAKDOWN ══ */
.breakdown-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:12px;width:100%;min-width:0}
.breakdown-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;min-width:0;overflow:hidden;width:100%}
.breakdown-heading{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.factor-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(26,37,53,.8);min-width:0}
.factor-row:last-child{border-bottom:none}
.factor-name{font-size:11px;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.factor-val{font-family:var(--mono);font-size:11px;font-weight:600;margin-left:6px;white-space:nowrap;flex-shrink:0}
.factor-val.pos{color:var(--pump)}
.factor-val.neg{color:var(--dump)}
.factor-val.neu{color:var(--dim)}
.factor-score{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:2px;margin-left:6px;min-width:34px;text-align:right;flex-shrink:0}
.factor-score.pos{background:rgba(0,217,126,.12);color:var(--pump)}
.factor-score.neg{background:rgba(255,61,90,.12);color:var(--dump)}
.factor-score.zero{color:var(--dim)}

.ind-table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;max-width:100%}
.ind-table th{background:var(--surface);color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:6px 7px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ind-table td{padding:6px 7px;border-bottom:1px solid rgba(26,37,53,.6);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ind-table tr:hover td{background:rgba(255,255,255,.015)}
.badge{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;font-family:var(--mono)}
.badge.pump{background:rgba(0,217,126,.15);color:var(--pump)}
.badge.dump{background:rgba(255,61,90,.15);color:var(--dump)}
.badge.neu{background:rgba(107,114,128,.12);color:var(--dim)}

.disclaimer{font-size:10px;color:var(--dim);font-family:var(--mono);border-top:1px solid var(--border);padding:10px 0 0;line-height:1.6;word-break:break-word}

/* ══ MOBILE ══ */
@media (max-width:680px){
  :root{--sidebar-w:100%}
  .menu-btn{display:block}
  .main{grid-template-columns:1fr;position:relative}
  .sidebar{
    position:absolute;top:0;left:0;height:100%;
    width:100%!important;min-width:unset!important;max-width:100%!important;
    transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.6);
  }
  .sidebar.open{transform:translateX(0)}
  .detail{width:100%;grid-column:1}
  .breakdown-grid{grid-template-columns:1fr}
  .gauge-row{grid-template-columns:minmax(0,1fr) minmax(0,1fr)}
  .fi-grid{grid-template-columns:repeat(3,minmax(0,1fr))}

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const BASE        = 'https://fapi.binance.com';
const CONCURRENCY = 5;
const KLINE_LIMIT = 100;
const VP_BINS     = 30;
const OB_DEPTH    = 20;   // 오더북 레벨 수
const WALL_MULT   = 3.0;  // 평균 대비 WALL_MULT배 이상 = 매물벽

let currentSort  = 'pump';
let scanResults  = [];
let activeSymbol = null;
let isMobile     = false;

function checkMobile(){ isMobile = window.innerWidth <= 680; }
checkMobile();
window.addEventListener('resize', checkMobile);

function toggleSidebar(){
  const sb=document.getElementById('sidebar'), ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('open'); ov.classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

// ════════════════════════════════════════════
// UTILITY
// ════════════════════════════════════════════
function makeAbortSignal(ms){
  if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout) return AbortSignal.timeout(ms);
  const c=new AbortController(); setTimeout(()=>c.abort(),ms); return c.signal;
}
async function apiFetch(path, retries=2){
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(BASE+path,{signal:makeAbortSignal(10000)});
      if(r.status===429){await sleep(1500);continue;}
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }catch(e){
      if(i===retries) throw e;
      await sleep(700);
    }
  }
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function batchRun(tasks,concurrency){
  const results=new Array(tasks.length).fill(null);
  let idx=0;
  async function worker(){
    while(true){
      const i=idx++; if(i>=tasks.length) break;
      try{results[i]=await tasks[i]();}catch(e){results[i]=null;}
    }
  }
  await Promise.all(Array.from({length:Math.min(concurrency,tasks.length)},worker));
  return results;
}
function fmtPrice(p){
  if(p==null) return '—';
  if(p>=1000)  return p.toLocaleString(undefined,{maximumFractionDigits:2});
  if(p>=1)     return p.toFixed(4);
  if(p>=0.01)  return p.toFixed(5);
  return p.toFixed(6);
}
function fmtVol(v){
  if(v>=1e9) return (v/1e9).toFixed(2)+'B';
  if(v>=1e6) return (v/1e6).toFixed(2)+'M';
  if(v>=1e3) return (v/1e3).toFixed(1)+'K';
  return v.toFixed(0);
}

// ════════════════════════════════════════════
// MATH
// ════════════════════════════════════════════
function ema(arr,n){
  if(!arr||!arr.length) return 0;
  const k=2/(n+1); let e=arr[0];
  for(let i=1;i<arr.length;i++) e=arr[i]*k+e*(1-k);
  return e;
}
function sma(arr,n){
  const s=arr.slice(-Math.min(n,arr.length));
  if(!s.length) return 0;
  return s.reduce((a,b)=>a+b,0)/s.length;
}
function stdev(arr){
  if(!arr.length) return 0;
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length);
}
function calcRSI(closes,n=14){
  if(closes.length<n+1) return 50;
  let gains=0,losses=0;
  for(let i=closes.length-n;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    d>0?(gains+=d):(losses-=d);
  }
  if(losses===0) return gains>0?100:50;
  return 100-100/(1+gains/losses);
}
function calcMACD(closes){
  if(closes.length<26) return {line:0,signal:0,hist:0};
  const k12=2/13,k26=2/27;
  let e12=closes[0],e26=closes[0];
  const macdLines=[];
  for(let i=1;i<closes.length;i++){
    e12=closes[i]*k12+e12*(1-k12);
    e26=closes[i]*k26+e26*(1-k26);
    if(i>=25) macdLines.push(e12-e26);
  }
  const line=macdLines[macdLines.length-1]||0;
  const signal=ema(macdLines.slice(-9),9);
  return{line,signal,hist:line-signal};
}
function calcBB(closes,n=20){
  if(closes.length<n) return{upper:0,lower:0,mid:0,width:0,pct:50};
  const s=closes.slice(-n);
  const mid=s.reduce((a,b)=>a+b,0)/n;
  const sd=stdev(s);
  const upper=mid+2*sd,lower=mid-2*sd;
  const last=closes[closes.length-1];
  const range=upper-lower;
  return{upper,lower,mid,width:mid>0?range/mid:0,pct:range>0?(last-lower)/range*100:50};
}
function calcATR(highs,lows,closes,n=14){
  const trs=[];
  for(let i=1;i<closes.length;i++)
    trs.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  if(!trs.length) return 0;
  return sma(trs,Math.min(n,trs.length));
}

// ════════════════════════════════════════════
// VOLUME PROFILE (매물대)
// ════════════════════════════════════════════
function calcVolumeProfile(klines,bins=VP_BINS){
  const highs =klines.map(k=>+k[2]);
  const lows  =klines.map(k=>+k[3]);
  const closes=klines.map(k=>+k[4]);
  const vols  =klines.map(k=>+k[5]);
  const priceHigh=Math.max(...highs), priceLow=Math.min(...lows);
  const range=priceHigh-priceLow;
  if(range<=0) return null;
  const binSize=range/bins;
  const buckets=Array.from({length:bins},(_,i)=>({
    priceMin:priceLow+i*binSize, priceMax:priceLow+(i+1)*binSize,
    priceMid:priceLow+(i+0.5)*binSize, vol:0,
  }));
  klines.forEach((_,i)=>{
    const hi=highs[i],lo=lows[i],v=vols[i],span=hi-lo||binSize;
    buckets.forEach(b=>{
      const overlap=Math.min(hi,b.priceMax)-Math.max(lo,b.priceMin);
      if(overlap>0) b.vol+=v*(overlap/span);
    });
  });
  const totalVol=buckets.reduce((s,b)=>s+b.vol,0);
  const poc=buckets.reduce((a,b)=>b.vol>a.vol?b:a);
  const pocIdx=buckets.indexOf(poc);
  let vaVol=poc.vol,vaLow=pocIdx,vaHigh=pocIdx;
  while(vaVol<totalVol*0.70&&(vaLow>0||vaHigh<bins-1)){
    const addL=vaLow>0?buckets[vaLow-1].vol:-1;
    const addH=vaHigh<bins-1?buckets[vaHigh+1].vol:-1;
    if(addL>=addH&&addL>=0){vaVol+=addL;vaLow--;}
    else if(addH>=0){vaVol+=addH;vaHigh++;}
    else break;
  }
  const VAH=buckets[vaHigh].priceMax, VAL=buckets[vaLow].priceMin;
  const maxVol=poc.vol;
  const lastPrice=closes[closes.length-1];
  const volThreshold=maxVol*0.4;
  const supports=buckets.filter(b=>b.priceMid<lastPrice&&b.vol>=volThreshold).sort((a,b)=>b.priceMid-a.priceMid).slice(0,2);
  const resists =buckets.filter(b=>b.priceMid>lastPrice&&b.vol>=volThreshold).sort((a,b)=>a.priceMid-b.priceMid).slice(0,2);
  const vpPumpScore=lastPrice<VAL?Math.min((VAL-lastPrice)/VAL*8,1.0):lastPrice<poc.priceMid?0.3:0;
  const vpDumpScore=lastPrice>VAH?Math.min((lastPrice-VAH)/VAH*8,1.0):lastPrice>poc.priceMid?0.3:0;
  const nearSupport=supports[0]?supports[0].priceMid:null;
  const nearResist =resists[0] ?resists[0].priceMid :null;
  const supportDist=nearSupport?((lastPrice-nearSupport)/lastPrice*100):null;
  const resistDist =nearResist ?((nearResist-lastPrice)/lastPrice*100) :null;
  return{buckets,poc:poc.priceMid,VAH,VAL,supports,resists,maxVol,totalVol,
    vpPumpScore,vpDumpScore,pocDist:(lastPrice-poc.priceMid)/poc.priceMid,
    nearSupport,nearResist,supportDist,resistDist,priceHigh,priceLow,lastPrice};
}

// ════════════════════════════════════════════
// ORDERBOOK ANALYSIS (매물벽)
// ════════════════════════════════════════════
function analyzeOrderbook(ob){
  // ob = {bids:[[price,qty],...], asks:[[price,qty],...]}
  if(!ob||!ob.bids||!ob.asks) return null;
  const bids=ob.bids.map(r=>[+r[0],+r[1]]).sort((a,b)=>b[0]-a[0]).slice(0,OB_DEPTH);
  const asks=ob.asks.map(r=>[+r[0],+r[1]]).sort((a,b)=>a[0]-b[0]).slice(0,OB_DEPTH);
  if(!bids.length||!asks.length) return null;

  const bidQtys=bids.map(r=>r[1]);
  const askQtys=asks.map(r=>r[1]);
  const avgBid=sma(bidQtys,bidQtys.length);
  const avgAsk=sma(askQtys,askQtys.length);

  // 매물벽 감지 (평균 대비 WALL_MULT배)
  const bidWalls=bids.filter(r=>r[1]>=avgBid*WALL_MULT);
  const askWalls=asks.filter(r=>r[1]>=avgAsk*WALL_MULT);

  const totalBidVol=bidQtys.reduce((a,b)=>a+b,0);
  const totalAskVol=askQtys.reduce((a,b)=>a+b,0);
  const totalVol=totalBidVol+totalAskVol;
  const bidRatio=totalVol>0?totalBidVol/totalVol*100:50;

  // 호가 불균형 신호: 매수벽 크면 펌프, 매도벽 크면 덤프
  const imbalance=totalVol>0?(totalBidVol-totalAskVol)/totalVol:0; // -1~+1
  const obPumpScore=Math.max(0,imbalance)*1.5;
  const obDumpScore=Math.max(0,-imbalance)*1.5;

  const bestBid=bids[0]?bids[0][0]:0;
  const bestAsk=asks[0]?asks[0][0]:0;
  const spread=bestAsk>0&&bestBid>0?(bestAsk-bestBid)/bestBid*100:0;
  const maxBidVol=Math.max(...bidQtys,1);
  const maxAskVol=Math.max(...askQtys,1);
  const maxVol=Math.max(maxBidVol,maxAskVol);

  return{
    bids,asks,bidWalls,askWalls,
    totalBidVol,totalAskVol,bidRatio,
    imbalance,obPumpScore,obDumpScore,
    bestBid,bestAsk,spread,
    maxBidVol,maxAskVol,maxVol,
    avgBid,avgAsk,
  };
}

// ════════════════════════════════════════════
// SIGNAL ENGINE
// ════════════════════════════════════════════
function sigmoid(x){return 1/(1+Math.exp(-x))}

function computeSignals(klines, obData, frData, oiData){
  const opens =klines.map(k=>+k[1]);
  const highs =klines.map(k=>+k[2]);
  const lows  =klines.map(k=>+k[3]);
  const closes=klines.map(k=>+k[4]);
  const vols  =klines.map(k=>+k[5]);
  const n=closes.length;
  if(n<30) return null;
  const last=closes[n-1], prev=closes[n-2];

  // RSI
  const rsi    =calcRSI(closes,14);
  const rsiPrev=calcRSI(closes.slice(0,-1),14);
  const rsiPumpScore=rsi<30?(30-rsi)/30:rsi<45?(45-rsi)/45*0.4:rsi>70?-(rsi-70)/30:rsi>55?-(rsi-55)/55*0.4:0;
  const rsiMomentum=(rsi-rsiPrev)/10;

  // MACD
  const macd=calcMACD(closes);
  const macdScore=last>0?Math.tanh(macd.hist/(last*0.001)):0;

  // BB
  const bb=calcBB(closes,20);
  const bbScore=bb.pct<20?(20-bb.pct)/20:bb.pct>80?-(bb.pct-80)/20:(50-bb.pct)/100;
  const bbWidthAvg=(()=>{
    if(n<21) return bb.width;
    let sum=0,cnt=0;
    for(let i=20;i<n;i++){const sl=closes.slice(i-20,i),m=sl.reduce((a,b)=>a+b,0)/20,sd=stdev(sl);sum+=m>0?(4*sd/m):0;cnt++;}
    return cnt?sum/cnt:bb.width;
  })();
  const bbSqueeze=bb.width<bbWidthAvg*0.75;

  // Volume
  const avgVol20=sma(vols.slice(-21,-1),20);
  const volRatio=avgVol20>0?vols[n-1]/avgVol20:1;
  const priceDir=prev>0?(last-prev)/prev:0;
  const volScore=Math.min(volRatio-1,3)*Math.sign(priceDir)*0.4;

  // MA
  const ma5 =sma(closes,5);
  const ma20=sma(closes,20);
  const ma60=n>=60?sma(closes,60):ma20;
  const maScore=ma20>0?((last-ma20)/ma20)*5:0;
  const maTrend=ma5>ma20?0.3:ma5<ma20?-0.3:0;
  const maLong =ma20>ma60?0.2:ma20<ma60?-0.2:0;

  // Momentum
  const c4=n>=4?closes[n-4]:closes[0];
  const c7=n>=7?closes[n-7]:closes[0];
  const c13=n>=13?closes[n-13]:closes[0];
  const ret3=c4>0?(last-c4)/c4:0;
  const ret6=c7>0?(last-c7)/c7:0;
  const ret12=c13>0?(last-c13)/c13:0;
  const momentum=(ret3*0.5+ret6*0.3+ret12*0.2)*8;

  // ATR
  const atr=calcATR(highs,lows,closes,14);
  const atrRatio=last>0?atr/last:0;
  const atrAmplify=Math.min(atrRatio*50,1.5);

  // Candle
  const body=Math.abs(last-opens[n-1]);
  const totalRange=Math.max(highs[n-1]-lows[n-1],0.0001);
  const bodyRatio=body/totalRange;
  const upperShadow=highs[n-1]-Math.max(last,opens[n-1]);
  const lowerShadow=Math.min(last,opens[n-1])-lows[n-1];
  const candleScore=(lowerShadow-upperShadow)/totalRange;

  // Consecutive
  let bullRun=0,bearRun=0;
  for(let i=n-1;i>=Math.max(0,n-8);i--){
    if(closes[i]>opens[i]){if(bearRun>0)break;bullRun++;}
    else if(closes[i]<opens[i]){if(bullRun>0)break;bearRun++;}
    else break;
  }
  const runScore=bullRun>0?Math.min(bullRun*0.15,0.6):bearRun>0?-Math.min(bearRun*0.15,0.6):0;

  // Divergence
  const lookback=Math.min(10,n-1);
  const rsi10=calcRSI(closes.slice(0,n-lookback),14);
  const priceDelta=last-closes[n-1-lookback];
  const rsiDelta=rsi-rsi10;
  let divergenceScore=0;
  if(priceDelta<0&&rsiDelta>2) divergenceScore=0.5;
  if(priceDelta>0&&rsiDelta<-2) divergenceScore=-0.5;

  // Volume Profile
  const vp=calcVolumeProfile(klines,VP_BINS);
  const vpPumpScore=vp?vp.vpPumpScore:0;
  const vpDumpScore=vp?vp.vpDumpScore:0;

  // Orderbook
  const ob=analyzeOrderbook(obData);
  const obPumpScore=ob?ob.obPumpScore:0;
  const obDumpScore=ob?ob.obDumpScore:0;

  // Funding Rate
  // frData = {fundingRate: "0.0001", ...}
  const fr=frData?+frData.lastFundingRate:0;
  // 양수 펀딩 = 롱 과부하 = 덤프 신호, 음수 = 숏 과부하 = 펌프 신호
  const frPumpScore=fr<0?Math.min(-fr*1000,1.0):fr>0?-Math.min(fr*500,0.6):0;
  const frDumpScore=fr>0?Math.min(fr*1000,1.0):fr<0?-Math.min(-fr*500,0.6):0;

  // Open Interest
  const oiNow=oiData?+oiData.openInterest:0;

  // ── 가중 합산 ──────────────────────────────────
  const factors={
    rsi:        {pump:rsiPumpScore,   dump:-rsiPumpScore,   w:2.0},
    rsiMom:     {pump:rsiMomentum,    dump:-rsiMomentum,    w:0.8},
    macd:       {pump:macdScore,      dump:-macdScore,      w:1.5},
    bb:         {pump:bbScore,        dump:-bbScore,        w:1.5},
    volume:     {pump:volScore,       dump:-volScore,       w:1.2},
    ma:         {pump:maScore,        dump:-maScore,        w:1.0},
    maTrend:    {pump:maTrend,        dump:-maTrend,        w:0.8},
    maLong:     {pump:maLong,         dump:-maLong,         w:0.6},
    momentum:   {pump:momentum,       dump:-momentum,       w:1.2},
    candle:     {pump:candleScore,    dump:-candleScore,    w:0.8},
    run:        {pump:runScore,       dump:-runScore,       w:0.7},
    divergence: {pump:divergenceScore,dump:-divergenceScore,w:1.0},
    vp:         {pump:vpPumpScore,    dump:vpDumpScore,     w:1.3},
    ob:         {pump:obPumpScore,    dump:obDumpScore,     w:1.5},
    funding:    {pump:frPumpScore,    dump:frDumpScore,     w:1.2},
  };

  let pumpRaw=0,dumpRaw=0;
  for(const f of Object.values(factors)){pumpRaw+=f.pump*f.w;dumpRaw+=f.dump*f.w;}
  pumpRaw*=atrAmplify; dumpRaw*=atrAmplify;
  if(bbSqueeze){pumpRaw*=1.2;dumpRaw*=1.2;}

  const SCALE=1.5;
  const pumpProb=Math.round(sigmoid(pumpRaw*SCALE)*100);
  const dumpProb=Math.round(sigmoid(dumpRaw*SCALE)*100);

  const breakdown=[
    {name:'RSI',         val:rsi.toFixed(1),                      pumpS:factors.rsi.pump,      dumpS:factors.rsi.dump},
    {name:'RSI 모멘텀',  val:(rsiMomentum*10).toFixed(2),         pumpS:factors.rsiMom.pump,   dumpS:factors.rsiMom.dump},
    {name:'MACD 히스토', val:macd.hist.toFixed(5),                pumpS:factors.macd.pump,     dumpS:factors.macd.dump},
    {name:'BB %B',       val:bb.pct.toFixed(1)+'%',               pumpS:factors.bb.pump,       dumpS:factors.bb.dump},

// SCAN
// ════════════════════════════════════════════
let scanning=false;

async function startScan(){
  if(scanning) return;
  scanning=true;
  const btn=document.getElementById('scanBtn');
  btn.disabled=true; btn.textContent='⏳ 스캔 중...'; btn.classList.add('scanning');
  document.getElementById('scanProgress').style.display='block';
  document.getElementById('errorMsg').style.display='none';
  document.getElementById('resultList').innerHTML='<div class="empty-list">종목 목록 로드 중...</div>';
  setProgress(0);

  const interval =document.getElementById('intervalSel').value;
  const topN     =parseInt(document.getElementById('limitSel').value);
  const threshold=parseInt(document.getElementById('thresholdInput').value)||40;
  const filter   =document.getElementById('filterSel').value;

  try{
    const [exchangeInfo,tickers]=await Promise.all([
      apiFetch('/fapi/v1/exchangeInfo'),
      apiFetch('/fapi/v1/ticker/24hr'),
    ]);

    const activeSymbols=new Set(
      exchangeInfo.symbols.filter(s=>s.quoteAsset==='USDT'&&s.status==='TRADING').map(s=>s.symbol)
    );
    const tickerMap={};
    tickers.forEach(t=>{tickerMap[t.symbol]=t;});

    const topSymbols=Object.values(tickerMap)
      .filter(t=>activeSymbols.has(t.symbol))
      .sort((a,b)=>+b.quoteVolume-+a.quoteVolume)
      .slice(0,topN).map(t=>t.symbol);

    setProgress(10);
    document.getElementById('resultList').innerHTML=`<div class="empty-list">${topSymbols.length}개 분석 중...</div>`;

    let done=0;
    const tasks=topSymbols.map(sym=>async()=>{
      // klines + orderbook + funding + OI 병렬 로드
      const [klines,obData,frData,oiData]=await Promise.all([
        apiFetch(`/fapi/v1/klines?symbol=${sym}&interval=${interval}&limit=${KLINE_LIMIT}`),
        apiFetch(`/fapi/v1/depth?symbol=${sym}&limit=${OB_DEPTH}`).catch(()=>null),
        apiFetch(`/fapi/v1/premiumIndex?symbol=${sym}`).catch(()=>null),
        apiFetch(`/fapi/v1/openInterest?symbol=${sym}`).catch(()=>null),
      ]);
      const sig=computeSignals(klines,obData,frData,oiData);
      done++;
      setProgress(10+Math.round(done/topSymbols.length*85));
      if(!sig) return null;
      const t=tickerMap[sym]||{};
      sig.symbol=sym;
      sig.change24h=+t.priceChangePercent||0;
      sig.volume24h=+t.quoteVolume||0;
      sig.lastPrice=+t.lastPrice||sig.lastPrice;
      return sig;
    });

    const raw=await batchRun(tasks,CONCURRENCY);
    setProgress(98);

    let results=raw.filter(r=>{
      if(!r) return false;
      if(filter==='pump') return r.pumpProb>=threshold;
      if(filter==='dump') return r.dumpProb>=threshold;
      return r.pumpProb>=threshold||r.dumpProb>=threshold;
    });
    results=sortResults(results,currentSort);
    scanResults=results;
    renderList(results);

    const now=new Date();
    document.getElementById('scanTime').textContent=
      `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('statusLeft').textContent=`${results.length}개 감지`;
    document.getElementById('statusRight').textContent=`${topSymbols.length}개 완료`;

  }catch(e){
    const err=document.getElementById('errorMsg');
    err.style.display='block'; err.textContent='❌ '+e.message;
    document.getElementById('resultList').innerHTML='<div class="empty-list">오류 발생 — 재시도해주세요</div>';
  }

  setProgress(100);
  setTimeout(()=>{document.getElementById('scanProgress').style.display='none';setProgress(0);},500);
  btn.disabled=false; btn.textContent='▶ 재스캔'; btn.classList.remove('scanning');
  scanning=false;
}

function setProgress(p){document.getElementById('progressFill').style.width=p+'%'}
function setSort(s){
  currentSort=s;
  document.querySelectorAll('.sort-tab').forEach(t=>t.classList.toggle('active',t.dataset.sort===s));
  if(scanResults.length) renderList(sortResults([...scanResults],s));
}
function sortResults(arr,sort){
  if(sort==='pump') return arr.sort((a,b)=>b.pumpProb-a.pumpProb);
  if(sort==='dump') return arr.sort((a,b)=>b.dumpProb-a.dumpProb);
  if(sort==='max')  return arr.sort((a,b)=>Math.max(b.pumpProb,b.dumpProb)-Math.max(a.pumpProb,a.dumpProb));
  if(sort==='vol')  return arr.sort((a,b)=>b.volume24h-a.volume24h);
  return arr;
}

// ════════════════════════════════════════════
// RENDER LIST
// ════════════════════════════════════════════
function renderList(results){
  const el=document.getElementById('resultList');
  if(!results.length){
    el.innerHTML='<div class="empty-list">조건을 충족하는 종목 없음<br>임계값을 낮추거나 재스캔 해주세요</div>';
    return;
  }
  el.innerHTML=results.map(r=>{
    const sig=r.pumpProb>r.dumpProb?'pump':r.dumpProb>r.pumpProb?'dump':'neutral';
    const sigLabel=sig==='pump'?'▲ 폭등':sig==='dump'?'▼ 폭락':'— 중립';
    const base=r.symbol.replace('USDT','');
    const chgClass=r.change24h>=0?'pos':'neg';
    const chgStr=(r.change24h>=0?'+':'')+r.change24h.toFixed(2)+'%';

    // 펀딩비 태그
    const fr=r.fundingRate||0;
    const frClass=fr>0.0002?'fund-pos':fr<-0.0002?'fund-neg':'fund-neu';
    const frLabel=fr!==0?`FR ${(fr*100).toFixed(3)}%`:'FR —';

    // OI 태그
    const oiLabel=r.openInterest>0?`OI ${fmtVol(r.openInterest)}`:'';

    // VP 태그
    const vpLabel=r.vp?`POC $${fmtPrice(r.vp.poc)}`:'';

    // OB 불균형 태그
    const obClass=r.ob&&r.ob.bidRatio>55?'oi-up':r.ob&&r.ob.bidRatio<45?'oi-dn':'fund-neu';
    const obLabel=r.ob?`OB ${r.ob.bidRatio.toFixed(0)}%매수`:'';

    return `
    <div class="sym-card ${r.symbol===activeSymbol?'active':''}" onclick="showDetail('${r.symbol}')">
      <div class="sym-card-top">
        <div>
          <span class="sym-name">${base}</span>
          <span class="factor-val ${chgClass}" style="font-size:10px;margin-left:5px">${chgStr}</span>
        </div>
        <span class="sym-signal ${sig}">${sigLabel}</span>
      </div>
      <div class="prob-bars">
        <div class="prob-row">
          <span class="prob-label" style="color:var(--pump)">폭등</span>
          <div class="bar-track"><div class="bar-fill pump" style="width:${r.pumpProb}%"></div></div>
          <span class="prob-pct pump">${r.pumpProb}%</span>
        </div>
        <div class="prob-row">
          <span class="prob-label" style="color:var(--dump)">폭락</span>
          <div class="bar-track"><div class="bar-fill dump" style="width:${r.dumpProb}%"></div></div>
          <span class="prob-pct dump">${r.dumpProb}%</span>
        </div>
      </div>
      <div class="sym-meta-row">
        <span class="meta-tag ${frClass}">${frLabel}</span>
        ${oiLabel?`<span class="meta-tag oi-up">${oiLabel}</span>`:''}
        ${obLabel?`<span class="meta-tag ${obClass}">${obLabel}</span>`:''}
        ${vpLabel?`<span class="meta-tag poc">${vpLabel}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:3px">24H 거래량</div>
        <div style="font-family:var(--mono);font-size:14px;font-weight:700">$${(r.volume24h/1e6).toFixed(1)}M</div>
        <div style="margin-top:5px">${bbSqText}</div>
      </div>
    </div>

    <!-- GAUGE -->
    <div class="gauge-row">
      <div class="gauge-card pump-card">
        <div class="gauge-title">▲ 폭등 확률</div>
        <div class="arc-wrap"><div class="arc-bg"></div><div class="arc-fg" style="transform:rotate(${pumpRot}deg)"></div></div>
        <div class="gauge-pct">${r.pumpProb}<span style="font-size:16px">%</span></div>
        <div class="gauge-sub">${r.pumpProb>=70?'⚡ 강한 펌프':r.pumpProb>=55?'📈 중간 상승':'─ 약한 신호'}</div>
      </div>
      <div class="gauge-card dump-card">
        <div class="gauge-title">▼ 폭락 확률</div>
        <div class="arc-wrap"><div class="arc-bg"></div><div class="arc-fg" style="transform:rotate(${dumpRot}deg)"></div></div>
        <div class="gauge-pct">${r.dumpProb}<span style="font-size:16px">%</span></div>
        <div class="gauge-sub">${r.dumpProb>=70?'⚡ 강한 덤프':r.dumpProb>=55?'📉 중간 하락':'─ 약한 신호'}</div>
      </div>
    </div>

    ${fiHtml}
    ${obHtml}
    ${vpHtml}

    <!-- BREAKDOWN -->
    <div class="breakdown-grid">
      <div class="breakdown-card">
        <div class="breakdown-heading">지표별 신호 기여도</div>
        <table class="ind-table">
          <colgroup><col style="width:36%"><col style="width:30%"><col style="width:17%"><col style="width:17%"></colgroup>
          <thead>
            <tr>
              <th>지표</th><th>현재값</th>
              <th style="color:var(--pump)">펌프↑</th>
              <th style="color:var(--dump)">덤프↓</th>
            </tr>
          </thead>
          <tbody>${bRows}</tbody>
        </table>
      </div>
      <div class="breakdown-card">
        <div class="breakdown-heading">주요 지표 스냅샷</div>
        <div class="factor-row"><span class="factor-name">RSI (14)</span><span class="factor-val ${r.rsi<30?'pos':r.rsi>70?'neg':'neu'}">${r.rsi.toFixed(2)}</span></div>
        <div class="factor-row"><span class="factor-name">MACD 히스토</span><span class="factor-val ${r.macd.hist>0?'pos':'neg'}">${r.macd.hist.toFixed(6)}</span></div>
        <div class="factor-row"><span class="factor-name">BB %B</span><span class="factor-val ${r.bb.pct<30?'pos':r.bb.pct>70?'neg':'neu'}">${r.bb.pct.toFixed(2)}%</span></div>
        <div class="factor-row"><span class="factor-name">BB 밴드폭</span><span class="factor-val neu">${(r.bb.width*100).toFixed(3)}%</span></div>
        <div class="factor-row"><span class="factor-name">거래량 비율</span><span class="factor-val ${r.volRatio>1.5?'pos':r.volRatio<0.7?'neg':'neu'}">${r.volRatio.toFixed(3)}x</span></div>
        <div class="factor-row"><span class="factor-name">MA5/MA20</span><span class="factor-val ${r.ma5>r.ma20?'pos':'neg'}">${r.ma20>0?(r.ma5/r.ma20).toFixed(5):'-'}</span></div>
        <div class="factor-row"><span class="factor-name">ATR 변동성</span><span class="factor-val neu">${(r.atrRatio*100).toFixed(4)}%</span></div>
        <div class="factor-row"><span class="factor-name">6봉 모멘텀</span><span class="factor-val ${r.momentum>0?'pos':'neg'}">${(r.momentum*100).toFixed(3)}%</span></div>
        <div class="factor-row"><span class="factor-name">펀딩비율</span><span class="factor-val ${fr>0.0002?'neg':fr<-0.0002?'pos':'neu'}">${(fr*100).toFixed(4)}%</span></div>
        <div class="factor-row"><span class="factor-name">호가 불균형</span><span class="factor-val ${ob&&ob.bidRatio>55?'pos':ob&&ob.bidRatio<45?'neg':'neu'}">${ob?ob.bidRatio.toFixed(1)+'% 매수':'—'}</span></div>
        <div class="factor-row"><span class="factor-name">BB 수축</span>${bbSqText}</div>
        <div class="factor-row">
          <span class="factor-name">최종 신호</span>
          <span class="sym-signal ${sigType}" style="font-size:10px">${sigType==='pump'?'▲ 폭등 우세':'▼ 폭락 우세'}</span>
        </div>
      </div>
    </div>

    <div class="disclaimer">
      ⚠ 본 수치는 RSI·MACD·BB·거래량·모멘텀·캔들·다이버전스·매물대·오더북·펀딩비·미결제약정 15개 인자
      기반 통계 추정값이며 미래 가격을 보장하지 않습니다. 실제 거래 시 반드시 추가 분석 필요.
    </div>
  `;
}
</script>
</body>
</html>
