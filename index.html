<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meogo AI 전략 회의실 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .officer-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .officer-card.active { border-left-color: #2563eb; background: #eff6ff; transform: scale(1.02); z-index: 10; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: fadeIn 0.4s ease-out forwards; }
        .markdown-text b { font-weight: 700; color: #1e40af; }
        .markdown-text p { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <aside class="w-72 glass-panel rounded-3xl p-5 flex flex-col gap-3 shadow-xl overflow-y-auto">
        <div class="mb-4 px-2">
            <h1 class="text-2xl font-extrabold text-blue-900 tracking-tighter italic">Meogo <span class="text-xs font-normal text-gray-400 not-italic">Inc.</span></h1>
            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">Board of AI Directors</p>
        </div>
        
        <div class="mb-4 px-2">
            <input type="password" id="api-key" placeholder="Gemini API Key 입력" class="w-full text-[10px] p-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-1 focus:ring-blue-400">
        </div>

        <div id="officer-list" class="flex flex-col gap-2.5">
            </div>
    </aside>

    <main class="flex-1 flex flex-col glass-panel rounded-3xl shadow-2xl overflow-hidden border border-white">
        <header class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-white/80">
            <div>
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    전략 컨퍼런스 홀
                </h2>
                <p id="topic-text" class="text-xs text-gray-500 mt-1 uppercase tracking-tight font-medium">Ready for Agenda</p>
            </div>
            <div id="status-tag" class="text-[10px] font-black px-4 py-1.5 rounded-full bg-gray-100 text-gray-400 border border-gray-200 uppercase">Standby</div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6 chat-scroll bg-[#fcfcfd]">
            <div class="msg-animate flex flex-col items-start max-w-[80%]">
                <span class="text-[10px] font-bold text-blue-500 mb-1 ml-1">AI SECRETARY</span>
                <div class="bg-white p-5 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-700 border border-blue-50 leading-relaxed">
                    반갑습니다 대표님. <br><b>Meogo</b>의 3가지 핵심 프로젝트(외국인 미션 여행, 랭킹 기반 다이어리, 스마트폰 중독 예방)에 대해 전문적인 분석을 제공합니다. 오늘 논의할 안건을 말씀해 주세요.
                </div>
            </div>
        </div>

        <footer class="p-6 bg-white border-t border-gray-100">
            <div class="flex gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-200 focus-within:border-blue-400 transition-all shadow-inner">
                <input type="text" id="user-input" onkeypress="if(event.keyCode==13) runMeeting()" 
                    placeholder="예: 외국인 미션 앱의 수익 모델을 광고 외에 더 확보할 수 있을까?" 
                    class="flex-1 bg-transparent border-none focus:ring-0 px-4 text-sm outline-none text-gray-700">
                <button id="start-btn" onclick="runMeeting()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all shadow-lg active:scale-95 disabled:bg-gray-400">
                    회의 시작
                </button>
            </div>
        </footer>
    </main>

    <aside class="w-80 flex flex-col gap-4">
        <div class="glass-panel rounded-3xl p-6 shadow-xl flex-1 flex flex-col overflow-hidden">
            <h3 class="text-sm font-bold text-gray-800 mb-4 flex justify-between items-center">
                <span>실시간 인사이트</span>
                <span class="flex gap-1">
                    <span class="w-1.5 h-1.5 bg-red-400 rounded-full"></span>
                    <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full"></span>
                    <span class="w-1.5 h-1.5 bg-green-400 rounded-full"></span>
                </span>
            </h3>
            <div id="insight-stream" class="text-[11px] text-gray-500 flex flex-col gap-3 overflow-y-auto flex-1 pr-1 chat-scroll italic">
                </div>
        </div>
        <div class="bg-[#1e293b] rounded-3xl p-6 shadow-2xl h-64 overflow-hidden flex flex-col border border-white/10">
            <h3 class="text-sm font-bold text-blue-400 mb-3 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                대표님을 위한 핵심 결론
            </h3>
            <div id="final-summary" class="text-[12px] text-slate-300 leading-relaxed overflow-y-auto flex-1 pr-1 chat-scroll">
                <p class="text-slate-500">회의가 진행되면 AI 비서가 실행 가능한 액션 아이템을 정리해 드립니다.</p>
            </div>
        </div>
    </aside>

    <script>
        const MODEL = "gemini-1.5-flash";

        const officers = [
            { id: "CEO", name: "비전 & ESG", color: "bg-blue-50", duty: "지역 소상공인 매출 증대, ESG 경영, 한국의 미션 가치 극대화." },
            { id: "CSO", name: "전략 & 글로벌", color: "bg-purple-50", duty: "외국인 관광 시장 경쟁력 분석 및 서비스 차별화 전략 수립." },
            { id: "CFO", name: "재무 & BM", color: "bg-orange-50", duty: "수익 모델(유료 결제, 광고)의 타당성 및 리스크 관리." },
            { id: "CDO", name: "데이터 & 인프라", color: "bg-emerald-50", duty: "Supabase 기반 데이터 수집 가치 및 기술적 보안/확장성 검토." },
            { id: "CMO", name: "마케팅 & UX", color: "bg-pink-50", duty: "외국인 타겟 브랜딩, 랭킹 시스템을 통한 사용자 리텐션 전략." },
            { id: "COO", name: "운영 & 자동화", color: "bg-slate-100", duty: "1인 개발자 환경의 운영 효율성 및 구글 플레이 스토어 출시 전략." },
            { id: "CPO", name: "제품 & 콘텐츠", color: "bg-teal-50", duty: "미션 카테고리(음식, 자연, K-라이프)의 기획 완성도 비평." },
            { id: "CRO", name: "매출 & 성장", color: "bg-amber-50", duty: "단기 수익화(1,500원 결제 등) 및 장기적인 비즈니스 스케일업 방향." }
        ];

        function init() {
            const list = document.getElementById('officer-list');
            list.innerHTML = '';
            officers.forEach(off => {
                const div = document.createElement('div');
                div.id = `card-${off.id}`;
                div.className = `officer-card ${off.color} p-4 rounded-2xl shadow-sm cursor-default border border-black/5`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold text-gray-800">${off.id}</span>
                        <div class="status-dot w-1.5 h-1.5 rounded-full bg-gray-300 transition-colors"></div>
                    </div>
                    <div class="text-[10px] text-gray-600 font-medium">${off.name}</div>
                    <div class="text-[9px] text-gray-400 mt-2 leading-tight">${off.duty.substring(0, 30)}...</div>
                `;
                list.appendChild(div);
            });
        }

        async function callAI(prompt, system, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] },
                        generationConfig: { temperature: 0.7, maxOutputTokens: 500 }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "의견을 정리하지 못했습니다.";
            } catch (e) {
                return "네트워크 문제로 의견을 전달받지 못했습니다.";
            }
        }

        async function runMeeting() {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) {
                alert("Gemini API Key를 입력해주세요.");
                return;
            }

            const input = document.getElementById('user-input');
            const topic = input.value.trim();
            if (!topic) return;

            input.value = '';
            input.disabled = true;
            document.getElementById('start-btn').disabled = true;
            document.getElementById('topic-text').innerText = `안건: ${topic}`;
            document.getElementById('status-tag').innerText = "In Session";
            document.getElementById('status-tag').className = "text-[10px] font-bold px-4 py-1.5 rounded-full bg-blue-100 text-blue-600 uppercase border border-blue-200 animate-pulse";

            addMessage("대표님", topic, false);
            let history = [`[전체 맥락: 대표님은 Flutter, Supabase로 1인 개발 중이며, 미션형 여행 앱 'Meogo', 경쟁형 다이어리, 앱 사용 제한 서비스를 기획 중입니다.]\n오늘의 안건: ${topic}`];

            const insightBox = document.getElementById('insight-stream');
            insightBox.innerHTML = '';

            for (const off of officers) {
                updateUI(off.id);
                const sys = `너는 Meogo 컴퍼니의 ${off.id}다. 역할: ${off.duty}. 너는 대표의 의견에 무조건 동의하지 않고, STP, 4P, SWOT 관점에서 객관적이고 날카로운 비평을 해야 한다. 2~3문장의 강렬한 한국어로 답변하라.`;
                const usr = `현재까지의 회의 기록: ${history.join('\n')}\n\n위 내용을 바탕으로 당신의 전문적인 의견을 제시하십시오.`;
                
                const response = await callAI(usr, sys, apiKey);
                addMessage(`${off.id} (${off.name})`, response, true, off.color);
                history.push(`${off.id}: ${response}`);
                
                const item = document.createElement('div');
                item.className = "p-3 bg-white rounded-xl shadow-sm border border-gray-100 msg-animate";
                item.innerHTML = `<b class="text-blue-600">[${off.id}]</b> ${response.substring(0, 50)}...`;
                insightBox.prepend(item);
                
                await new Promise(r => setTimeout(r, 800)); 
            }

            // 요약 진행
            const summarySys = "너는 회의 서기다. 8인 임원의 논의를 종합하여 대표가 '즉시 실행할 것', '수정할 것', '검토할 것'을 마크다운 문법으로 정리하라.";
            const summary = await callAI(history.join('\n'), summarySys, apiKey);
            
            document.getElementById('final-summary').innerHTML = formatMarkdown(summary);
            document.getElementById('status-tag').innerText = "Completed";
            document.getElementById('status-tag').className = "text-[10px] font-bold px-4 py-1.5 rounded-full bg-green-100 text-green-600 uppercase border border-green-200";
            document.getElementById('start-btn').disabled = false;
            input.disabled = false;
        }

        function formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
        }

        function addMessage(sender, text, isAi, color = "") {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg-animate flex flex-col ${isAi ? 'items-start' : 'items-end'} max-w-[85%] ${!isAi ? 'ml-auto' : ''}`;
            
            const content = isAi ? formatMarkdown(text) : text;
            
            div.innerHTML = `
                <span class="text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-tighter">${sender}</span>
                <div class="${isAi ? color : 'bg-blue-600 text-white shadow-blue-100'} p-4 rounded-2xl ${isAi ? 'rounded-tl-none' : 'rounded-tr-none'} shadow-sm text-sm border border-black/5 leading-relaxed markdown-text">
                    ${content}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUI(activeId) {
            officers.forEach(off => {
                const card = document.getElementById(`card-${off.id}`);
                const dot = card.querySelector('.status-dot');
                if (off.id === activeId) {
                    card.classList.add('active');
                    dot.className = "status-dot w-2 h-2 rounded-full bg-blue-500 animate-ping";
                } else {
                    card.classList.remove('active');
                    dot.className = "status-dot w-1.5 h-1.5 rounded-full bg-green-400";
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
