
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Dashboard | MeoTrader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            background-color: #0b0e11; 
            color: #eaecef; 
            font-family: 'Inter', sans-serif; 
        }
        .binance-card { 
            background-color: #1e2329; 
            border-radius: 16px; 
            border: 1px solid #2b3139;
            transition: all 0.2s ease;
        }
        .binance-card:hover {
            border-color: #fcd535;
        }
        .accent-yellow { color: #fcd535; }
        .bg-yellow { background-color: #fcd535; color: #181a20; }
        .status-up { color: #0ecb81; }
        .status-down { color: #f6465d; }
        .loader {
            border: 2px solid #2b3139;
            border-top: 2px solid #fcd535;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background-color: rgba(252, 213, 53, 0.05); }
        .selected-row { background-color: rgba(252, 213, 53, 0.1) !important; border-left: 4px solid #fcd535; }
    </style>
</head>
<body class="antialiased pb-12">
    <div class="max-w-5xl mx-auto px-4 pt-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                    <span class="accent-yellow">Binance</span> Futures
                </h1>
                <p class="text-gray-500 text-sm mt-1">10초 자동 업데이트 및 심볼 필터링 시스템</p>
            </div>
            <div class="flex gap-2">
                <div id="connectionIndicator" class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-800 text-xs">
                    <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                    연결 대기 중
                </div>
                <button id="refreshBtn" class="bg-yellow px-6 py-2 rounded-lg font-bold hover:opacity-90 active:scale-95 transition-all text-sm">
                    즉시 갱신
                </button>
            </div>
        </header>

        <!-- Main Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="binance-card p-6 col-span-1 md:col-span-2">
                <p class="text-gray-400 text-sm mb-2">총 지갑 잔고 (Total Wallet Balance)</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalBalance" class="text-4xl font-bold text-white">0.00</span>
                    <span class="text-gray-500 font-semibold">USDT</span>
                </div>
            </div>
            <div class="binance-card p-6 border-l-4 border-l-[#fcd535]">
                <p class="text-gray-400 text-sm mb-2">사용 가능한 증거금</p>
                <div class="flex items-baseline gap-2">
                    <span id="availableBalance" class="text-3xl font-bold accent-yellow">0.00</span>
                    <span class="text-gray-500 font-semibold text-sm">USDT</span>
                </div>
            </div>
        </div>

        <!-- Details Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Asset List & Position -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">보유 자산 및 포지션</h3>
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">Click symbol to filter trades</span>
                </div>
                <div class="binance-card overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-[#2b3139] text-gray-400">
                            <tr>
                                <th class="px-4 py-3">자산/심볼</th>
                                <th class="px-4 py-3 text-right">잔고/수량</th>
                                <th class="px-4 py-3 text-right">미실현 손익</th>
                            </tr>
                        </thead>
                        <tbody id="assetList" class="divide-y divide-[#2b3139]">
                            <tr><td colspan="3" class="px-4 py-8 text-center text-gray-500">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Recent Trades (Filtered) -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold flex items-center gap-2">
                        최근 거래 내역 
                        <span id="filterBadge" class="hidden text-[10px] bg-yellow-500/20 text-yellow-500 px-2 py-0.5 rounded border border-yellow-500/30"></span>
                    </h3>
                    <span id="lastSyncTime" class="text-[10px] text-gray-500 font-mono">--:--:--</span>
                </div>
                <div class="binance-card overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-[#2b3139] text-gray-400">
                            <tr>
                                <th class="px-4 py-3">종목</th>
                                <th class="px-4 py-3">방향</th>
                                <th class="px-4 py-3 text-right">체결가</th>
                                <th class="px-4 py-3 text-right">시간</th>
                            </tr>
                        </thead>
                        <tbody id="tradeList" class="divide-y divide-[#2b3139]">
                            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-600">필터링된 데이터가 여기에 표시됩니다.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <!-- API Error Overlay -->
        <div id="errorModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50">
            <div class="bg-[#1e2329] p-8 rounded-2xl max-w-md w-full border border-red-500/50 shadow-2xl">
                <h4 class="text-red-500 font-bold text-xl mb-4">API 연결 오류</h4>
                <p id="errorMessage" class="text-gray-300 text-sm leading-relaxed mb-6 font-mono bg-black/30 p-4 rounded-lg"></p>
                <button onclick="closeError()" class="w-full py-3 bg-red-500 text-white rounded-lg font-bold hover:bg-red-600 transition">확인</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "dqstBJE5IdRC8pyZW2RDSLE1qwR9HjDMPmJaRgxpUdM7pZWoum0DQNUZzHRPOEa5";
        const API_SECRET = "aunpWCXCMc1a4PPL5Qaa6HRGsM0QnRmYBfTC78iuD1LoMJFv1hUO11ESNWpKjh3L";
        const BASE_URL = "https://fapi.binance.com";

        let selectedSymbol = null; // 선택된 심볼 필터링용

        function closeError() {
            document.getElementById('errorModal').classList.add('hidden');
            document.getElementById('errorModal').classList.remove('flex');
        }

        function showError(msg) {
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorModal').classList.remove('hidden');
            document.getElementById('errorModal').classList.add('flex');
        }

        function updateIndicator(status) {
            const box = document.getElementById('connectionIndicator');
            if(status === 'success') {
                box.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> 정상 연결 (10s)`;
            } else if(status === 'loading') {
                box.innerHTML = `<div class="loader"></div> 데이터 갱신 중`;
            } else {
                box.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> 연결 실패`;
            }
        }

        async function requestBinance(path, method = "GET", params = {}) {
            const timestamp = Date.now();
            let queryString = `timestamp=${timestamp}&recvWindow=10000`;
            
            Object.keys(params).forEach(key => {
                queryString += `&${key}=${params[key]}`;
            });

            const signature = CryptoJS.HmacSHA256(queryString, API_SECRET).toString(CryptoJS.enc.Hex);
            const url = `${BASE_URL}${path}?${queryString}&signature=${signature}`;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'X-MBX-APIKEY': API_KEY }
                });

                if (!response.ok) {
                    const errorJson = await response.json();
                    throw new Error(errorJson.msg || `HTTP Error ${response.status}`);
                }
                return await response.json();
            } catch (err) {
                if (err.message === 'Failed to fetch') {
                    throw new Error("CORS 정책 차단: 브라우저 확장 프로그램(Allow CORS)을 활성화해주세요.");
                }
                throw err;
            }
        }

        async function fetchData() {
            updateIndicator('loading');
            try {
                // 1. 계정 정보 및 거래 내역 병렬 요청
                const account = await requestBinance("/fapi/v2/account");
                
                // 2. 상단 잔고 갱신
                document.getElementById('totalBalance').innerText = parseFloat(account.totalWalletBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('availableBalance').innerText = parseFloat(account.availableBalance).toLocaleString(undefined, {minimumFractionDigits: 2});

                // 3. 자산 및 포지션 리스트 렌더링
                const assetListBody = document.getElementById('assetList');
                assetListBody.innerHTML = '';
                
                // 지갑 잔고가 있는 자산 + 현재 포지션이 있는 심볼 병합 표시
                const activeAssets = account.assets.filter(a => parseFloat(a.walletBalance) > 0.01);
                const activePositions = account.positions.filter(p => Math.abs(parseFloat(p.positionAmt)) > 0);

                // 자산 렌더링
                activeAssets.forEach(asset => {
                    assetListBody.innerHTML += `
                        <tr class="bg-black/10">
                            <td class="px-4 py-4 font-semibold text-gray-400 italic">${asset.asset} (Wallet)</td>
                            <td class="px-4 py-4 text-right font-mono">${parseFloat(asset.walletBalance).toFixed(2)}</td>
                            <td class="px-4 py-4 text-right font-mono text-gray-600">-</td>
                        </tr>
                    `;
                });

                // 포지션 렌더링 (클릭 시 필터링 기능 추가)
                activePositions.forEach(pos => {
                    const pnl = parseFloat(pos.unrealizedProfit);
                    const isSelected = selectedSymbol === pos.symbol;
                    const row = document.createElement('tr');
                    row.className = `clickable-row transition ${isSelected ? 'selected-row' : ''}`;
                    row.onclick = () => toggleFilter(pos.symbol);
                    row.innerHTML = `
                        <td class="px-4 py-4 font-bold text-yellow-500">${pos.symbol}</td>
                        <td class="px-4 py-4 text-right font-mono">${pos.positionAmt}</td>
                        <td class="px-4 py-4 text-right font-mono ${pnl >= 0 ? 'status-up' : 'status-down'}">
                            ${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}
                        </td>
                    `;
                    assetListBody.appendChild(row);
                });

                // 4. 거래 내역 로드 및 필터링
                await fetchTrades();

                updateIndicator('success');
                document.getElementById('lastSyncTime').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error(error);
                updateIndicator('error');
                showError(error.message);
            }
        }

        async function fetchTrades() {
            const tradeListBody = document.getElementById('tradeList');
            const filterBadge = document.getElementById('filterBadge');
            
            try {
                const params = { limit: 100 };
                if (selectedSymbol) params.symbol = selectedSymbol;

                const trades = await requestBinance("/fapi/v1/userTrades", "GET", params);
                
                // 24시간 이내 데이터 필터링
                const now = Date.now();
                const twentyFourHoursAgo = now - (24 * 60 * 60 * 1000);
                const recentTrades = trades.filter(t => t.time >= twentyFourHoursAgo);

                // UI 업데이트
                if (selectedSymbol) {
                    filterBadge.innerText = selectedSymbol;
                    filterBadge.classList.remove('hidden');
                } else {
                    filterBadge.classList.add('hidden');
                }

                tradeListBody.innerHTML = '';
                if (recentTrades.length === 0) {
                    tradeListBody.innerHTML = `<tr><td colspan="4" class="px-4 py-12 text-center text-gray-600">최근 24시간 내 거래 내역이 없습니다.</td></tr>`;
                } else {
                    recentTrades.reverse().forEach(trade => {
                        const time = new Date(trade.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        tradeListBody.innerHTML += `
                            <tr class="hover:bg-white/5 transition">
                                <td class="px-4 py-4 font-semibold">${trade.symbol}</td>
                                <td class="px-4 py-4 font-bold ${trade.side === 'BUY' ? 'status-up' : 'status-down'}">${trade.side}</td>
                                <td class="px-4 py-4 text-right font-mono">$${parseFloat(trade.price).toLocaleString()}</td>
                                <td class="px-4 py-4 text-right text-gray-500 text-xs">${time}</td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error("Trades Error:", e);
            }
        }

        function toggleFilter(symbol) {
            if (selectedSymbol === symbol) {
                selectedSymbol = null; // 필터 해제
            } else {
                selectedSymbol = symbol; // 필터 적용
            }
            fetchData(); // 즉시 갱신
        }

        // 초기 실행 및 버튼 바인딩
        document.getElementById('refreshBtn').onclick = fetchData;
        window.onload = () => {
            fetchData();
            // 10초마다 자동 갱신 (요구사항 반영)
            setInterval(fetchData, 10000);
        };
    </script>
</body>
</html>
