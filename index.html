<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meogo AI 전략 회의실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f8f9fa;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        .officer-card { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .officer-card.active { border-left-color: #2563eb; background: #eff6ff; transform: translateX(5px); }
        .officer-card.waiting { opacity: 0.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4 bg-[#f0f2f5]">

    <!-- 사이드바: 8인 임원진 -->
    <aside class="w-64 glass-panel rounded-3xl p-5 flex flex-col gap-3 shadow-sm overflow-y-auto">
        <div class="mb-4">
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">Meogo</h1>
            <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest">Executive Board</p>
        </div>
        <div id="officer-list" class="flex flex-col gap-2">
            <!-- 임원 카드가 JS로 생성됨 -->
        </div>
    </aside>

    <!-- 메인: 컨퍼런스 홀 -->
    <main class="flex-1 flex flex-col glass-panel rounded-3xl shadow-lg overflow-hidden">
        <header class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-white/50">
            <div>
                <h2 class="text-lg font-bold text-gray-800">MEOAI 전략 회의</h2>
                <p id="topic-text" class="text-xs text-gray-400">안건을 입력하면 회의가 시작됩니다.</p>
            </div>
            <div id="status-tag" class="text-[10px] font-bold px-3 py-1 rounded-full bg-gray-100 text-gray-400 uppercase">Ready</div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6 chat-scroll">
            <div class="msg-animate flex flex-col items-start max-w-[80%]">
                <span class="text-[10px] font-bold text-gray-400 mb-1">SYSTEM</span>
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-600 border border-gray-100">
                    반갑습니다 대표님. Meogo의 성공적인 런칭을 위해 8인의 AI 임원이 대기 중입니다. 비즈니스 전략이나 고민되는 지점을 말씀해 주세요.
                </div>
            </div>
        </div>

        <footer class="p-6 bg-white/80 border-t border-gray-100">
            <div class="flex gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-200">
                <input type="text" id="user-input" onkeypress="if(event.keyCode==13) runMeeting()" 
                    placeholder="대표님, 오늘 논의할 안건을 입력하세요..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 px-4 text-sm outline-none">
                <button id="start-btn" onclick="runMeeting()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                    상담 시작
                </button>
            </div>
        </footer>
    </main>

    <!-- 우측: 분석 정보 -->
    <aside class="w-72 flex flex-col gap-4">
        <div class="glass-panel rounded-3xl p-6 shadow-sm flex-1 flex flex-col">
            <h3 class="text-sm font-bold text-gray-800 mb-4">실시간 인사이트</h3>
            <div id="insight-stream" class="text-[11px] text-gray-500 flex flex-col gap-3 overflow-y-auto">
                <p class="italic text-gray-300">임원들의 핵심 의견이 요약됩니다.</p>
            </div>
        </div>
        <div class="bg-gray-900 rounded-3xl p-6 shadow-xl h-48">
            <h3 class="text-sm font-bold text-blue-400 mb-2">대표님을 위한 결론</h3>
            <div id="final-summary" class="text-[11px] text-gray-400 leading-relaxed italic">
                회의 종료 후 요약됩니다.
            </div>
        </div>
    </aside>

    <script>
        // API 설정 (오류가 났던 preview 모델 대신 안정적인 1.5-flash 사용)
        const API_KEY = ""; // 환경에서 자동 제공됨
        const MODEL = "gemini-1.5-flash";

        const officers = [
            { id: "CEO", name: "비전 & 지역상생", color: "bg-blue-50", duty: "지역 소상공인 매출 증대와 ESG 가치 수호" },
            { id: "CSO", name: "전략 & 경쟁우위", color: "bg-purple-50", duty: "글로벌 트래블 시장 경쟁력 및 차별화 전략" },
            { id: "CFO", name: "재무 & 리스크", color: "bg-orange-50", duty: "수익 모델 검증 및 현금 흐름 분석" },
            { id: "CDO", name: "데이터 & 인프라", color: "bg-green-50", duty: "데이터 가치 추출 및 기술적 확장성 검토" },
            { id: "CMO", name: "마케팅 & 고객경험", color: "bg-pink-50", duty: "외국인 타겟 브랜딩 및 UX 비평" },
            { id: "COO", name: "운영 & 효율성", color: "bg-gray-100", duty: "1인 개발 환경의 운영 자동화 전략" },
            { id: "CPO", name: "제품 & 서비스", color: "bg-teal-50", duty: "미션 시스템의 재미와 사용자 유지 전략" },
            { id: "CRO", name: "매출 & 성장", color: "bg-yellow-50", duty: "단기 수익화 및 장기 스케일업 전략" }
        ];

        function init() {
            const list = document.getElementById('officer-list');
            officers.forEach(off => {
                const div = document.createElement('div');
                div.id = `card-${off.id}`;
                div.className = `officer-card ${off.color} p-4 rounded-2xl shadow-sm cursor-default border border-black/5`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-bold text-gray-800">${off.id}</span>
                        <div class="status-dot w-1.5 h-1.5 rounded-full bg-gray-300"></div>
                    </div>
                    <div class="text-[10px] text-gray-500 leading-tight">${off.name}</div>
                `;
                list.appendChild(div);
            });
        }

        async function callAI(prompt, system) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
            
            // 지연 방지를 위한 타임아웃 처리 (10초)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "의견을 정리하는 데 어려움이 있습니다.";
            } catch (e) {
                return e.name === 'AbortError' ? "응답 지연이 발생했습니다. 다음 단계로 진행합니다." : "네트워크 오류가 발생했습니다.";
            }
        }

        async function runMeeting() {
            const input = document.getElementById('user-input');
            const topic = input.value.trim();
            if (!topic) return;

            input.value = '';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('topic-text').innerText = `주제: ${topic}`;
            document.getElementById('status-tag').innerText = "In Session";
            document.getElementById('status-tag').className = "text-[10px] font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-600 uppercase animate-pulse";

            addMessage("대표님", topic, false);
            let history = [`안건: ${topic}`];

            for (const off of officers) {
                updateUI(off.id);
                const sys = `너는 Meogo 컴퍼니의 ${off.id}이다. 역할: ${off.duty}. 대표의 질문에 대해 아주 날카롭고 비판적이면서도 현실적인 대안을 2~3문장으로 한국어로 답변하라.`;
                const usr = `현재 토론 내용: ${history.join('\n')}`;
                
                const response = await callAI(usr, sys);
                addMessage(`${off.id} (${off.name})`, response, true, off.color);
                history.push(`${off.id}: ${response}`);
                
                // 인사이트 박스 업데이트
                const insightBox = document.getElementById('insight-stream');
                if (insightBox.querySelector('p.italic')) insightBox.innerHTML = '';
                const item = document.createElement('div');
                item.className = "p-3 bg-white rounded-xl shadow-sm border border-gray-100 msg-animate";
                item.innerHTML = `<b class="text-blue-600">[${off.id}]</b> ${response.substring(0, 40)}...`;
                insightBox.prepend(item);
                
                await new Promise(r => setTimeout(r, 500)); // 자연스러운 흐름을 위한 딜레이
            }

            // 최종 요약
            const summary = await callAI(history.join('\n'), "너는 회의 서기다. 위 대화 내용을 종합하여 대표가 오늘 바로 실행해야 할 액션 아이템 3가지를 정리하라.");
            document.getElementById('final-summary').innerText = summary;
            document.getElementById('status-tag').innerText = "Completed";
            document.getElementById('status-tag').className = "text-[10px] font-bold px-3 py-1 rounded-full bg-green-100 text-green-600 uppercase";
            document.getElementById('start-btn').disabled = false;
        }

        function addMessage(sender, text, isAi, color = "") {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg-animate flex flex-col ${isAi ? 'items-start' : 'items-end'} max-w-[85%] ${!isAi ? 'ml-auto' : ''}`;
            div.innerHTML = `
                <span class="text-[10px] font-bold text-gray-400 mb-1 uppercase">${sender}</span>
                <div class="${isAi ? color : 'bg-blue-600 text-white'} p-4 rounded-2xl ${isAi ? 'rounded-tl-none' : 'rounded-tr-none'} shadow-sm text-sm border border-black/5">
                    ${text}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUI(activeId) {
            officers.forEach(off => {
                const card = document.getElementById(`card-${off.id}`);
                const dot = card.querySelector('.status-dot');
                if (off.id === activeId) {
                    card.classList.add('active');
                    dot.className = "status-dot w-1.5 h-1.5 rounded-full bg-blue-500 animate-ping";
                } else {
                    card.classList.remove('active');
                    dot.className = "status-dot w-1.5 h-1.5 rounded-full bg-green-400";
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
