<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite AI Strategy Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .thinking {
            animation: pulse-custom 1.5s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 sticky top-0 z-10">
        <div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                C-Suite AI Strategy Room
            </h1>
            <p class="text-xs text-slate-400 mt-1">전문 경영진 AI가 당신의 비즈니스를 정밀 분석합니다.</p>
        </div>
        <div id="connectionStatus" class="flex items-center gap-2 text-xs">
            <span class="w-2 h-2 rounded-full bg-yellow-500" id="statusDot"></span>
            <span id="statusText">연결 확인 중...</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Left Sidebar: Participant Status -->
        <aside class="w-full md:w-64 border-r border-slate-800 p-4 bg-slate-900/30 overflow-y-auto">
            <h2 class="text-sm font-semibold mb-4 text-slate-500 uppercase tracking-wider">회의 참석자</h2>
            <div id="participantList" class="space-y-3">
                <!-- Dynamically generated from Supabase -->
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="flex-1 flex flex-col relative bg-slate-950/50">
            <div id="chatContainer" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
                <div id="welcomeMessage" class="max-w-2xl mx-auto text-center py-12">
                    <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                    </div>
                    <h3 class="text-xl font-medium mb-2">새로운 전략 회의를 시작하세요</h3>
                    <p class="text-slate-400 text-sm">비즈니스 안건을 입력하면 C-Level AI 경영진이 토론을 시작합니다.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 border-t border-slate-800 bg-slate-900/80">
                <div class="max-w-4xl mx-auto relative">
                    <textarea 
                        id="userInput" 
                        rows="2" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl py-3 px-4 pr-16 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"
                        placeholder="분석할 비즈니스 모델이나 안건을 입력하세요..."
                    ></textarea>
                    <button 
                        id="sendBtn"
                        class="absolute right-2 bottom-2 p-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition-colors disabled:opacity-50"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = "https://pcmrpxcpjynmayactgan.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_endfjcxVBfda-lzjOpPbrQ_DTdF3MHZ"; 

        // API Keys (Separated for rate limits)
        const GEMINI_KEYS = {
            "GROUP1": "AIzaSyDOuootRofHJ4AOSEanA-B8V5wzuNBIcuc", 
            "GROUP2": "AIzaSyD1vAdVRyf7aeYhLxIDzd5Ln0SxYMNAtjI", 
            "GROUP3": "AIzaSyDkOTEUZq5tpX6qF14Is80jUT-Y-LjPVT4", 
            "GROUP4": "AIzaSyBpTVLu44pvfWId6qMtFjqE1oZjbZ4Fv3A" 
        };

        const ROLE_GROUP_MAP = {
            "CEO": "GROUP1", "CSO": "GROUP1",
            "CPO": "GROUP2", "CMO": "GROUP2",
            "CTO": "GROUP3", "CDO": "GROUP3",
            "CFO": "GROUP4", "CRO": "GROUP4"
        };

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentSessionId = null;
        let isProcessing = false;
        let personas = {};

        // Discussion Flow Structure
        const DISCUSSION_STAGES = [
            ['CEO', 'CPO', 'CMO'], 
            ['CTO', 'CDO'],         
            ['CFO', 'CRO'],         
            ['CSO', 'CEO']          
        ];

        // --- 2. INITIALIZATION ---
        window.onload = async () => {
            console.log("App Initializing...");
            await checkConnection();
            await loadPersonas();
            setupEventListeners();
        };

        async function checkConnection() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            try {
                const { error } = await supabaseClient.from('participant_status').select('role_key').limit(1);
                if (error) throw error;
                statusDot.classList.replace('bg-yellow-500', 'bg-emerald-500');
                statusText.innerText = "Supabase 연결됨";
            } catch (err) {
                console.error("Connection Error:", err);
                statusDot.classList.replace('bg-yellow-500', 'bg-red-500');
                statusText.innerText = "연결 실패";
            }
        }

        async function loadPersonas() {
            const { data, error } = await supabaseClient.from('participant_status').select('*');
            const listEl = document.getElementById('participantList');
            if (error || !data) return;

            listEl.innerHTML = '';
            data.forEach(p => {
                personas[p.role_key] = p.persona_description;
                const div = document.createElement('div');
                div.id = `status-${p.role_key}`;
                div.className = "p-3 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-between transition-all";
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-[10px] font-bold">${p.role_key}</div>
                        <span class="text-xs font-medium">${p.role_key}</span>
                    </div>
                    <span class="status-indicator text-[10px] text-slate-500">대기중</span>
                `;
                listEl.appendChild(div);
            });
        }

        // --- 3. CORE LOGIC ---
        async function startDiscussion(topic) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                // 1. Create Session (image_652d1a.png: conference_sessions table has 'title')
                const { data: session, error } = await supabaseClient
                    .from('conference_sessions')
                    .insert([{ title: topic }])
                    .select()
                    .single();
                
                if (error) throw error;
                currentSessionId = session.id;

                document.getElementById('welcomeMessage')?.remove();
                addMessage('User', topic, 'user');

                // 2. Sequential Discussion
                for (let i = 0; i < DISCUSSION_STAGES.length; i++) {
                    const stageRoles = DISCUSSION_STAGES[i];
                    // Multi-persona response in one stage
                    await Promise.all(stageRoles.map(role => runAIRole(role, i + 1)));
                }
            } catch (err) {
                console.error("Discussion Error:", err);
                addMessage('System', '토론을 시작하는 중 오류가 발생했습니다.', 'ai');
            } finally {
                isProcessing = false;
            }
        }

        async function runAIRole(role, stageNumber) {
            updateUIStatus(role, true);

            try {
                // Fetch context
                const { data: history } = await supabaseClient
                    .from('meeting_messages')
                    .select('role_key, content')
                    .eq('session_id', currentSessionId)
                    .order('created_at', { ascending: true });

                const context = history?.map(m => `${m.role_key}: ${m.content}`).join('\n') || "회의 시작됨.";
                
                const prompt = `
                    당신은 ${role}입니다.
                    페르소나: ${personas[role] || "전문 경영진"}
                    이전 대화: ${context}
                    현재 단계: ${stageNumber}/4
                    지침: 위 내용을 바탕으로 당신의 직책에 맞는 날카롭고 전략적인 의견을 한국어로 1~2문장으로 답변하세요.
                `;

                const apiKey = GEMINI_KEYS[ROLE_GROUP_MAP[role]];
                const resultText = await callGemini(prompt, apiKey);
                
                // Save to DB (image_652d1a.png: meeting_messages has 'content', 'analysis_type')
                await supabaseClient.from('meeting_messages').insert([{
                    session_id: currentSessionId,
                    role_key: role,
                    content: resultText,
                    analysis_type: stageNumber === 4 ? 'final' : 'step' + stageNumber
                }]);

                addMessage(role, resultText, 'ai');
            } catch (err) {
                console.error(`${role} Error:`, err);
                addMessage('System', `${role}의 응답을 가져오지 못했습니다. (${err.message})`, 'ai');
            } finally {
                updateUIStatus(role, false);
            }
        }

        async function callGemini(prompt, apiKey) {
            // URL with v1beta endpoint
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (!response.ok) {
                console.error("Gemini API Full Error:", data);
                throw new Error(data.error?.message || `HTTP ${response.status}`);
            }

            // Enhanced parsing with safety checks
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!text) {
                console.error("Unexpected Response Format:", data);
                throw new Error("응답 데이터 형식이 올바르지 않습니다.");
            }

            return text.trim();
        }

        // --- 4. UI UTILS ---
        function addMessage(sender, text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const div = document.createElement('div');
            const isUser = type === 'user';
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`;
            div.innerHTML = `
                <div class="max-w-[85%] p-4 rounded-2xl ${isUser ? 'bg-blue-600' : 'bg-slate-800 border border-slate-700 shadow-lg'}">
                    <div class="text-[10px] font-bold mb-1 opacity-60 uppercase tracking-tight">${sender}</div>
                    <div class="text-sm leading-relaxed">${text}</div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function updateUIStatus(role, isThinking) {
            const el = document.getElementById(`status-${role}`);
            if (!el) return;
            const indicator = el.querySelector('.status-indicator');
            if (isThinking) {
                el.classList.add('border-blue-500', 'bg-blue-500/10', 'thinking');
                indicator.innerText = "분석 중...";
                indicator.className = "status-indicator text-[10px] text-blue-400 font-medium";
            } else {
                el.classList.remove('border-blue-500', 'bg-blue-500/10', 'thinking');
                indicator.innerText = "대기중";
                indicator.className = "status-indicator text-[10px] text-slate-500";
            }
        }

        function setupEventListeners() {
            const sendBtn = document.getElementById('sendBtn');
            const userInput = document.getElementById('userInput');
            
            const submitAction = () => {
                const text = userInput.value.trim();
                if (text && !isProcessing) {
                    startDiscussion(text);
                    userInput.value = '';
                }
            };

            sendBtn.onclick = submitAction;
            userInput.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitAction();
                }
            };
        }
    </script>
</body>
</html>
