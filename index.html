<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meogo AI 전략 회의실 - 실시간 AI 토론</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .watercolor-bg {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .officer-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .officer-card.active { border-left-color: #3b82f6; background: white; transform: scale(1.02); }
        
        /* 임원별 배경색 */
        .bg-ceo { background-color: #e3f2fd; } .bg-cso { background-color: #f3e5f5; }
        .bg-cfo { background-color: #fff3e0; } .bg-cdo { background-color: #e8f5e9; }
        .bg-cmo { background-color: #fce4ec; } .bg-coo { background-color: #efebe9; }
        .bg-cpo { background-color: #e0f2f1; } .bg-cro { background-color: #fffde7; }

        @keyframes typing { from { opacity: 0.5; } to { opacity: 1; } }
        .typing-indicator { animation: typing 0.8s infinite alternate; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <!-- 좌측: 임원 리스트 -->
    <aside class="w-72 watercolor-bg rounded-3xl p-6 flex flex-col gap-4 shadow-xl overflow-y-auto">
        <div class="mb-2">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Meogo</h1>
            <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">C-Level AI Board</p>
        </div>
        
        <div id="officer-list" class="flex flex-col gap-3"></div>

        <div class="mt-auto pt-4 border-t border-gray-100">
            <button onclick="resetConference()" class="w-full py-2 text-xs text-gray-400 hover:text-red-500 transition-colors">회의 초기화</button>
        </div>
    </aside>

    <!-- 중앙: 메인 회의장 -->
    <main class="flex-1 flex flex-col watercolor-bg rounded-3xl shadow-xl overflow-hidden relative">
        <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/40">
            <div>
                <h2 class="text-lg font-bold text-gray-700">MEOAI 전략 회의실</h2>
                <p id="topic-display" class="text-xs text-gray-400 italic">안건을 입력하면 AI 임원진이 토론을 시작합니다.</p>
            </div>
            <div id="status-badge" class="px-3 py-1 bg-gray-100 text-gray-400 text-[10px] rounded-full font-bold uppercase">대기 중</div>
        </header>

        <!-- 채팅창 -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6 chat-container">
            <div class="flex flex-col items-start max-w-[85%]">
                <div class="text-[10px] font-bold text-gray-400 ml-1 mb-1">시스템 알림</div>
                <div class="bg-white/80 p-4 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-600 border border-blue-50">
                    안녕하세요 대표님. Meogo의 성공을 위해 8인의 AI 임원이 대기 중입니다. 비즈니스 전략이나 고민되는 지점을 말씀해 주세요.
                </div>
            </div>
        </div>

        <!-- 입력창 -->
        <footer class="p-6 bg-white/60 border-t border-gray-100 backdrop-blur-md">
            <div class="relative flex gap-3">
                <input type="text" id="user-input" placeholder="대표님, 안건이나 궁금한 점을 입력하세요..." 
                    class="flex-1 p-4 rounded-2xl border-none focus:ring-2 focus:ring-blue-200 outline-none shadow-sm bg-white/90 text-sm">
                <button id="send-btn" onclick="startConference()" class="px-6 bg-blue-500 text-white rounded-2xl hover:bg-blue-600 shadow-lg shadow-blue-200 transition-all font-bold">
                    상담 시작
                </button>
            </div>
        </footer>

        <!-- 로딩 오버레이 (API 키 없을 때) -->
        <div id="api-modal" class="fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50 hidden">
            <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
                <h3 class="text-xl font-bold mb-4">Gemini API 설정</h3>
                <p class="text-sm text-gray-500 mb-6">AI 임원들과 대화하기 위해<br>Gemini API 키가 필요합니다.</p>
                <input type="password" id="api-key-input" placeholder="API 키를 입력하세요" class="w-full p-3 border rounded-xl mb-4 text-center">
                <button onclick="saveApiKey()" class="w-full py-3 bg-blue-500 text-white rounded-xl font-bold">연결하기</button>
            </div>
        </div>
    </main>

    <!-- 우측: 분석 및 결과 요약 -->
    <aside class="w-80 flex flex-col gap-4">
        <section class="watercolor-bg rounded-3xl p-6 shadow-xl flex-[1.5] flex flex-col">
            <h3 class="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 실시간 전략 리포트
            </h3>
            <div id="analysis-content" class="text-xs text-gray-600 flex flex-col gap-5 overflow-y-auto pr-2">
                <p class="italic text-gray-400 text-center py-10">토론이 시작되면 분석 내용이 표시됩니다.</p>
            </div>
        </section>

        <section class="bg-white/90 rounded-3xl p-6 shadow-xl flex-1 flex flex-col">
            <h3 class="text-sm font-bold text-gray-800 mb-3">최종 의사결정 요약</h3>
            <div id="decision-summary" class="text-[11px] text-gray-500 leading-relaxed overflow-y-auto flex-1 italic">
                C-Level의 합의된 결과가 이곳에 기록됩니다.
            </div>
        </section>
    </aside>

    <script>
        const apiKey = ""; // 환경에서 자동 제공됨

        const roles = [
            { key: "CEO", name: "비전 & 상생", color: "bg-ceo", prompt: "대표의 비전을 구체화하고 지역 상생과 ESG 관점에서 조언하라. 긍정적이나 원칙적이다." },
            { key: "CSO", name: "전략 & 경쟁", color: "bg-cso", prompt: "시장 분석, 경쟁사 대비 우위, SWOT 관점에서 전략적 허점을 파고들어라." },
            { key: "CFO", name: "재무 & 리스크", color: "bg-cfo", prompt: "수익 모델, 캐시플로우, 서버 비용, 인건비 리스크 등 돈 문제를 매우 까칠하고 현실적으로 지적하라." },
            { key: "CDO", name: "데이터 & 기술", color: "bg-cdo", prompt: "데이터 수집 가치, 확장성, 개인정보, 기술적 구현 가능성을 데이터 기반으로 논하라." },
            { key: "CMO", name: "마케팅 & 고객", color: "bg-cmo", prompt: "외국인 타겟 유입 방안, 브랜드 이미지, 바이럴 요소 등 고객 획득 비용(CAC) 관점에서 말하라." },
            { key: "COO", name: "운영 & 효율", color: "bg-coo", prompt: "1인 개발 환경에서의 운영 효율, 업무 자동화, 유지보수 리소스를 효율화하는 방법을 제시하라." },
            { key: "CPO", name: "제품 & UX", color: "bg-cpo", prompt: "외국인 사용자의 UI/UX 경험, 미션의 재미 요소, 앱의 직관성을 사용자 관점에서 비평하라." },
            { key: "CRO", name: "매출 & 성장", color: "bg-cro", prompt: "광고 수익 외의 부가 매출 창출, 제휴 모델, 스케일업 전략을 통한 매출 극대화를 논하라." }
        ];

        let discussionHistory = [];

        function init() {
            const listContainer = document.getElementById('officer-list');
            roles.forEach(role => {
                const card = document.createElement('div');
                card.id = `card-${role.key}`;
                card.className = `officer-card ${role.color} p-4 rounded-2xl flex flex-col gap-1 shadow-sm opacity-80`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-800">${role.key}</span>
                        <div class="status-dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </div>
                    <span class="text-[10px] text-gray-600">${role.name}</span>
                `;
                listContainer.appendChild(card);
            });
        }

        async function callGemini(prompt, systemInstruction) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "의견을 정리하지 못했습니다.";
            } catch (error) {
                console.error(error);
                return "네트워크 오류가 발생했습니다.";
            }
        }

        async function startConference() {
            const input = document.getElementById('user-input');
            const topic = input.value.trim();
            if (!topic) return;

            input.value = '';
            document.getElementById('topic-display').innerText = `주제: ${topic}`;
            document.getElementById('status-badge').innerText = "토론 진행 중";
            document.getElementById('status-badge').className = "px-3 py-1 bg-blue-100 text-blue-600 text-[10px] rounded-full font-bold uppercase animate-pulse";

            addMessage("대표님 (Owner)", topic, false);
            discussionHistory.push(`대표의 안건: ${topic}`);

            // 8인 임원 순차 토론 (CFO와 CMO 등 주요 인물 위주로 먼저 진행)
            const activeOfficers = ["CEO", "CFO", "CMO", "CSO"]; // 핵심 4인 먼저 반응
            
            for (const key of activeOfficers) {
                const role = roles.find(r => r.key === key);
                setActiveOfficer(key);
                
                const systemPrompt = `너는 Meogo 회사의 ${role.key}이다. 페르소나: ${role.prompt}. 이전 대화들을 참고하여 대표의 안건에 대해 너의 입장에서 3문장 이내로 짧고 강하게 의견을 말해라.`;
                const userPrompt = `이전 대화: ${discussionHistory.join("\n")}\n\n새로운 안건: ${topic}`;
                
                const response = await callGemini(userPrompt, systemPrompt);
                addMessage(`${role.key} (${role.name})`, response, true, role.color);
                discussionHistory.push(`${role.key}: ${response}`);
                updateAnalysis(role.key, response);
                
                await new Promise(r => setTimeout(r, 500)); // 자연스러운 간격
            }

            finishConference();
        }

        function addMessage(sender, text, isAi, colorClass = "") {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isAi ? 'items-start' : 'items-end'} max-w-[85%] ${!isAi ? 'ml-auto' : ''}`;
            
            msgDiv.innerHTML = `
                <div class="text-[10px] font-bold text-gray-400 ${isAi ? 'ml-1' : 'mr-1'} mb-1">${sender}</div>
                <div class="${isAi ? (colorClass || 'bg-white') : 'bg-blue-500 text-white'} p-4 rounded-2xl ${isAi ? 'rounded-tl-none' : 'rounded-tr-none'} shadow-sm text-sm leading-relaxed border border-black/5">
                    ${text}
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function setActiveOfficer(key) {
            roles.forEach(r => {
                const card = document.getElementById(`card-${r.key}`);
                const dot = card.querySelector('.status-dot');
                if (r.key === key) {
                    card.classList.add('active', 'opacity-100');
                    dot.classList.replace('bg-gray-300', 'bg-blue-500');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        function updateAnalysis(key, text) {
            const container = document.getElementById('analysis-content');
            if (container.querySelector('p.italic')) container.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = "border-b border-gray-100 pb-2";
            item.innerHTML = `<span class="font-bold text-blue-600">[${key}]</span> <span class="opacity-80">${text.substring(0, 50)}...</span>`;
            container.prepend(item);
        }

        async function finishConference() {
            document.getElementById('status-badge').innerText = "결론 도출 중";
            
            const summaryPrompt = "위 토론 내용을 바탕으로 '실행 지침 3가지'를 리스트 형태로 아주 짧게 요약하라.";
            const summary = await callGemini(discussionHistory.join("\n"), summaryPrompt);
            
            document.getElementById('decision-summary').innerHTML = `<div class="bg-gray-50 p-3 rounded-xl border-l-4 border-blue-500">${summary.replace(/\n/g, '<br>')}</div>`;
            document.getElementById('status-badge').innerText = "완료";
            document.getElementById('status-badge').className = "px-3 py-1 bg-green-100 text-green-600 text-[10px] rounded-full font-bold uppercase";
            
            roles.forEach(r => {
                document.getElementById(`card-${r.key}`).classList.remove('active');
                document.getElementById(`card-${r.key}`).querySelector('.status-dot').classList.replace('bg-blue-500', 'bg-green-400');
            });
        }

        function resetConference() {
            location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
