<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meogo AI 전략 회의실 v2.5 (Supervisor)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .officer-card { transition: all 0.3s ease; border-left: 4px solid transparent; position: relative; }
        .officer-card.active { border-left-color: #2563eb; background: #eff6ff; transform: scale(1.02); z-index: 10; }
        .officer-card.system-checker { border-left-color: #10b981; background: #f0fdf4; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-animate { animation: fadeIn 0.4s ease-out forwards; }
        .markdown-text b { font-weight: 700; color: #1e40af; }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <aside class="w-72 glass-panel rounded-3xl p-5 flex flex-col gap-3 shadow-xl overflow-y-auto">
        <div class="mb-4 px-2">
            <h1 class="text-2xl font-extrabold text-blue-900 italic">Meogo <span class="text-xs font-normal text-gray-400 not-italic">Admin</span></h1>
            <p class="text-[10px] text-green-600 font-bold uppercase tracking-widest mt-1">System & Board Monitor</p>
        </div>
        
        <div class="mb-4 px-2">
            <label class="text-[9px] font-bold text-gray-400 ml-1 uppercase">Gemini API Access</label>
            <input type="password" id="api-key" placeholder="API Key를 입력하세요" class="w-full text-xs p-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-green-400 transition-all">
        </div>

        <div id="officer-list" class="flex flex-col gap-2.5">
            </div>
    </aside>

    <main class="flex-1 flex flex-col glass-panel rounded-3xl shadow-2xl overflow-hidden border border-white">
        <header class="px-8 py-5 border-b border-gray-100 flex justify-between items-center bg-white/80">
            <div>
                <h2 class="text-xl font-bold text-gray-800">전략 컨퍼런스 홀</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span id="system-indicator" class="w-2 h-2 bg-gray-300 rounded-full"></span>
                    <p id="topic-text" class="text-xs text-gray-500 uppercase font-medium tracking-tight">System Idle</p>
                </div>
            </div>
            <div id="status-tag" class="text-[10px] font-black px-4 py-1.5 rounded-full bg-gray-100 text-gray-400 border border-gray-200 uppercase">Ready</div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6 chat-scroll bg-[#fcfcfd]">
            </div>

        <footer class="p-6 bg-white border-t border-gray-100">
            <div class="flex gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-200 shadow-inner">
                <input type="text" id="user-input" onkeypress="if(event.keyCode==13) runMeeting()" 
                    placeholder="안건을 입력하면 시스템 감독자가 먼저 연결 상태를 체크합니다..." 
                    class="flex-1 bg-transparent border-none focus:ring-0 px-4 text-sm outline-none">
                <button id="start-btn" onclick="runMeeting()" class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-black transition-all active:scale-95 disabled:bg-gray-300">
                    회의 시작
                </button>
            </div>
        </footer>
    </main>

    <aside class="w-80 flex flex-col gap-4">
        <div class="glass-panel rounded-3xl p-6 shadow-xl flex-1 flex flex-col overflow-hidden">
            <h3 class="text-sm font-bold text-gray-800 mb-4 uppercase tracking-widest">Live Log</h3>
            <div id="insight-stream" class="text-[11px] text-gray-500 flex flex-col gap-3 overflow-y-auto flex-1 pr-1 chat-scroll italic">
                <p class="text-center py-20 text-gray-300 font-light">감독자가 시스템 로그를<br>실시간으로 기록합니다.</p>
            </div>
        </div>
        <div class="bg-[#0f172a] rounded-3xl p-6 h-64 flex flex-col border border-white/10 shadow-2xl">
            <h3 class="text-sm font-bold text-emerald-400 mb-3 flex items-center gap-2">
                최종 의사결정 지원
            </h3>
            <div id="final-summary" class="text-[12px] text-slate-400 leading-relaxed overflow-y-auto flex-1 chat-scroll">
                회의 종료 후 시스템 요약이 출력됩니다.
            </div>
        </div>
    </aside>

    <script>
        const MODEL = "gemini-1.5-flash";

        // CTO를 최상단에 배치
        const officers = [
            { id: "CTO", name: "시스템 감독자", color: "bg-green-50", duty: "API 연결 상태 점검, 웹 사이트 오류 모니터링, 데이터 무결성 확인." },
            { id: "CEO", name: "비전 & ESG", color: "bg-blue-50", duty: "지역 상생 및 소상공인 매출 증대 가치 수호." },
            { id: "CFO", name: "재무 & 리스크", color: "bg-orange-50", duty: "수익 모델 검증 및 현금 흐름 분석." },
            { id: "CMO", name: "마케팅 & UX", color: "bg-pink-50", duty: "외국인 브랜딩 및 랭킹 시스템 리텐션 분석." },
            { id: "CPO", name: "제품 전략", color: "bg-teal-50", duty: "미션 콘텐츠의 재미와 서비스 기획 완성도 비평." }
        ];

        function init() {
            const list = document.getElementById('officer-list');
            list.innerHTML = '';
            officers.forEach(off => {
                const div = document.createElement('div');
                div.id = `card-${off.id}`;
                div.className = `officer-card ${off.color} p-4 rounded-2xl shadow-sm border border-black/5 ${off.id === 'CTO' ? 'system-checker' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black text-gray-800">${off.id}</span>
                        <div class="status-dot w-2 h-2 rounded-full bg-gray-300"></div>
                    </div>
                    <div class="text-[11px] font-bold text-gray-700">${off.name}</div>
                `;
                list.appendChild(div);
            });
        }

        async function callAI(prompt, system, apiKey) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
            } catch (e) {
                console.error("API Error:", e);
                return `[ERROR] ${e.message}`;
            }
        }

        async function runMeeting() {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) {
                alert("감독자: API Key가 없습니다. 입력 후 다시 시도하세요.");
                return;
            }

            const input = document.getElementById('user-input');
            const topic = input.value.trim();
            if (!topic) return;

            // 초기화
            input.value = '';
            document.getElementById('start-btn').disabled = true;
            document.getElementById('insight-stream').innerHTML = '';
            document.getElementById('topic-text').innerText = topic;

            // 1단계: CTO 시스템 체크
            updateUI("CTO", "active");
            addMessage("CTO (시스템 감독자)", "회의 시작 전 시스템 무결성을 점검합니다...", true, "bg-green-50");
            
            const checkResult = await callAI("Reply 'OK' if you can read this.", "You are a system monitor.", apiKey);
            
            if (checkResult.includes("[ERROR]")) {
                addMessage("CTO (오류 보고)", `시스템 연결 실패: ${checkResult}. API Key를 확인하십시오.`, true, "bg-red-100 text-red-700");
                updateUI("CTO", "error");
                document.getElementById('start-btn').disabled = false;
                return;
            }

            // 체크 성공 시 진행
            addMessage("CTO (시스템 감독자)", "✅ API 연결 정상. 웹 사이트 오류 없음. 모든 임원진 가동을 승인합니다.", true, "bg-green-50");
            document.getElementById('system-indicator').className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
            document.getElementById('status-tag').className = "text-[10px] font-black px-4 py-1.5 rounded-full bg-blue-100 text-blue-600 uppercase border border-blue-200 animate-bounce";

            let history = [`안건: ${topic}`];
            
            // 2단계: 나머지 임원 순차 회의
            for (let i = 1; i < officers.length; i++) {
                const off = officers[i];
                updateUI(off.id, "active");
                
                const sys = `너는 Meogo 컴퍼니의 ${off.id}다. ${off.duty} 대표의 질문에 대해 아주 날카롭고 비판적인 분석을 한국어로 답변하라.`;
                const usr = `현재 토론 내역: ${history.join('\n')}\n대표의 질문: ${topic}`;
                
                const response = await callAI(usr, sys, apiKey);
                
                if (response.includes("[ERROR]")) {
                    addMessage("CTO (긴급 보고)", `회의 중단 알림: ${off.id} 응답 중 기술적 오류가 발생했습니다.`, true, "bg-red-50 text-red-600");
                    break;
                }

                addMessage(`${off.id} (${off.name})`, response, true, off.color);
                history.push(`${off.id}: ${response}`);
                
                // 로그 기록
                const log = document.createElement('div');
                log.className = "p-2 bg-white rounded-lg shadow-sm border border-gray-100 msg-animate text-[10px]";
                log.innerHTML = `<span class="text-blue-500 font-bold">[LOG]</span> ${off.id} 응답 수신 완료`;
                document.getElementById('insight-stream').prepend(log);

                await new Promise(r => setTimeout(r, 600));
            }

            // 요약
            const summary = await callAI(history.join('\n'), "회의 서기입니다. 결론을 요약하세요.", apiKey);
            document.getElementById('final-summary').innerText = summary;
            document.getElementById('status-tag').innerText = "Finished";
            document.getElementById('status-tag').className = "text-[10px] font-black px-4 py-1.5 rounded-full bg-green-100 text-green-600 uppercase";
            document.getElementById('start-btn').disabled = false;
        }

        function addMessage(sender, text, isAi, color = "") {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg-animate flex flex-col ${isAi ? 'items-start' : 'items-end'} max-w-[85%] ${!isAi ? 'ml-auto' : ''}`;
            div.innerHTML = `
                <span class="text-[10px] font-black text-gray-400 mb-1 uppercase">${sender}</span>
                <div class="${isAi ? color : 'bg-slate-800 text-white'} p-4 rounded-2xl ${isAi ? 'rounded-tl-none' : 'rounded-tr-none'} shadow-sm text-sm border border-black/5">
                    ${text}
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUI(activeId, status) {
            officers.forEach(off => {
                const card = document.getElementById(`card-${off.id}`);
                const dot = card.querySelector('.status-dot');
                if (off.id === activeId) {
                    card.classList.add('active');
                    dot.className = `status-dot w-2 h-2 rounded-full ${status === 'error' ? 'bg-red-500' : 'bg-blue-500 animate-ping'}`;
                } else {
                    card.classList.remove('active');
                    dot.className = "status-dot w-2 h-2 rounded-full bg-green-400";
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
