<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite AI Strategy Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        @keyframes pulse-ring { 0% { transform: scale(.33); opacity: 1; } 80%, 100% { opacity: 0; } }
        .is-thinking::before {
            content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            border-radius: inherit; background-color: #3b82f6; animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-[#0a0f1d] text-slate-200 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 bg-[#0a0f1d]/80 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">C</div>
            <h1 class="font-bold text-lg tracking-tight">C-Suite <span class="text-blue-500">AI</span> Strategy</h1>
        </div>
        <div id="connStatus" class="flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse" id="statusDot"></span>
            <span id="statusText">System Initializing...</span>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Participants -->
        <aside class="w-72 border-r border-white/10 bg-[#0a0f1d] flex flex-col">
            <div class="p-5">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-4">Board Members</h2>
                <div id="participantList" class="space-y-2">
                    <!-- Roles will be loaded here -->
                </div>
            </div>
            <div class="mt-auto p-5 border-t border-white/5">
                <div class="p-4 rounded-xl bg-blue-500/5 border border-blue-500/10">
                    <p class="text-[10px] text-blue-400 font-bold mb-1">CURRENT MODEL</p>
                    <p class="text-xs text-white">Gemini 1.5 Flash (Stable)</p>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <section class="flex-1 flex flex-col bg-gradient-to-b from-[#0f172a] to-[#0a0f1d]">
            <div id="chatBox" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll">
                <!-- Welcome UI -->
                <div id="welcomeUI" class="max-w-xl mx-auto text-center py-20">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-blue-600/10 border border-blue-500/20 mb-6">
                        <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-bold text-white mb-4">전략 회의 안건을 입력하세요</h2>
                    <p class="text-slate-400 text-sm leading-relaxed">비즈니스 기획, 마케팅 전략, 투자 유치 등 고민 중인 안건을 입력하면 8인의 전문 경영진 AI가 토론을 시작합니다.</p>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="p-6 bg-gradient-to-t from-[#0a0f1d] to-transparent">
                <div class="max-w-4xl mx-auto flex items-end gap-3 glass-card p-2 rounded-2xl shadow-2xl">
                    <textarea id="userInput" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 text-sm p-3 max-h-40 overflow-y-auto resize-none" placeholder="회의 안건을 상세히 입력해 주세요..."></textarea>
                    <button id="sendBtn" class="bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white p-3 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const CONFIG = {
            SUPABASE_URL: "https://pcmrpxcpjynmayactgan.supabase.co",
            SUPABASE_KEY: "sb_publishable_endfjcxVBfda-lzjOpPbrQ_DTdF3MHZ",
            GEMINI_MODEL: "gemini-1.5-flash", // 404 에러 방지를 위해 가장 안정적인 모델 사용
            API_KEYS: [
                "AIzaSyDOuootRofHJ4AOSEanA-B8V5wzuNBIcuc",
                "AIzaSyD1vAdVRyf7aeYhLxIDzd5Ln0SxYMNAtjI",
                "AIzaSyDkOTEUZq5tpX6qF14Is80jUT-Y-LjPVT4",
                "AIzaSyBpTVLu44pvfWId6qMtFjqE1oZjbZ4Fv3A"
            ]
        };

        // --- 2. INITIALIZATION (Global duplicate check) ---
        let _sb;
        try {
            if (typeof supabase !== 'undefined' && !_sb) {
                _sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.CONFIG_KEY || CONFIG.SUPABASE_KEY);
            }
        } catch (e) {
            console.error("Initialization error:", e);
        }

        const state = {
            sessionId: null,
            isThinking: false,
            personas: {},
            roles: ["CEO", "CSO", "CPO", "CMO", "CTO", "CDO", "CFO", "CRO"]
        };

        // --- 3. CORE FUNCTIONS ---
        async function init() {
            updateStatus("Supabase Connecting...", "yellow");
            try {
                // Participant status 테이블에서 페르소나 데이터 로드
                const { data, error } = await _sb.from('participant_status').select('*');
                if (error) throw error;

                const listEl = document.getElementById('participantList');
                listEl.innerHTML = '';

                data.forEach(p => {
                    state.personas[p.role_key] = p.persona_description;
                    listEl.innerHTML += `
                        <div id="role-card-${p.role_key}" class="group relative flex items-center justify-between p-3 rounded-xl bg-white/5 border border-white/5 transition-all">
                            <div class="flex items-center gap-3">
                                <div class="w-2 h-2 rounded-full bg-slate-600" id="dot-${p.role_key}"></div>
                                <span class="text-xs font-semibold text-slate-300">${p.role_key}</span>
                            </div>
                            <span class="text-[9px] text-slate-500 uppercase tracking-tighter" id="txt-${p.role_key}">Waiting</span>
                        </div>
                    `;
                });
                updateStatus("System Ready", "emerald");
            } catch (err) {
                console.error(err);
                updateStatus("Database Error", "red");
            }
        }

        async function startMeeting(topic) {
            if (state.isThinking) return;
            state.isThinking = true;
            document.getElementById('welcomeUI').classList.add('hidden');
            addMsg("User", topic, true);

            try {
                // 1. 세션 생성
                const { data: session, error: sErr } = await _sb.from('conference_sessions').insert([{ title: topic }]).select().single();
                if (sErr) throw sErr;
                state.sessionId = session.id;

                // 2. 순차적 토론 진행 (CEO부터 순서대로)
                for (let role of state.roles) {
                    await processRoleTurn(role);
                }
            } catch (err) {
                addMsg("System", "Error: " + err.message, false);
            } finally {
                state.isThinking = false;
            }
        }

        async function processRoleTurn(role) {
            setRoleUI(role, true);
            try {
                // 이전 대화 맥락 가져오기
                const { data: history } = await _sb.from('meeting_messages')
                    .select('role_key, content')
                    .eq('session_id', state.sessionId)
                    .order('created_at', { ascending: true });

                const context = history?.map(h => `${h.role_key}: ${h.content}`).join("\n") || "";
                const prompt = `당신은 ${role}입니다. 페르소나: ${state.personas[role]}. 다른 경영진들의 의견: ${context}. 이에 대해 당신의 전문 분야에서 1~2문장으로 한국어로 짧고 명확하게 의견을 제시하세요.`;

                // 순환하며 API Key 선택 (할당량 분산)
                const keyIndex = state.roles.indexOf(role) % 4;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${CONFIG.API_KEYS[keyIndex]}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const json = await response.json();
                if (!response.ok) throw new Error(json.error?.message || "API_ERROR");

                const reply = json.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!reply) throw new Error("EMPTY_RESPONSE");

                // DB 저장 및 UI 표시
                await _sb.from('meeting_messages').insert([{
                    session_id: state.sessionId,
                    role_key: role,
                    content: reply
                }]);
                addMsg(role, reply, false);

            } catch (err) {
                console.error(`${role} error:`, err);
                addMsg("System", `${role}의 응답을 생성하지 못했습니다. (에러: ${err.message})`, false);
            } finally {
                setRoleUI(role, false);
            }
        }

        // --- 4. UI UTILS ---
        function updateStatus(text, color) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = `w-1.5 h-1.5 rounded-full bg-${color}-500`;
            txt.innerText = text;
        }

        function setRoleUI(role, isThinking) {
            const card = document.getElementById(`role-card-${role}`);
            const dot = document.getElementById(`dot-${role}`);
            const txt = document.getElementById(`txt-${role}`);
            if (isThinking) {
                card.classList.add('border-blue-500/50', 'bg-blue-500/10', 'is-thinking');
                dot.classList.replace('bg-slate-600', 'bg-blue-500');
                txt.innerText = "Analyzing...";
            } else {
                card.classList.remove('border-blue-500/50', 'bg-blue-500/10', 'is-thinking');
                dot.classList.replace('bg-blue-500', 'bg-emerald-500');
                txt.innerText = "Waiting";
            }
        }

        function addMsg(role, text, isUser) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-500`;
            
            div.innerHTML = `
                <div class="max-w-[80%] ${isUser ? 'bg-blue-600 text-white' : 'glass-card text-slate-200'} p-4 rounded-2xl shadow-xl">
                    <p class="text-[9px] font-bold opacity-50 mb-1 uppercase tracking-widest">${role}</p>
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        // --- 5. EVENT LISTENERS ---
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (val) { startMeeting(val); input.value = ''; }
        };

        document.getElementById('userInput').onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        };

        init();
    </script>
</body>
</html>
