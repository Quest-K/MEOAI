<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite Auth Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .bg-binance-gold { background-color: #F3BA2F; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #F3BA2F; outline: none; background: rgba(255,255,255,0.08); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter">C-SUITE <span class="binance-gold">VAULT</span></h1>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.3em]">Institutional Grade Security</p>
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl border-white/10">
            <!-- Tab Switcher -->
            <div class="flex bg-black/40 p-1 rounded-2xl mb-8">
                <button id="tab-login" class="flex-1 py-2 text-xs font-bold rounded-xl bg-white/10 text-white transition-all">로그인</button>
                <button id="tab-signup" class="flex-1 py-2 text-xs font-bold rounded-xl text-slate-500 hover:text-white transition-all">회원가입</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email Address</label>
                    <input type="email" id="login-email" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="name@company.com">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="login-password" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-binance-gold text-black font-bold py-4 rounded-2xl mt-4 hover:brightness-110 transition-all shadow-lg shadow-yellow-500/10">
                    시스템 접속
                </button>
            </form>

            <!-- Signup Form (Hidden) -->
            <form id="signup-form" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Full Name</label>
                    <input type="text" id="signup-name" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="홍길동">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Email Address</label>
                    <input type="email" id="signup-email" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="name@company.com">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Password</label>
                    <input type="password" id="signup-password" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="최소 6자리 이상">
                </div>
                <button type="submit" class="w-full bg-white text-black font-bold py-4 rounded-2xl mt-4 hover:bg-slate-200 transition-all">
                    계정 생성 및 인증 메일 발송
                </button>
            </form>

            <div id="message" class="mt-6 text-center text-xs font-medium hidden"></div>
        </div>

        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-widest">
            Protected by Supabase Guard System
        </p>
    </div>

    <script>
        // Supabase 초기화
        const SUPABASE_URL = "https://your-project.supabase.co";
        const SUPABASE_KEY = "your-anon-key";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const msgBox = document.getElementById('message');

        // 탭 전환 로직
        tabLogin.onclick = () => {
            tabLogin.classList.add('bg-white/10', 'text-white');
            tabLogin.classList.remove('text-slate-500');
            tabSignup.classList.remove('bg-white/10', 'text-white');
            tabSignup.classList.add('text-slate-500');
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        };

        tabSignup.onclick = () => {
            tabSignup.classList.add('bg-white/10', 'text-white');
            tabSignup.classList.remove('text-slate-500');
            tabLogin.classList.remove('bg-white/10', 'text-white');
            tabLogin.classList.add('text-slate-500');
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        };

        function showMessage(text, isError = false) {
            msgBox.innerText = text;
            msgBox.className = `mt-6 text-center text-xs font-medium ${isError ? 'text-red-400' : 'text-emerald-400'}`;
            msgBox.classList.remove('hidden');
        }

        // 회원가입 처리
        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const fullName = document.getElementById('signup-name').value;

            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: fullName },
                    emailRedirectTo: window.location.origin + '/analysis.html'
                }
            });

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage("인증 이메일이 발송되었습니다. 메일함을 확인해주세요!");
            }
        };

        // 로그인 처리
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await sb.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                showMessage(error.message, true);
            } else {
                showMessage("로그인 성공! 대시보드로 이동합니다.");
                setTimeout(() => {
                    window.location.href = 'analysis.html';
                }, 1000);
            }
        };

        // 이미 로그인된 세션이 있는지 확인
        async function checkSession() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'analysis.html';
            }
        }
        checkSession();
    </script>
</body>
</html>
