<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meogo AI 전략 회의실</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .watercolor-bg {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        .officer-card { transition: all 0.3s ease; border-left: 4px solid transparent; opacity: 0.6; }
        .officer-card.active { border-left-color: #3b82f6; background: white; transform: scale(1.05); opacity: 1; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .officer-card.completed { opacity: 0.95; border-left-color: #10b981; }

        .bg-ceo { background-color: #e3f2fd; } .bg-cso { background-color: #f3e5f5; }
        .bg-cfo { background-color: #fff3e0; } .bg-cdo { background-color: #e8f5e9; }
        .bg-cmo { background-color: #fce4ec; } .bg-coo { background-color: #efebe9; }
        .bg-cpo { background-color: #e0f2f1; } .bg-cro { background-color: #fffde7; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: slideIn 0.4s ease-out forwards; }
        
        .typing-dot { width: 4px; height: 4px; background: #6b7280; border-radius: 50%; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body class="flex h-screen p-4 gap-4">

    <!-- 좌측: 임원 리스트 -->
    <aside class="w-72 watercolor-bg rounded-3xl p-6 flex flex-col gap-4 shadow-xl overflow-y-auto">
        <div class="mb-2">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Meogo</h1>
            <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest italic">8-Executive AI Board</p>
        </div>
        
        <div id="officer-list" class="flex flex-col gap-3"></div>

        <div class="mt-auto pt-4 border-t border-gray-100 flex flex-col gap-2">
            <p class="text-[9px] text-gray-400 text-center mb-2">Gemini 1.5 Flash Connected</p>
            <button onclick="resetConference()" class="w-full py-2 text-[10px] text-gray-400 hover:text-red-500 transition-colors">전체 회의 초기화</button>
        </div>
    </aside>

    <!-- 중앙: 메인 회의장 -->
    <main class="flex-1 flex flex-col watercolor-bg rounded-3xl shadow-xl overflow-hidden relative">
        <header class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/40">
            <div>
                <h2 class="text-lg font-bold text-gray-700">MEOAI 전략 컨퍼런스</h2>
                <p id="topic-display" class="text-xs text-gray-400 italic">안건을 입력하시면 임원진 토론이 시작됩니다.</p>
            </div>
            <div id="status-badge" class="px-4 py-1.5 bg-gray-100 text-gray-400 text-[10px] rounded-full font-bold uppercase tracking-widest shadow-inner">Standby</div>
        </header>

        <!-- 채팅창 -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-8 flex flex-col gap-6 chat-container">
            <div class="flex flex-col items-start max-w-[85%] animate-msg">
                <div class="text-[10px] font-bold text-gray-400 ml-1 mb-1 italic uppercase">System Notification</div>
                <div class="bg-white/80 p-5 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-600 border border-blue-50 leading-relaxed">
                    대표님, 8인의 AI 임원이 모두 소집되었습니다.<br>
                    <strong>Meogo</strong>의 글로벌 확장과 지역 상생을 위한 전략적 안건을 제안해 주세요.
                </div>
            </div>
        </div>

        <!-- 입력창 -->
        <footer class="p-6 bg-white/60 border-t border-gray-100 backdrop-blur-md">
            <div class="relative flex gap-3">
                <input type="text" id="user-input" onkeypress="if(event.keyCode==13) startConference()" placeholder="대표님, 오늘 논의할 핵심 안건은 무엇입니까?" 
                    class="flex-1 p-4 rounded-2xl border-none focus:ring-2 focus:ring-blue-200 outline-none shadow-inner bg-white/90 text-sm placeholder:text-gray-300">
                <button id="send-btn" onclick="startConference()" class="px-8 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all font-bold">
                    상담 시작
                </button>
            </div>
        </footer>
    </main>

    <!-- 우측: 분석 및 요약 -->
    <aside class="w-80 flex flex-col gap-4">
        <section class="watercolor-bg rounded-3xl p-6 shadow-xl flex-[1.5] flex flex-col overflow-hidden">
            <h3 class="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span> 전략 리포트 분석
            </h3>
            <div id="analysis-content" class="text-xs text-gray-600 flex flex-col gap-4 overflow-y-auto pr-2">
                <p class="italic text-gray-400 text-center py-10">토론 과정에서의 핵심 인사이트가 이곳에 기록됩니다.</p>
            </div>
        </section>

        <section class="bg-white/90 rounded-3xl p-6 shadow-xl flex-1 flex flex-col overflow-hidden">
            <h3 class="text-sm font-bold text-gray-800 mb-3">C-Level 최종 의사결정</h3>
            <div id="decision-summary" class="text-[11px] text-gray-500 leading-relaxed overflow-y-auto flex-1 italic">
                회의가 종료되면 8인 임원의 합의된 실행 안이 도출됩니다.
            </div>
        </section>
    </aside>

    <script>
        // 대표님이 제공하신 API Key 적용
        const API_KEY = "AIzaSyDOuootRofHJ4AOSEanA-B8V5wzuNBIcuc";
        const MODEL_NAME = "gemini-1.5-flash";

        const roles = [
            { key: "CEO", name: "비전 & 지역상생", color: "bg-ceo", prompt: "지역 소상공인 매출 증대와 ESG 경영 가치를 최우선으로 하며 대표의 비전을 지지하는 관점." },
            { key: "CSO", name: "전략 & 경쟁우위", color: "bg-cso", prompt: "글로벌 트래블 마켓에서의 경쟁사 분석과 차별화된 전략적 허점을 찾는 관점." },
            { key: "CFO", name: "재무 & 리스크", color: "bg-cfo", prompt: "광고 수익성, 서버 비용, 인건비 대비 효율성 및 리스크를 엄격하게 따지는 관점." },
            { key: "CDO", name: "데이터 & 인프라", color: "bg-cdo", prompt: "데이터 수집 가치, 확장성, 개인정보 보호 및 기술적 구현 로드맵을 체크하는 관점." },
            { key: "CMO", name: "마케팅 & 고객경험", color: "bg-cmo", prompt: "외국인 여행객의 바이럴 요소, 브랜드 이미지, 고객 획득 비용(CAC) 최적화 관점." },
            { key: "COO", name: "운영 & 효율성", color: "bg-coo", prompt: "1인 개발 환경에서의 운영 리소스 최적화 및 지속 가능한 유지보수 효율성 관점." },
            { key: "CPO", name: "제품 & UX 비평", color: "bg-cpo", prompt: "외국인 타겟 UI/UX의 직관성, 미션 수행의 재미 요소 및 제품 완성도를 비평하는 관점." },
            { key: "CRO", name: "매출 & 성장동력", color: "bg-cro", prompt: "추가 유료 모델(프리미엄 미션), 제휴 매출 등 수익 극대화와 스케일업 전략 관점." }
        ];

        let discussionHistory = [];

        function init() {
            const listContainer = document.getElementById('officer-list');
            listContainer.innerHTML = '';
            roles.forEach(role => {
                const card = document.createElement('div');
                card.id = `card-${role.key}`;
                card.className = `officer-card ${role.color} p-4 rounded-2xl flex flex-col gap-1 shadow-sm`;
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-gray-800">${role.key}</span>
                        <div class="status-dot w-2 h-2 rounded-full bg-gray-300 transition-all"></div>
                    </div>
                    <span class="text-[10px] text-gray-600">${role.name}</span>
                `;
                listContainer.appendChild(card);
            });
        }

        async function callGemini(prompt, systemInstruction) {
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                
                const result = await response.json();
                if (response.ok) {
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } else {
                    console.error("API Error:", result.error?.message);
                    return null;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                return null;
            }
        }

        async function startConference() {
            const input = document.getElementById('user-input');
            const topic = input.value.trim();
            if (!topic) return;

            input.value = '';
            document.getElementById('topic-display').innerText = `Current Topic: ${topic}`;
            const badge = document.getElementById('status-badge');
            badge.innerText = "In Progress";
            badge.className = "px-4 py-1.5 bg-blue-100 text-blue-600 text-[10px] rounded-full font-bold uppercase animate-pulse shadow-sm";

            addMessage("대표님 (Owner)", topic, false);
            discussionHistory = [`오늘의 회의 주제: ${topic}`];

            for (const role of roles) {
                setActiveOfficer(role.key);
                
                const sysPrompt = `너는 Meogo 컴퍼니의 ${role.key}다. ${role.prompt} 대표의 안건에 대해 너의 입장에서 한국어로 아주 짧고 강한 인사이트(2문장)를 말하라.`;
                const usrPrompt = `안건: ${topic}\n이전 맥락: ${discussionHistory.slice(-2).join(" | ")}`;
                
                const response = await callGemini(usrPrompt, sysPrompt);
                const finalResponse = response || `${role.key}의 의견을 정리하는 데 잠시 지연이 발생했습니다.`;
                
                addMessage(`${role.key} (${role.name})`, finalResponse, true, role.color);
                discussionHistory.push(`${role.key}: ${finalResponse}`);
                updateAnalysis(role.key, finalResponse);
                
                // 자연스러운 토론 흐름을 위한 지연
                await new Promise(r => setTimeout(r, 1200));
            }

            finishConference();
        }

        function addMessage(sender, text, isAi, colorClass = "") {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isAi ? 'items-start' : 'items-end'} max-w-[90%] ${!isAi ? 'ml-auto' : ''} animate-msg`;
            
            msgDiv.innerHTML = `
                <div class="text-[10px] font-bold text-gray-400 ${isAi ? 'ml-1' : 'mr-1'} mb-1 italic">${sender}</div>
                <div class="${isAi ? (colorClass || 'bg-white') : 'bg-blue-600 text-white'} p-4 rounded-2xl ${isAi ? 'rounded-tl-none' : 'rounded-tr-none'} shadow-md text-sm border border-black/5 leading-relaxed">
                    ${text}
                </div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function setActiveOfficer(key) {
            roles.forEach(r => {
                const card = document.getElementById(`card-${r.key}`);
                const dot = card.querySelector('.status-dot');
                if (r.key === key) {
                    card.classList.add('active');
                    dot.classList.remove('bg-gray-300', 'bg-green-400');
                    dot.classList.add('bg-blue-500');
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    card.classList.remove('active');
                    if (discussionHistory.some(h => h.startsWith(r.key + ":"))) {
                        card.classList.add('completed');
                        dot.classList.remove('bg-blue-500', 'bg-gray-300');
                        dot.classList.add('bg-green-400');
                    }
                }
            });
        }

        function updateAnalysis(key, text) {
            const container = document.getElementById('analysis-content');
            if (container.querySelector('p.italic')) container.innerHTML = '';
            
            const item = document.createElement('div');
            item.className = "p-3 bg-white/60 rounded-xl border border-white shadow-sm animate-msg text-[11px] leading-snug";
            item.innerHTML = `<span class="font-bold text-blue-600 block mb-1">Decision Point [${key}]</span> ${text}`;
            container.prepend(item);
        }

        async function finishConference() {
            const badge = document.getElementById('status-badge');
            badge.innerText = "Summarizing";
            
            const summarySys = "너는 이 회의를 기록하는 서기다. 위 8인 임원의 토론을 요약하여 대표가 즉시 실행할 'Meogo 액션 플랜 3가지'를 아주 간결하고 명확하게 한국어로 작성하라.";
            const summary = await callGemini(discussionHistory.join("\n"), summarySys);
            
            document.getElementById('decision-summary').innerHTML = `
                <div class="bg-blue-50/70 p-4 rounded-2xl border-l-4 border-blue-500 shadow-sm text-gray-700 animate-msg">
                    ${(summary || "결론 도출 중 오류가 발생했습니다. 다시 시도해 주세요.").replace(/\n/g, '<br>')}
                </div>`;
            
            badge.innerText = "Completed";
            badge.className = "px-4 py-1.5 bg-green-100 text-green-600 text-[10px] rounded-full font-bold uppercase shadow-sm";
        }

        function resetConference() {
            if(confirm("현재 진행 중인 모든 토론 내용을 삭제할까요?")) location.reload();
        }

        window.onload = init;
    </script>
</body>
</html>
