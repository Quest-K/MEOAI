
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Loop: Dark Echo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        /* 호러 분위기를 위한 시야 제한(비네트) 효과 */
        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.95) 80%);
            pointer-events: none;
            z-index: 10;
        }

        .horror-font {
            font-family: 'Creepster', cursive;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .btn-active {
            pointer-events: auto;
            cursor: pointer;
        }

        /* 펄스 애니메이션 */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="vignette"></div>

    <div id="ui-layer" class="flex flex-col justify-between p-6">
        <!-- HUD -->
        <div class="flex justify-between items-start text-red-600">
            <div class="flex flex-col">
                <span class="text-xs font-bold uppercase tracking-widest opacity-60">Level</span>
                <span id="level-display" class="text-3xl font-black horror-font">01</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-xs font-bold uppercase tracking-widest opacity-60">Time Flux</span>
                <div class="w-32 h-2 bg-red-900/30 rounded-full mt-1 overflow-hidden border border-red-600/20">
                    <div id="flux-bar" class="h-full bg-red-600 w-0 transition-all"></div>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-xs font-bold uppercase tracking-widest opacity-60">Echoes</span>
                <span id="echo-count" class="text-3xl font-black horror-font">0</span>
            </div>
        </div>

        <!-- 중앙 오버레이 -->
        <div id="overlay" class="m-auto pointer-events-auto bg-black/80 border border-red-900/50 p-10 rounded-lg text-center max-w-sm backdrop-blur-md">
            <div id="start-screen">
                <h1 class="text-5xl text-red-700 horror-font mb-4 pulse">DARK ECHO</h1>
                <p class="text-gray-500 text-sm mb-8 leading-relaxed italic">
                    "과거의 당신은 당신을 죽이려 할 것입니다."<br>
                    기기를 기울여 어둠 속 탈출구를 찾으세요.
                </p>
                <button onclick="initSensors()" class="px-10 py-4 bg-red-900/40 hover:bg-red-800/60 border border-red-700 text-red-500 font-bold rounded transition-all">
                    공포 속으로 진입
                </button>
            </div>

            <div id="gameover-screen" class="hidden">
                <h2 class="text-5xl text-red-600 horror-font mb-2">CAUGHT</h2>
                <p id="death-reason" class="text-gray-500 text-xs mb-8 uppercase tracking-widest">Time Paradox Occurred</p>
                <button onclick="restartGame()" class="px-10 py-4 bg-white/10 hover:bg-white/20 text-white border border-white/30 rounded font-bold transition-all">
                    다시 시도
                </button>
            </div>
        </div>

        <!-- 하단 정보 -->
        <div class="flex justify-between items-end text-[10px] text-red-900/50 font-bold uppercase tracking-widest">
            <div>Gyroscope Active</div>
            <div id="status-msg">Don't look back...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const fluxBar = document.getElementById('flux-bar');
        
        let state = 'START';
        let level = 1;
        let score = 0;
        let flux = 0;
        let isFreezing = false;
        
        let player = { x: 50, y: 50, r: 8 };
        let vel = { x: 0, y: 0 };
        let exit = { x: 80, y: 80, r: 15 };
        
        let history = []; // 현재 이동 경로
        let echoes = [];  // 과거의 경로들
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        async function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleGyro);
                    }
                } catch (e) { console.warn("Gyro blocked"); }
            } else {
                window.addEventListener('deviceorientation', handleGyro);
            }
            startGame();
        }

        function handleGyro(e) {
            if (state !== 'PLAYING' || isFreezing) return;
            const sensitivity = 0.06;
            vel.x = e.gamma * sensitivity;
            vel.y = (e.beta - 45) * sensitivity; // 45도 기울기를 기본값으로 설정
        }

        // 키보드 지원 (PC)
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.code === 'Space' && flux >= 100) triggerFreeze();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function triggerFreeze() {
            isFreezing = true;
            flux = 0;
            document.getElementById('status-msg').innerText = "TIME FROZEN";
            setTimeout(() => {
                isFreezing = false;
                document.getElementById('status-msg').innerText = "Don't look back...";
            }, 3000);
        }

        function startGame() {
            state = 'PLAYING';
            document.getElementById('overlay').classList.add('hidden');
            initLevel(1);
            requestAnimationFrame(loop);
        }

        function initLevel(lv) {
            level = lv;
            player.x = 10;
            player.y = 10;
            vel = { x: 0, y: 0 };
            
            // 출구 위치 랜덤 (멀리 배치)
            exit.x = 50 + Math.random() * 40;
            exit.y = 50 + Math.random() * 40;
            
            if (lv === 1) {
                echoes = [];
            } else {
                echoes.push([...history]);
            }
            history = [];
            flux = 0;
            
            document.getElementById('level-display').innerText = String(lv).padStart(2, '0');
            document.getElementById('echo-count').innerText = echoes.length;
        }

        function loop() {
            if (state !== 'PLAYING') return;

            if (!isFreezing) {
                // 키보드 입력
                const speed = 0.8;
                if (keys['w'] || keys['arrowup']) vel.y = -speed;
                if (keys['s'] || keys['arrowdown']) vel.y = speed;
                if (keys['a'] || keys['arrowleft']) vel.x = -speed;
                if (keys['d'] || keys['arrowright']) vel.x = speed;

                // 감속
                vel.x *= 0.96;
                vel.y *= 0.96;

                player.x += vel.x;
                player.y += vel.y;

                // 경계
                player.x = Math.max(5, Math.min(95, player.x));
                player.y = Math.max(5, Math.min(95, player.y));

                // 경로 기록
                history.push({ x: player.x, y: player.y });

                // 에너지 충전
                if (flux < 100) flux += 0.2;
                fluxBar.style.width = `${flux}%`;

                // 충돌 체크 (과거의 나와 부딪힘)
                const currentIdx = history.length - 1;
                echoes.forEach(path => {
                    const echoPos = path[currentIdx] || path[path.length - 1];
                    const dx = player.x - echoPos.x;
                    const dy = player.y - echoPos.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 3.5) {
                        endGame("과거의 자신에게 붙잡혔습니다.");
                    }
                });

                // 목표 도달
                const edx = player.x - exit.x;
                const edy = player.y - exit.y;
                if (Math.sqrt(edx*edx + edy*edy) < 5) {
                    initLevel(level + 1);
                }
            }

            draw();
            requestAnimationFrame(loop);
        }

        function draw() {
            ctx.fillStyle = '#050000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const w = canvas.width;
            const h = canvas.height;

            // 시간 정지 시 효과
            if (isFreezing) {
                ctx.fillStyle = 'rgba(0, 100, 255, 0.05)';
                ctx.fillRect(0, 0, w, h);
            }

            // 출구 (희미한 빛)
            const grad = ctx.createRadialGradient(exit.x*w/100, exit.y*h/100, 0, exit.x*w/100, exit.y*h/100, 30);
            grad.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(exit.x*w/100, exit.y*h/100, 30, 0, Math.PI*2);
            ctx.fill();

            // 잔상 (과거의 나) - 공포스럽게 표현
            const currentIdx = history.length - 1;
            echoes.forEach((path, i) => {
                const pos = path[currentIdx] || path[path.length - 1];
                const age = i / echoes.length;
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0000';
                ctx.fillStyle = `rgba(150, 0, 0, ${0.3 + age * 0.4})`;
                
                // 잔상을 약간 떨리게 표현 (Glitch 효과)
                const shakeX = (Math.random() - 0.5) * 2;
                const shakeY = (Math.random() - 0.5) * 2;
                
                ctx.beginPath();
                ctx.arc((pos.x + shakeX)*w/100, (pos.y + shakeY)*h/100, 8, 0, Math.PI*2);
                ctx.fill();
            });

            // 플레이어 (현재)
            ctx.shadowBlur = 20;
            ctx.shadowColor = isFreezing ? '#00ffff' : '#ff3333';
            ctx.fillStyle = isFreezing ? '#ffffff' : '#ff1111';
            ctx.beginPath();
            ctx.arc(player.x*w/100, player.y*h/100, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function endGame(reason) {
            state = 'GAMEOVER';
            document.getElementById('death-reason').innerText = reason;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('gameover-screen').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function restartGame() {
            initLevel(1);
            state = 'PLAYING';
            document.getElementById('overlay').classList.add('hidden');
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
