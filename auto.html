<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V6 Sniper Premium Dashboard</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e11; color: #eaecef; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { createClient } = supabase;

        // --- CONFIGURATION ---
        const SUPABASE_URL = "https://mgidrwfgcdcxgosotysg.supabase.co";
        const SUPABASE_KEY = "sb_publishable_FQt1zyzqKOI3LUSZ8DYNAQ_b9fOqhTx";
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
        const API_BASE = "https://fapi.binance.com";

        function App() {
            // --- States ---
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authLoading, setAuthLoading] = useState(true);
            const [totalSeed, setTotalSeed] = useState(500);
            const [maxSymbols, setMaxSymbols] = useState(5);
            const [marketData, setMarketData] = useState([]);
            const [activeTrades, setActiveTrades] = useState([]);
            const [history, setHistory] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // --- Auth Logic ---
            useEffect(() => {
                const checkUser = async () => {
                    const { data: { session } } = await sb.auth.getSession();
                    setUser(session?.user ?? null);
                    setAuthLoading(false);
                };
                checkUser();
                const { data: authListener } = sb.auth.onAuthStateChanged((_event, session) => {
                    setUser(session?.user ?? null);
                });
                return () => authListener.subscription.unsubscribe();
            }, []);

            // --- Data Fetching ---
            const fetchData = useCallback(async () => {
                if (!user) return;
                const { data: logs } = await sb.from('trading_logs').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                if (logs) {
                    setActiveTrades(logs.filter(l => l.status === 'OPEN'));
                    setHistory(logs.filter(l => l.status === 'CLOSED'));
                }
            }, [user]);

            const scanMarket = useCallback(async () => {
                try {
                    const res = await fetch(`${API_BASE}/fapi/v1/ticker/24hr`);
                    const tickers = await res.json();
                    const candidates = tickers
                        .filter(t => t.symbol.endsWith('USDT') && parseFloat(t.priceChangePercent) >= 15)
                        .sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent))
                        .slice(0, 10);
                    setMarketData(candidates);
                    setIsLoading(false);
                } catch (err) { console.error("Market data error", err); }
            }, []);

            useEffect(() => {
                if (user) {
                    fetchData();
                    scanMarket();
                    const interval = setInterval(() => { fetchData(); scanMarket(); }, 15000);
                    return () => clearInterval(interval);
                }
            }, [user, fetchData, scanMarket]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) alert("Login Error: " + error.message);
            };

            const handleLogout = () => sb.auth.signOut();

            const startTrade = async (symbol, currentPrice) => {
                if (activeTrades.length >= maxSymbols) return alert("All slots filled.");
                const seed = totalSeed / maxSymbols;
                const { error } = await sb.from('trading_logs').insert([{
                    user_id: user.id, symbol, status: 'OPEN', total_usdt_allocated: seed,
                    entry_1_price: currentPrice * 1.03, avg_price: currentPrice, entry_at: new Date().toISOString()
                }]);
                if (!error) fetchData();
            };

            // --- Icon Wrapper ---
            const Icon = ({ name, size = 20, className = "" }) => {
                useEffect(() => { lucide.createIcons(); }, []);
                return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
            };

            if (authLoading) return <div className="min-h-screen flex items-center justify-center bg-[#0b0e11]"><Icon name="refresh-cw" className="animate-spin text-yellow-500" /></div>;

            if (!user) return (
                <div className="min-h-screen bg-[#0b0e11] flex items-center justify-center p-4">
                    <form onSubmit={handleLogin} className="bg-[#1e2329] p-10 rounded-[2.5rem] border border-white/5 w-full max-w-md shadow-2xl">
                        <div className="flex items-center gap-4 mb-10 justify-center">
                            <div className="p-3 bg-yellow-500 rounded-2xl"><Icon name="activity" size={28} className="text-black" /></div>
                            <h1 className="text-3xl font-black uppercase tracking-tighter italic text-white">V6 SNIPER</h1>
                        </div>
                        <input type="email" placeholder="Email" className="w-full bg-[#2b3139] border border-white/5 p-4 rounded-2xl mb-4 outline-none focus:border-yellow-500 text-sm" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input type="password" placeholder="Password" className="w-full bg-[#2b3139] border border-white/5 p-4 rounded-2xl mb-6 outline-none focus:border-yellow-500 text-sm" value={password} onChange={e => setPassword(e.target.value)} required />
                        <button type="submit" className="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase text-[11px] tracking-[0.2em] shadow-xl hover:bg-yellow-400 active:scale-95 transition-all">Access Terminal</button>
                    </form>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#0b0e11] text-[#eaecef] p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                            <div>
                                <div className="flex items-center gap-3">
                                    <div className="p-2.5 bg-yellow-500 rounded-xl"><Icon name="activity" className="text-black" /></div>
                                    <h1 className="text-2xl font-black italic tracking-tighter uppercase">V6 Sniper Premium</h1>
                                </div>
                                <p className="text-[10px] text-gray-500 font-bold mt-2 uppercase">{user.email}</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="flex gap-4 bg-[#1e2329] p-3.5 rounded-2xl border border-white/5 shadow-xl">
                                    <div className="px-4 border-r border-white/10">
                                        <p className="text-[9px] text-gray-500 font-black uppercase mb-1">Seed (USDT)</p>
                                        <input type="number" value={totalSeed} onChange={e => setTotalSeed(Number(e.target.value))} className="bg-transparent font-black text-yellow-500 outline-none w-20" />
                                    </div>
                                    <div className="px-4">
                                        <p className="text-[9px] text-gray-500 font-black uppercase mb-1">Bots</p>
                                        <input type="number" value={maxSymbols} onChange={e => setMaxSymbols(Number(e.target.value))} className="bg-transparent font-black text-yellow-500 outline-none w-10" />
                                    </div>
                                </div>
                                <button onClick={handleLogout} className="p-4 bg-[#1e2329] hover:bg-red-500/10 rounded-2xl text-gray-500 hover:text-red-500 border border-white/5 transition-all"><Icon name="log-out" /></button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <main className="lg:col-span-8 space-y-8">
                                <section className="bg-[#181a20] rounded-[2rem] border border-white/5 overflow-hidden shadow-2xl">
                                    <div className="p-7 border-b border-white/5 bg-white/[0.01] flex justify-between items-center">
                                        <h2 className="text-xs font-black text-gray-400 uppercase tracking-widest flex items-center gap-3"><Icon name="trending-up" className="text-yellow-500" /> Market Scanner</h2>
                                        {isLoading && <Icon name="refresh-cw" size={14} className="animate-spin text-yellow-500" />}
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="text-[9px] text-gray-500 font-black uppercase tracking-widest border-b border-white/5 bg-black/5">
                                                <tr><th className="px-8 py-5">Pair</th><th className="px-8 py-5 text-right">24h Change</th><th className="px-8 py-5">Target</th><th className="px-8 py-5 text-center">Action</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5">
                                                {marketData.map(coin => {
                                                    const price = parseFloat(coin.lastPrice);
                                                    const change = parseFloat(coin.priceChangePercent);
                                                    const isTrading = activeTrades.some(t => t.symbol === coin.symbol);
                                                    return (
                                                        <tr key={coin.symbol} className="hover:bg-white/[0.02] transition-colors">
                                                            <td className="px-8 py-7"><span className="text-base font-black text-white">{coin.symbol}</span></td>
                                                            <td className="px-8 py-7 text-right font-mono">
                                                                <div className={`font-black ${change > 0 ? 'text-[#0ecb81]' : 'text-[#f6465d]'}`}>+{change}%</div>
                                                                <div className="text-[10px] text-gray-500">${price}</div>
                                                            </td>
                                                            <td className="px-8 py-7"><span className="text-[10px] text-red-400 font-bold uppercase">Short @ ${(price*1.03).toFixed(4)}</span></td>
                                                            <td className="px-8 py-7 text-center">
                                                                {isTrading ? <div className="text-yellow-500 font-black text-[10px] tracking-widest animate-pulse">POSITION OPEN</div> :
                                                                <button onClick={() => startTrade(coin.symbol, price)} className="bg-white text-black px-6 py-2.5 rounded-xl text-[10px] font-black hover:bg-yellow-500 transition-all">SNIPE</button>}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </main>

                            <aside className="lg:col-span-4 space-y-6">
                                <h2 className="text-xs font-black text-gray-400 uppercase tracking-widest flex items-center gap-3 ml-2"><Icon name="shield" className="text-yellow-500" /> Active Operations</h2>
                                {activeTrades.length === 0 && <div className="p-16 text-center bg-[#181a20] rounded-[2.5rem] border border-dashed border-white/10 opacity-30 text-[10px] font-black uppercase">No active bots</div>}
                                {activeTrades.map(t => (
                                    <div key={t.id} className="bg-[#181a20] rounded-[2.5rem] border-l-4 border-yellow-500 p-8 shadow-2xl space-y-6 border border-white/5">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-xl font-black text-white italic">{t.symbol}</h3>
                                            <Icon name="activity" size={16} className="text-yellow-500 animate-pulse" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-4 rounded-2xl"><p className="text-[8px] text-gray-500 uppercase mb-1">Entry</p><p className="font-black text-sm text-red-400">${parseFloat(t.avg_price).toFixed(4)}</p></div>
                                            <div className="bg-white/5 p-4 rounded-2xl"><p className="text-[8px] text-gray-500 uppercase mb-1">Target</p><p className="font-black text-sm text-green-400">${(t.avg_price*0.98).toFixed(4)}</p></div>
                                        </div>
                                        <div className="pt-4 border-t border-white/5 flex justify-between items-center">
                                            <span className="text-[10px] text-yellow-500 font-black uppercase">V6 Strategy Active</span>
                                            <button className="text-gray-600 hover:text-red-500 transition-colors"><Icon name="stop-circle" /></button>
                                        </div>
                                    </div>
                                ))}
                            </aside>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
