
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Echo: Micro Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc; 
            font-family: 'Pretendard', sans-serif; 
            user-select: none;
            touch-action: manipulation;
        }
        canvas { display: block; background-color: #ffffff; }
        .control-btn {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.05s;
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active {
            transform: scale(0.95);
            background-color: #eff6ff;
            border-color: #3b82f6;
        }
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 20; 
        }
        .pointer-auto { pointer-events: auto; }
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer" class="flex flex-col justify-between p-5">
        <!-- Dashboard -->
        <div class="flex justify-between items-start gap-3">
            <div class="stat-card p-3 rounded-2xl shadow-sm min-w-[90px] text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase block tracking-tighter">Score</span>
                <span id="score-display" class="text-2xl font-black text-blue-600">0</span>
            </div>
            
            <div class="flex-1 pt-4">
                <div class="h-3 bg-slate-200 rounded-full overflow-hidden shadow-inner border border-white">
                    <div id="energy-bar" class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 w-full transition-all duration-75"></div>
                </div>
                <div class="flex justify-between mt-1 px-1">
                    <span class="text-[8px] text-slate-400 font-bold uppercase">Energy</span>
                    <span id="time-display" class="text-[8px] text-blue-500 font-bold tracking-widest">0.0s</span>
                </div>
            </div>

            <div class="stat-card p-3 rounded-2xl shadow-sm min-w-[90px] text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase block tracking-tighter">Best</span>
                <span id="best-display" class="text-2xl font-black text-slate-700">0</span>
            </div>
        </div>

        <!-- Start/Gameover Overlay -->
        <div id="overlay" class="m-auto pointer-auto bg-white/95 p-8 rounded-[2.5rem] text-center max-w-xs shadow-2xl border border-slate-100">
            <div id="start-screen">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-slate-800 mb-2">Micro Echo</h1>
                <p class="text-slate-500 text-xs mb-6 leading-relaxed">버튼을 짧게 눌러 세밀하게 이동하세요.<br>오래 버틸수록 점수가 올라갑니다.</p>
                <button onclick="startGame()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95">탐사 시작</button>
            </div>

            <div id="gameover-screen" class="hidden">
                <h2 class="text-xl font-black text-slate-800 mb-1">탐사 종료</h2>
                <p id="final-score" class="text-blue-600 font-black text-4xl mb-4">0</p>
                <p id="death-reason" class="text-slate-500 text-[10px] mb-6 uppercase tracking-widest">Energy Depleted</p>
                <button onclick="resetGame()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold mb-2">다시 도전</button>
                <button onclick="offerRevive()" class="w-full py-3 bg-white border border-slate-200 text-slate-700 rounded-2xl font-bold text-sm">광고 보고 이어하기 (5회 제한)</button>
            </div>
        </div>

        <!-- Micro Controller (D-Pad) -->
        <div class="flex flex-col items-center gap-2 mb-4">
            <div class="grid grid-cols-3 gap-3 pointer-auto bg-slate-100/50 p-3 rounded-[2rem]">
                <div></div>
                <button class="control-btn h-14 w-14" id="btn-up">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                </button>
                <div></div>
                <button class="control-btn h-14 w-14" id="btn-left">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button class="control-btn h-14 w-14" id="btn-down">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <button class="control-btn h-14 w-14" id="btn-right">
                    <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisp = document.getElementById('score-display');
        const bestDisp = document.getElementById('best-display');
        const energyBar = document.getElementById('energy-bar');
        const timeDisp = document.getElementById('time-display');

        let state = 'START', score = 0, bestScore = 0, frameCount = 0;
        let player = { x: 50, y: 50, r: 10 };
        let core = { x: 0, y: 0, r: 8 };
        let energy = 100;
        let history = [], echoes = []; 
        let lastEchoSpawn = 0;
        let echoInterval = 240; 
        
        // Input Handling
        const keys = { up: false, down: false, left: false, right: false };
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            btn.addEventListener('mousedown', start);
            btn.addEventListener('touchstart', start);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        };
        setupBtn('btn-up', 'up'); setupBtn('btn-down', 'down');
        setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnCore() {
            core.x = 15 + Math.random() * 70;
            core.y = 15 + Math.random() * 70;
        }

        function startGame() {
            state = 'PLAYING';
            score = 0; frameCount = 0; lastEchoSpawn = 0; energy = 100;
            player = { x: 50, y: 50, r: 10 };
            history = []; echoes = [];
            spawnCore();
            document.getElementById('overlay').classList.add('hidden');
            requestAnimationFrame(update);
        }

        function update() {
            if (state !== 'PLAYING') return;

            frameCount++;
            
            // 1. 점진적 이동 (Micro Movement)
            const speed = 0.5; // 매우 세밀한 이동 단위
            if (keys.up) player.y -= speed;
            if (keys.down) player.y += speed;
            if (keys.left) player.x -= speed;
            if (keys.right) player.x += speed;

            player.x = Math.max(5, Math.min(95, player.x));
            player.y = Math.max(5, Math.min(95, player.y));

            // 2. 점수 및 에너지
            score += 0.05;
            scoreDisp.innerText = Math.floor(score);
            timeDisp.innerText = (frameCount / 60).toFixed(1) + 's';
            
            energy -= (0.07 + (score * 0.0005));
            energyBar.style.width = energy + '%';

            if (energy <= 0) return endGame("Energy Depleted");

            // Core Collision
            const dCore = Math.sqrt((player.x - core.x)**2 + (player.y - core.y)**2);
            if (dCore < 8) {
                score += 30;
                energy = Math.min(100, energy + 40);
                spawnCore();
            }

            history.push({ x: player.x, y: player.y });

            // 3. 잔상 생성
            if (frameCount - lastEchoSpawn > echoInterval) {
                echoes.push({ path: [...history], offset: frameCount });
                lastEchoSpawn = frameCount;
                echoInterval = Math.max(120, 240 - Math.floor(score / 100) * 10);
            }

            // 4. 충돌 체크
            for (let i = 0; i < echoes.length; i++) {
                const echo = echoes[i];
                const relIdx = frameCount - echo.offset;
                const pos = echo.path[relIdx] || echo.path[echo.path.length - 1];
                const dist = Math.sqrt((player.x - pos.x)**2 + (player.y - pos.y)**2);
                if (dist < 5) return endGame("Echo Collision");
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;

            // Background
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 1;
            for(let i=0; i<=20; i++) {
                ctx.beginPath(); ctx.moveTo(i*(w/20), 0); ctx.lineTo(i*(w/20), h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*(h/20)); ctx.lineTo(w, i*(h/20)); ctx.stroke();
            }

            // Core
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(core.x*w/100, core.y*h/100, core.r, 0, Math.PI*2); ctx.fill();

            // Echoes
            echoes.forEach((echo, i) => {
                const relIdx = frameCount - echo.offset;
                const pos = echo.path[relIdx] || echo.path[echo.path.length - 1];
                ctx.fillStyle = `rgba(249, 115, 22, ${0.1 + (i/echoes.length)*0.3})`;
                ctx.beginPath(); ctx.arc(pos.x*w/100, pos.y*h/100, 7, 0, Math.PI*2); ctx.fill();
            });

            // Player
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath(); ctx.arc(player.x*w/100, player.y*h/100, player.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
        }

        function endGame(reason) {
            state = 'GAMEOVER';
            const final = Math.floor(score);
            if (final > bestScore) {
                bestScore = final;
                bestDisp.innerText = bestScore;
            }
            document.getElementById('final-score').innerText = final;
            document.getElementById('death-reason').innerText = reason;
            document.getElementById('gameover-screen').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function resetGame() {
            state = 'START';
            document.getElementById('gameover-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            draw();
        }

        function offerRevive() {
            // 이 기능은 나중에 AdMob 등과 연동
            alert("광고 시스템 연동 예정 (5회 제한)");
        }
    </script>
</body>
</html>
