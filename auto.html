
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Echo: Micro Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #f8fafc; 
            font-family: 'Pretendard', sans-serif; 
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; background-color: #ffffff; }
        .control-btn {
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.05s, background-color 0.1s;
            pointer-events: auto;
        }
        .control-btn:active { transform: scale(0.9); background-color: #eff6ff; border-color: #3b82f6; }
        #ui-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 20; 
        }
        .pointer-auto { pointer-events: auto; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer" class="flex flex-col justify-between p-5">
        <!-- 상단 스코어보드 -->
        <div class="flex justify-between items-start gap-3">
            <div class="bg-white/95 p-3 rounded-2xl shadow-md min-w-[90px] text-center border border-slate-200">
                <span class="text-[10px] font-bold text-slate-400 uppercase block tracking-tighter">Score</span>
                <span id="score-display" class="text-2xl font-black text-blue-600">0</span>
            </div>
            <div class="flex-1 pt-4">
                <div class="h-3 bg-slate-100 rounded-full overflow-hidden border border-white shadow-inner">
                    <div id="energy-bar" class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 w-full transition-all duration-75"></div>
                </div>
                <div class="flex justify-center mt-1">
                    <span id="time-display" class="text-[10px] text-blue-500 font-black tracking-widest">0.0s</span>
                </div>
            </div>
            <div class="bg-white/95 p-3 rounded-2xl shadow-md min-w-[90px] text-center border border-slate-200">
                <span class="text-[10px] font-bold text-slate-400 uppercase block tracking-tighter">Best</span>
                <span id="best-display" class="text-2xl font-black text-slate-700">0</span>
            </div>
        </div>

        <!-- 오버레이 화면 -->
        <div id="overlay" class="m-auto pointer-auto bg-white/98 p-8 rounded-[2.5rem] text-center max-w-xs shadow-2xl border border-slate-100">
            <div id="start-screen">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <h1 class="text-2xl font-black text-slate-800 mb-2">Micro Hunter</h1>
                <p class="text-slate-500 text-xs mb-6 leading-relaxed">에너지가 소진되기 전에<br>그리드를 따라 정밀하게 이동하세요.</p>
                <button id="btn-start" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-transform">탐사 시작</button>
            </div>
            <div id="gameover-screen" class="hidden">
                <h2 class="text-xl font-black text-slate-800 mb-1">기록 종료</h2>
                <p id="final-score" class="text-blue-600 font-black text-4xl mb-4">0</p>
                <button id="btn-reset" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold mb-3 active:scale-95 transition-transform">다시 도전</button>
                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-1">Business Logic</p>
                    <p class="text-[11px] text-slate-600">광고 시청 시 1회 이어하기 가능</p>
                </div>
            </div>
        </div>

        <!-- 정밀 방향키 -->
        <div class="grid grid-cols-3 gap-3 w-48 mx-auto pointer-auto mb-8 bg-slate-50/50 p-4 rounded-[2.5rem] border border-slate-100">
            <div></div>
            <div class="control-btn h-14 w-14" id="move-up"><svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div></div>
            <div class="control-btn h-14 w-14" id="move-left"><svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="control-btn h-14 w-14" id="move-down"><svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            <div class="control-btn h-14 w-14" id="move-right"><svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let state = 'START', score = 0, bestScore = 0, frameCount = 0, energy = 100;
        let player = { x: 50, y: 50, r: 9 }, core = { x: 0, y: 0, r: 7 };
        let history = [], echoes = [], lastEchoSpawn = 0;
        const keys = { up: false, down: false, left: false, right: false };

        const bindKey = (id, key) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); keys[key] = true; };
            const end = (e) => { e.preventDefault(); keys[key] = false; };
            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', start);
            window.addEventListener('mouseup', end);
        };
        bindKey('move-up', 'up'); bindKey('move-down', 'down');
        bindKey('move-left', 'left'); bindKey('move-right', 'right');

        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-reset').addEventListener('click', resetGame);

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnCore() {
            core.x = 10 + Math.random() * 80;
            core.y = 10 + Math.random() * 80;
        }

        function startGame() {
            state = 'PLAYING';
            score = 0; frameCount = 0; lastEchoSpawn = 0; energy = 100;
            history = []; echoes = []; player = { x: 50, y: 50, r: 9 };
            spawnCore();
            document.getElementById('overlay').classList.add('hidden');
            requestAnimationFrame(update);
        }

        function update() {
            if (state !== 'PLAYING') return;

            frameCount++;
            const speed = 0.55; // 정밀 조작 속도
            if (keys.up) player.y -= speed;
            if (keys.down) player.y += speed;
            if (keys.left) player.x -= speed;
            if (keys.right) player.x += speed;

            player.x = Math.max(4, Math.min(96, player.x));
            player.y = Math.max(4, Math.min(96, player.y));

            score += 0.05;
            document.getElementById('score-display').innerText = Math.floor(score);
            document.getElementById('time-display').innerText = (frameCount / 60).toFixed(1) + 's';
            
            energy -= (0.075 + (score * 0.0004));
            document.getElementById('energy-bar').style.width = energy + '%';

            if (energy <= 0) return endGame("Energy Depleted");

            if (Math.sqrt((player.x - core.x)**2 + (player.y - core.y)**2) < 9) {
                score += 50; energy = Math.min(100, energy + 35); spawnCore();
            }

            history.push({ x: player.x, y: player.y });

            if (frameCount - lastEchoSpawn > 240) {
                echoes.push({ path: [...history], offset: frameCount });
                lastEchoSpawn = frameCount;
            }

            for (let echo of echoes) {
                const pos = echo.path[frameCount - echo.offset] || echo.path[echo.path.length-1];
                if (Math.sqrt((player.x - pos.x)**2 + (player.y - pos.y)**2) < 5) return endGame("Echo Paradox");
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;

            // 마이크로 그리드 (25단위로 더 촘촘하게 수정)
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.5;
            const gridCount = 25; 
            for(let i=0; i<=gridCount; i++) {
                // 세로선
                ctx.beginPath(); 
                ctx.moveTo(i*(w/gridCount), 0); 
                ctx.lineTo(i*(w/gridCount), h); 
                ctx.stroke();
                // 가로선
                ctx.beginPath(); 
                ctx.moveTo(0, i*(h/gridCount)); 
                ctx.lineTo(w, i*(h/gridCount)); 
                ctx.stroke();
            }

            // 코어
            ctx.fillStyle = '#fbbf24';
            ctx.shadowBlur = 10; ctx.shadowColor = '#fbbf24';
            ctx.beginPath(); ctx.arc(core.x*w/100, core.y*h/100, core.r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // 잔상
            echoes.forEach((e, i) => {
                const pos = e.path[frameCount - e.offset] || e.path[e.path.length-1];
                ctx.fillStyle = `rgba(249, 115, 22, ${0.1 + (i/echoes.length)*0.3})`;
                ctx.beginPath(); ctx.arc(pos.x*w/100, pos.y*h/100, 7, 0, Math.PI*2); ctx.fill();
            });

            // 플레이어
            ctx.fillStyle = '#3b82f6';
            ctx.shadowBlur = 8; ctx.shadowColor = '#3b82f6';
            ctx.beginPath(); ctx.arc(player.x*w/100, player.y*h/100, player.r, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function endGame(reason) {
            state = 'GAMEOVER';
            const final = Math.floor(score);
            if (final > bestScore) { bestScore = final; document.getElementById('best-display').innerText = bestScore; }
            document.getElementById('final-score').innerText = final;
            document.getElementById('gameover-screen').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('gameover-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            startGame();
        }
    </script>
</body>
</html>
