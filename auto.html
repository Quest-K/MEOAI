
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Echo: 4D Motion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .retro-text {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .btn-active {
            pointer-events: auto;
            transition: transform 0.1s;
        }
        .btn-active:active {
            transform: scale(0.95);
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .danger-blink {
            animation: pulse-red 0.5s infinite;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer" class="flex flex-col items-center justify-between p-6">
        <!-- 상단 점수판 -->
        <div class="w-full flex justify-between items-start text-white">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-cyan-400 tracking-widest uppercase">Level</span>
                <span id="level-display" class="text-3xl font-black italic">1</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold text-yellow-400 tracking-widest uppercase">Time Remaining</span>
                <span id="timer-display" class="text-3xl font-black italic">10.0</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] font-bold text-green-400 tracking-widest uppercase">Score</span>
                <span id="score-display" class="text-3xl font-black italic">0</span>
            </div>
        </div>

        <!-- 중앙 메시지 오버레이 -->
        <div id="overlay" class="pointer-events-auto bg-black/90 backdrop-blur-md border border-white/10 p-8 rounded-3xl text-center max-w-sm shadow-2xl">
            <div id="start-screen">
                <div class="w-16 h-16 bg-cyan-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-white mb-2 tracking-tighter">TIME ECHO 4D</h1>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">
                    기기를 기울여 움직이세요.<br>
                    과거의 당신(빨간색)과 부딪히면 안 됩니다!
                </p>
                <button onclick="requestSensorPermission()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-2xl font-bold transition-all shadow-lg shadow-cyan-900/20">
                    센서 활성화 및 시작
                </button>
                <p class="text-[10px] text-gray-600 mt-4">PC 사용자는 WASD나 방향키로 즉시 시작 가능</p>
            </div>

            <div id="gameover-screen" class="hidden">
                <h2 class="text-4xl font-black text-red-500 mb-2 italic">FAILED</h2>
                <p class="text-gray-400 text-sm mb-6 uppercase tracking-widest font-bold">Time Paradox Detected</p>
                <div class="bg-white/5 py-4 rounded-xl mb-6">
                    <div class="text-gray-500 text-xs uppercase">Final Score</div>
                    <div id="final-score" class="text-4xl font-black text-white">0</div>
                </div>
                <button onclick="resetGame()" class="w-full py-4 bg-white text-black hover:bg-gray-200 rounded-2xl font-bold transition-all">
                    다시 시도
                </button>
            </div>
        </div>

        <!-- 하단 가이드 -->
        <div class="w-full flex justify-center gap-6 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
            <div class="flex items-center gap-2"><div class="w-2 h-2 bg-cyan-400 rounded-full shadow-lg shadow-cyan-500/50"></div> Present</div>
            <div class="flex items-center gap-2"><div class="w-2 h-2 bg-red-500 rounded-full shadow-lg shadow-red-500/50"></div> Past Echo</div>
            <div class="flex items-center gap-2"><div class="w-2 h-2 bg-yellow-400 rounded-full shadow-lg shadow-yellow-500/50"></div> Portal</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let level = 1;
        let timer = 10;
        
        let player = { x: 10, y: 50, radius: 8 };
        let vel = { x: 0, y: 0 };
        let goal = { x: 80, y: 50, radius: 12 };
        let history = [];
        let echoes = [];
        
        // 캔버스 크기 조정
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 센서 요청 및 게임 시작
        async function requestSensorPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            startGame();
        }

        function handleOrientation(e) {
            if (gameState !== 'PLAYING') return;
            // 가속도 조절 (기기 기울기)
            const sens = 0.04;
            vel.x = e.gamma * sens;
            vel.y = e.beta * sens;
        }

        // 키보드 조작 (PC)
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (gameState === 'START') startGame();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame() {
            gameState = 'PLAYING';
            overlay.classList.add('hidden');
            initLevel(1);
            gameLoop();
        }

        function initLevel(nextLevel) {
            player.x = 10;
            player.y = 50;
            vel = { x: 0, y: 0 };
            goal = { 
                x: 20 + Math.random() * 70, 
                y: 10 + Math.random() * 80 
            };
            timer = 10;
            if (nextLevel === 1) {
                echoes = [];
                score = 0;
            } else {
                echoes.push([...history]);
            }
            history = [];
            level = nextLevel;
            updateUI();
        }

        function updateUI() {
            document.getElementById('level-display').innerText = level;
            document.getElementById('score-display').innerText = score;
            document.getElementById('timer-display').innerText = timer.toFixed(1);
        }

        function resetGame() {
            gameState = 'START';
            gameoverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            overlay.classList.remove('hidden');
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            // 키보드 입력 반영
            const kSpeed = 0.8;
            if (keys['w'] || keys['arrowup']) vel.y = -kSpeed;
            if (keys['s'] || keys['arrowdown']) vel.y = kSpeed;
            if (keys['a'] || keys['arrowleft']) vel.x = -kSpeed;
            if (keys['d'] || keys['arrowright']) vel.x = kSpeed;

            // 마찰력 (조금 더 부드러운 움직임)
            if (!window.DeviceOrientationEvent || Math.abs(vel.x) < 0.1) vel.x *= 0.95;
            if (!window.DeviceOrientationEvent || Math.abs(vel.y) < 0.1) vel.y *= 0.95;

            player.x += vel.x;
            player.y += vel.y;

            // 경계선 처리
            player.x = Math.max(2, Math.min(98, player.x));
            player.y = Math.max(2, Math.min(98, player.y));

            // 데이터 기록
            history.push({ x: player.x, y: player.y });

            // 타이머 업데이트
            timer -= 1/60;
            if (timer <= 0) endGame();

            // 충돌 감지
            const currIdx = history.length - 1;
            echoes.forEach(path => {
                if (path[currIdx]) {
                    const dx = player.x - path[currIdx].x;
                    const dy = player.y - path[currIdx].y;
                    if (Math.sqrt(dx*dx + dy*dy) < 3.5) endGame();
                }
            });

            // 목표 도달
            const gdx = player.x - goal.x;
            const gdy = player.y - goal.y;
            if (Math.sqrt(gdx*gdx + gdy*gdy) < 5) {
                score += Math.floor(100 + timer * 20);
                initLevel(level + 1);
            }

            draw();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const w = canvas.width;
            const h = canvas.height;

            // 그리드
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<w; i+=w/10) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }
            for(let i=0; i<h; i+=h/10) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
            }

            // 목표
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#f9d423';
            ctx.fillStyle = '#f9d423';
            ctx.beginPath();
            ctx.arc(goal.x * w / 100, goal.y * h / 100, 15, 0, Math.PI*2);
            ctx.fill();

            // 잔상 (Echoes)
            const currIdx = history.length - 1;
            echoes.forEach((path, idx) => {
                const pos = path[currIdx] || path[path.length - 1];
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff4b4b';
                ctx.fillStyle = `rgba(255, 75, 75, ${0.4 + (idx * 0.1)})`;
                ctx.beginPath();
                ctx.arc(pos.x * w / 100, pos.y * h / 100, 10, 0, Math.PI*2);
                ctx.fill();
            });

            // 플레이어
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#4deeea';
            ctx.fillStyle = '#4deeea';
            ctx.beginPath();
            ctx.arc(player.x * w / 100, player.y * h / 100, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function endGame() {
            gameState = 'GAMEOVER';
            document.getElementById('final-score').innerText = score;
            startScreen.classList.add('hidden');
            gameoverScreen.classList.remove('hidden');
            overlay.classList.remove('hidden');
        }
    </script>
</body>
</html>
