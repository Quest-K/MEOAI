<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Micro Hunter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap');

  :root {
    --blue: #2563eb;
    --blue-light: #3b82f6;
    --cyan: #06b6d4;
    --amber: #f59e0b;
    --orange: #f97316;
    --red: #ef4444;
    --green: #10b981;
    --bg: #f0f4ff;
    --surface: #ffffff;
    --border: #dde4f5;
    --text: #1e293b;
    --muted: #64748b;
    --grid: #dde4f5;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    user-select: none;
    touch-action: none;
    width: 100dvw;
    height: 100dvh;
  }

  canvas { display: block; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0;
    width: 100%; padding: 14px 16px 0;
    display: flex; align-items: flex-start; gap: 10px;
    pointer-events: none; z-index: 30;
  }

  .hud-card {
    background: rgba(255,255,255,0.92);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 8px 14px;
    backdrop-filter: blur(12px);
    box-shadow: 0 2px 12px rgba(37,99,235,0.08);
    min-width: 72px; text-align: center;
  }
  .hud-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    display: block; margin-bottom: 2px;
  }
  .hud-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--blue); line-height: 1;
  }
  .hud-value.slate { color: var(--text); }
  .hud-value.combo { color: var(--amber); font-size: 18px; }

  .energy-wrapper {
    flex: 1; padding-top: 6px;
  }
  .energy-track {
    height: 8px; background: var(--border);
    border-radius: 99px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
  }
  .energy-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    transition: width 0.08s linear, background 0.3s;
    position: relative;
  }
  .energy-fill.warn { background: linear-gradient(90deg, var(--orange), var(--red)); }
  .energy-fill::after {
    content: '';
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 8px;
    background: rgba(255,255,255,0.5);
    border-radius: 99px;
  }
  .energy-info {
    display: flex; justify-content: space-between;
    margin-top: 4px;
  }
  .energy-pct {
    font-family: 'Space Mono', monospace;
    font-size: 9px; color: var(--blue); font-weight: 700;
  }
  .energy-pct.warn { color: var(--red); }
  .time-display {
    font-family: 'Space Mono', monospace;
    font-size: 9px; color: var(--muted);
  }

  /* ── Toast ── */
  #toast {
    position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(30,41,59,0.9); color: #fff;
    padding: 7px 18px; border-radius: 99px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; white-space: nowrap;
    pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.2s;
  }
  #toast.show { opacity: 1; }

  /* ── Joystick ── */
  #joystick-wrap {
    position: fixed;
    bottom: max(32px, env(safe-area-inset-bottom, 32px));
    left: 50%;
    transform: translateX(-50%);
    pointer-events: auto;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #joystick-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    color: rgba(100,116,139,0.35);
    text-transform: uppercase;
  }
  #joystick-base {
    width: 140px; height: 140px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid rgba(37,99,235,0.12);
    position: relative;
    cursor: pointer;
    touch-action: none;
    transition: border-color 0.2s;
  }
  #joystick-base.active {
    border-color: rgba(37,99,235,0.28);
  }
  /* Outer ring only — no fill */
  #joystick-base::before {
    content: '';
    position: absolute; inset: 18px;
    border-radius: 50%;
    border: 1px dashed rgba(37,99,235,0.10);
  }
  #joystick-base::after { content: none; }

  #joystick-knob {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(37,99,235,0.13);
    border: 1.5px solid rgba(37,99,235,0.25);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: background 0.15s, border-color 0.15s;
    pointer-events: none;
    backdrop-filter: blur(2px);
  }
  #joystick-knob.active {
    background: rgba(37,99,235,0.22);
    border-color: rgba(37,99,235,0.45);
  }

  /* Direction arrow hints */
  .js-arrow {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    width: 18px; height: 18px;
    opacity: 0.18;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .js-arrow.lit { opacity: 0.6; }
  .js-arrow svg { color: var(--blue); }
  .js-arrow.top    { top: 6px;    left: 50%; transform: translateX(-50%); }
  .js-arrow.bottom { bottom: 6px; left: 50%; transform: translateX(-50%); }
  .js-arrow.left-a  { left: 6px;   top: 50%;  transform: translateY(-50%); }
  .js-arrow.right-a { right: 6px;  top: 50%;  transform: translateY(-50%); }

  /* ── Overlay ── */
  #overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 40; padding: 24px;
    background: rgba(240,244,255,0.6);
    backdrop-filter: blur(6px);
  }
  #overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 32px;
    padding: 36px 28px;
    width: 100%; max-width: 320px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(37,99,235,0.12), 0 4px 16px rgba(0,0,0,0.06);
    animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes modalIn {
    from { transform: scale(0.85) translateY(20px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal-icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  .modal-icon.blue { background: #eff6ff; }
  .modal-icon.red  { background: #fef2f2; }

  .modal h1 {
    font-size: 24px; font-weight: 900;
    color: var(--text); letter-spacing: -0.5px; margin-bottom: 8px;
  }
  .modal p {
    font-size: 13px; color: var(--muted);
    line-height: 1.6; margin-bottom: 24px;
  }

  .btn {
    display: block; width: 100%;
    padding: 16px; border-radius: 18px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
    letter-spacing: 0.02em; cursor: pointer; border: none;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn:active { transform: scale(0.95); }
  .btn-primary {
    background: var(--blue); color: #fff;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
  }
  .btn-primary:active { box-shadow: 0 2px 8px rgba(37,99,235,0.25); }
  .btn-dark {
    background: var(--text); color: #fff;
    box-shadow: 0 4px 12px rgba(30,41,59,0.2);
    margin-bottom: 10px;
  }

  .score-big {
    font-family: 'Space Mono', monospace;
    font-size: 52px; font-weight: 700;
    color: var(--blue); line-height: 1; margin-bottom: 6px;
    letter-spacing: -2px;
  }
  .score-label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 20px; display: block;
  }

  .stats-row {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .stat-chip {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 8px;
  }
  .stat-chip-label {
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    display: block; margin-bottom: 3px;
    font-family: 'Space Mono', monospace;
  }
  .stat-chip-value {
    font-family: 'Space Mono', monospace;
    font-size: 16px; font-weight: 700; color: var(--text);
  }

  .tip-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px;
    text-align: left; margin-top: 12px;
  }
  .tip-box p { font-size: 11px; color: var(--muted); margin: 0; line-height: 1.5; }
  .tip-box strong { color: var(--text); font-weight: 700; }

  /* ── Keyboard hint ── */
  #kb-hint {
    position: fixed; bottom: 8px; right: 14px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--muted); pointer-events: none; z-index: 25;
    opacity: 0.5; display: none;
  }

  /* ── Particle canvas overlay ── */
  #particle-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 10;
  }

  /* Ripple effect */
  @keyframes ripple {
    from { transform: scale(0); opacity: 0.6; }
    to   { transform: scale(2.5); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-card">
    <span class="hud-label">Score</span>
    <span id="score-display" class="hud-value">0</span>
  </div>
  <div class="energy-wrapper">
    <div class="energy-track">
      <div class="energy-fill" id="energy-fill"></div>
    </div>
    <div class="energy-info">
      <span class="energy-pct" id="energy-pct">100%</span>
      <span class="time-display" id="time-display">0.0s</span>
    </div>
  </div>
  <div class="hud-card">
    <span class="hud-label">Best</span>
    <span id="best-display" class="hud-value slate">0</span>
  </div>
  <div class="hud-card" id="combo-card" style="display:none;">
    <span class="hud-label">Combo</span>
    <span id="combo-display" class="hud-value combo">×1</span>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Joystick -->
<div id="joystick-wrap">
  <div id="joystick-base">
    <!-- Direction arrows -->
    <div class="js-arrow top" id="js-up">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="js-arrow bottom" id="js-down">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="js-arrow left-a" id="js-left">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="js-arrow right-a" id="js-right">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <!-- Knob -->
    <div id="joystick-knob"></div>
  </div>
  <div id="joystick-label">drag to move</div>
</div>

<!-- Keyboard hint -->
<div id="kb-hint">WASD / ↑↓←→</div>

<!-- Overlay -->
<div id="overlay">
  <!-- Start Screen -->
  <div class="modal" id="start-screen">
    <div class="modal-icon blue">⚡</div>
    <h1>Micro Hunter</h1>
    <p>그리드 위에서 에너지 코어를 수집하세요.<br>과거의 잔상과 충돌하면 게임 오버.</p>
    <div class="tip-box" style="margin-bottom:20px;">
      <p><strong>💡 팁</strong> — 코어를 연속 수집할수록 콤보 보너스! 에너지가 30% 이하면 긴급 모드 돌입.</p>
    </div>
    <button class="btn btn-primary" id="btn-start">탐사 시작</button>
  </div>

  <!-- Game Over Screen -->
  <div class="modal hidden" id="gameover-screen">
    <div class="modal-icon red">💥</div>
    <div class="score-big" id="final-score">0</div>
    <span class="score-label" id="gameover-reason">에너지 소진</span>
    <div class="stats-row">
      <div class="stat-chip">
        <span class="stat-chip-label">생존 시간</span>
        <span class="stat-chip-value" id="stat-time">0s</span>
      </div>
      <div class="stat-chip">
        <span class="stat-chip-label">수집 코어</span>
        <span class="stat-chip-value" id="stat-cores">0</span>
      </div>
      <div class="stat-chip">
        <span class="stat-chip-label">최대 콤보</span>
        <span class="stat-chip-value" id="stat-combo">0×</span>
      </div>
    </div>
    <button class="btn btn-dark" id="btn-reset">다시 도전</button>
    <button class="btn btn-primary" id="btn-share">결과 공유</button>
  </div>
</div>

<script>
// ─── Canvas Setup ────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pc = document.getElementById('particle-canvas');
const pctx = pc.getContext('2d');

function resize() {
  canvas.width = pc.width = window.innerWidth;
  canvas.height = pc.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── State ───────────────────────────────────────────────────
let state = 'START';
let score = 0, bestScore = 0, frameCount = 0;
let energy = 100, energyMax = 100;
let combo = 1, maxCombo = 1, coresCollected = 0;
let player, core, echoes, history, lastEchoSpawn;
let particles = [];
let toastTimer = null;
let joystick = { dx: 0, dy: 0, active: false };
let isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

// ─── UX helpers ──────────────────────────────────────────────
function showToast(msg, duration = 1500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ─── Joystick ────────────────────────────────────────────────
(function setupJoystick() {
  const base   = document.getElementById('joystick-base');
  const knob   = document.getElementById('joystick-knob');
  const arrows = {
    up:    document.getElementById('js-up'),
    down:  document.getElementById('js-down'),
    left:  document.getElementById('js-left'),
    right: document.getElementById('js-right'),
  };

  const RADIUS = 44; // max knob travel from center (px)
  let baseRect, pointerId = null;

  function getCenter() {
    baseRect = base.getBoundingClientRect();
    return {
      cx: baseRect.left + baseRect.width / 2,
      cy: baseRect.top  + baseRect.height / 2
    };
  }

  function updateKnob(clientX, clientY) {
    const { cx, cy } = getCenter();
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.hypot(dx, dy);
    if (dist > RADIUS) { dx = dx / dist * RADIUS; dy = dy / dist * RADIUS; }

    // Normalize to -1..1
    joystick.dx = dx / RADIUS;
    joystick.dy = dy / RADIUS;
    joystick.active = true;

    // Move knob visually
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    knob.classList.add('active');
    base.classList.add('active');

    // Light up arrows
    const threshold = 0.35;
    arrows.up.classList.toggle('lit',    joystick.dy < -threshold);
    arrows.down.classList.toggle('lit',  joystick.dy >  threshold);
    arrows.left.classList.toggle('lit',  joystick.dx < -threshold);
    arrows.right.classList.toggle('lit', joystick.dx >  threshold);
  }

  function resetKnob() {
    joystick.dx = 0; joystick.dy = 0; joystick.active = false;
    pointerId = null;
    knob.style.transform = 'translate(-50%, -50%)';
    knob.classList.remove('active');
    base.classList.remove('active');
    Object.values(arrows).forEach(a => a.classList.remove('lit'));
  }

  // Touch
  base.addEventListener('touchstart', e => {
    e.preventDefault();
    if (pointerId !== null) return;
    const t = e.changedTouches[0];
    pointerId = t.identifier;
    updateKnob(t.clientX, t.clientY);
  }, { passive: false });

  base.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === pointerId) { updateKnob(t.clientX, t.clientY); break; }
    }
  }, { passive: false });

  base.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === pointerId) { resetKnob(); break; }
    }
  }, { passive: false });

  base.addEventListener('touchcancel', resetKnob, { passive: false });

  // Mouse (for desktop testing)
  base.addEventListener('mousedown', e => {
    e.preventDefault(); pointerId = 'mouse';
    updateKnob(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', e => {
    if (pointerId !== 'mouse') return;
    updateKnob(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => {
    if (pointerId === 'mouse') resetKnob();
  });
})();

// ─── Keyboard support (still works) ─────────────────────────
const _keys = { up: false, down: false, left: false, right: false };
const keyDirMap = {
  'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
  'w':'up','s':'down','a':'left','d':'right',
  'W':'up','S':'down','A':'left','D':'right'
};
window.addEventListener('keydown', e => {
  const dir = keyDirMap[e.key];
  if (dir) { _keys[dir] = true; e.preventDefault(); }
  if (!isMobile) document.getElementById('kb-hint').style.display = 'block';
});
window.addEventListener('keyup', e => {
  const dir = keyDirMap[e.key]; if (dir) _keys[dir] = false;
});

// ─── Buttons ─────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('gameover-screen').classList.add('hidden');
  startGame();
});
document.getElementById('btn-share').addEventListener('click', () => {
  const text = `🎮 Micro Hunter: ${Math.floor(score)}점 달성!\n생존시간: ${(frameCount/60).toFixed(1)}s | 코어: ${coresCollected}개 | 최대콤보: ${maxCombo}×`;
  if (navigator.share) {
    navigator.share({ title: 'Micro Hunter', text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 클립보드에 복사됨!'));
  }
});

// ─── Particles ───────────────────────────────────────────────
function spawnParticles(wx, wy, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x: wx, y: wy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 3 + Math.random() * 4,
      color, alpha: 1, life: 1
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= 0.04;
    p.alpha = p.life;
    p.r *= 0.98;
  });
}

function drawParticles() {
  pctx.clearRect(0, 0, pc.width, pc.height);
  particles.forEach(p => {
    pctx.save();
    pctx.globalAlpha = Math.max(0, p.alpha);
    pctx.fillStyle = p.color;
    pctx.beginPath();
    pctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
    pctx.fill();
    pctx.restore();
  });
}

// ─── Core spawning ───────────────────────────────────────────
function spawnCore() {
  // 플레이어에서 최소 거리 이상 떨어진 위치에 스폰
  let attempts = 0;
  do {
    core.x = 2 + Math.random() * 96;
    core.y = 2 + Math.random() * 96;
    attempts++;
  } while (
    Math.hypot(player.x - core.x, player.y - core.y) < 20 && attempts < 20
  );

  core.pulse = 0;
  core.type = Math.random() < 0.2 ? 'bonus' : 'normal'; // 20% chance bonus core
}

// ─── Game Init ───────────────────────────────────────────────
function startGame() {
  state = 'PLAYING';
  score = 0; frameCount = 0; lastEchoSpawn = 0;
  energy = 100; combo = 1; maxCombo = 1; coresCollected = 0;
  history = []; echoes = []; particles = [];
  player = { x: 50, y: 50, r: 9, trail: [] };
  core = { x: 0, y: 0, r: 7, pulse: 0, type: 'normal' };
  spawnCore();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('combo-card').style.display = 'none';
  updateHUD();
  requestAnimationFrame(loop);
}

// ─── Main Loop ───────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  if (state !== 'PLAYING') return;

  const dt = Math.min((ts - lastTime) / (1000/60), 3); // cap at 3x frame delta
  lastTime = ts;

  update(dt);
  draw();
  drawParticles();

  requestAnimationFrame(loop);
}

function update(dt) {
  frameCount++;

  // ── Movement — joystick analog + keyboard fallback ──
  const SPEED = 0.7;
  let dx = joystick.dx;
  let dy = joystick.dy;

  // Keyboard overlay (merges with joystick)
  if (_keys.up)    dy -= 1;
  if (_keys.down)  dy += 1;
  if (_keys.left)  dx -= 1;
  if (_keys.right) dx += 1;

  // Normalize if over magnitude 1 (e.g. keyboard diagonal)
  const mag = Math.hypot(dx, dy);
  if (mag > 1) { dx /= mag; dy /= mag; }

  // Apply deadzone for joystick
  const DEAD = 0.08;
  if (Math.abs(dx) < DEAD && !(_keys.left || _keys.right)) dx = 0;
  if (Math.abs(dy) < DEAD && !(_keys.up   || _keys.down))  dy = 0;

  player.x += dx * SPEED * dt;
  player.y += dy * SPEED * dt;
  if (player.x < 0)   player.x += 100;
  if (player.x > 100) player.x -= 100;
  if (player.y < 0)   player.y += 100;
  if (player.y > 100) player.y -= 100;

  // ── Trail ──
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 20) player.trail.shift();

  // ── Energy drain ──
  const drainRate = 0.065 + score * 0.00035;
  energy -= drainRate * dt;
  energy = Math.max(0, Math.min(100, energy));
  if (energy <= 0) { endGame('에너지 소진'); return; }

  // ── Core pulse ──
  core.pulse = (core.pulse + 0.07 * dt) % (Math.PI * 2);

  // ── Core collection ──
  const dist = Math.hypot(player.x - core.x, player.y - core.y);
  const collectRadius = 11; // 약간 넉넉하게
  if (dist < collectRadius) {
    const isBonus = core.type === 'bonus';
    const gain = isBonus ? 100 : 50;
    const energyGain = isBonus ? 50 : 35;

    score += gain * combo;
    energy = Math.min(100, energy + energyGain);
    coresCollected++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;

    const wx = core.x * canvas.width / 100;
    const wy = core.y * canvas.height / 100;
    spawnParticles(wx, wy, isBonus ? '#f97316' : '#06b6d4', isBonus ? 16 : 10);

    if (combo > 1) showToast(`⚡ ${combo}× 콤보!`);
    if (isBonus) showToast('🌟 보너스 코어! +100');

    document.getElementById('combo-card').style.display = combo > 1 ? 'flex' : 'none';
    spawnCore();
  }

  // ── History recording ──
  history.push({ x: player.x, y: player.y });
  // 10분 분량만 유지
  if (history.length > 36000) history.shift();

  // ── Echo spawn every ~4 seconds ──
  if (frameCount - lastEchoSpawn > 240 && history.length > 60) {
    echoes.push({ path: [...history], offset: frameCount });
    lastEchoSpawn = frameCount;
    if (echoes.length === 1) showToast('👻 잔상 출현!');
  }
  // 최대 5개 잔상
  if (echoes.length > 5) echoes.shift();

  // ── Echo collision ──
  for (let echo of echoes) {
    const idx = frameCount - echo.offset;
    const pos = echo.path[Math.min(idx, echo.path.length - 1)];
    if (!pos) continue;
    if (Math.hypot(player.x - pos.x, player.y - pos.y) < 6) {
      const wx = player.x * canvas.width / 100;
      const wy = player.y * canvas.height / 100;
      spawnParticles(wx, wy, '#ef4444', 20);
      endGame('시간 역설');
      return;
    }
  }

  // ── Combo decay: reset if no collection for 5s ──
  if (combo > 1 && (frameCount % 300 === 0)) {
    combo = 1;
    document.getElementById('combo-card').style.display = 'none';
  }

  updateHUD();
  updateParticles();
}

// ─── HUD Update ──────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-display').textContent = Math.floor(score);
  document.getElementById('combo-display').textContent = `×${combo}`;
  document.getElementById('time-display').textContent = (frameCount / 60).toFixed(1) + 's';

  const pct = Math.round(energy);
  const fill = document.getElementById('energy-fill');
  const pctEl = document.getElementById('energy-pct');
  fill.style.width = energy + '%';
  const warn = energy < 30;
  fill.className = 'energy-fill' + (warn ? ' warn' : '');
  pctEl.className = 'energy-pct' + (warn ? ' warn' : '');
  pctEl.textContent = pct + '%';
}

// ─── Draw ────────────────────────────────────────────────────
function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#f4f7ff';
  ctx.fillRect(0, 0, w, h);

  drawGrid(w, h);
  drawPlayerTrail(w, h);
  drawEchoes(w, h);
  drawCore(w, h);
  drawPlayer(w, h);
}

function drawGrid(w, h) {
  const COUNT = 30;
  const lowEnergy = energy < 30;

  ctx.lineWidth = 0.5;

  for (let i = 0; i <= COUNT; i++) {
    const x = i * (w / COUNT);
    const y = i * (h / COUNT);

    // pulse grid lines near player
    const px = player.x / 100 * w;
    const py = player.y / 100 * h;
    const distX = Math.abs(px - x) / w;
    const distY = Math.abs(py - y) / h;
    const nearX = distX < 0.08;
    const nearY = distY < 0.08;

    ctx.strokeStyle = nearX || nearY
      ? (lowEnergy ? 'rgba(239,68,68,0.35)' : 'rgba(37,99,235,0.25)')
      : (lowEnergy ? 'rgba(239,68,68,0.08)' : '#dde4f5');

    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  // Grid intersection dots near player
  if (!lowEnergy) {
    ctx.fillStyle = 'rgba(37,99,235,0.12)';
    const px = player.x / 100 * w;
    const py = player.y / 100 * h;
    for (let i = 0; i <= COUNT; i++) {
      for (let j = 0; j <= COUNT; j++) {
        const gx = i * (w / COUNT), gy = j * (h / COUNT);
        if (Math.hypot(px - gx, py - gy) < w * 0.12) {
          ctx.beginPath(); ctx.arc(gx, gy, 1.2, 0, Math.PI * 2); ctx.fill();
        }
      }
    }
  }
}

function drawPlayerTrail(w, h) {
  player.trail.forEach((pt, i) => {
    const alpha = (i / player.trail.length) * 0.35;
    const r = (i / player.trail.length) * 7;
    ctx.beginPath();
    ctx.arc(pt.x * w / 100, pt.y * h / 100, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(37,99,235,${alpha})`;
    ctx.fill();
  });
}

function drawEchoes(w, h) {
  echoes.forEach((echo, ei) => {
    const idx = frameCount - echo.offset;
    const pos = echo.path[Math.min(idx, echo.path.length - 1)];
    if (!pos) return;

    const baseAlpha = 0.12 + (ei / echoes.length) * 0.35;
    const px = pos.x * w / 100, py = pos.y * h / 100;
    const dangerDist = Math.hypot(player.x - pos.x, player.y - pos.y);
    const dangerAlpha = dangerDist < 15 ? 0.8 : baseAlpha;

    // Echo glow
    const grad = ctx.createRadialGradient(px, py, 0, px, py, 20);
    grad.addColorStop(0, `rgba(249,115,22,${dangerAlpha})`);
    grad.addColorStop(1, 'rgba(249,115,22,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI * 2); ctx.fill();

    // Echo body
    ctx.fillStyle = `rgba(249,115,22,${dangerAlpha * 1.5})`;
    ctx.strokeStyle = `rgba(255,255,255,0.8)`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    // Danger indicator
    if (dangerDist < 20) {
      ctx.strokeStyle = `rgba(239,68,68,${0.8 * (1 - dangerDist/20)})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(player.x * w / 100, player.y * h / 100);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  });
}

function drawCore(w, h) {
  const cx = core.x * w / 100, cy = core.y * h / 100;
  const pulse = Math.sin(core.pulse) * 0.3 + 1;
  const isBonus = core.type === 'bonus';
  const color = isBonus ? '#f97316' : '#f59e0b';
  const glowColor = isBonus ? 'rgba(249,115,22,' : 'rgba(245,158,11,';

  // Outer glow ring
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28 * pulse);
  grad.addColorStop(0, glowColor + '0.35)');
  grad.addColorStop(1, glowColor + '0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, 28 * pulse, 0, Math.PI * 2); ctx.fill();

  // Core body
  ctx.fillStyle = color;
  ctx.shadowBlur = 12; ctx.shadowColor = color;
  ctx.beginPath(); ctx.arc(cx, cy, 8 * pulse, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Inner white dot
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(cx - 2, cy - 2, 2.5, 0, Math.PI * 2); ctx.fill();

  // Bonus star ring
  if (isBonus) {
    ctx.strokeStyle = 'rgba(249,115,22,0.5)';
    ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx, cy, 16 * pulse, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawPlayer(w, h) {
  const px = player.x * w / 100, py = player.y * h / 100;
  const lowEnergy = energy < 30;
  const color = lowEnergy ? '#ef4444' : '#2563eb';
  const glow = lowEnergy ? '#ef4444' : '#3b82f6';

  // Glow
  const grad = ctx.createRadialGradient(px, py, 0, px, py, 20);
  grad.addColorStop(0, lowEnergy ? 'rgba(239,68,68,0.3)' : 'rgba(37,99,235,0.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = color;
  ctx.shadowBlur = 10; ctx.shadowColor = glow;
  ctx.beginPath(); ctx.arc(px, py, player.r, 0, Math.PI * 2); ctx.fill();

  // White ring
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(px, py, player.r, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;

  // Inner dot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(px - 2.5, py - 2.5, 2, 0, Math.PI * 2); ctx.fill();

  // Low energy pulsing ring
  if (lowEnergy) {
    const ring = ((frameCount * 0.05) % 1);
    ctx.strokeStyle = `rgba(239,68,68,${1 - ring})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(px, py, player.r + ring * 20, 0, Math.PI * 2); ctx.stroke();
  }
}

// ─── Game Over ───────────────────────────────────────────────
function endGame(reason) {
  state = 'GAMEOVER';
  const final = Math.floor(score);
  if (final > bestScore) {
    bestScore = final;
    document.getElementById('best-display').textContent = bestScore;
  }
  document.getElementById('final-score').textContent = final;
  document.getElementById('gameover-reason').textContent = reason;
  document.getElementById('stat-time').textContent = (frameCount / 60).toFixed(1) + 's';
  document.getElementById('stat-cores').textContent = coresCollected;
  document.getElementById('stat-combo').textContent = maxCombo + '×';

  document.getElementById('gameover-screen').classList.remove('hidden');
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('overlay').classList.remove('hidden');

  // Final burst
  const wx = player.x * canvas.width / 100;
  const wy = player.y * canvas.height / 100;
  spawnParticles(wx, wy, '#ef4444', 30);

  // Keep drawing particles after game over
  function finalDraw() {
    if (particles.length === 0) return;
    updateParticles();
    drawParticles();
    requestAnimationFrame(finalDraw);
  }
  finalDraw();
}

// ─── Init ────────────────────────────────────────────────────
// Show keyboard hint on desktop
if (!isMobile) {
  document.getElementById('kb-hint').style.display = 'block';
}
</script>
