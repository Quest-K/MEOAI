
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Loop: Dark Echo Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 15%, rgba(0,0,0,0.98) 75%);
            pointer-events: none; z-index: 10;
        }
        .horror-font { font-family: 'Creepster', cursive; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        @keyframes pulse-red { 0%, 100% { color: #991b1b; } 50% { color: #f87171; } }
        .animate-horror { animation: pulse-red 2s infinite; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    <div id="vignette"></div>

    <div id="ui-layer" class="flex flex-col justify-between p-6">
        <div class="flex justify-between items-start text-red-700">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold uppercase opacity-50">Depth</span>
                <span id="level-display" class="text-4xl horror-font text-red-600">01</span>
            </div>
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold uppercase opacity-50">Stamina</span>
                <div class="w-32 h-1 bg-red-950 rounded-full mt-2 overflow-hidden">
                    <div id="stamina-bar" class="h-full bg-red-600 w-full transition-all"></div>
                </div>
            </div>
            <div class="flex flex-col items-end text-red-600">
                <span class="text-[10px] font-bold uppercase opacity-50 text-red-700">Echoes</span>
                <span id="echo-count" class="text-4xl horror-font">0</span>
            </div>
        </div>

        <div id="overlay" class="m-auto pointer-events-auto bg-black/90 border border-red-900/40 p-10 rounded-lg text-center max-w-sm backdrop-blur-xl">
            <div id="start-screen">
                <h1 class="text-5xl text-red-700 horror-font mb-6 animate-horror">DARK ECHO</h1>
                <p class="text-gray-500 text-xs mb-8 leading-relaxed italic uppercase">"당신의 과거가 당신을 사냥합니다."</p>
                <button onclick="requestPermissions()" class="w-full py-4 border border-red-700 text-red-600 font-bold hover:bg-red-900/20 transition-all">공포 속으로 진입</button>
            </div>
            <div id="gameover-screen" class="hidden">
                <h2 class="text-5xl text-red-600 horror-font mb-4">CAUGHT</h2>
                <p id="death-reason" class="text-gray-500 text-[10px] mb-8 uppercase">Time Paradox</p>
                <button onclick="resetGame()" class="w-full py-4 bg-red-900/40 border border-red-700 text-white font-bold hover:bg-red-800/50 transition-all">다시 시도</button>
            </div>
        </div>

        <div id="status-msg" class="text-center text-[10px] text-red-900/40 font-bold uppercase mb-4 tracking-widest">
            Don't step on your past
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let state = 'START', level = 1, stamina = 100, spawnTimer = 0;
        let player = { x: 15, y: 15, r: 8 }, vel = { x: 0, y: 0 }, exit = { x: 80, y: 80, r: 12 };
        let history = [], echoes = [], keys = {};

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        async function requestPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res === 'granted') window.addEventListener('deviceorientation', handleGyro);
                } catch (e) { console.error(e); }
            } else { window.addEventListener('deviceorientation', handleGyro); }
            startGame();
        }

        function handleGyro(e) {
            if (state !== 'PLAYING') return;
            vel.x = e.gamma * 0.05;
            vel.y = (e.beta - 45) * 0.05;
        }

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (state === 'START') startGame(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame() {
            state = 'PLAYING';
            document.getElementById('overlay').classList.add('hidden');
            initLevel(1);
            requestAnimationFrame(loop);
        }

        function initLevel(lv) {
            level = lv;
            player.x = 15; player.y = 15;
            vel = { x: 0, y: 0 }; stamina = 100;
            spawnTimer = 90; // 약 1.5초간 무적 (60fps 기준)
            
            exit.x = 30 + Math.random() * 60;
            exit.y = 30 + Math.random() * 60;
            
            if (lv > 1 && history.length > 0) echoes.push([...history]);
            else if (lv === 1) echoes = [];
            
            history = [];
            document.getElementById('level-display').innerText = String(lv).padStart(2, '0');
            document.getElementById('echo-count').innerText = echoes.length;
        }

        function loop() {
            if (state !== 'PLAYING') return;

            const speed = 0.7;
            if (keys['w'] || keys['arrowup']) vel.y = -speed;
            if (keys['s'] || keys['arrowdown']) vel.y = speed;
            if (keys['a'] || keys['arrowleft']) vel.x = -speed;
            if (keys['d'] || keys['arrowright']) vel.x = speed;

            vel.x *= 0.95; vel.y *= 0.95;
            player.x += vel.x; player.y += vel.y;
            player.x = Math.max(5, Math.min(95, player.x));
            player.y = Math.max(5, Math.min(95, player.y));

            history.push({ x: player.x, y: player.y });
            stamina -= 0.04;
            document.getElementById('stamina-bar').style.width = stamina + '%';
            if (stamina <= 0) endGame("탈출 시간이 초과되었습니다.");

            // 스폰 보호 타이머 감소
            if (spawnTimer > 0) {
                spawnTimer--;
                document.getElementById('status-msg').innerText = "SAFE TIME: " + Math.ceil(spawnTimer/60) + "s";
            } else {
                document.getElementById('status-msg').innerText = "Don't step on your past";
                // 충돌 체크
                const currentIdx = history.length - 1;
                for (let i = 0; i < echoes.length; i++) {
                    const echoPath = echoes[i];
                    const echoPos = echoPath[currentIdx] || echoPath[echoPath.length - 1];
                    const dist = Math.sqrt((player.x - echoPos.x)**2 + (player.y - echoPos.y)**2);
                    if (dist < 4) { endGame("과거의 자신과 충돌했습니다."); return; }
                }
            }

            if (Math.sqrt((player.x - exit.x)**2 + (player.y - exit.y)**2) < 5) initLevel(level + 1);

            draw();
            requestAnimationFrame(loop);
        }

        function draw() {
            ctx.fillStyle = '#050000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const w = canvas.width, h = canvas.height;

            // 출구
            const pulse = 15 + Math.sin(Date.now() * 0.005) * 5;
            const grad = ctx.createRadialGradient(exit.x*w/100, exit.y*h/100, 0, exit.x*w/100, exit.y*h/100, pulse*2);
            grad.addColorStop(0, 'rgba(255, 0, 0, 0.4)'); grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(exit.x*w/100, exit.y*h/100, pulse*2, 0, Math.PI*2); ctx.fill();

            // 과거 잔상
            const currentIdx = history.length - 1;
            echoes.forEach((path, i) => {
                const pos = path[currentIdx] || path[path.length - 1];
                ctx.fillStyle = `rgba(255, 0, 0, ${0.3 + (i/echoes.length)*0.5})`;
                ctx.beginPath(); ctx.arc(pos.x*w/100, pos.y*h/100, 7, 0, Math.PI*2); ctx.fill();
            });

            // 플레이어
            ctx.shadowBlur = spawnTimer > 0 ? 30 : 15;
            ctx.shadowColor = spawnTimer > 0 ? 'white' : '#4deeea';
            ctx.fillStyle = spawnTimer > 0 ? `rgba(255,255,255,${0.5 + Math.sin(Date.now()*0.01)*0.5})` : '#4deeea';
            ctx.beginPath(); ctx.arc(player.x*w/100, player.y*h/100, 8, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function endGame(reason) {
            state = 'GAMEOVER';
            document.getElementById('death-reason').innerText = reason;
            document.getElementById('gameover-screen').classList.remove('hidden');
            document.getElementById('overlay').classList.remove('hidden');
        }

        function resetGame() {
            state = 'START';
            level = 1;
            echoes = [];
            history = [];
            document.getElementById('gameover-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
