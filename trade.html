
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; }
        .card { background-color: #1e2329; border-radius: 12px; border: 1px solid #333; }
        .accent { color: #fcd535; }
        .btn-primary { background-color: #fcd535; color: #000; font-weight: bold; }
        .btn-primary:hover { background-color: #e2c02d; }
        .status-up { color: #0ecb81; }
        .status-down { color: #f6465d; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold accent">Binance Futures</h1>
                <p class="text-sm text-gray-400">실시간 선물 계정 상태</p>
            </div>
            <button id="refreshBtn" class="px-4 py-2 btn-primary rounded-lg transition">데이터 갱신</button>
        </header>

        <!-- Balance Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="card p-6">
                <p class="text-gray-400 text-sm mb-1">총 잔고 (Total Wallet Balance)</p>
                <h2 id="totalBalance" class="text-3xl font-bold">-- <span class="text-lg font-normal">USDT</span></h2>
            </div>
            <div class="card p-6">
                <p class="text-gray-400 text-sm mb-1">사용 가능한 잔고 (Available Balance)</p>
                <h2 id="availableBalance" class="text-3xl font-bold accent">-- <span class="text-lg font-normal">USDT</span></h2>
            </div>
        </div>

        <!-- Position/Assets List -->
        <div class="card p-6 mb-8">
            <h3 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">상세 잔고 내역</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 text-sm border-b border-gray-800">
                            <th class="py-2">자산</th>
                            <th class="py-2 text-right">잔고</th>
                            <th class="py-2 text-right">미실현 손익</th>
                        </tr>
                    </thead>
                    <tbody id="assetTableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Trade History -->
        <div class="card p-6">
            <h3 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">최근 거래 내역</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 text-sm border-b border-gray-800">
                            <th class="py-2">심볼</th>
                            <th class="py-2">사이드</th>
                            <th class="py-2 text-right">가격</th>
                            <th class="py-2 text-right">수량</th>
                            <th class="py-2 text-right">날짜</th>
                        </tr>
                    </thead>
                    <tbody id="tradeHistoryBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "dqstBJE5IdRC8pyZW2RDSLE1qwR9HjDMPmJaRgxpUdM7pZWoum0DQNUZzHRPOEa5";
        const apiSecret = "aunpWCXCMc1a4PPL5Qaa6HRGsM0QnRmYBfTC78iuD1LoMJFv1hUO11ESNWpKjh3L";
        const baseUrl = "https://fapi.binance.com"; // Futures Testnet을 원하시면 https://testnet.binancefuture.com 사용

        // 유틸리티: 서명 생성
        function generateSignature(queryString) {
            return CryptoJS.HmacSHA256(queryString, apiSecret).toString(CryptoJS.enc.Hex);
        }

        // 유틸리티: Fetch API 호출 (선물 API 필수 헤더 포함)
        async function callBinanceApi(endpoint, params = {}) {
            const timestamp = Date.now();
            let queryString = `timestamp=${timestamp}`;
            
            Object.keys(params).forEach(key => {
                queryString += `&${key}=${params[key]}`;
            });

            const signature = generateSignature(queryString);
            const url = `${baseUrl}${endpoint}?${queryString}&signature=${signature}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-MBX-APIKEY': apiKey,
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) throw new Error('API 호출 실패: ' + response.statusText);
                return await response.json();
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        // 잔고 정보 로드
        async function loadAccountData() {
            const accountData = await callBinanceApi("/fapi/v2/account");
            if (!accountData) return;

            document.getElementById('totalBalance').innerText = parseFloat(accountData.totalWalletBalance).toFixed(2);
            document.getElementById('availableBalance').innerText = parseFloat(accountData.availableBalance).toFixed(2);

            const assetTable = document.getElementById('assetTableBody');
            assetTable.innerHTML = '';
            
            // USDT 등 보유 자산만 표시
            accountData.assets.filter(a => parseFloat(a.walletBalance) > 0).forEach(asset => {
                const row = `
                    <tr class="border-b border-gray-800 text-sm">
                        <td class="py-3 font-medium">${asset.asset}</td>
                        <td class="py-3 text-right">${parseFloat(asset.walletBalance).toFixed(4)}</td>
                        <td class="py-3 text-right ${parseFloat(asset.unrealizedProfit) >= 0 ? 'status-up' : 'status-down'}">
                            ${parseFloat(asset.unrealizedProfit).toFixed(2)}
                        </td>
                    </tr>
                `;
                assetTable.innerHTML += row;
            });
        }

        // 거래 내역 로드
        async function loadTradeHistory() {
            // 최근 10개 거래 내역
            const trades = await callBinanceApi("/fapi/v1/userTrades", { limit: 10 });
            if (!trades) return;

            const tradeHistory = document.getElementById('tradeHistoryBody');
            tradeHistory.innerHTML = '';

            trades.reverse().forEach(trade => {
                const date = new Date(trade.time).toLocaleDateString() + ' ' + new Date(trade.time).toLocaleTimeString();
                const row = `
                    <tr class="border-b border-gray-800 text-sm hover:bg-gray-800 transition">
                        <td class="py-3 font-medium">${trade.symbol}</td>
                        <td class="py-3 ${trade.side === 'BUY' ? 'status-up' : 'status-down'} font-bold">${trade.side}</td>
                        <td class="py-3 text-right font-mono">${parseFloat(trade.price).toFixed(2)}</td>
                        <td class="py-3 text-right font-mono">${trade.qty}</td>
                        <td class="py-3 text-right text-gray-500 text-xs">${date}</td>
                    </tr>
                `;
                tradeHistory.innerHTML += row;
            });
        }

        // 초기화 및 갱신
        async function refreshData() {
            document.getElementById('refreshBtn').innerText = "로딩 중...";
            await Promise.all([loadAccountData(), loadTradeHistory()]);
            document.getElementById('refreshBtn').innerText = "데이터 갱신";
        }

        document.getElementById('refreshBtn').onclick = refreshData;

        // 페이지 로드 시 실행
        window.onload = refreshData;
    </script>
</body>
</html>
