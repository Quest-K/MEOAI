<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVERSAL MASTER | Integrated Binance Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0f1117; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(30, 34, 45, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-field { background: #1a1d26; border: 1px solid #2d323e; color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-field:focus { border-color: #fbbf24; outline: none; box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.1); }
        .btn-primary { background: #fbbf24; color: #000; font-weight: 800; transition: all 0.2s; }
        .btn-primary:hover { background: #fcd34d; transform: translateY(-1px); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .pnl-positive { color: #10b981; }
        .pnl-negative { color: #ef4444; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2d323e; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- Header -->
    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
        <div class="flex items-center gap-3">
            <div class="bg-amber-400 p-2.5 rounded-xl"><i class="fas fa-chart-line text-black text-xl"></i></div>
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">REVERSAL <span class="text-amber-400">MASTER</span></h1>
                <p class="text-[10px] text-gray-500 font-bold tracking-[0.2em] mt-1 uppercase">Institutional Grade Analytics</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 bg-black/30 p-2 rounded-2xl border border-white/5">
            <div class="flex items-center gap-3 px-3">
                <span id="sync-label" class="text-[10px] font-black text-gray-500 uppercase">OFFLINE</span>
                <div class="w-32 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div id="sync-progress" class="h-full bg-amber-400" style="width: 0%"></div>
                </div>
                <span id="sync-timer" class="text-[10px] font-mono text-amber-400/80 w-6">0s</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-12 gap-6">
        <!-- Top Summary Cards -->
        <div class="md:col-span-3 glass-panel p-6">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Total Margin Balance</p>
            <div class="flex items-baseline gap-2">
                <h2 id="summary-balance" class="text-3xl font-black">0.00</h2>
                <span class="text-xs text-gray-500 font-bold uppercase">USDT</span>
            </div>
        </div>
        <div class="md:col-span-3 glass-panel p-6">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Unrealized PNL</p>
            <div class="flex items-baseline gap-2">
                <h2 id="summary-pnl" class="text-3xl font-black">0.00</h2>
                <span id="summary-roe" class="text-[10px] bg-white/5 px-2 py-0.5 rounded font-bold">0.00%</span>
            </div>
        </div>
        <div class="md:col-span-3 glass-panel p-6">
            <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Active Positions</p>
            <h2 id="summary-positions" class="text-3xl font-black">0</h2>
        </div>
        <div class="md:col-span-3 bg-amber-400 rounded-[1.5rem] p-6 flex flex-col justify-center">
            <p class="text-[10px] font-black text-black/40 uppercase">System Pulse</p>
            <h2 id="pulse-text" class="text-xl font-black text-black uppercase leading-tight">Ready</h2>
        </div>

        <!-- Sidebar (Auth/Profile) -->
        <div class="md:col-span-4 space-y-6">
            <div id="auth-section" class="glass-panel p-8">
                <div class="flex bg-black/40 p-1 rounded-xl mb-6">
                    <button onclick="switchTab('login')" id="tab-login" class="flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all bg-gray-700">LOGIN</button>
                    <button onclick="switchTab('signup')" id="tab-signup" class="flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all text-gray-500">SIGN UP</button>
                </div>
                <form id="auth-form" class="space-y-4">
                    <div id="signup-fields" class="hidden space-y-4">
                        <input type="text" id="full-name" class="input-field w-full p-4 rounded-xl text-xs" placeholder="FULL NAME">
                    </div>
                    <input type="email" id="email" class="input-field w-full p-4 rounded-xl text-xs" placeholder="EMAIL ADDRESS" required>
                    <input type="password" id="password" class="input-field w-full p-4 rounded-xl text-xs" placeholder="PASSWORD" required>
                    <div id="api-fields" class="hidden space-y-4 pt-4 border-t border-white/5">
                        <p class="text-[9px] font-black text-amber-400 uppercase">Binance API Key (Futures Enabled)</p>
                        <input type="text" id="api-key" class="input-field w-full p-4 rounded-xl text-xs font-mono" placeholder="API KEY">
                        <input type="password" id="api-secret" class="input-field w-full p-4 rounded-xl text-xs font-mono" placeholder="SECRET KEY">
                    </div>
                    <button type="submit" id="submit-btn" class="btn-primary w-full py-4 rounded-xl text-[10px] uppercase tracking-widest">Login</button>
                </form>
                <div id="auth-message" class="mt-4 text-[10px] font-bold text-center hidden"></div>
            </div>

            <div id="profile-section" class="glass-panel p-8 hidden">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <p id="user-name" class="font-black uppercase text-sm">User</p>
                        <p id="user-email" class="text-[10px] text-gray-500 font-bold">email@example.com</p>
                    </div>
                    <button onclick="handleLogout()" class="text-gray-500 hover:text-red-500"><i class="fas fa-power-off"></i></button>
                </div>
                <div class="p-3 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center gap-3">
                    <span class="status-dot bg-emerald-500 animate-pulse"></span>
                    <span id="api-status-label" class="text-[9px] font-black text-emerald-500 uppercase tracking-wider">Syncing Data...</span>
                </div>
            </div>
        </div>

        <!-- Position Tracker -->
        <div class="md:col-span-8">
            <div class="glass-panel h-full min-h-[500px] flex flex-col">
                <div class="p-6 border-b border-white/5">
                    <h3 class="font-black uppercase text-sm italic">Live Profit Tracker</h3>
                </div>
                <div id="position-list" class="flex-grow p-4 overflow-y-auto">
                    <div id="no-data" class="h-full flex flex-col items-center justify-center text-gray-600">
                        <i class="fas fa-lock mb-4 text-2xl opacity-20"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Authentication Required</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://mgidrwfgcdcxgosotysg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FQt1zyzqKOI3LUSZ8DYNAQ_b9fOqhTx';
        
        // CORS 문제를 해결하기 위한 프록시 서버 활용 (주석: AllOrigins 혹은 직접 구축된 프록시 권장)
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';
        const BINANCE_BASE = 'https://fapi.binance.com';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userKeys = null;
        let syncInterval = null;
        let isSyncing = false;

        // --- AUTH LOGIC ---
        function switchTab(mode) {
            const sFields = document.getElementById('signup-fields');
            const aFields = document.getElementById('api-fields');
            const btn = document.getElementById('submit-btn');
            const tLogin = document.getElementById('tab-login');
            const tSignup = document.getElementById('tab-signup');

            if (mode === 'signup') {
                sFields.classList.remove('hidden');
                aFields.classList.remove('hidden');
                btn.innerText = 'CREATE ACCOUNT';
                tSignup.classList.add('bg-gray-700'); tSignup.classList.remove('text-gray-500');
                tLogin.classList.remove('bg-gray-700'); tLogin.classList.add('text-gray-500');
            } else {
                sFields.classList.add('hidden');
                aFields.classList.add('hidden');
                btn.innerText = 'LOGIN';
                tLogin.classList.add('bg-gray-700'); tLogin.classList.remove('text-gray-500');
                tSignup.classList.remove('bg-gray-700'); tSignup.classList.add('text-gray-500');
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const msg = document.getElementById('auth-message');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full-name').value;
            const apiKey = document.getElementById('api-key').value;
            const apiSecret = document.getElementById('api-secret').value;

            msg.className = "mt-4 text-[10px] font-bold text-center text-amber-400 block";
            msg.innerText = "PROCESSING...";

            try {
                if (document.getElementById('submit-btn').innerText.includes('CREATE')) {
                    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
                    if (error) throw error;
                    if (data.user) {
                        const { error: dbErr } = await sb.from('user_configs').insert({ 
                            user_id: data.user.id, 
                            binance_api_key: apiKey, 
                            binance_api_secret: apiSecret 
                        });
                        if(dbErr) throw dbErr;
                    }
                    msg.innerText = "SIGNUP SUCCESS! CHECK YOUR EMAIL.";
                } else {
                    const { error } = await sb.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    msg.innerText = "LOGIN SUCCESS!";
                }
            } catch (err) {
                msg.className = "mt-4 text-[10px] font-bold text-center text-red-500 block";
                msg.innerText = err.message || "Authentication Failed";
            }
        }

        async function handleLogout() {
            await sb.auth.signOut();
            location.reload();
        }

        // --- BINANCE SYNC LOGIC ---
        async function fetchBinanceData() {
            if (!userKeys || !userKeys.binance_api_key || isSyncing) return;
            isSyncing = true;

            const timestamp = Date.now();
            const query = `timestamp=${timestamp}`;
            const signature = CryptoJS.HmacSHA256(query, userKeys.binance_api_secret).toString();
            
            try {
                // 바이낸스 API는 CORS를 허용하지 않으므로 PROXY를 통해 우회하거나 브라우저 제약을 감수해야 합니다.
                // 여기서는 AllOrigins 프록시를 사용하여 요청을 전송합니다.
                
                const accountUrl = `${BINANCE_BASE}/fapi/v2/account?${query}&signature=${signature}`;
                const posUrl = `${BINANCE_BASE}/fapi/v2/positionRisk?${query}&signature=${signature}`;

                // 1. Account Info (Balance)
                const accountRes = await fetch(PROXY_URL + encodeURIComponent(accountUrl), {
                    headers: { 'X-MBX-APIKEY': userKeys.binance_api_key }
                });
                const accountData = await accountRes.json();

                // 2. Position Risk
                const posRes = await fetch(PROXY_URL + encodeURIComponent(posUrl), {
                    headers: { 'X-MBX-APIKEY': userKeys.binance_api_key }
                });
                const posData = await posRes.json();

                if (accountData.code || posData.code) {
                    throw new Error(accountData.msg || posData.msg || "API Key Error");
                }

                renderData(accountData, posData);
                document.getElementById('api-status-label').innerText = "BINANCE API CONNECTED";
            } catch (err) {
                console.error("Binance Sync Error:", err);
                document.getElementById('pulse-text').innerText = "SYNC ERROR";
                document.getElementById('api-status-label').innerText = "SYNC FAILED (Check API Key)";
                document.getElementById('api-status-label').classList.replace('text-emerald-500', 'text-red-500');
            } finally {
                isSyncing = false;
            }
        }

        function renderData(account, positions) {
            // Update Summary
            if (account.totalMarginBalance) {
                document.getElementById('summary-balance').innerText = parseFloat(account.totalMarginBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('summary-pnl').innerText = parseFloat(account.totalUnrealizedProfit).toLocaleString(undefined, {minimumFractionDigits: 2});
                const pnl = parseFloat(account.totalUnrealizedProfit);
                document.getElementById('summary-pnl').className = `text-3xl font-black ${pnl >= 0 ? 'pnl-positive' : 'pnl-negative'}`;
            }
            
            const activePos = Array.isArray(positions) ? positions.filter(p => parseFloat(p.positionAmt) !== 0) : [];
            document.getElementById('summary-positions').innerText = activePos.length;

            const listEl = document.getElementById('position-list');
            if (activePos.length === 0) {
                listEl.innerHTML = `<div class="h-full flex items-center justify-center text-gray-600 uppercase text-[10px] font-bold italic">No active positions found</div>`;
                return;
            }

            listEl.innerHTML = activePos.map(p => {
                const pnl = parseFloat(p.unRealizedProfit);
                const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                const size = Math.abs(parseFloat(p.positionAmt));
                return `
                    <div class="bg-black/20 p-5 rounded-2xl border border-white/5 mb-3 flex justify-between items-center hover:bg-black/30 transition-colors">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-0.5 rounded bg-white/5 text-[9px] font-black">${parseFloat(p.positionAmt) > 0 ? 'LONG' : 'SHORT'}</span>
                                <p class="text-xs font-black uppercase tracking-tight">${p.symbol}</p>
                            </div>
                            <p class="text-[9px] text-gray-500 font-bold mt-1">SIZE: ${size} | LEV: ${p.leverage}x</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-black ${pnlClass}">${pnl > 0 ? '+' : ''}${pnl.toFixed(2)} USDT</p>
                            <p class="text-[9px] text-gray-500 font-bold">ENTRY: ${parseFloat(p.entryPrice).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('pulse-text').innerText = "LIVE SYNCED";
        }

        async function loadUserConfig(userId) {
            document.getElementById('pulse-text').innerText = "FETCHING KEYS";
            const { data, error } = await sb.from('user_configs').select('*').eq('user_id', userId).maybeSingle();
            if (error) {
                console.error("DB Error:", error);
                document.getElementById('pulse-text').innerText = "DB ERROR";
                return;
            }
            
            if (data) {
                userKeys = data;
                startSyncLoop();
            } else {
                document.getElementById('pulse-text').innerText = "API KEYS MISSING";
                document.getElementById('api-status-label').innerText = "PLEASE RE-LOGIN WITH API KEYS";
            }
        }

        function startSyncLoop() {
            if (syncInterval) clearInterval(syncInterval);
            fetchBinanceData();
            let timer = 10;
            syncInterval = setInterval(() => {
                if (isSyncing) return;
                timer -= 0.1;
                document.getElementById('sync-progress').style.width = (timer * 10) + '%';
                document.getElementById('sync-timer').innerText = Math.ceil(timer) + 's';
                if (timer <= 0) {
                    timer = 10;
                    fetchBinanceData();
                }
            }, 100);
            document.getElementById('sync-label').innerText = "ONLINE";
        }

        function updateUI(user) {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('profile-section').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.user_metadata.full_name || 'COMMANDER';
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('no-data').classList.add('hidden');
                loadUserConfig(user.id);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                document.getElementById('no-data').classList.remove('hidden');
                document.getElementById('sync-label').innerText = "OFFLINE";
                if (syncInterval) clearInterval(syncInterval);
            }
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-form').addEventListener('submit', handleAuth);
            
            sb.auth.onAuthStateChange((event, session) => {
                updateUI(session?.user || null);
            });

            sb.auth.getSession().then(({data}) => {
                updateUI(data.session?.user || null);
            });
        });
    </script>
</body>
</html>
