<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite | Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .bg-binance-gold { background-color: #F3BA2F; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: #F3BA2F; outline: none; background: rgba(255,255,255,0.1); }
        .btn-primary { background-color: #F3BA2F; color: black; font-weight: 700; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 4px 20px rgba(243, 186, 47, 0.2); }
        .tab-btn.active { color: #F3BA2F; border-bottom: 2px solid #F3BA2F; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back
                </a>
                <div class="h-4 w-[1px] bg-white/10"></div>
                <h1 class="font-bold tracking-tight text-lg">TRADING <span class="binance-gold">TERMINAL</span></h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="user-display" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Checking...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Sidebar: Settings & Portfolio -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel rounded-[2.5rem] p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-binance-gold/10 flex items-center justify-center">
                        <svg class="w-6 h-6 binance-gold" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                    </div>
                    <div>
                        <h2 class="font-bold">API 설정</h2>
                        <p id="api-status-text" class="text-[10px] text-slate-500 uppercase">연결 대기 중</p>
                    </div>
                </div>

                <form id="api-storage-form" class="space-y-4">
                    <input type="password" id="input-api-key" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="API Key">
                    <input type="password" id="input-secret-key" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="Secret Key">
                    <button type="submit" id="save-trigger" class="w-full btn-primary py-3 rounded-xl text-sm">설정 업데이트</button>
                </form>
            </div>

            <div class="glass-panel rounded-[2.5rem] p-8">
                <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-[0.2em]">Data Filter</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase ml-1">시작일</label>
                            <input type="date" id="start-date" class="input-field w-full px-3 py-2 rounded-lg text-[11px]">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase ml-1">종료일</label>
                            <input type="date" id="end-date" class="input-field w-full px-3 py-2 rounded-lg text-[11px]">
                        </div>
                    </div>
                    <button onclick="fetchHistory()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 py-3 rounded-xl text-xs font-bold transition-all">내역 조회 및 분석</button>
                </div>
            </div>
        </div>

        <!-- Right: Activity Terminal -->
        <div class="lg:col-span-8 flex flex-col gap-6">
            <div id="analysis-summary" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4"></div>

            <div class="glass-panel rounded-[2.5rem] p-8 min-h-[500px] flex flex-col">
                <div class="flex gap-6 border-b border-white/5 mb-6">
                    <button onclick="switchTab('futures')" id="tab-futures" class="tab-btn active pb-4 text-sm font-bold transition-all">선물 거래 내역</button>
                    <button onclick="switchTab('summary')" id="tab-summary" class="tab-btn pb-4 text-sm font-bold transition-all">심볼별 요약 통계</button>
                    <button onclick="switchTab('transactions')" id="tab-transactions" class="tab-btn pb-4 text-sm font-bold transition-all">입출금 내역</button>
                </div>

                <div id="loading-state" class="hidden flex-1 flex flex-col items-center justify-center py-20">
                    <div class="w-10 h-10 border-2 border-binance-gold border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-xs text-slate-500">바이낸스에서 데이터를 불러오는 중...</p>
                </div>

                <div id="empty-state" class="flex-1 flex flex-col items-center justify-center py-20 text-center">
                    <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <p class="text-sm text-slate-500">조회할 기간을 선택하고 버튼을 눌러주세요.</p>
                </div>

                <div id="table-container" class="hidden overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead id="table-head" class="text-slate-500 uppercase border-b border-white/5"></thead>
                        <tbody id="table-body" class="mono"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://pcmrpxcpjynmayactgan.supabase.co";
        const SUPABASE_KEY = "sb_publishable_endfjcxVBfda-lzjOpPbrQ_DTdF3MHZ";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'futures';
        let userConfig = null;
        let currentUser = null;
        let rawTradeData = [];
        let usdToKrw = 1350; // 기본 환율 (실시간 API 연동 전 가상 데이터)

        // 초기 날짜 설정
        const today = new Date();
        const lastWeek = new Date(today);
        lastWeek.setDate(today.getDate() - 7);
        document.getElementById('start-date').value = lastWeek.toISOString().split('T')[0];
        document.getElementById('end-date').value = today.toISOString().split('T')[0];

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            document.getElementById('user-display').innerText = currentUser.email;
            document.querySelector('#connection-status span').classList.replace('bg-red-500', 'bg-emerald-500');

            const { data } = await sb.from('user_settings').select('*').eq('user_id', currentUser.id).maybeSingle();
            if (data) {
                userConfig = data;
                document.getElementById('input-api-key').value = "****************";
                document.getElementById('input-secret-key').value = "****************";
                document.getElementById('api-status-text').innerText = "API 연결 완료";
                document.getElementById('api-status-text').classList.add('text-emerald-500');
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            if (rawTradeData.length > 0 || currentTab === 'transactions') {
                renderContent();
            } else {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('table-container').classList.add('hidden');
            }
        }

        async function fetchHistory() {
            if (!userConfig) { alert("API 설정을 먼저 완료해주세요."); return; }
            
            const start = new Date(document.getElementById('start-date').value).getTime();
            const end = new Date(document.getElementById('end-date').value).getTime();

            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('table-container').classList.add('hidden');

            try {
                await getFuturesTrades(start, end);
                renderContent();
            } catch (err) {
                alert("데이터 조회 중 오류 발생: " + err.message);
            } finally {
                document.getElementById('loading-state').classList.add('hidden');
            }
        }

        function getSignature(queryString, secret) {
            return CryptoJS.HmacSHA256(queryString, secret).toString();
        }

        async function getFuturesTrades(startTime, endTime) {
            const endpoint = "https://fapi.binance.com/fapi/v1/userTrades";
            const timestamp = Date.now();
            const query = `startTime=${startTime}&endTime=${endTime}&timestamp=${timestamp}`;
            const signature = getSignature(query, userConfig.binance_secret);
            
            const response = await fetch(`${endpoint}?${query}&signature=${signature}`, {
                headers: { 'X-MBX-APIKEY': userConfig.binance_key }
            });
            rawTradeData = await response.json();
        }

        function renderContent() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            document.getElementById('table-container').classList.remove('hidden');

            if (currentTab === 'futures') {
                renderFuturesTable(rawTradeData);
            } else if (currentTab === 'summary') {
                renderSummaryTable(rawTradeData);
            } else if (currentTab === 'transactions') {
                head.innerHTML = `<tr><th class="py-4 px-4">날짜/시간</th><th>코인</th><th>금액</th><th>상태</th></tr>`;
                body.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-slate-500">입출금 내역이 없습니다.</td></tr>`;
            }
        }

        function formatDateTime(timestamp) {
            const d = new Date(timestamp);
            const date = d.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\. /g, '-').replace('.','');
            const time = d.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            return { date, time };
        }

        function renderFuturesTable(data) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            if (!data || data.length === 0 || data.msg) {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('table-container').classList.add('hidden');
                return;
            }

            head.innerHTML = `<tr>
                <th class="py-4 px-4">날짜/시간 (초 단위)</th>
                <th>심볼</th>
                <th>사이드</th>
                <th>가격</th>
                <th>수량 / 거래대금</th>
                <th>수수료 (KRW)</th>
            </tr>`;

            data.forEach(row => {
                const { date, time } = formatDateTime(row.time);
                const sideClass = row.side === 'BUY' ? 'text-emerald-400' : 'text-red-400';
                const quoteQty = parseFloat(row.quoteQty);
                const krwValue = (quoteQty * usdToKrw).toLocaleString();
                const commissionKrw = (parseFloat(row.commission) * usdToKrw).toLocaleString(undefined, { maximumFractionDigits: 0 });

                body.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors group">
                        <td class="py-4 px-4 whitespace-nowrap">
                            <span class="text-slate-400 text-[10px]">${date}</span>
                            <span class="binance-gold ml-1 font-bold text-xs">${time}</span>
                        </td>
                        <td class="font-bold text-white">${row.symbol}</td>
                        <td class="font-bold ${sideClass}">${row.side}</td>
                        <td class="text-slate-300 font-mono">${parseFloat(row.price).toLocaleString()}</td>
                        <td class="text-slate-300 font-mono">
                            <div>${row.qty} <span class="text-[10px] text-slate-500">QTY</span></div>
                            <div class="text-[10px] text-emerald-500/70">₩${krwValue}</div>
                        </td>
                        <td class="text-slate-500 text-[10px]">
                            <div>${row.commission} ${row.commissionAsset}</div>
                            <div class="binance-gold">약 ₩${commissionKrw}</div>
                        </td>
                    </tr>`;
            });
        }

        function renderSummaryTable(data) {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            if (!data || data.length === 0 || data.msg) {
                body.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-slate-500">분석할 거래 데이터가 없습니다.</td></tr>`;
                return;
            }

            const summary = {};
            data.forEach(row => {
                if (!summary[row.symbol]) {
                    summary[row.symbol] = { buy: 0, sell: 0, fees: 0 };
                }
                const amount = parseFloat(row.quoteQty);
                if (row.side === 'BUY') summary[row.symbol].buy += amount;
                else summary[row.symbol].sell += amount;
                summary[row.symbol].fees += parseFloat(row.commission);
            });

            head.innerHTML = `<tr><th class="py-4 px-4">심볼</th><th>총 매수/매도 대금</th><th>실현 순익 (USD)</th><th>실현 순익 (KRW)</th></tr>`;
            
            Object.keys(summary).forEach(symbol => {
                const s = summary[symbol];
                const netProfit = s.sell - s.buy;
                const krwProfit = (netProfit * usdToKrw).toLocaleString(undefined, { maximumFractionDigits: 0 });

                body.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="py-4 px-4 font-bold text-base text-white">${symbol}</td>
                        <td class="font-mono text-[11px]">
                            <div class="text-emerald-500">B: $${s.buy.toLocaleString()}</div>
                            <div class="text-red-400">S: $${s.sell.toLocaleString()}</div>
                        </td>
                        <td class="font-bold font-mono ${netProfit >= 0 ? 'text-emerald-400' : 'text-red-500'}">
                            ${netProfit >= 0 ? '+' : ''}$${netProfit.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </td>
                        <td class="font-bold font-mono ${netProfit >= 0 ? 'text-emerald-400' : 'text-red-500'}">
                            ${netProfit >= 0 ? '+' : ''}₩${krwProfit}
                        </td>
                    </tr>`;
            });
        }

        init();
    </script>
</body>
</html>
