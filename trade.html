<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite | AI Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #e2e8f0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .bg-binance-gold { background-color: #F3BA2F; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: #F3BA2F; outline: none; background: rgba(255,255,255,0.1); }
        .btn-primary { background-color: #F3BA2F; color: black; font-weight: 700; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 4px 20px rgba(243, 186, 47, 0.2); }
        .tab-btn { color: #64748b; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #F3BA2F; border-bottom: 2px solid #F3BA2F; }
        
        .table-wrapper { max-height: 500px; overflow-y: auto; scrollbar-gutter: stable; }
        thead th { position: sticky; top: 0; background: #0c1220; z-index: 10; border-bottom: 2px solid rgba(243, 186, 47, 0.2); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(243, 186, 47, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(243, 186, 47, 0.5); }

        .row-clickable { cursor: pointer; transition: background 0.2s; }
        .row-clickable:hover { background: rgba(243, 186, 47, 0.05) !important; }

        .ai-gradient { background: linear-gradient(135deg, #F3BA2F 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes pulse-gold { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .ai-loading { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back
                </a>
                <div class="h-4 w-[1px] bg-white/10"></div>
                <h1 class="font-bold tracking-tight text-lg uppercase">Trading <span class="binance-gold">Terminal</span></h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2">
                <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
                <span id="user-display" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Checking...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left Sidebar -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel rounded-[2.5rem] p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-binance-gold/10 flex items-center justify-center">
                        <svg class="w-6 h-6 binance-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"></path></svg>
                    </div>
                    <div>
                        <h2 class="font-bold">API 설정</h2>
                        <p id="api-status-text" class="text-[10px] text-slate-500 uppercase">연결 대기 중</p>
                    </div>
                </div>

                <form id="api-storage-form" class="space-y-4">
                    <input type="password" id="input-api-key" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="API Key">
                    <input type="password" id="input-secret-key" required class="input-field w-full px-4 py-3 rounded-xl text-sm" placeholder="Secret Key">
                    <button type="submit" class="w-full btn-primary py-3 rounded-xl text-sm">설정 업데이트</button>
                </form>
            </div>

            <div class="glass-panel rounded-[2.5rem] p-8">
                <h3 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-[0.2em]">조회 필터</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase ml-1">시작일</label>
                            <input type="date" id="start-date" class="input-field w-full px-3 py-2 rounded-lg text-[11px]">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-500 uppercase ml-1">종료일</label>
                            <input type="date" id="end-date" class="input-field w-full px-3 py-2 rounded-lg text-[11px]">
                        </div>
                    </div>
                    <button onclick="fetchHistory()" class="w-full bg-white/5 hover:bg-binance-gold hover:text-black border border-white/10 py-3 rounded-xl text-xs font-bold transition-all">전체 내역 불러오기</button>
                </div>
            </div>

            <!-- AI Analysis Button -->
            <div class="glass-panel rounded-[2.5rem] p-8 border-binance-gold/30">
                <div class="flex items-center gap-2 mb-4">
                    <span class="p-1.5 bg-binance-gold/20 rounded-lg">
                        <svg class="w-4 h-4 binance-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </span>
                    <h3 class="text-xs font-bold uppercase tracking-widest ai-gradient">AI Trading Insights</h3>
                </div>
                <p class="text-[11px] text-slate-400 mb-6 leading-relaxed">선택한 기간의 데이터를 AI가 분석하여 당신의 매매 습관과 개선점을 제안합니다.</p>
                <button onclick="analyzeTrading()" id="ai-analyze-btn" class="w-full py-3 bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-black font-bold rounded-xl text-xs transition-all flex items-center justify-center gap-2">
                    <span id="ai-btn-text">매매 패턴 분석하기</span>
                </button>
            </div>
        </div>

        <!-- Right Terminal -->
        <div class="lg:col-span-8 flex flex-col gap-6">
            <!-- AI Result Panel (Hidden by default) -->
            <div id="ai-result-panel" class="hidden glass-panel rounded-[2.5rem] p-8 border-binance-gold/20 overflow-hidden relative">
                <div class="absolute top-0 right-0 p-4">
                    <button onclick="document.getElementById('ai-result-panel').classList.add('hidden')" class="text-slate-500 hover:text-white">✕</button>
                </div>
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 rounded-full bg-binance-gold flex items-center justify-center animate-pulse">
                        <svg class="w-5 h-5 text-black" fill="currentColor" viewBox="0 0 20 20"><path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 015.25-2.906z"></path></svg>
                    </div>
                    <h2 class="font-bold text-lg ai-gradient">AI 종합 진단 리포트</h2>
                </div>
                <div id="ai-content" class="text-sm leading-relaxed text-slate-300 space-y-4 whitespace-pre-line">
                    <!-- AI 분석 내용이 여기에 들어감 -->
                </div>
            </div>

            <div class="glass-panel rounded-[2.5rem] p-8 min-h-[500px] flex flex-col">
                <div class="flex items-center justify-between border-b border-white/5 mb-6">
                    <div class="flex gap-6 items-end">
                        <button onclick="switchTab('summary')" id="tab-summary" class="tab-btn active pb-4 text-sm font-bold transition-all">심볼별 요약</button>
                        <button onclick="switchTab('futures')" id="tab-futures" class="tab-btn pb-4 text-sm font-bold transition-all">선물 거래 내역</button>
                        <div id="filter-indicator" class="hidden pb-4 flex items-center gap-2">
                            <span class="w-[1px] h-3 bg-white/20"></span>
                            <span id="active-symbol" class="text-[11px] font-bold binance-gold uppercase bg-binance-gold/10 px-2 py-0.5 rounded"></span>
                            <button onclick="clearSymbolFilter()" class="text-slate-500 hover:text-white text-[10px]">✕</button>
                        </div>
                    </div>
                    <div id="data-count" class="text-[10px] text-slate-500 font-mono pb-4">0 Rows Loaded</div>
                </div>

                <div id="loading-state" class="hidden flex-1 flex flex-col items-center justify-center py-20">
                    <div class="w-10 h-10 border-2 border-binance-gold border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-xs text-slate-500">데이터 처리 중...</p>
                </div>

                <div id="empty-state" class="flex-1 flex flex-col items-center justify-center py-20 text-center">
                    <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <p class="text-sm text-slate-500">데이터를 불러와 분석을 시작하세요.</p>
                </div>

                <!-- Table Container with Scroller -->
                <div id="table-container" class="hidden table-wrapper">
                    <table class="w-full text-left text-xs relative">
                        <thead id="table-head"></thead>
                        <tbody id="table-body" class="mono divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://pcmrpxcpjynmayactgan.supabase.co";
        const SUPABASE_KEY = "sb_publishable_endfjcxVBfda-lzjOpPbrQ_DTdF3MHZ";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const apiKey = ""; // Gemini API Key (Runtime provided)

        let currentTab = 'summary'; // 기본 탭을 요약으로 변경
        let userConfig = null;
        let currentUser = null;
        let rawTradeData = [];
        let usdToKrw = 1350;
        let selectedSymbol = null;

        const initDates = () => {
            const today = new Date();
            const lastWeek = new Date(today);
            lastWeek.setDate(today.getDate() - 7);
            document.getElementById('start-date').value = lastWeek.toISOString().split('T')[0];
            document.getElementById('end-date').value = today.toISOString().split('T')[0];
        };

        async function init() {
            initDates();
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            currentUser = session.user;
            document.getElementById('user-display').innerText = currentUser.email;
            document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-emerald-500');

            const { data } = await sb.from('user_settings').select('*').eq('user_id', currentUser.id).maybeSingle();
            if (data) {
                userConfig = data;
                document.getElementById('input-api-key').value = "****************";
                document.getElementById('input-secret-key').value = "****************";
                document.getElementById('api-status-text').innerText = "API 연결 완료";
                document.getElementById('api-status-text').classList.add('text-emerald-500');
            }
        }

        async function fetchHistory() {
            if (!userConfig) { alert("API 설정을 완료해주세요."); return; }
            const start = new Date(document.getElementById('start-date').value).getTime();
            const end = new Date(document.getElementById('end-date').value).getTime();

            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('table-container').classList.add('hidden');

            try {
                await getFuturesTrades(start, end);
                renderContent();
            } catch (err) {
                alert("데이터 조회 오류: " + err.message);
            } finally {
                document.getElementById('loading-state').classList.add('hidden');
            }
        }

        async function getFuturesTrades(startTime, endTime) {
            const endpoint = "https://fapi.binance.com/fapi/v1/userTrades";
            const timestamp = Date.now();
            const query = `startTime=${startTime}&endTime=${endTime}&limit=1000&timestamp=${timestamp}`;
            const signature = CryptoJS.HmacSHA256(query, userConfig.binance_secret).toString();
            
            const response = await fetch(`${endpoint}?${query}&signature=${signature}`, {
                headers: { 'X-MBX-APIKEY': userConfig.binance_key }
            });
            
            const result = await response.json();
            if (Array.isArray(result)) {
                // 실제 체결되지 않았거나 데이터가 비정상적인 경우 필터링 (주문 취소 등)
                // 선물 거래의 경우 realizedPnl이 0이어도 체결 건일 수 있으므로 qty가 0보다 큰지 확인
                rawTradeData = result
                    .filter(t => parseFloat(t.qty) > 0) 
                    .sort((a, b) => b.time - a.time);
                document.getElementById('data-count').innerText = `${rawTradeData.length} Rows Loaded`;
            } else throw new Error(result.msg);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderContent();
        }

        function filterBySymbol(symbol) {
            selectedSymbol = symbol;
            document.getElementById('active-symbol').innerText = symbol;
            document.getElementById('filter-indicator').classList.remove('hidden');
            switchTab('futures');
        }

        function clearSymbolFilter() {
            selectedSymbol = null;
            document.getElementById('filter-indicator').classList.add('hidden');
            renderContent();
        }

        // --- AI Analysis Logic ---

        async function analyzeTrading() {
            if (rawTradeData.length === 0) {
                alert("분석할 거래 내역이 없습니다. 먼저 데이터를 불러오세요.");
                return;
            }

            const btn = document.getElementById('ai-analyze-btn');
            const btnText = document.getElementById('ai-btn-text');
            const resultPanel = document.getElementById('ai-result-panel');
            const aiContent = document.getElementById('ai-content');

            btn.disabled = true;
            btnText.innerText = "AI 분석 진행 중...";
            btn.classList.add('ai-loading');
            resultPanel.classList.remove('hidden');
            aiContent.innerHTML = `<div class="flex items-center gap-2 text-slate-400"><div class="w-4 h-4 border-2 border-binance-gold border-t-transparent rounded-full animate-spin"></div>데이터 패턴을 추출하는 중...</div>`;

            // AI에 전달할 데이터 요약
            const analysisData = rawTradeData.slice(0, 100).map(t => ({
                t: new Date(t.time).toLocaleString(),
                s: t.symbol,
                sd: t.side,
                p: t.price,
                q: parseFloat(t.quoteQty).toFixed(0),
                r: t.realizedPnl
            }));

            const prompt = `당신은 전문 암호화폐 트레이딩 분석가입니다. 다음은 사용자의 최근 100건의 바이낸스 선물 거래 내역입니다. 이 데이터를 분석하여 다음 항목에 대해 상세히 답해주세요:
            1. 매매 스타일 진단 (단타, 스윙, 뇌동매매 여부 등)
            2. 수익이 발생하는 시간대나 특정 심볼의 패턴
            3. 손실이 발생하는 주요 원인 (추격 매수, 물타기, 손절 부재 등)
            4. 수익률 향상을 위한 구체적인 조언
            
            데이터: ${JSON.stringify(analysisData)}
            
            답변은 한국어로, 친절하지만 냉철하게 분석해주시고, 가독성 좋게 불렛포인트와 섹션을 나누어 작성해주세요.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "당신은 세계 최고의 퀀트 트레이더이자 리스크 관리 전문가입니다. 사용자의 거래 데이터를 보고 돈을 잃지 않는 법을 가르칩니다." }] }
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "분석 결과를 가져오지 못했습니다.";
                
                aiContent.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b class="binance-gold">$1</b>');
                resultPanel.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                aiContent.innerText = "AI 분석 중 오류가 발생했습니다: " + err.message;
            } finally {
                btn.disabled = false;
                btnText.innerText = "매매 패턴 분석하기";
                btn.classList.remove('ai-loading');
            }
        }

        // --- Rendering Logic ---

        function renderContent() {
            if (rawTradeData.length === 0) return;
            const body = document.getElementById('table-body');
            body.innerHTML = "";
            document.getElementById('table-container').classList.remove('hidden');

            if (currentTab === 'futures') renderFuturesTable();
            else if (currentTab === 'summary') renderSummaryTable();
        }

        function renderFuturesTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            head.innerHTML = `<tr class="bg-[#0c1220]"><th class="py-4 px-4">시간</th><th class="py-4">심볼</th><th class="py-4">사이드</th><th class="py-4 text-right">가격</th><th class="py-4 text-right">거래대금</th><th class="py-4 px-4 text-right">PnL</th></tr>`;

            const displayData = selectedSymbol ? rawTradeData.filter(d => d.symbol === selectedSymbol) : rawTradeData;

            displayData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-white/5 hover:bg-white/5 transition-colors";
                const pnl = parseFloat(row.realizedPnl || 0);
                const pnlClass = pnl > 0 ? 'text-emerald-400' : pnl < 0 ? 'text-red-500' : 'text-slate-500';

                tr.innerHTML = `
                    <td class="py-3 px-4 text-[10px] text-slate-500">${new Date(row.time).toLocaleString()}</td>
                    <td class="font-bold text-white">${row.symbol}</td>
                    <td class="${row.side === 'BUY' ? 'text-emerald-400' : 'text-red-400'} font-bold">${row.side}</td>
                    <td class="text-right font-mono">${parseFloat(row.price).toLocaleString()}</td>
                    <td class="text-right font-mono text-slate-400">$${parseFloat(row.quoteQty).toFixed(0).toLocaleString()}</td>
                    <td class="px-4 text-right font-bold ${pnlClass}">${pnl > 0 ? '+' : ''}${pnl.toFixed(2)}</td>
                `;
                body.appendChild(tr);
            });
        }

        function renderSummaryTable() {
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            const summary = {};
            
            rawTradeData.forEach(row => {
                if (!summary[row.symbol]) summary[row.symbol] = { pnl: 0, count: 0, volume: 0 };
                summary[row.symbol].pnl += parseFloat(row.realizedPnl || 0);
                summary[row.symbol].volume += parseFloat(row.quoteQty);
                summary[row.symbol].count++;
            });

            head.innerHTML = `<tr class="bg-[#0c1220]"><th class="py-4 px-4">심볼</th><th class="py-4">횟수</th><th class="py-4 text-right">총 거래량</th><th class="py-4 px-4 text-right">총 실현 손익</th></tr>`;
            
            Object.keys(summary).sort((a,b) => summary[b].pnl - summary[a].pnl).forEach(symbol => {
                const s = summary[symbol];
                const tr = document.createElement('tr');
                tr.className = "border-b border-white/5 row-clickable";
                tr.onclick = () => filterBySymbol(symbol);
                tr.innerHTML = `
                    <td class="py-4 px-4 font-bold text-white">${symbol}</td>
                    <td class="text-slate-400">${s.count}회</td>
                    <td class="text-right text-slate-400">$${s.volume.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="px-4 text-right font-bold ${s.pnl >= 0 ? 'text-emerald-400' : 'text-red-500'} text-sm">
                        ${s.pnl >= 0 ? '+' : ''}$${s.pnl.toLocaleString(undefined, {minimumFractionDigits: 2})}
                    </td>`;
                body.appendChild(tr);
            });
        }

        init();
    </script>
</body>
</html>
