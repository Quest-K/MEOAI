<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite | Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050810; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .bg-binance-gold { background-color: #F3BA2F; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: #F3BA2F; outline: none; background: rgba(255,255,255,0.1); }
        .btn-primary { background-color: #F3BA2F; color: black; font-weight: 700; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); box-shadow: 0 4px 20px rgba(243, 186, 47, 0.2); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="border-b border-white/5 bg-black/20 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="home.html" class="text-slate-400 hover:text-white transition-colors flex items-center gap-2 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back
                </a>
                <div class="h-4 w-[1px] bg-white/10"></div>
                <h1 class="font-bold tracking-tight text-lg">TRADING <span class="binance-gold">TERMINAL</span></h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span id="user-display" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Checking Session...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-panel rounded-[2.5rem] p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-binance-gold/10 flex items-center justify-center">
                        <svg class="w-6 h-6 binance-gold" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                    </div>
                    <div>
                        <h2 class="font-bold">Binance API</h2>
                        <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Connection Settings</p>
                    </div>
                </div>

                <form id="api-storage-form" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">API Key</label>
                        <input type="password" id="input-api-key" required class="input-field w-full px-4 py-4 rounded-2xl text-sm" placeholder="Input Key...">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Secret Key</label>
                        <input type="password" id="input-secret-key" required class="input-field w-full px-4 py-4 rounded-2xl text-sm" placeholder="Input Secret...">
                    </div>
                    <button type="submit" id="save-trigger" class="w-full btn-primary py-4 rounded-2xl mt-4 text-sm">
                        설정 저장 및 연결
                    </button>
                </form>
                <div id="notify-box" class="mt-4 text-[11px] text-center hidden p-3 rounded-xl border"></div>
            </div>

            <div class="glass-panel rounded-[2.5rem] p-8">
                <h3 class="text-xs font-bold text-slate-400 mb-6 uppercase tracking-[0.2em]">Portfolio Summary</h3>
                <div class="space-y-2">
                    <div class="flex justify-between items-baseline">
                        <span class="text-3xl font-bold tracking-tighter">$ 0.00</span>
                        <span class="text-xs text-emerald-400 font-bold">+0.00%</span>
                    </div>
                    <p class="text-[10px] text-slate-600 font-medium uppercase">Last updated: Just now</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="glass-panel rounded-[2.5rem] flex-1 flex flex-col items-center justify-center p-12 text-center border-dashed border-white/10">
                <div class="w-20 h-20 bg-white/5 rounded-[2rem] flex items-center justify-center mb-6 rotate-12">
                    <svg class="w-10 h-10 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h3 class="text-2xl font-bold mb-3 italic">Terminal Restricted</h3>
                <p class="text-slate-500 text-sm max-w-sm mx-auto leading-relaxed">
                    API 키가 등록되지 않았습니다. 바이낸스 계정의 데이터를 안전하게 불러오기 위해 설정을 먼저 완료해 주세요.
                </p>
            </div>
        </div>
    </main>

    <script>
        // Supabase 인스턴스 초기화 (사용자 프로젝트 정보 적용)
        const SUPABASE_URL = "https://pcmrpxcpjynmayactgan.supabase.co";
        const SUPABASE_KEY = "sb_publishable_endfjcxVBfda-lzjOpPbrQ_DTdF3MHZ";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const apiForm = document.getElementById('api-storage-form');
        const notifyBox = document.getElementById('notify-box');
        const saveTrigger = document.getElementById('save-trigger');
        let currentSessionUser = null;

        async function initializeTerminal() {
            // 1. 세션 확인
            const { data: { session }, error } = await sb.auth.getSession();
            if (!session) {
                window.location.href = 'index.html'; // 로그인 안되어있으면 튕김
                return;
            }
            currentSessionUser = session.user;
            
            // 2. 상단 UI 업데이트
            document.getElementById('user-display').innerText = currentSessionUser.email;
            document.querySelector('#connection-status span').className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";

            // 3. 기존 저장된 API 키가 있는지 조회
            fetchSavedConfig();
        }

        async function fetchSavedConfig() {
            try {
                const { data, error } = await sb
                    .from('user_settings')
                    .select('binance_key')
                    .eq('user_id', currentSessionUser.id)
                    .maybeSingle();

                if (data) {
                    document.getElementById('input-api-key').value = "********************";
                    document.getElementById('input-secret-key').value = "********************";
                    saveTrigger.innerText = "설정 업데이트";
                    showNotification("기존 설정이 안전하게 로드되었습니다.", false);
                }
            } catch (err) {
                console.error("Config fetch error:", err);
            }
        }

        apiForm.onsubmit = async (e) => {
            e.preventDefault();
            const bKey = document.getElementById('input-api-key').value;
            const bSecret = document.getElementById('input-secret-key').value;

            // 마스킹된 상태로 저장을 누르는 경우 방지
            if (bKey.includes('***')) {
                showNotification("수정할 새로운 키를 입력해 주세요.", true);
                return;
            }

            saveTrigger.disabled = true;
            saveTrigger.innerText = "시스템 암호화 중...";

            try {
                // Supabase의 user_settings 테이블에 upsert (없으면 생성, 있으면 수정)
                const { error } = await sb
                    .from('user_settings')
                    .upsert({ 
                        user_id: currentSessionUser.id,
                        binance_key: bKey,
                        binance_secret: bSecret,
                        updated_at: new Date()
                    });

                if (error) throw error;

                showNotification("API 정보가 Supabase 클라우드에 저장되었습니다.", false);
                saveTrigger.innerText = "설정 업데이트";
            } catch (err) {
                showNotification("저장 실패: " + err.message, true);
                saveTrigger.innerText = "다시 시도";
            } finally {
                saveTrigger.disabled = false;
            }
        };

        function showNotification(msg, isError) {
            notifyBox.innerText = msg;
            notifyBox.className = `mt-4 text-[11px] text-center p-3 rounded-xl border ${
                isError ? 'text-red-400 border-red-400/20 bg-red-400/5' : 'text-emerald-400 border-emerald-400/20 bg-emerald-400/5'
            }`;
            notifyBox.classList.remove('hidden');
        }

        initializeTerminal();
    </script>
</body>
</html>
