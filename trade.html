<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-Suite | Quant Market Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .binance-gold { color: #F3BA2F; }
        .btn-primary { background-color: #F3BA2F; color: black; font-weight: 700; transition: all 0.2s; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; }
        .input-field:focus { border-color: #F3BA2F; outline: none; }
        .table-wrapper { max-height: 600px; overflow-y: auto; }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background: rgba(243, 186, 47, 0.05); }
        .indicator-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .tag-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .tag-gold { background: rgba(243, 186, 47, 0.1); color: #F3BA2F; border: 1px solid rgba(243, 186, 47, 0.2); }
        
        /* 로딩 애니메이션 */
        .loader { width: 16px; height: 16px; border: 2px solid #F3BA2F; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="border-b border-white/5 bg-slate-950/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-binance-gold rounded-lg flex items-center justify-center text-black font-black">C</div>
                <span class="font-bold tracking-tighter text-xl uppercase">C-Suite <span class="binance-gold font-light">Quant Scanner</span></span>
            </div>
            <div class="flex items-center gap-4 text-[10px] mono">
                <span id="api-status" class="text-slate-500 italic uppercase">Trading System Online</span>
            </div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6 space-y-6">
        <div class="grid grid-cols-12 gap-6">
            
            <!-- 필터 설정 사이드바 -->
            <div class="col-span-12 lg:col-span-3 space-y-6">
                <div class="glass-panel rounded-3xl p-6">
                    <h3 class="text-xs font-bold text-slate-500 mb-6 uppercase tracking-widest border-b border-white/5 pb-2">Technical Filters</h3>
                    
                    <div class="space-y-5">
                        <!-- 1) 고점 대비 경과 시간 -->
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-2 font-bold uppercase">1. 고점 경과 시간 (24h High)</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="filter-high-minutes" class="input-field w-full" value="60" placeholder="분">
                                <span class="text-xs text-slate-500 min-w-max">분 이상</span>
                            </div>
                            <p class="text-[9px] text-slate-500 mt-1 italic">* 24시간 최고점 도달 후 경과된 시간</p>
                        </div>

                        <!-- 2) 이동평균선 추세 조건 -->
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-2 font-bold uppercase">2. 이동평균선 추세 (MA 30/60)</label>
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" id="filter-ma-bearish" checked class="accent-binance-gold">
                                    <span class="text-xs text-slate-300 group-hover:text-white transition-colors">MA 30/60 역배열 (현재가 아래)</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" id="filter-ma-slope" checked class="accent-binance-gold">
                                    <span class="text-xs text-slate-300 group-hover:text-white transition-colors">MA 30/60 하락 추세</span>
                                </label>
                            </div>
                        </div>

                        <!-- 3) 기본 시장 조건 -->
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-2 font-bold uppercase">3. 기본 거래대금 (24h)</label>
                            <select id="filter-vol" class="input-field w-full">
                                <option value="50000000">$50M+</option>
                                <option value="100000000" selected>$100M+</option>
                                <option value="300000000">$300M+</option>
                            </select>
                        </div>

                        <button id="scan-btn" onclick="startQuantScan()" class="w-full btn-primary py-4 rounded-xl text-xs uppercase shadow-lg shadow-binance-gold/10">
                            Apply & Run Scanner
                        </button>
                    </div>
                </div>

                <!-- 실시간 상태 요약 -->
                <div id="scan-status-box" class="hidden glass-panel rounded-3xl p-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">Scan Progress</span>
                        <span id="progress-percent" class="text-[10px] binance-gold mono">0%</span>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-binance-gold transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <p id="progress-label" class="text-[9px] text-slate-500 mt-2 italic text-center">바이낸스 선물 종목 분석 중...</p>
                </div>
            </div>

            <!-- 메인 스캐너 결과 리스트 -->
            <div class="col-span-12 lg:col-span-9 space-y-6">
                <div class="flex items-center justify-between border-b border-white/5 pb-2">
                    <div class="flex gap-4">
                        <h3 class="text-sm font-black tracking-widest binance-gold">QUANT SCAN RESULTS</h3>
                        <span id="match-count" class="text-[10px] mono text-slate-500 self-center">WAITING FOR SCAN</span>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] text-slate-500 mono">
                        <span>API LIMIT: <span id="api-limit" class="text-emerald-500">GOOD</span></span>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl">
                    <div class="table-wrapper">
                        <table class="w-full text-left text-[11px]">
                            <thead>
                                <tr class="bg-slate-900/50">
                                    <th class="p-4 text-slate-500 uppercase font-bold">Symbol</th>
                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">Current Price</th>
                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">High Elapsed</th>
                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">Trend Signal</th>
                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">24h Vol</th>
                                    <th class="p-4 text-center text-slate-500 uppercase font-bold">Analysis</th>
                                </tr>
                            </thead>
                            <tbody id="result-tbody" class="mono divide-y divide-white/5">
                                <tr>
                                    <td colspan="6" class="p-32 text-center">
                                        <div class="text-slate-600 mb-2 font-bold uppercase tracking-widest text-xs">No Data Loaded</div>
                                        <div class="text-[10px] text-slate-500">좌측 필터를 설정하고 스캐너를 실행하세요.</div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 차트 뷰어 (선택 시 노출) -->
                <div id="chart-viewer" class="hidden space-y-4">
                    <div class="flex items-center justify-between">
                        <h4 id="selected-symbol-title" class="text-sm font-bold binance-gold">---</h4>
                        <button onclick="document.getElementById('chart-viewer').classList.add('hidden')" class="text-slate-500 hover:text-white">✕ Close</button>
                    </div>
                    <div id="tv_chart_container" class="h-[500px] w-full rounded-2xl overflow-hidden border border-white/10"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 전역 상태
        let matchedSymbols = [];

        async function startQuantScan() {
            const btn = document.getElementById('scan-btn');
            const tbody = document.getElementById('result-tbody');
            const statusBox = document.getElementById('scan-status-box');
            
            // UI 초기화
            btn.disabled = true;
            statusBox.classList.remove('hidden');
            tbody.innerHTML = `<tr><td colspan="6" class="p-32 text-center"><span class="loader mr-2"></span> <span class="binance-gold uppercase font-bold text-xs tracking-widest">Applying Quant Algorithms...</span></td></tr>`;

            try {
                // 1. 전체 선물 티커 정보 가져오기 (24시간 데이터)
                const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');
                const tickers = await res.json();
                
                // 기본 거래대금 필터링 ($100M 이상 등)
                const minVol = parseFloat(document.getElementById('filter-vol').value);
                const filteredTickers = tickers.filter(t => t.symbol.endsWith('USDT') && parseFloat(t.quoteVolume) >= minVol);
                
                matchedSymbols = [];
                const total = filteredTickers.length;
                
                // 필터 조건 값
                const minHighElapsed = parseInt(document.getElementById('filter-high-minutes').value);
                const checkMABearish = document.getElementById('filter-ma-bearish').checked;
                const checkMASlope = document.getElementById('filter-ma-slope').checked;

                // 2. 종목별 캔들 데이터 심층 분석 (순차적/병렬 처리)
                // 바이낸스 API 제한을 피하기 위해 10개씩 묶어서 처리
                for(let i=0; i < total; i++) {
                    const ticker = filteredTickers[i];
                    
                    // 진행률 표시
                    const progress = Math.round(((i + 1) / total) * 100);
                    document.getElementById('progress-bar').style.width = `${progress}%`;
                    document.getElementById('progress-percent').innerText = `${progress}%`;
                    document.getElementById('progress-label').innerText = `Analyzing ${ticker.symbol}... (${i+1}/${total})`;

                    // 24시간 최고점으로부터 경과 시간 계산
                    // 캔들 데이터를 불러오기 전에 24시간 티커의 highPrice가 언제 발생했는지 직접 알 수는 없으므로, 
                    // 1분봉 캔들 1440개를 가져와서 고점 위치를 찾습니다.
                    const klRes = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${ticker.symbol}&interval=1m&limit=1440`);
                    const klines = await klRes.json();
                    
                    if (klines.length < 100) continue;

                    // 퀀트 분석 엔진 가동
                    const analysis = runQuantAnalysis(klines, ticker, {
                        minHighElapsed,
                        checkMABearish,
                        checkMASlope
                    });

                    if (analysis.isMatch) {
                        matchedSymbols.push({
                            ...ticker,
                            quant: analysis
                        });
                    }
                }

                renderResults();
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-rose-500">Scan failed: ${err.message}</td></tr>`;
            } finally {
                btn.disabled = false;
                statusBox.classList.add('hidden');
            }
        }

        /**
         * 퀀트 분석 알고리즘
         */
        function runQuantAnalysis(klines, ticker, config) {
            // 캔들 구조: [시간, 시가, 고가, 저가, 종가, 거래량, ...]
            const prices = klines.map(k => parseFloat(k[4]));
            const highs = klines.map(k => parseFloat(k[2]));
            const currentTime = Date.now();
            
            // 1. 고점 경과 시간 계산
            let maxHigh = 0;
            let maxHighIndex = 0;
            highs.forEach((h, idx) => {
                if(h > maxHigh) {
                    maxHigh = h;
                    maxHighIndex = idx;
                }
            });
            
            const highTime = klines[maxHighIndex][0];
            const elapsedMinutes = Math.floor((currentTime - highTime) / (1000 * 60));
            
            const cond1 = elapsedMinutes >= config.minHighElapsed;

            // 2. 이동평균선(MA 30, 60) 계산
            const ma30 = calculateMA(prices, 30);
            const ma60 = calculateMA(prices, 60);
            const currentPrice = prices[prices.length - 1];

            // 역배열 및 하락 추세 확인
            let cond2 = true;
            if (config.checkMABearish) {
                // 현재가가 이평선들보다 아래에 있는지
                cond2 = currentPrice < ma30 && currentPrice < ma60;
            }

            let cond3 = true;
            if (config.checkMASlope) {
                // 이평선이 이전 값들보다 낮아지고 있는지 (최근 5봉 기준 하락 기울기)
                const prevMa30 = calculateMA(prices.slice(0, -5), 30);
                const prevMa60 = calculateMA(prices.slice(0, -5), 60);
                cond3 = ma30 < prevMa30 && ma60 < prevMa60;
            }

            return {
                isMatch: cond1 && cond2 && cond3,
                elapsedMinutes,
                ma30,
                ma60,
                slope: ma30 < calculateMA(prices.slice(0, -5), 30) ? 'DOWN' : 'UP'
            };
        }

        function calculateMA(data, period) {
            if (data.length < period) return 0;
            const slice = data.slice(-period);
            return slice.reduce((a, b) => a + b, 0) / period;
        }

        function renderResults() {
            const tbody = document.getElementById('result-tbody');
            document.getElementById('match-count').innerText = `${matchedSymbols.length} SYMBOLS MATCHED`;
            
            if (matchedSymbols.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-32 text-center text-slate-500 uppercase font-bold text-xs tracking-widest">No Symbols Match Your Criteria</td></tr>`;
                return;
            }

            tbody.innerHTML = matchedSymbols.map(item => {
                const change = parseFloat(item.priceChangePercent);
                const vol = (parseFloat(item.quoteVolume) / 1000000).toFixed(1);
                
                return `
                    <tr class="clickable-row border-b border-white/5" onclick="showChart('${item.symbol}')">
                        <td class="p-4">
                            <div class="font-black text-white text-sm">${item.symbol}</div>
                            <div class="text-[9px] text-slate-500 uppercase">Binance Perpetual</div>
                        </td>
                        <td class="p-4 text-right mono font-bold">
                            ${parseFloat(item.lastPrice).toLocaleString()}
                            <div class="text-[9px] ${change >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${change >= 0 ? '+' : ''}${change}%</div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="text-xs binance-gold font-black">${item.quant.elapsedMinutes}m</div>
                            <div class="text-[9px] text-slate-500 uppercase">Since 24h High</div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex flex-col items-end gap-1">
                                <span class="indicator-tag tag-red">Bearish MA Break</span>
                                <span class="indicator-tag tag-gold">MA Slope Down</span>
                            </div>
                        </td>
                        <td class="p-4 text-right mono text-slate-400">$${vol}M</td>
                        <td class="p-4 text-center">
                            <button class="bg-white/5 hover:bg-white/10 p-2 rounded-lg transition-all group">
                                <svg class="w-4 h-4 text-slate-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function showChart(symbol) {
            document.getElementById('chart-viewer').classList.remove('hidden');
            document.getElementById('selected-symbol-title').innerText = `${symbol} QUANT ANALYSIS CHART`;
            
            new TradingView.widget({
                "autosize": true,
                "symbol": `BINANCE:${symbol}PERP`,
                "interval": "15",
                "timezone": "Asia/Seoul",
                "theme": "dark",
                "style": "1",
                "locale": "kr",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tv_chart_container",
                "studies": [
                    "MASimple@tv-basicstudies",
                    "MASimple@tv-basicstudies"
                ],
                "overrides": {
                    "mainSeriesProperties.style": 1,
                    "paneProperties.background": "#020617"
                }
            });
            
            document.getElementById('chart-viewer').scrollIntoView({ behavior: 'smooth' });
        }

        // 초기 메시지
        console.log("C-Suite Terminal: Quant Logic Ready.");
    </script>
</body>
</html>
