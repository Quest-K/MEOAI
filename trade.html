
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro | MeoTrader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .binance-card { background-color: #1e2329; border-radius: 12px; border: 1px solid #2b3139; }
        .accent-yellow { color: #fcd535; }
        .status-up { color: #0ecb81; }
        .status-down { color: #f6465d; }
        .glass-header { background: rgba(30, 35, 41, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
        .search-input { background: #2b3139; border: 1px solid #474d57; color: white; }
        .search-input:focus { border-color: #fcd535; outline: none; }
        .fixed-btc { border-left: 4px solid #f3ba2f; background: rgba(243, 186, 47, 0.05); }
    </style>
</head>
<body class="antialiased pb-10">

    <nav class="glass-header border-b border-[#2b3139] py-4 mb-6">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center font-bold text-black text-xl">M</div>
                <h1 class="text-xl font-bold tracking-tight">Market <span class="accent-yellow">Scanner</span></h1>
            </div>
            <div id="scanIndicator" class="flex items-center gap-2 text-xs text-gray-400">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                실시간 타임프레임(15m/1h/6h/24h) 분석 중...
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4">
        
        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="binance-card p-4">
                <p class="text-gray-500 text-xs font-semibold mb-1 uppercase">분석 종목</p>
                <div id="totalSymbols" class="text-2xl font-bold">---</div>
            </div>
            <div class="binance-card p-4">
                <p class="text-gray-500 text-xs font-semibold mb-1 uppercase text-green-500">Long Signal</p>
                <div id="bullSymbols" class="text-2xl font-bold status-up">---</div>
            </div>
            <div class="binance-card p-4">
                <p class="text-gray-500 text-xs font-semibold mb-1 uppercase text-red-500">Short Signal</p>
                <div id="bearSymbols" class="text-2xl font-bold status-down">---</div>
            </div>
            <div class="binance-card p-4">
                <p class="text-gray-500 text-xs font-semibold mb-1 uppercase text-yellow-500">평균 변동성</p>
                <div id="avgVol" class="text-2xl font-bold accent-yellow">---</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex flex-wrap gap-3 mb-6 items-center">
            <input type="text" id="symbolSearch" placeholder="심볼 검색..." class="search-input px-4 py-2 rounded-lg text-sm w-full md:w-64">
            <div class="flex bg-[#1e2329] p-1 rounded-lg border border-[#2b3139]">
                <button onclick="setFilter('all')" class="px-4 py-1.5 rounded-md text-xs filter-btn active bg-gray-700">전체</button>
                <button onclick="setFilter('gainers')" class="px-4 py-1.5 rounded-md text-xs filter-btn">상승장</button>
                <button onclick="setFilter('volume')" class="px-4 py-1.5 rounded-md text-xs filter-btn">거래대금</button>
            </div>
            <span class="text-[10px] text-gray-500">BTCUSDT는 항상 상단에 고정됩니다.</span>
        </div>

        <!-- Scanner Table -->
        <div class="binance-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-[#2b3139] text-gray-400 text-[10px] uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Symbol</th>
                            <th class="px-6 py-4 text-right">Price</th>
                            <th class="px-6 py-4 text-center">15m</th>
                            <th class="px-6 py-4 text-center">1h</th>
                            <th class="px-6 py-4 text-center">6h</th>
                            <th class="px-6 py-4 text-center">24h (Daily)</th>
                            <th class="px-6 py-4 text-right">Volume</th>
                            <th class="px-6 py-4 text-center">Signal</th>
                        </tr>
                    </thead>
                    <tbody id="opportunityList" class="divide-y divide-[#2b3139]">
                        <tr>
                            <td colspan="8" class="px-6 py-20 text-center text-gray-500">
                                멀티 타임프레임 데이터 로딩 중...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FAPI = "https://fapi.binance.com";
        let allTickerData = [];
        let timeframeCache = {}; // { SYMBOL: { m15: 0, h1: 0, h6: 0 } }
        let currentFilter = 'all';

        async function initScanner() {
            await fetchBaseTickers();
            renderOpportunities();
            updateMultiTimeframes();
        }

        async function fetchBaseTickers() {
            try {
                const res = await fetch(`${FAPI}/fapi/v1/ticker/24hr`);
                const data = await res.json();
                allTickerData = data.filter(i => i.symbol.endsWith('USDT'));
                updateSummary();
            } catch (e) { console.error("Fetch error", e); }
        }

        async function updateMultiTimeframes() {
            // 거래량 상위 종목 우선 분석
            const targets = allTickerData
                .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                .slice(0, 100);

            for (const t of targets) {
                try {
                    // 다양한 타임프레임을 얻기 위해 5분봉 데이터를 활용하여 계산 (API 호출 최소화)
                    // 6시간 변동률을 위해 최소 72개의 5분봉 필요 (60/5 * 6 = 72)
                    const res = await fetch(`${FAPI}/fapi/v1/klines?symbol=${t.symbol}&interval=5m&limit=100`);
                    const klines = await res.json();
                    
                    if (klines.length >= 72) {
                        const currentPrice = parseFloat(klines[klines.length - 1][4]);
                        
                        const getChangeFromKlines = (candlesBack) => {
                            const pastPrice = parseFloat(klines[klines.length - 1 - candlesBack][4]);
                            return ((currentPrice - pastPrice) / pastPrice) * 100;
                        };

                        timeframeCache[t.symbol] = {
                            m15: getChangeFromKlines(3),  // 3 * 5m = 15m
                            h1: getChangeFromKlines(12),  // 12 * 5m = 1h
                            h6: getChangeFromKlines(72)   // 72 * 5m = 6h
                        };
                    }
                } catch (e) {}
                
                if (Object.keys(timeframeCache).length % 5 === 0) renderOpportunities();
            }
        }

        function updateSummary() {
            document.getElementById('totalSymbols').innerText = allTickerData.length;
            const bulls = allTickerData.filter(t => parseFloat(t.priceChangePercent) > 2).length;
            const bears = allTickerData.filter(t => parseFloat(t.priceChangePercent) < -2).length;
            document.getElementById('bullSymbols').innerText = bulls;
            document.getElementById('bearSymbols').innerText = bears;
            
            const avg = allTickerData.reduce((acc, cur) => acc + Math.abs(parseFloat(cur.priceChangePercent)), 0) / allTickerData.length;
            document.getElementById('avgVol').innerText = avg.toFixed(2) + "%";
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-gray-700'));
            event.target.classList.add('bg-gray-700');
            renderOpportunities();
        }

        function renderOpportunities() {
            const listBody = document.getElementById('opportunityList');
            const search = document.getElementById('symbolSearch').value.toUpperCase();
            
            const btcData = allTickerData.find(t => t.symbol === 'BTCUSDT');
            let others = allTickerData.filter(t => t.symbol !== 'BTCUSDT');

            if (currentFilter === 'gainers') others = others.filter(t => parseFloat(t.priceChangePercent) > 0);
            if (currentFilter === 'volume') others.sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
            else others.sort((a, b) => Math.abs(parseFloat(b.priceChangePercent)) - Math.abs(parseFloat(a.priceChangePercent)));

            if (search) {
                others = others.filter(t => t.symbol.includes(search));
            }

            const finalDisplayList = btcData && (!search || btcData.symbol.includes(search)) 
                                    ? [btcData, ...others.slice(0, 49)] 
                                    : others.slice(0, 50);

            listBody.innerHTML = finalDisplayList.map(t => {
                const isBTC = t.symbol === 'BTCUSDT';
                const d24 = parseFloat(t.priceChangePercent);
                const tc = timeframeCache[t.symbol] || { m15: null, h1: null, h6: null };
                
                const formatVal = (val, isMain = false) => {
                    if (val === null) return `<span class="text-gray-600">...</span>`;
                    const colorClass = val >= 0 ? 'status-up' : 'status-down';
                    const weightClass = isMain ? 'font-bold' : '';
                    return `<span class="${colorClass} ${weightClass}">${val >= 0 ? '+' : ''}${val.toFixed(2)}%</span>`;
                };

                return `
                    <tr class="hover:bg-white/5 transition ${isBTC ? 'fixed-btc' : ''}">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                ${isBTC ? '📌' : ''}
                                <span class="font-bold ${isBTC ? 'accent-yellow' : 'text-white'}">${t.symbol.replace('USDT', '')}</span>
                                <span class="text-[10px] text-gray-500">USDT</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right font-mono text-xs">
                            ${parseFloat(t.lastPrice).toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </td>
                        <td class="px-6 py-4 text-center font-mono text-xs">${formatVal(tc.m15)}</td>
                        <td class="px-6 py-4 text-center font-mono text-xs">${formatVal(tc.h1)}</td>
                        <td class="px-6 py-4 text-center font-mono text-xs">${formatVal(tc.h6)}</td>
                        <td class="px-6 py-4 text-center font-mono text-sm bg-white/5">${formatVal(d24, true)}</td>
                        <td class="px-6 py-4 text-right text-gray-400 text-xs">
                            ${(parseFloat(t.quoteVolume) / 1000000).toFixed(1)}M
                        </td>
                        <td class="px-6 py-4 text-center">
                            ${getSignalBadge(d24, tc.m15)}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getSignalBadge(d24, m15) {
            if (m15 > 0.5) return `<span class="text-[9px] bg-green-500/20 text-green-500 px-2 py-0.5 rounded border border-green-500/30 font-bold">15m 급등</span>`;
            if (m15 < -0.5) return `<span class="text-[9px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded border border-red-500/30 font-bold">15m 급락</span>`;
            if (d24 > 5) return `<span class="text-[9px] bg-yellow-500/20 text-yellow-500 px-2 py-0.5 rounded border border-yellow-500/30">강세 유지</span>`;
            return `<span class="text-[9px] bg-gray-800 text-gray-500 px-2 py-0.5 rounded">관망</span>`;
        }

        document.getElementById('symbolSearch').addEventListener('input', renderOpportunities);

        window.onload = initScanner;
        setInterval(fetchBaseTickers, 5000);
        setInterval(updateMultiTimeframes, 30000); // 타임프레임 갱신 주기를 30초로 단축
    </script>
</body>
</html>
