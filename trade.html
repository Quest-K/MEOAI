<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>C-Suite | Terminal Fixed</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');

        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }

        .binance-gold { color: #F3BA2F; }

        .btn-primary { background-color: #F3BA2F; color: black; font-weight: 700; transition: all 0.2s; }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .table-wrapper { max-height: 500px; overflow-y: auto; }

        .clickable-row { cursor: pointer; transition: background 0.2s; }

        .clickable-row:hover { background: rgba(243, 186, 47, 0.05); }

        .tab-trigger { padding: 12px 24px; cursor: pointer; font-size: 12px; font-weight: 700; color: #64748b; border-bottom: 2px solid transparent; }

        .tab-trigger.active { color: #F3BA2F; border-bottom-color: #F3BA2F; background: rgba(243, 186, 47, 0.05); }

        .ai-loading-pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    </style>

</head>

<body class="min-h-screen pb-20">



    <nav class="border-b border-white/5 bg-slate-950/50 backdrop-blur-xl sticky top-0 z-50">

        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">

            <div class="flex items-center gap-2">

                <div class="w-8 h-8 bg-binance-gold rounded-lg flex items-center justify-center text-black font-black">C</div>

                <span class="font-bold tracking-tighter text-xl uppercase">C-Suite <span class="binance-gold font-light">Scanner</span></span>

            </div>

            <div class="flex items-center gap-4 text-[10px] mono">

                <span id="api-status" class="text-rose-500">API KEY REQUIRED</span>

                <div id="status-dot" class="w-2 h-2 rounded-full bg-rose-500"></div>

            </div>

        </div>

    </nav>



    <main class="max-w-[1600px] mx-auto p-6 space-y-6">

        <div class="grid grid-cols-12 gap-6">

            

            <!-- 왼쪽 설정 사이드바 -->

            <div class="col-span-12 lg:col-span-3 space-y-6">

                <div class="glass-panel rounded-3xl p-6">

                    <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">Scanner Filters</h3>

                    <div class="space-y-4">

                        <div>

                            <label class="text-[10px] text-slate-400 block mb-1">Min. Volume (24h)</label>

                            <select id="filter-vol" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-xs text-white">

                                <option value="50000000">$50M+</option>

                                <option value="100000000" selected>$100M+</option>

                                <option value="500000000">$500M+</option>

                            </select>

                        </div>

                        <div>

                            <label class="text-[10px] text-slate-400 block mb-1">Volatility Threshold</label>

                            <select id="filter-change" class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-xs text-white">

                                <option value="3">±3%+</option>

                                <option value="5" selected>±5%+</option>

                                <option value="10">±10%+</option>

                            </select>

                        </div>

                        <button id="scan-btn" onclick="runManualScan()" class="w-full btn-primary py-3 rounded-xl text-xs uppercase">Run Scan Now</button>

                    </div>

                </div>



                <div id="ai-quick-info" class="hidden glass-panel rounded-3xl p-6 border-binance-gold/30">

                    <p class="text-[10px] font-bold binance-gold mb-2 uppercase">AI Status</p>

                    <p id="ai-status-msg" class="text-xs text-slate-400 leading-relaxed italic">준비됨</p>

                </div>

            </div>



            <!-- 오른쪽 메인 테이블/차트 -->

            <div class="col-span-12 lg:col-span-9 space-y-6">

                <div class="flex border-b border-white/5">

                    <div class="tab-trigger active">MARKET SCANNER</div>

                    <div class="ml-auto flex items-center px-4">

                        <span id="match-count" class="text-[10px] mono text-slate-500 font-bold">0 SYMBOLS FOUND</span>

                    </div>

                </div>



                <!-- 스캐너 테이블 -->

                <div class="glass-panel rounded-3xl overflow-hidden">

                    <div class="table-wrapper">

                        <table class="w-full text-left text-[11px]">

                            <thead>

                                <tr class="bg-slate-900/50">

                                    <th class="p-4 text-slate-500 uppercase font-bold">Symbol</th>

                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">Price</th>

                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">24h Change</th>

                                    <th class="p-4 text-right text-slate-500 uppercase font-bold">24h Volume</th>

                                    <th class="p-4 text-center text-slate-500 uppercase font-bold">Action</th>

                                </tr>

                            </thead>

                            <tbody id="scan-tbody" class="mono divide-y divide-white/5">

                                <tr><td colspan="5" class="p-20 text-center text-slate-600">Click 'Run Scan Now' to fetch market data.</td></tr>

                            </tbody>

                        </table>

                    </div>

                </div>



                <!-- 차트 및 분석 패널 -->

                <div id="analysis-zone" class="hidden space-y-6">

                    <div id="tv-container" class="h-[400px] rounded-3xl overflow-hidden border border-white/10"></div>

                    

                    <div id="ai-report-panel" class="glass-panel rounded-3xl p-8 border-l-4 border-binance-gold">

                        <div class="flex justify-between items-center mb-6">

                            <h2 class="text-lg font-bold binance-gold flex items-center gap-2 italic">

                                <span class="not-italic">⚡</span> AI Deep Strategy Report

                            </h2>

                            <button onclick="closeAnalysis()" class="text-slate-500 hover:text-white text-xs">Close Analysis ✕</button>

                        </div>

                        <div id="ai-content" class="text-sm text-slate-300 leading-relaxed whitespace-pre-line"></div>

                    </div>

                </div>

            </div>

        </div>

    </main>



    <script>

        // API 설정 (실제 운영 시 Supabase에서 가져오도록 구현 권장)

        const geminiApiKey = ""; // 여기에 Gemini API Key를 입력하세요.



        let marketSymbols = [];



        async function runManualScan() {

            const btn = document.getElementById('scan-btn');

            const tbody = document.getElementById('scan-tbody');

            

            btn.disabled = true;

            btn.innerText = "SCANNING...";

            tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center"><div class="ai-loading-pulse text-binance-gold">Fetching Binance Market Data...</div></td></tr>`;



            try {

                // 바이낸스 선물 데이터 호출

                const response = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr');

                if (!response.ok) throw new Error("바이낸스 응답 오류");

                

                const data = await response.json();

                

                // 필터 값 가져오기

                const minVol = parseFloat(document.getElementById('filter-vol').value);

                const minChange = parseFloat(document.getElementById('filter-change').value);



                // 데이터 필터링 및 정렬

                marketSymbols = data.filter(item => {

                    const vol = parseFloat(item.quoteVolume);

                    const change = Math.abs(parseFloat(item.priceChangePercent));

                    return item.symbol.endsWith('USDT') && vol >= minVol && change >= minChange;

                }).sort((a, b) => Math.abs(parseFloat(b.priceChangePercent)) - Math.abs(parseFloat(a.priceChangePercent)));



                renderScanner();

            } catch (err) {

                console.error(err);

                tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-rose-500">Error: ${err.message}. Check CORS or Internet connection.</td></tr>`;

            } finally {

                btn.disabled = false;

                btn.innerText = "Run Scan Now";

            }

        }



        function renderScanner() {

            const tbody = document.getElementById('scan-tbody');

            document.getElementById('match-count').innerText = `${marketSymbols.length} SYMBOLS FOUND`;

            

            if (marketSymbols.length === 0) {

                tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-500">No symbols match the current filters.</td></tr>`;

                return;

            }



            tbody.innerHTML = marketSymbols.map(item => {

                const change = parseFloat(item.priceChangePercent);

                const vol = (parseFloat(item.quoteVolume) / 1000000).toFixed(1);

                return `

                    <tr class="clickable-row border-b border-white/5">

                        <td class="p-4 font-bold text-white">${item.symbol}</td>

                        <td class="p-4 text-right mono">${parseFloat(item.lastPrice).toLocaleString()}</td>

                        <td class="p-4 text-right font-bold ${change >= 0 ? 'text-emerald-400' : 'text-rose-500'}">

                            ${change >= 0 ? '+' : ''}${change.toFixed(2)}%

                        </td>

                        <td class="p-4 text-right text-slate-400">$${vol}M</td>

                        <td class="p-4 text-center">

                            <button onclick="startAnalysis('${item.symbol}')" class="px-4 py-2 bg-binance-gold/10 hover:bg-binance-gold text-binance-gold hover:text-black text-[10px] font-bold rounded-lg border border-binance-gold/20 transition-all">ANALYZE</button>

                        </td>

                    </tr>

                `;

            }).join('');

        }



        async function startAnalysis(symbol) {

            if (!geminiApiKey) {

                alert("Gemini API Key가 설정되지 않았습니다. 코드 상단의 geminiApiKey 변수를 확인해 주세요.");

                return;

            }



            const zone = document.getElementById('analysis-zone');

            const content = document.getElementById('ai-content');

            

            zone.classList.remove('hidden');

            content.innerHTML = `<div class="ai-loading-pulse">AI가 ${symbol}의 차트 패턴과 리스크를 퀀트 분석 중입니다...</div>`;

            zone.scrollIntoView({ behavior: 'smooth' });



            // TradingView 차트 로드

            new TradingView.widget({

                "width": "100%",

                "height": 400,

                "symbol": `BINANCE:${symbol}PERP`,

                "interval": "15",

                "theme": "dark",

                "style": "1",

                "locale": "kr",

                "container_id": "tv-container"

            });



            // AI 분석 요청

            const item = marketSymbols.find(s => s.symbol === symbol);

            try {

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`, {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify({

                        contents: [{ parts: [{ text: `

                            당신은 냉철한 퀀트 트레이더입니다. 다음 데이터를 분석하여 한국어로 트레이딩 리포트를 작성하세요.

                            분석 대상: ${symbol}

                            현재 가격: ${item.lastPrice}

                            24시간 변동률: ${item.priceChangePercent}%

                            24시간 거래대금: ${item.quoteVolume} USDT



                            섹션별 가이드:

                            1. 기술적 상황 요약: 현재 가격 변동의 강도와 유동성 분석.

                            2. 심리적 요인: 이 정도 변동폭에서 개인 투자자들이 느끼는 공포와 탐욕 지수 추론.

                            3. 전략 제언: 진입 시점, 손절가(SL), 익절가(TP) 제언.

                            4. 'Meomchit' 경고: 리스크가 너무 크다면 "지금은 멈추어야 할 때"라고 강하게 경고할 것.

                            

                            모든 금액은 소수점을 제외하고 가독성 있게 작성하세요.

                        ` }] }]

                    })

                });



                const result = await response.json();

                const aiText = result.candidates[0].content.parts[0].text;

                content.innerHTML = aiText.replace(/\*\*(.*?)\*\*/g, '<b class="binance-gold">$1</b>');

            } catch (err) {

                content.innerHTML = `<span class="text-rose-500">AI 분석 중 오류가 발생했습니다: ${err.message}</span>`;

            }

        }



        function closeAnalysis() {

            document.getElementById('analysis-zone').classList.add('hidden');

        }



        // 초기 실행

        window.onload = () => {

            if (geminiApiKey) {

                document.getElementById('api-status').innerText = "AI ENGINE READY";

                document.getElementById('api-status').className = "text-emerald-500";

                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";

            }

        };

    </script>

</body>

</html>
