
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Scanner (240m)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e11; color: #eaecef; }
        .card { background-color: #1e2329; border-radius: 12px; transition: all 0.2s; border: 1px solid #2b3139; }
        .card:hover { transform: translateY(-4px); border-color: #f0b90b; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .binance-yellow { color: #f0b90b; }
        .binance-bg-yellow { background-color: #f0b90b; color: #000; }
        .indicator-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .pulse { animation: pulse-yellow 2s infinite; }
        @keyframes pulse-yellow { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e11; }
        ::-webkit-scrollbar-thumb { background: #2b3139; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-bold binance-yellow flex items-center gap-2">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4.5 12 12 22l7.5-10L12 2zm0 3.85L16.62 12 12 18.15 7.38 12 12 5.85z"/></svg>
                    선물 전략 스캐너
                </h1>
                <div class="flex flex-wrap items-center gap-3 mt-2">
                    <span class="text-[11px] bg-gray-800 px-2 py-1 rounded text-gray-400 border border-gray-700">15m 봉 기준</span>
                    <span class="text-[11px] bg-gray-800 px-2 py-1 rounded text-gray-400 border border-gray-700">이평선: 5 > 10 > 20 > 60 (정배열)</span>
                    <span class="text-[11px] bg-yellow-900/30 px-2 py-1 rounded text-yellow-500 border border-yellow-700/50 font-bold">최근 240분 내 단일 봉 10%+ 상승</span>
                </div>
            </div>
            <div class="flex items-center gap-6 bg-gray-900/50 p-4 rounded-xl border border-gray-800">
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Auto-Scan In</p>
                    <p id="timer" class="text-2xl font-mono font-bold text-white leading-none">05:00</p>
                </div>
                <button onclick="scanMarkets()" id="scanBtn" class="binance-bg-yellow px-8 py-3 rounded-lg font-bold hover:opacity-90 active:scale-95 transition-all shadow-lg text-sm">
                    지금 스캔
                </button>
            </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 flex flex-col items-center justify-center">
                <span class="text-gray-500 text-[10px] uppercase mb-1">상태</span>
                <div class="flex items-center font-bold text-sm" id="scanStatus">
                    <span class="indicator-dot bg-gray-500"></span>대기 중
                </div>
            </div>
            <div class="card p-4 flex flex-col items-center justify-center">
                <span class="text-gray-500 text-[10px] uppercase mb-1">감시 대상</span>
                <span id="totalSymbols" class="text-xl font-bold">0</span>
            </div>
            <div class="card p-4 flex flex-col items-center justify-center">
                <span class="text-gray-500 text-[10px] uppercase mb-1">마지막 업데이트</span>
                <span id="lastScanTime" class="text-xl font-bold">-</span>
            </div>
            <div class="card p-4 flex flex-col items-center justify-center">
                <span class="text-gray-500 text-[10px] uppercase mb-1">검출된 심볼</span>
                <span id="matchCount" class="text-xl font-bold text-green-500">0</span>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-yellow-500 mb-4"></div>
            <p id="loadingMsg" class="text-gray-400 animate-pulse text-sm">최근 240분 데이터를 분석 중입니다...</p>
        </div>

        <!-- Results -->
        <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="emptyState" class="text-center py-20 text-gray-500">
            <p class="text-lg">조건을 만족하는 심볼이 없습니다.</p>
            <p class="text-sm mt-2 text-gray-600 italic">240분(4시간) 내에 15분 봉 기준 10% 이상 장대양봉이 발생한 심볼을 찾습니다.</p>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const API_BASE = "https://fapi.binance.com";
        const PROXY = "https://corsproxy.io/?"; 
        
        let countdown = 300;
        let isScanning = false;

        function updateTimer() {
            if (isScanning) return;
            const minutes = Math.floor(countdown / 60);
            const seconds = countdown % 60;
            document.getElementById('timer').innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            if (countdown <= 0) {
                scanMarkets();
                countdown = 300;
            } else {
                countdown--;
            }
        }

        async function fetchSymbols() {
            try {
                const response = await fetch(`${PROXY}${encodeURIComponent(API_BASE + '/fapi/v1/exchangeInfo')}`);
                const data = await response.json();
                return data.symbols
                    .filter(s => s.status === "TRADING" && s.quoteAsset === "USDT")
                    .map(s => s.symbol);
            } catch (e) {
                return [];
            }
        }

        async function analyzeSymbol(symbol) {
            try {
                // 15분 봉 100개 조회
                const res = await fetch(`${PROXY}${encodeURIComponent(API_BASE + `/fapi/v1/klines?symbol=${symbol}&interval=15m&limit=100`)}`);
                const klines = await res.json();
                
                if (!Array.isArray(klines) || klines.length < 70) return null;

                const closes = klines.map(k => parseFloat(k[4]));
                
                // 1. 이동평균선 (SMA)
                const getSMA = (data, period) => {
                    const subset = data.slice(-period);
                    return subset.reduce((a, b) => a + b, 0) / period;
                };

                const ma5 = getSMA(closes, 5);
                const ma10 = getSMA(closes, 10);
                const ma20 = getSMA(closes, 20);
                const ma60 = getSMA(closes, 60);

                // 정배열 검증
                const isBullish = ma5 > ma10 && ma10 > ma20 && ma20 > ma60;
                if (!isBullish) return null;

                // 2. 조건2: 최근 240분(15분 봉 16개) 내 단일 봉 10% 이상 상승
                const recentKlines = klines.slice(-16); 
                let spikeFound = false;
                let maxSpike = 0;
                let spikeTime = "";

                recentKlines.forEach(k => {
                    const low = parseFloat(k[3]);
                    const high = parseFloat(k[2]);
                    const spikePercent = ((high - low) / low) * 100;
                    
                    if (spikePercent >= 10) {
                        spikeFound = true;
                        if (spikePercent > maxSpike) {
                            maxSpike = spikePercent;
                            // 봉의 시작 시간을 사람이 읽기 편하게 변환
                            const d = new Date(k[0]);
                            spikeTime = `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
                        }
                    }
                });

                if (spikeFound) {
                    return {
                        symbol,
                        price: closes[closes.length - 1],
                        maxSpike: maxSpike.toFixed(2),
                        spikeTime,
                        ma: { ma5, ma10, ma20, ma60 }
                    };
                }
            } catch (e) {
                return null;
            }
            return null;
        }

        async function scanMarkets() {
            if (isScanning) return;
            isScanning = true;
            
            const btn = document.getElementById('scanBtn');
            const loading = document.getElementById('loading');
            const resultsDiv = document.getElementById('results');
            const emptyState = document.getElementById('emptyState');
            const statusIndicator = document.getElementById('scanStatus');
            
            statusIndicator.innerHTML = '<span class="indicator-dot bg-yellow-500 pulse"></span>스캔 중...';
            btn.disabled = true;
            loading.classList.remove('hidden');
            resultsDiv.innerHTML = "";
            emptyState.classList.add('hidden');

            const symbols = await fetchSymbols();
            document.getElementById('totalSymbols').innerText = symbols.length;

            let matches = [];
            const chunkSize = 20; 

            for (let i = 0; i < symbols.length; i += chunkSize) {
                const chunk = symbols.slice(i, i + chunkSize);
                document.getElementById('loadingMsg').innerText = `최근 240분 데이터 분석: ${Math.round((i/symbols.length)*100)}% 완료...`;
                
                const results = await Promise.all(chunk.map(s => analyzeSymbol(s)));
                const validResults = results.filter(r => r !== null);
                
                validResults.forEach(res => {
                    matches.push(res);
                    renderCard(res);
                });
            }

            if (matches.length > 0) {
                document.getElementById('notifSound').play().catch(e => {});
                document.getElementById('matchCount').innerText = matches.length;
                emptyState.classList.add('hidden');
            } else {
                emptyState.classList.remove('hidden');
                document.getElementById('matchCount').innerText = "0";
            }

            document.getElementById('lastScanTime').innerText = new Date().toLocaleTimeString();
            statusIndicator.innerHTML = '<span class="indicator-dot bg-green-500"></span>정상';
            loading.classList.add('hidden');
            btn.disabled = false;
            isScanning = false;
            countdown = 300;
        }

        function renderCard(data) {
            const resultsDiv = document.getElementById('results');
            const card = document.createElement('div');
            card.className = "card p-5 flex flex-col gap-4";
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2">
                            <h3 class="text-xl font-bold binance-yellow">${data.symbol}</h3>
                            <span class="text-[9px] bg-yellow-900/40 text-yellow-200 px-1.5 py-0.5 rounded border border-yellow-700/30">FUTURES</span>
                        </div>
                        <p class="text-2xl font-mono mt-1 font-bold text-white">$${data.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[9px] text-gray-500 block mb-1 uppercase tracking-tighter">Max Candle Jump</span>
                        <span class="bg-red-900/80 text-red-100 px-2 py-1 rounded text-sm font-bold border border-red-700/50">${data.maxSpike}%</span>
                        <span class="block text-[10px] text-gray-500 mt-1">at ${data.spikeTime}</span>
                    </div>
                </div>
                
                <div class="space-y-2 border-t border-gray-800 pt-3">
                    <div class="flex justify-between text-[10px] mb-2">
                        <span class="text-gray-400">정배열 상태 (15m)</span>
                        <span class="text-green-500 font-bold uppercase">Perfect Alignment</span>
                    </div>
                    <div class="grid grid-cols-2 gap-x-4 gap-y-1 bg-black/30 p-2 rounded-lg">
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">MA5</span>
                            <span class="text-gray-300">$${data.ma.ma5.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">MA10</span>
                            <span class="text-gray-300">$${data.ma.ma10.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">MA20</span>
                            <span class="text-gray-300">$${data.ma.ma20.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-[11px]">
                            <span class="text-gray-500">MA60</span>
                            <span class="text-gray-300">$${data.ma.ma60.toFixed(2)}</span>
                        </div>
                    </div>
                </div>

                <a href="https://www.binance.com/en/futures/${data.symbol}" target="_blank" class="block w-full text-center text-xs py-3 bg-gray-800 rounded-lg hover:bg-yellow-500 hover:text-black font-bold transition-all uppercase tracking-wider">
                    Open Chart
                </a>
            `;
            resultsDiv.appendChild(card);
        }

        window.onload = () => {
            setInterval(updateTimer, 1000);
            scanMarkets();
        };
    </script>
</body>
</html>
