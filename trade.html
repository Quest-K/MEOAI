<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures - Auto Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0e11; color: #eaecef; }
        .binance-yellow { color: #fcd535; }
        .card { background-color: #1e2329; border-radius: 12px; border: 1px solid #30363d; }
        input { background-color: #2b3139 !important; border: 1px solid #474d57 !important; color: white !important; }
        .profit { color: #0ecb81; }
        .loss { color: #f6465d; }
        
        /* Progress Bar Animation */
        #update-progress {
            height: 2px;
            background-color: #fcd535;
            width: 0%;
            transition: width 10s linear;
        }
        .loading-spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #fcd535;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <!-- Login Section -->
        <section id="auth-section" class="max-w-md mx-auto mt-20 card p-8 shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold binance-yellow mb-2">Login</h1>
                <p class="text-gray-400 text-sm">Supabase 계정으로 로그인</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="login-email" class="w-full p-3 rounded-lg" placeholder="Email">
                <input type="password" id="login-password" class="w-full p-3 rounded-lg" placeholder="Password">
                <button onclick="handleLogin()" id="login-btn" class="w-full bg-[#fcd535] hover:bg-[#f0c82d] text-black font-bold py-3 rounded-lg transition-all flex justify-center items-center gap-2">
                    로그인 및 대시보드 시작
                </button>
            </div>
            <p id="auth-error" class="text-red-500 text-xs mt-4 text-center hidden"></p>
        </section>

        <!-- Dashboard Section -->
        <section id="main-dashboard" class="hidden">
            <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold binance-yellow">Binance Futures</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="user-info" class="text-gray-400 text-sm"></span>
                        <button onclick="handleLogout()" class="text-xs text-gray-500 hover:text-white underline">로그아웃</button>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div class="flex items-center gap-3">
                        <span id="status-text" class="text-xs font-semibold text-green-400">실시간 연결 중 (10초 자동 갱신)</span>
                        <div class="loading-spinner" id="global-loader"></div>
                    </div>
                    <div class="w-48 bg-gray-800 rounded-full h-1 overflow-hidden">
                        <div id="update-progress"></div>
                    </div>
                </div>
            </header>

            <!-- Summary -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="card p-5 border-l-4 border-yellow-500">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">총 미실현 손익</p>
                    <p id="total-pnl" class="text-3xl font-bold mt-2">--</p>
                </div>
                <div class="card p-5">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">지갑 잔고</p>
                    <p id="wallet-balance" class="text-3xl font-bold mt-2">--</p>
                </div>
                <div class="card p-5">
                    <p class="text-xs text-gray-500 uppercase tracking-wider">포지션</p>
                    <p id="position-count" class="text-3xl font-bold mt-2">--</p>
                </div>
            </div>

            <!-- Positions -->
            <section class="card overflow-hidden">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/30">
                    <h2 class="font-semibold text-gray-200">내 포지션 정보</h2>
                    <span id="last-update" class="text-[10px] font-mono text-gray-500"></span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-[#2b3139] text-gray-400 text-[11px] uppercase">
                            <tr>
                                <th class="px-6 py-3">Symbol</th>
                                <th class="px-6 py-3">Size/Side</th>
                                <th class="px-6 py-3">Entry/Mark</th>
                                <th class="px-6 py-3 text-right">PNL</th>
                                <th class="px-6 py-3 text-right">ROE%</th>
                            </tr>
                        </thead>
                        <tbody id="position-table-body" class="divide-y divide-gray-800 text-sm">
                            <tr><td colspan="5" class="px-6 py-10 text-center text-gray-600">데이터를 불러오는 중...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>

        <div id="toast" class="fixed bottom-5 right-5 hidden bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-50"></div>
    </div>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = 'https://your-project.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BINANCE_BASE = 'https://fapi.binance.com';

        let userApiKey = '';
        let userSecretKey = '';
        let refreshTimer = null;
        const REFRESH_INTERVAL = 10000; // 10초

        // --- AUTH ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            
            btn.disabled = true;
            btn.innerHTML = `<div class="loading-spinner"></div> 확인 중...`;

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('auth-error').innerText = error.message;
                document.getElementById('auth-error').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "로그인 및 대시보드 시작";
                return;
            }

            // user_settings 테이블에서 키 정보 가져오기
            const { data: settings, error: sError } = await sb
                .from('user_settings')
                .select('binance_key, binance_secret')
                .eq('user_id', data.user.id)
                .single();

            if (sError || !settings) {
                alert("API 설정을 찾을 수 없습니다. user_settings 테이블을 확인하세요.");
                location.reload();
                return;
            }

            userApiKey = settings.binance_key;
            userSecretKey = settings.binance_secret;
            
            document.getElementById('user-info').innerText = email;
            startDashboard();
        }

        function handleLogout() {
            clearInterval(refreshTimer);
            sb.auth.signOut();
            location.reload();
        }

        // --- CORE LOGIC ---
        function startDashboard() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
            
            // 첫 실행
            fetchAndRefresh();
            
            // 10초 간격 반복
            refreshTimer = setInterval(fetchAndRefresh, REFRESH_INTERVAL);
        }

        async function fetchAndRefresh() {
            // 프로그레스 바 리셋 및 애니메이션 시작
            const bar = document.getElementById('update-progress');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            
            // 데이터 호출 애니메이션 표시
            document.getElementById('global-loader').classList.remove('opacity-0');

            await fetchBinanceData();

            // 데이터 호출 완료 후 프로그레스 바 가동
            setTimeout(() => {
                bar.style.transition = `width ${REFRESH_INTERVAL/1000}s linear`;
                bar.style.width = '100%';
                document.getElementById('global-loader').classList.add('opacity-0');
            }, 100);
        }

        function getSignature(query, secret) {
            return CryptoJS.HmacSHA256(query, secret).toString();
        }

        async function fetchBinanceData() {
            try {
                const ts = Date.now();
                const query = `timestamp=${ts}`;
                const sig = getSignature(query, userSecretKey);
                const headers = { 'X-MBX-APIKEY': userApiKey };

                const [accRes, posRes] = await Promise.all([
                    fetch(`${BINANCE_BASE}/fapi/v2/account?${query}&signature=${sig}`, { headers }),
                    fetch(`${BINANCE_BASE}/fapi/v2/positionRisk?${query}&signature=${sig}`, { headers })
                ]);

                if (!accRes.ok || !posRes.ok) throw new Error("API Key 권한이나 네트워크를 확인하세요.");

                const accData = await accRes.json();
                const posData = await posRes.json();

                updateUI(accData, posData);
            } catch (err) {
                showToast(err.message);
                console.error(err);
            }
        }

        function updateUI(acc, pos) {
            // 요약
            const pnl = parseFloat(acc.totalUnrealizedProfit);
            const pnlDisplay = document.getElementById('total-pnl');
            pnlDisplay.innerText = (pnl >= 0 ? '+' : '') + pnl.toLocaleString() + " USDT";
            pnlDisplay.className = `text-3xl font-bold mt-2 ${pnl >= 0 ? 'profit' : 'loss'}`;
            
            document.getElementById('wallet-balance').innerText = parseFloat(acc.totalWalletBalance).toLocaleString() + " USDT";

            // 포지션 테이블
            const active = pos.filter(p => parseFloat(p.positionAmt) !== 0);
            document.getElementById('position-count').innerText = active.length + "건";

            const tbody = document.getElementById('position-table-body');
            tbody.innerHTML = '';

            if (active.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-600">활성 포지션 없음</td></tr>';
            } else {
                active.forEach(p => {
                    const amt = parseFloat(p.positionAmt);
                    const entry = parseFloat(p.entryPrice);
                    const mark = parseFloat(p.markPrice);
                    const upnl = parseFloat(p.unRealizedProfit);
                    const leverage = p.leverage;
                    const margin = (Math.abs(amt) * entry) / leverage;
                    const roe = ((upnl / margin) * 100).toFixed(2);

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-800/40 border-b border-gray-800 last:border-0";
                    tr.innerHTML = `
                        <td class="px-6 py-4 font-bold">
                            ${p.symbol}
                            <div class="text-[10px] text-gray-500 font-normal uppercase">${p.marginType} ${leverage}x</div>
                        </td>
                        <td class="px-6 py-4">
                            <span class="font-bold ${amt > 0 ? 'profit' : 'loss'}">${amt > 0 ? 'LONG' : 'SHORT'}</span>
                            <div class="text-xs text-gray-400">${Math.abs(amt)}</div>
                        </td>
                        <td class="px-6 py-4 text-xs">
                            <span class="text-gray-500">E:</span> ${entry.toLocaleString()}<br>
                            <span class="text-gray-500">M:</span> ${mark.toLocaleString()}
                        </td>
                        <td class="px-6 py-4 text-right font-bold ${upnl >= 0 ? 'profit' : 'loss'}">
                            ${upnl.toLocaleString()}
                        </td>
                        <td class="px-6 py-4 text-right">
                            <span class="px-2 py-1 rounded text-xs font-bold ${roe >= 0 ? 'bg-green-500/10 profit' : 'bg-red-500/10 loss'}">
                                ${roe >= 0 ? '+' : ''}${roe}%
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('last-update').innerText = `LAST SYNC: ${new Date().toLocaleTimeString()}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
