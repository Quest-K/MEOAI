
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro | 30s Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .binance-card { background-color: #1e2329; border-radius: 12px; border: 1px solid #2b3139; }
        .accent-yellow { color: #fcd535; }
        .status-up { color: #0ecb81; }
        .status-down { color: #f6465d; }
        .glass-header { background: rgba(30, 35, 41, 0.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
        .search-input { background: #2b3139; border: 1px solid #474d57; color: white; transition: all 0.2s; }
        .search-input:focus { border-color: #fcd535; outline: none; box-shadow: 0 0 0 2px rgba(252, 213, 53, 0.2); }
        .fixed-btc { border-left: 4px solid #f3ba2f; background: rgba(243, 186, 47, 0.05); }
        .loading-shimmer { background: linear-gradient(90deg, #2b3139 25%, #3e444e 50%, #2b3139 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .progress-bar { height: 2px; background: #fcd535; transition: width 0.3s; position: absolute; bottom: 0; left: 0; }
    </style>
</head>
<body class="antialiased pb-10">

    <nav class="glass-header border-b border-[#2b3139] py-4 mb-6">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center font-bold text-black text-xl">M</div>
                <h1 class="text-xl font-bold tracking-tight">Market <span class="accent-yellow">Scanner</span></h1>
            </div>
            <div class="flex flex-col items-end gap-1">
                <div id="scanIndicator" class="flex items-center gap-2 text-xs text-gray-400">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-green-500"></span>
                    <span id="statusText">대기 중 (30초 주기)</span>
                </div>
                <div class="text-[10px] text-gray-500" id="nextUpdate">다음 업데이트: 계산 중...</div>
            </div>
        </div>
        <div id="loadingProgress" class="progress-bar" style="width: 0%"></div>
    </nav>

    <div class="max-w-7xl mx-auto px-4">
        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="binance-card p-3 md:p-4">
                <p class="text-gray-500 text-[10px] font-semibold mb-1 uppercase">분석 종목</p>
                <div id="totalSymbols" class="text-xl md:text-2xl font-bold">---</div>
            </div>
            <div class="binance-card p-3 md:p-4 border-l-4 border-green-500">
                <p class="text-gray-500 text-[10px] font-semibold mb-1 uppercase">LONG</p>
                <div id="bullSymbols" class="text-xl md:text-2xl font-bold status-up">---</div>
            </div>
            <div class="binance-card p-3 md:p-4 border-l-4 border-red-500">
                <p class="text-gray-500 text-[10px] font-semibold mb-1 uppercase">SHORT</p>
                <div id="bearSymbols" class="text-xl md:text-2xl font-bold status-down">---</div>
            </div>
            <div class="binance-card p-3 md:p-4 border-l-4 border-yellow-500">
                <p class="text-gray-500 text-[10px] font-semibold mb-1 uppercase">변동성</p>
                <div id="avgVol" class="text-xl md:text-2xl font-bold accent-yellow">---</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="flex flex-col md:flex-row gap-3 mb-6 items-center">
            <input type="text" id="symbolSearch" placeholder="심볼 검색 (예: AIOT)..." class="search-input px-4 py-3 rounded-lg text-sm w-full md:w-64">
            <div class="flex bg-[#1e2329] p-1 rounded-lg border border-[#2b3139] w-full">
                <button onclick="setFilter('all')" id="btn-all" class="flex-1 px-4 py-1.5 rounded-md text-xs filter-btn bg-gray-700">전체</button>
                <button onclick="setFilter('gainers')" id="btn-gainers" class="flex-1 px-4 py-1.5 rounded-md text-xs filter-btn">상승장</button>
                <button onclick="setFilter('volume')" id="btn-volume" class="flex-1 px-4 py-1.5 rounded-md text-xs filter-btn">거래대금순</button>
            </div>
        </div>

        <!-- Table -->
        <div class="binance-card overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-[#2b3139] text-gray-400 text-[10px] uppercase tracking-wider">
                        <tr>
                            <th class="px-4 py-4">Symbol</th>
                            <th class="px-4 py-4 text-right">Price</th>
                            <th class="px-4 py-4 text-center">15m</th>
                            <th class="px-4 py-4 text-center">1h</th>
                            <th class="px-4 py-4 text-center">6h</th>
                            <th class="px-4 py-4 text-center bg-black/20">24h</th>
                            <th class="px-4 py-4 text-right">Volume</th>
                            <th class="px-4 py-4 text-center">Signal</th>
                        </tr>
                    </thead>
                    <tbody id="opportunityList" class="divide-y divide-[#2b3139]">
                        <!-- 데이터 로딩 전 스켈레톤 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FAPI = "https://fapi.binance.com";
        const UPDATE_INTERVAL = 30000; // 30초
        let allTickerData = [];
        let timeframeCache = JSON.parse(localStorage.getItem('tf_cache') || '{}'); 
        let currentFilter = 'all';
        let isScanning = false;
        let countdown = 30;

        async function initScanner() {
            startCountdown();
            await refreshData();
            // 30초 주기 설정
            setInterval(refreshData, UPDATE_INTERVAL);
        }

        async function refreshData() {
            if(isScanning) return;
            isScanning = true;
            countdown = 30;
            
            updateStatus('analyzing', '기초 데이터 수집 중...');
            await fetchBaseTickers();
            renderOpportunities();
            
            await updateMultiTimeframes();
            isScanning = false;
            updateStatus('idle', '분석 완료 (30초 주기)');
        }

        function startCountdown() {
            setInterval(() => {
                if(!isScanning) {
                    countdown--;
                    if(countdown < 0) countdown = 0;
                    document.getElementById('nextUpdate').innerText = `다음 업데이트까지: ${countdown}초`;
                } else {
                    document.getElementById('nextUpdate').innerText = `업데이트 진행 중...`;
                }
            }, 1000);
        }

        async function fetchBaseTickers() {
            try {
                const res = await fetch(`${FAPI}/fapi/v1/ticker/24hr`);
                const data = await res.json();
                allTickerData = data.filter(i => i.symbol.endsWith('USDT'));
                updateSummary();
            } catch (e) { console.error("Base fetch error", e); }
        }

        async function updateMultiTimeframes() {
            const progressBar = document.getElementById('loadingProgress');
            const searchVal = document.getElementById('symbolSearch').value.toUpperCase();
            
            // 우선순위 정렬: 검색어 포함 -> 거래량 상위
            let targets = [...allTickerData].sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
            if(searchVal) {
                const searched = targets.filter(t => t.symbol.includes(searchVal));
                targets = [...searched, ...targets.filter(t => !t.symbol.includes(searchVal))];
            }

            const total = targets.length;
            const chunkSize = 8; // 30초 주기에 맞춰 병렬 요청 수 상향
            
            for (let i = 0; i < targets.length; i += chunkSize) {
                const chunk = targets.slice(i, i + chunkSize);
                const progress = Math.round((i / total) * 100);
                progressBar.style.width = `${progress}%`;
                updateStatus('analyzing', `지표 분석 중 (${progress}%)`);

                await Promise.all(chunk.map(async (t) => {
                    try {
                        // 30초마다 모든 데이터를 갱신하기 위해 limit 최적화 (75 -> 72)
                        const res = await fetch(`${FAPI}/fapi/v1/klines?symbol=${t.symbol}&interval=5m&limit=73`);
                        const klines = await res.json();
                        
                        if (klines.length >= 72) {
                            const currentPrice = parseFloat(klines[klines.length - 1][4]);
                            const getChange = (index) => {
                                const past = parseFloat(klines[klines.length - 1 - index][4]);
                                return ((currentPrice - past) / past) * 100;
                            };

                            timeframeCache[t.symbol] = {
                                m15: getChange(3),
                                h1: getChange(12),
                                h6: getChange(72),
                                ts: Date.now()
                            };
                        }
                    } catch (e) {}
                }));
                
                if (i % 16 === 0) renderOpportunities();
                await new Promise(r => setTimeout(r, 50)); // API Rate Limit 준수
            }
            
            progressBar.style.width = '0%';
            localStorage.setItem('tf_cache', JSON.stringify(timeframeCache));
        }

        function updateStatus(state, message) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            txt.innerText = message;
            
            if(state === 'analyzing') {
                dot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-pulse";
            } else {
                dot.className = "w-2 h-2 rounded-full bg-green-500";
            }
        }

        function updateSummary() {
            document.getElementById('totalSymbols').innerText = allTickerData.length;
            const bulls = allTickerData.filter(t => parseFloat(t.priceChangePercent) > 3).length;
            const bears = allTickerData.filter(t => parseFloat(t.priceChangePercent) < -3).length;
            document.getElementById('bullSymbols').innerText = bulls;
            document.getElementById('bearSymbols').innerText = bears;
            
            const avg = allTickerData.reduce((acc, cur) => acc + Math.abs(parseFloat(cur.priceChangePercent)), 0) / allTickerData.length;
            document.getElementById('avgVol').innerText = avg.toFixed(2) + "%";
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-gray-700'));
            document.getElementById(`btn-${filter}`).classList.add('bg-gray-700');
            renderOpportunities();
        }

        function renderOpportunities() {
            const listBody = document.getElementById('opportunityList');
            const search = document.getElementById('symbolSearch').value.toUpperCase();
            
            let displayList = [...allTickerData];

            if (currentFilter === 'gainers') displayList = displayList.filter(t => parseFloat(t.priceChangePercent) > 0);
            if (currentFilter === 'volume') displayList.sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
            else displayList.sort((a, b) => Math.abs(parseFloat(b.priceChangePercent)) - Math.abs(parseFloat(a.priceChangePercent)));

            if (search) displayList = displayList.filter(t => t.symbol.includes(search));

            const btcIndex = displayList.findIndex(t => t.symbol === 'BTCUSDT');
            if (btcIndex > -1 && !search) {
                const btc = displayList.splice(btcIndex, 1)[0];
                displayList.unshift(btc);
            }

            listBody.innerHTML = displayList.slice(0, 60).map(t => {
                const isBTC = t.symbol === 'BTCUSDT';
                const d24 = parseFloat(t.priceChangePercent);
                const tc = timeframeCache[t.symbol] || { m15: null, h1: null, h6: null };
                
                const formatVal = (val, isMain = false) => {
                    if (val === null) return `<div class="h-4 w-12 loading-shimmer rounded mx-auto"></div>`;
                    const colorClass = val >= 0 ? 'status-up' : 'status-down';
                    return `<span class="${colorClass} ${isMain ? 'font-bold text-sm' : 'text-[11px]'}">${val >= 0 ? '+' : ''}${val.toFixed(2)}%</span>`;
                };

                return `
                    <tr class="hover:bg-white/5 transition border-b border-[#2b3139] ${isBTC ? 'fixed-btc' : ''}">
                        <td class="px-4 py-3">
                            <div class="flex flex-col">
                                <span class="font-bold ${isBTC ? 'accent-yellow' : 'text-white'} text-sm">${t.symbol.replace('USDT', '')}</span>
                                <span class="text-[9px] text-gray-500 uppercase">Binance Perp</span>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-right font-mono text-xs text-gray-300">
                            ${parseFloat(t.lastPrice).toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </td>
                        <td class="px-4 py-3 text-center font-mono">${formatVal(tc.m15)}</td>
                        <td class="px-4 py-3 text-center font-mono">${formatVal(tc.h1)}</td>
                        <td class="px-4 py-3 text-center font-mono">${formatVal(tc.h6)}</td>
                        <td class="px-4 py-3 text-center font-mono bg-black/10">${formatVal(d24, true)}</td>
                        <td class="px-4 py-3 text-right text-gray-400 text-[10px]">
                            ${(parseFloat(t.quoteVolume) / 1000000).toFixed(1)}M
                        </td>
                        <td class="px-4 py-3 text-center">
                            ${getSignalBadge(d24, tc.m15, tc.h1)}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getSignalBadge(d24, m15, h1) {
            if (m15 > 0.8 && h1 > 1.5) return `<span class="text-[9px] bg-green-500/20 text-green-500 px-2 py-0.5 rounded border border-green-500/30 font-bold">STRONG BUY</span>`;
            if (m15 < -0.8 && h1 < -1.5) return `<span class="text-[9px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded border border-red-500/30 font-bold">STRONG SELL</span>`;
            if (Math.abs(m15) > 0.5) return `<span class="text-[9px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded border border-blue-500/30">VOLATILE</span>`;
            return `<span class="text-[9px] bg-gray-800 text-gray-500 px-2 py-0.5 rounded">STABLE</span>`;
        }

        document.getElementById('symbolSearch').addEventListener('input', renderOpportunities);
        window.onload = initScanner;
    </script>
</body>
</html>
